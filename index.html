<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --font:'DM Sans',-apple-system,system-ui,sans-serif;
    --display:'Baloo 2','DM Sans',sans-serif;
    --header:#EF9CB4;
    --bg:linear-gradient(180deg,#FDEFF3,#FBE7EE);
    --surface:#FFFFFF;
    --text:#2B2A26;
    --text-soft:#9A938A;
    --divider:#EFE9DF;
    --accent:#EF9CB4;
    --accent-strong:#E37D9A;
    --accent-bg:#FBEFF4;
    --danger:#D67A8E;
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);background-attachment:fixed;color:var(--text);
    font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);}
  button{cursor:pointer;background:none;border:none;}
  input,select{background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--radius-sm);
    padding:11px 14px;width:100%;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  a{color:var(--accent-strong);}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 18px var(--reserve,160px);}

  .band{background:var(--header);margin:0 -18px;padding:16px 18px 20px;color:#fff;}
  .band-top{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;}
  .logo-cat{width:30px;height:30px;flex:0 0 auto;display:inline-flex;}
  .logo-cat svg,.auth-cat svg,.logo-cat img,.auth-cat img{width:100%;height:100%;display:block;object-fit:contain;}
  .gear{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;}
  .gear:active{background:rgba(255,255,255,.34);}
  .bandnav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .bandnav .navbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;line-height:1;}
  .bandnav .navbtn.off{opacity:.35;pointer-events:none;}
  .bandnav .d1{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;line-height:1;text-align:center;}
  .bandnav .d2{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;}
  .hero{text-align:center;margin-top:14px;}
  .hero-num{font-family:var(--display);font-weight:800;font-size:60px;color:#fff;line-height:.95;}
  .hero-label{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.03em;}
  .progress{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .progress .track{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;}
  .progress .fill{height:100%;background:rgba(255,255,255,.92);border-radius:6px;transition:width .3s ease;}
  .progress .pct{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;min-width:34px;text-align:right;}
  .statchips{display:flex;gap:10px;margin-top:12px;}
  .statchip{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:9px 8px;text-align:center;}
  .statchip .l{font-size:10px;color:rgba(255,255,255,.8);}
  .statchip .v{font-family:var(--display);font-weight:700;font-size:16px;color:#fff;margin-top:2px;}

  .card{background:var(--surface);border-radius:24px;padding:18px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-top:14px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text);}
  .card-sub{font-size:13px;color:var(--text-soft);}

  .macrocols{display:flex;gap:10px;}
  .macrocol{flex:1;}
  .macrocol .mv{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;}
  .macrocol .mv s{text-decoration:none;font-size:12px;font-weight:600;color:var(--text-soft);}
  .macrocol .ml{font-size:12px;color:var(--text-soft);margin:5px 0 6px;}
  .mbar{height:5px;border-radius:4px;background:#ECE6DB;overflow:hidden;}
  .mbar i{display:block;height:100%;}

  .mealgroup{padding-top:14px;}
  .meal-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-line .ml-left{display:flex;align-items:center;gap:8px;}
  .meal-dot{width:7px;height:7px;border-radius:50%;}
  .meal-name{font-weight:600;font-size:14px;color:var(--text);}
  .meal-sub{font-size:13px;color:var(--text-soft);}
  .fooditems{display:flex;flex-direction:column;gap:8px;}

    border-radius:16px;padding:4px 14px;box-shadow:0 3px 14px rgba(43,42,38,.05);}
  .rv-codepre{font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:2px;color:var(--text-soft);}
  .rv-codeinp{flex:1;border:none;background:none;outline:none;font-family:var(--display);font-weight:800;
    font-size:24px;letter-spacing:4px;color:var(--text);padding:12px 6px;text-transform:uppercase;}
  .rv-note{color:var(--text-soft);font-size:13px;line-height:1.5;text-align:center;margin-top:14px;}
  .rv-leave{width:100%;margin-top:16px;padding:14px 0;border:none;border-radius:16px;background:var(--surface);
    box-shadow:0 3px 14px rgba(43,42,38,.05);font-family:var(--display);font-weight:700;color:#E5533A;cursor:pointer;}
  .rv-brow-s{font-size:12.5px;color:var(--text-soft);line-height:1.45;}
  .rv-grow{margin-bottom:14px;}
  .rv-grow:last-child{margin-bottom:2px;}
  .rv-grow-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:13.5px;color:var(--text);}
  .rv-grow-h b{font-family:var(--display);font-size:14px;}
  .rv-gbar{height:12px;border-radius:999px;background:#EFE9DF;overflow:hidden;}
  .rv-gbar>span{display:block;height:100%;border-radius:999px;transition:width .4s;}
  .rv-rules{padding:2px 0 4px;}
  .rv-rules-lead{font-size:14px;color:var(--text);line-height:1.55;margin:0 0 18px;}
  .rv-rule{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
  .rv-rule-ic{flex:none;width:34px;height:34px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;font-size:17px;font-weight:800;}
  .rv-rule-t{font-family:var(--display);font-weight:700;font-size:14.5px;color:var(--text);}
  .rv-rule-t b{color:var(--accent-strong);}
  .rv-rule-s{font-size:12.5px;color:var(--text-soft);line-height:1.5;margin-top:2px;}
  .rv-rules-foot{background:var(--accent-bg);border-radius:14px;padding:13px 15px;font-size:13px;
    color:var(--text);line-height:1.5;margin-top:6px;}
  .rv-spin{width:26px;height:26px;border:3px solid var(--accent-bg);border-top-color:var(--accent-strong);
    border-radius:50%;margin:30px auto;animation:rvspin .8s linear infinite;}
  @keyframes rvspin{to{transform:rotate(360deg)}}
  .rv-daycol.tap{cursor:pointer;border-radius:10px;transition:background .15s;}
  .rv-daycol.tap:active{background:var(--accent-bg);}
  .rv-daytip{margin-top:12px;font-size:12px;color:var(--text-soft);text-align:center;}
  .rv-diary-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin:0 0 14px;}
  .rv-diary-date{font-size:13px;color:var(--text-soft);}
  .rv-diary-tot{font-family:var(--display);font-weight:800;font-size:20px;color:var(--text);}
  .rv-diary-you{font-size:12px;color:var(--text-soft);text-align:right;line-height:1.4;}
  .rv-diary-you b{font-family:var(--display);color:var(--text);}
  .rv-diary-load{min-height:80px;display:flex;align-items:center;justify-content:center;}
  .rv-diary-head2{display:flex;gap:10px;margin:0 0 6px;}
  .rv-dc{flex:1;min-width:0;background:var(--accent-bg);border-radius:16px;padding:12px 13px;}
  .rv-dc-name{font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rv-dc-tot{font-family:var(--display);font-weight:800;font-size:24px;color:var(--text);line-height:1;}
  .rv-dc-tot span{font-family:var(--font);font-weight:600;font-size:12px;color:var(--text-soft);}
  .rv-dc-sub{font-size:11.5px;color:var(--text-soft);margin-top:5px;line-height:1.35;}
  .rv-dc-sub b{font-weight:700;}
  .rv-diary-date2{font-size:12.5px;color:var(--text-soft);text-align:center;margin:8px 0 14px;}
</style>

let tab='today';
let viewDate=todayKey();
const MEALS=['Breakfast','Lunch','Dinner','Snack'];
const MEAL_FRAC={Breakfast:0.25,Lunch:0.35,Dinner:0.30,Snack:0.10};
// which meals the user usually eats (Plan tab). Missing/all-off ⇒ treat all four as on.
function mealsEnabledMap(){
  const d={Breakfast:true,Lunch:true,Dinner:true,Snack:true};
  const m=state.settings.meals;
  if(!m||typeof m!=='object') return d;
  const merged=Object.assign({},d,m);
  return MEALS.some(k=>merged[k])?merged:d;
}
function enabledMeals(){ const m=mealsEnabledMap(); return MEALS.filter(k=>m[k]); }
// a meal's share of the daily target, renormalised across only the meals you eat
function mealFraction(meal){
  const en=enabledMeals();
  const denom=en.reduce((a,k)=>a+(MEAL_FRAC[k]||0),0)||1;
  return en.includes(meal) ? (MEAL_FRAC[meal]||0)/denom : (MEAL_FRAC[meal]||0.3);
}
function defaultMeal(){
  const h=new Date().getHours();
  const clock=h<11?'Breakfast':h<15?'Lunch':h<21?'Dinner':'Snack';
  const en=enabledMeals();
  if(en.includes(clock)) return clock;
  const idx=MEALS.indexOf(clock); let best=en[0]||clock, bd=99;
  en.forEach(k=>{const dd=Math.abs(MEALS.indexOf(k)-idx); if(dd<bd){bd=dd;best=k;}});
  return best;
}
function shiftDay(key,delta){const a=key.split('-').map(Number);const d=new Date(a[0],a[1]-1,a[2]);d.setDate(d.getDate()+delta);return dateKey(d);}
function dayLabel(key){if(key===todayKey())return 'Today';if(key===shiftDay(todayKey(),-1))return 'Yesterday';return new Date(key+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'long'});}
function mealChips(sel){return `<div class="field"><label>Meal</label><div class="chips mealchips">${MEALS.map(x=>`<button class="chip${x===sel?' sel':''}" data-meal="${x}">${x}</button>`).join('')}</div></div>`;}
function wireMealChips(root){const box=root.querySelector('.mealchips');let cur=box.querySelector('.chip.sel')?box.querySelector('.chip.sel').dataset.meal:MEALS[0];box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{cur=c.dataset.meal;box.querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x===c));});return ()=>cur;}
const UNITS=[{u:'gram',g:1},{u:'ml',g:1},{u:'tsp',g:5},{u:'tbsp',g:15},{u:'cup',g:240},{u:'bowl',g:250},{u:'plate',g:300},{u:'piece',g:50},{u:'slice',g:30},{u:'serving',g:100}];
function servingWidget(){
  return `<div class="field"><label>Serving size</label>
    <select id="sv-unit">${UNITS.map(x=>`<option value="${x.u}">${x.u}</option>`).join('')}</select></div>
  <div class="field-row">
    <div class="field"><label>Quantity</label><input type="number" inputmode="decimal" id="sv-qty" value="100"></div>
    <div class="field" id="sv-gpu-wrap" style="display:none"><label>Grams per serving</label><input type="number" inputmode="decimal" id="sv-gpu" value="1"></div>
  </div>
  <div class="hint" id="sv-total"></div>`;
}
function wireServing(root,per,initGrams){
  const unitSel=root.querySelector('#sv-unit'),qty=root.querySelector('#sv-qty'),gpu=root.querySelector('#sv-gpu'),gpuWrap=root.querySelector('#sv-gpu-wrap'),total=root.querySelector('#sv-total');
  function grams(){return (+qty.value||0)*(+gpu.value||0);}
  function recompute(){const g=grams();const u=unitSel.value;const wl=(u==='ml')?`${r1(g)} ml`:`${r1(g)} g`;total.textContent=`= ${wl}${per?` · ${r0(per.calories*g/100)} kcal`:''}`;}
  function syncUnit(){
    const u=unitSel.value;
    if(u==='gram'||u==='ml'){gpuWrap.style.display='none';gpu.value=1;qty.value=100;}
    else{const d=UNITS.find(x=>x.u===u);gpuWrap.style.display='';gpu.value=d.g;qty.value=1;}
    recompute();
  }
  unitSel.onchange=syncUnit;qty.oninput=recompute;gpu.oninput=recompute;
  if(initGrams){unitSel.value='gram';gpuWrap.style.display='none';gpu.value=1;qty.value=r1(initGrams);}
  recompute();
  return {grams,desc:()=>{const u=unitSel.value,q=+qty.value||0;return (u==='gram')?`${r1(grams())} g`:(u==='ml')?`${r1(grams())} ml`:`${q} ${u} (${r1(grams())} g)`;}};
}
/* Portion picker: Small / Medium (avg) / Large chips + a count stepper. p={label,small,medium,large}. */
function portionPicker(p){
  const label=esc(p.label||'serving');
  return `<div class="field"><label>Portion <span class="ai-badge">typical</span></label>
    <div class="pchips">
      <button type="button" class="pchip" data-g="${p.small}" data-s="small">Small<span>${p.small} g</span></button>
      <button type="button" class="pchip on" data-g="${p.medium}" data-s="medium">Medium<span>${p.medium} g</span></button>
      <button type="button" class="pchip" data-g="${p.large}" data-s="large">Large<span>${p.large} g</span></button>
    </div></div>
    <div class="field"><label>How many ${label}?</label>
      <div class="qstep"><button type="button" id="pp-dec" aria-label="Fewer">−</button><input id="pp-qty" type="number" inputmode="decimal" value="1"><button type="button" id="pp-inc" aria-label="More">+</button></div>
    </div>
    <div class="hint" id="pp-total"></div>
    <button type="button" class="linkbtn" id="pp-manual" style="margin-top:2px">Enter exact grams instead</button>`;
}
function wirePortion(root,per,p){
  let gpc=p.medium, size='medium';
  const qEl=root.querySelector('#pp-qty'), tot=root.querySelector('#pp-total'), chips=[...root.querySelectorAll('.pchip')];
  const grams=()=>Math.max(0,(+qEl.value||0))*gpc;
  const recompute=()=>{const g=grams();tot.textContent=`= ${r0(g)} g · ${r0(per.calories*g/100)} kcal`;};
  chips.forEach(c=>c.onclick=()=>{chips.forEach(x=>x.classList.toggle('on',x===c));gpc=+c.dataset.g;size=c.dataset.s;recompute();});
  root.querySelector('#pp-dec').onclick=()=>{qEl.value=Math.max(1,(+qEl.value||1)-1);recompute();};
  root.querySelector('#pp-inc').onclick=()=>{qEl.value=(+qEl.value||0)+1;recompute();};
  qEl.oninput=recompute; recompute();
  return {grams,desc:()=>{const q=+qEl.value||0,lbl=p.label||'serving';return `${q} ${size} ${lbl}${q!==1?'s':''} (${r0(grams())} g)`;}};
}

function dateKey(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function todayKey(){return dateKey(new Date());}
function fmtDate(){return new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});}
function r0(n){return Math.round(n||0);}
function r1(n){return Math.round((n||0)*10)/10;}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const KG_PER_LB=0.45359237, CM_PER_IN=2.54;
function kgToUnit(kg,u){return u==='lb'?kg/KG_PER_LB:kg;}
function unitToKg(v,u){return u==='lb'?v*KG_PER_LB:v;}
function cmToUnit(cm,u){return u==='in'?cm/CM_PER_IN:cm;}
function unitToCm(v,u){return u==='in'?v*CM_PER_IN:v;}

function latestWeightKg(){
  if(!state.weights.length)return null;
  const w=[...state.weights].sort((a,b)=>a.date<b.date?1:-1)[0];
  return unitToKg(w.weight, w.unit||'kg');
}

function sum(arr,f){return arr.reduce((s,x)=>s+(x[f]||0),0);}
/* consecutive days (ending today, or yesterday if today isn't logged yet) with any food logged */
function loggingStreak(){
  const logged=new Set(state.entries.map(e=>e.date));
  let cur=todayKey();
  if(!logged.has(cur)) cur=shiftDay(cur,-1);   // today unlogged — streak still stands through yesterday
  let n=0;
  while(logged.has(cur)){ n++; cur=shiftDay(cur,-1); }
  return n;
}
/* last 7 calendar days ending today, marked logged/not — for the streak strip */
function last7Logged(){
  const logged=new Set(state.entries.map(e=>e.date)), tk=todayKey(), out=[];
  let d=tk;
  for(let i=0;i<7;i++){ out.unshift({date:d,logged:logged.has(d),today:d===tk}); d=shiftDay(d,-1); }
  return out;
}

let _fabH=52;
function layout(){
  const tb=document.querySelector('.tabbar');
  const h=tb?tb.offsetHeight:64;
  const fab=document.getElementById('fab');
  if(fab && fab.offsetHeight) _fabH=fab.offsetHeight;
  const root=document.documentElement.style;
  root.setProperty('--fab-bottom',(h+14)+'px');
  root.setProperty('--reserve',(h+_fabH+30)+'px');
}
function render(){
  applyTheme(state.settings.theme);
  document.querySelectorAll('.tabbar .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  $('fab').style.display = tab==='today' ? 'block' : 'none';
  if(tab==='today')renderToday();
  else if(tab==='weight')renderWeight();
  else if(tab==='rivals')renderRivals();
  else renderPlan();
  layout();
}

    const nline = st>0 ? `<b>${st}</b>-day streak` : `No streak yet`;
    const sub = st>0
      ? (loggedToday ? `Logged today — nice, keep it rolling.` : `Log something today to reach ${st+1} days.`)
      : `Log any food each day to start a streak.`;
    const dots = days.map(d=>`<span class="sd ${d.logged?'on':'off'}${d.today?' today':''}"></span>`).join('');
    streakHtml=`<div class="streak">
      <div class="streak-flame">${IC_FLAME}</div>
      <div class="streak-main"><div class="streak-n">${nline}</div><div class="streak-sub">${sub}</div></div>
      <div class="streak-dots">${dots}</div>
    </div>`;
  }
  // macros card
  const macro=(g,ref,color,label)=>{
    const pct=Math.max(0,Math.min(100,Math.round((g/ref)*100)));
    return `<div class="macrocol"><div class="mv" style="color:${color}">${r0(g)}<s>g</s></div><div class="ml">${label}</div><div class="mbar"><i style="width:${pct}%;background:${color}"></i></div></div>`;
  };
  const macroCard=`<div class="card">
    <div class="card-title" style="margin-bottom:14px">Macros today</div>
    <div class="macrocols">
      ${macro(sum(food,'protein_g'),120,'#18A974','Protein')}
      ${macro(sum(food,'carbs_g'),300,'#F2A93B','Carbs')}
      ${macro(sum(food,'fat_g'),70,'#FF6B4A','Fat')}
    </div></div>`;

  // food card grouped by meal
  let groups='';
  MEALS.forEach(mealName=>{
    const items=food.filter(e=>(e.meal||'Snack')===mealName);
    if(!items.length)return;
    const subtotal=sum(items,'calories');
    groups+=`<div class="mealgroup">
      <div class="meal-line"><div class="ml-left"><span class="meal-dot" style="background:${MEALCOLOR[mealName]}"></span><span class="meal-name">${mealName}</span></div><span class="meal-sub">${r0(subtotal)} kcal</span></div>
      <div class="fooditems">${items.map(e=>`
        <button class="fooditem" data-edit-food="${e.id}">
          <span style="min-width:0;display:flex;flex-direction:column;gap:2px"><span class="fi-name">${esc(e.name)}</span><span class="fi-sub">${esc(e.servingLabel||r0(e.grams)+' g')}</span></span>
          <span class="fi-right"><span class="fi-cal">${r0(e.calories)}</span><svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>`).join('')}</div>
    </div>`;
  });
  if(!groups)groups=`<div class="empty" style="margin-top:6px">No food logged${atToday?' yet':''}. Tap Add to start.</div>`;
  const foodCard=`<div class="card">
    <div class="card-head"><div class="card-title">Food</div><div class="card-sub">${r0(consumed)} kcal</div></div>
    ${groups}</div>`;

  // activity card
  const actRows = ex.length ? ex.map((e,i)=>`
    <div class="act-item${i===0?' first':''}" data-edit-ex="${e.id}">
      <div class="act-icon">${actMeta(e.activity).ic}</div>
      <div style="flex:1;min-width:0"><div class="act-name">${esc(e.activity)}</div><div class="act-sub">${e.minutes} min · ${e.intensity}</div></div>
      <div class="act-cal">${r0(e.caloriesBurned)}</div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-soft);flex:none;margin-left:6px"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join('') : `<div class="empty" style="margin-top:0">No exercise logged.</div>`;
  const actCard=`<div class="card">
    <div class="card-head"><div class="card-title">Activity</div><div class="card-sub">${r0(burned)} kcal</div></div>
    ${actRows}</div>`;

  $('main').innerHTML=band+streakHtml+macroCard+foodCard+actCard;
  $('open-settings').onclick=openSettings;
  $('open-cal').onclick=openCalendar;
  $('cal-open2').onclick=openCalendar;
  $('day-prev').onclick=()=>{viewDate=shiftDay(viewDate,-1);render();};
  $('day-next').onclick=()=>{if(!atToday){viewDate=shiftDay(viewDate,1);render();}};
  document.querySelectorAll('[data-edit-food]').forEach(n=>n.onclick=()=>editFood(n.dataset.editFood));
  document.querySelectorAll('[data-edit-ex]').forEach(n=>n.onclick=()=>editExercise(n.dataset.editEx));
}

/* ---------- CALENDAR ---------- */
function openCalendar(){
  const target=state.settings.dailyTarget;
  const today=todayKey();
  const map={};
  for(const e of state.entries){(map[e.date]=map[e.date]||{c:0,b:0}).c+=e.calories||0;}
  for(const x of state.exercise){(map[x.date]=map[x.date]||{c:0,b:0}).b+=x.caloriesBurned||0;}
  const hasData=(k)=>!!(map[k]&&map[k].c>0);
  const netOf=(k)=>map[k]?(map[k].c-map[k].b):0;
  const consumedOf=(k)=>map[k]?map[k].c:0;
  const metric=(k)=>target!=null?(target-netOf(k)):netOf(k);   // remaining (target − food + exercise) when a target is set
  const lerp=(a,b,t)=>[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
  const lum=(c)=>(0.299*c[0]+0.587*c[1]+0.114*c[2])/255;
  const GLO=[150,226,197],GHI=[16,150,101],RLO=[249,178,180],RHI=[222,54,60];
  const signed=(k)=>{ if(target==null)return r0(metric(k)); const v=metric(k); return (v>0?'+':'')+r0(v); };
  const heat=(k)=>{
    const st=statusOf(k);
    if((st==='under'||st==='over')&&target){
      const rem=target-netOf(k); let f,bg;
      if(rem>=0){ f=Math.min(1,rem/target); bg=lerp(GLO,GHI,f); } else { f=Math.min(1,(-rem)/target); bg=lerp(RLO,RHI,f); }
      return {bg:`rgb(${bg[0]},${bg[1]},${bg[2]})`, fg:lum(bg)>0.62?'#23201c':'#fff'};
    }
    return {bg:CELLBG[st], fg:CELLFG[st]};
  };
  const statusOf=(k)=>{ if(k>today)return 'future'; if(!hasData(k))return 'none'; if(!target)return 'data'; return netOf(k)<=target?'under':'over'; };
  const CELLBG={under:'#18A974',over:'#E5484D',data:'var(--accent-bg)',none:'rgba(43,42,38,.04)',future:'transparent'};
  const CELLFG={under:'#fff',over:'#fff',data:'var(--text)',none:'var(--text-soft)',future:'#D8D2C8'};
  const DOW=['S','M','T','W','T','F','S'];
  const shortLabel=(k)=>new Date(k+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});
  let mode='month';
  let anchor=new Date(today+'T00:00:00');

  // all-time stats
  const allDays=Object.keys(map).filter(hasData).sort();
  let bestStreak=0;
  if(target){ let run=0,prev=null; for(const k of allDays){ if(netOf(k)<=target){ run=(prev&&shiftDay(prev,1)===k)?run+1:1; bestStreak=Math.max(bestStreak,run); prev=k; } else { run=0; prev=null; } } }
  let bestDay=null,highDay=null;
  for(const k of allDays){
    if(target!=null){ if(bestDay===null||metric(k)>metric(bestDay))bestDay=k; } else { if(bestDay===null||metric(k)<metric(bestDay))bestDay=k; }
    if(highDay===null||consumedOf(k)>consumedOf(highDay))highDay=k;
  }

  const ov=el(`<div class="cal-ov"><div class="cal-head">
      <div class="cal-head-row">
        <button class="cal-rbtn" id="cal-prev">${IC_BACK}</button>
        <span class="cal-title" id="cal-title"></span>
        <div style="display:flex;gap:7px"><button class="cal-rbtn" id="cal-next">${IC_CHEVR}</button><button class="cal-rbtn" id="cal-x">${IC_X}</button></div>
      </div>
      <div class="cal-agg"><span class="net" id="cal-net">—</span><span class="cal-pill" id="cal-pill"></span></div>
      <div class="cal-sub" id="cal-sub"></div>
    </div>
    <div class="cal-body">
      <div class="cal-seg" id="cal-seg"><button data-m="week">1W</button><button data-m="month">1M</button></div>
      <div class="cal-card" id="cal-card"></div>
      <div class="cal-legend"><span class="lg"><span class="sw" style="background:#18A974"></span>Under target</span><span class="lg"><span class="sw" style="background:#E5484D"></span>Over target</span></div>
      <div class="cal-stats" id="cal-stats"></div>
    </div></div>`);
  $('modal-root').appendChild(ov);
  const _navEntry=navOpen(()=>ov.remove());
  const close=()=>{ navClose(_navEntry); ov.remove(); };
  ov.querySelector('#cal-x').onclick=close;
  const jump=(k)=>{ viewDate=k; tab='today'; close(); render(); };

  const periodKeys=()=>{
    const keys=[];
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),days=new Date(y,m+1,0).getDate();
      for(let i=1;i<=days;i++)keys.push(dateKey(new Date(y,m,i)));
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);keys.push(dateKey(d));}
    }
    return keys;
  };

  function paint(){
    if(mode==='month'){ ov.querySelector('#cal-title').textContent=anchor.toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
    else { const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(s.getDate()+6); ov.querySelector('#cal-title').textContent=`${shortLabel(dateKey(s))} – ${shortLabel(dateKey(e))}`; }
    ov.querySelectorAll('#cal-seg button').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
    const pk=periodKeys().filter(hasData), daysLogged=pk.length;
    const avg=daysLogged?Math.round(pk.reduce((s,k)=>s+metric(k),0)/daysLogged):0;
    ov.querySelector('#cal-net').textContent=daysLogged?r0(avg):'—';
    const pill=ov.querySelector('#cal-pill');
    if(daysLogged&&target){
      const under=avg>=0;
      pill.style.display='';
      pill.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">${under?'<path d="M12 5v14M6 13l6 6 6-6"/>':'<path d="M12 19V5M6 11l6-6 6 6"/>'}</svg><span>${under?'under':'over'}</span>`;
    } else pill.style.display='none';
    ov.querySelector('#cal-sub').textContent=daysLogged?`${target?'avg left/day':'avg net/day'} · ${daysLogged} day${daysLogged===1?'':'s'} logged${target?'':' · set a daily target to track on/over'}`:'No days logged this period';

    const card=ov.querySelector('#cal-card');
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
      let cells='';
      for(let i=0;i<first;i++)cells+=`<div></div>`;
      for(let dd=1;dd<=days;dd++){
        const k=dateKey(new Date(y,m,dd)),h=heat(k),clk=k<=today;
        const kc=hasData(k)?`<span class="k" style="color:${h.fg}">${signed(k)}</span>`:'';
        cells+=`<div class="cal-cell" data-jump="${clk?k:''}" style="background:${h.bg};cursor:${clk?'pointer':'default'}"><span class="d" style="color:${h.fg}">${dd}</span>${kc}</div>`;
      }
      card.innerHTML=`<div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      let cells='';
      for(let i=0;i<7;i++){
        const d=new Date(s);d.setDate(s.getDate()+i);const k=dateKey(d),h=heat(k),clk=k<=today;
        const lab=hasData(k)?signed(k):(k>today?'·':'–');
        cells+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:10px;font-weight:600;color:var(--text-soft)">${DOW[i]}</span>
          <div class="cal-cell" data-jump="${clk?k:''}" style="width:100%;background:${h.bg};border-radius:11px;padding:9px 2px;cursor:${clk?'pointer':'default'}"><span class="d" style="font-size:13px;color:${h.fg}">${d.getDate()}</span><span class="k" style="font-size:9.5px;color:${h.fg}">${lab}</span></div></div>`;
      }
      card.innerHTML=`<div class="cal-grid">${cells}</div>`;
    }
    card.querySelectorAll('[data-jump]').forEach(c=>{ if(c.dataset.jump)c.onclick=()=>openDayDetail(c.dataset.jump); });

    const pkAll=periodKeys().filter(hasData);
    const daysOn=target?pkAll.filter(k=>netOf(k)<=target).length:0;
    const icC='<svg viewBox="0 0 24 24" fill="none" stroke="#18A974" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    const icF='<svg viewBox="0 0 24 24" fill="none" stroke="#F2A93B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1.5 3 4 4 4 7a4 4 0 01-8 0c0-1 .3-1.8.8-2.5C9 9 12 8 12 2z"/></svg>';
    ov.querySelector('#cal-stats').innerHTML=`
      <div class="cal-stat"><div class="sh">${icC}Days on target</div><div class="sv" style="color:#18A974">${target?daysOn:'—'}<small>${target?` /${pkAll.length}`:''}</small></div></div>
      <div class="cal-stat"><div class="sh">${icF}Best streak</div><div class="sv" style="color:var(--text)">${target?bestStreak:'—'}<small> days</small></div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#18A974"></span>Best day</div><div class="sv" style="color:#18A974">${bestDay?signed(bestDay):'—'}</div><div class="sl">${bestDay?shortLabel(bestDay):'No data yet'}</div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#E5484D"></span>Highest day</div><div class="sv" style="color:#E5484D">${highDay?r0(consumedOf(highDay)):'—'}</div><div class="sl">${highDay?shortLabel(highDay):'No data yet'}</div></div>`;
  }
  ov.querySelector('#cal-prev').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()-1); else anchor.setDate(anchor.getDate()-7); paint(); };
  ov.querySelector('#cal-next').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()+1); else anchor.setDate(anchor.getDate()+7); paint(); };
  ov.querySelectorAll('#cal-seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.m;paint();});
  paint();
}
function openDayDetail(key){

  const REST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>';
  const ov=el(`<div class="cal-ov" style="z-index:140"><div class="cal-head">

  ov.querySelector('#dd-prev').onclick=()=>{cur=shiftDay(cur,-1);paint();};

  function paint(){

    else { ov.querySelector('#dd-net').textContent=r0(consumed-burned); ov.querySelector('#dd-word').textContent='net intake'; }
    ov.querySelector('#dd-food').textContent=r0(consumed);
    ov.querySelector('#dd-burn').textContent=r0(burned);
    ov.querySelector('#dd-tgt').textContent=target!=null?r0(target):'—';
    let foodHtml='';

    });
    if(!foodHtml)foodHtml=`<div class="dd-rest" style="padding-top:10px"><div class="ic">${IC_FORK}</div>No food logged</div>`;
    const exHtml = exs.length
      ? exs.map(e=>`<div class="dd-ex"><div class="ic">${actMeta(e.activity).ic}</div><div class="mn"><div class="n">${esc(e.activity)}</div><div class="s">${e.minutes} min · ${e.intensity}</div></div><div class="kc">${r0(e.caloriesBurned)}</div></div>`).join('')
      : `<div class="dd-rest"><div class="ic">${REST}</div>Rest day — no activity logged</div>`;
    ov.querySelector('#dd-body').innerHTML=`
      <div class="dd-card"><div class="dd-card-h"><div class="t">Food</div><div class="s">${r0(consumed)} kcal</div></div>${foodHtml}</div>

  }
  paint();

/* ---------- back-button / swipe-back navigation ---------- */
const _navStack=[];        // LIFO of open dismissible layers, each {close}
let _navSuppress=0;        // count of history entries we're unwinding ourselves
function _navBase(){ if(!(history.state&&history.state.nomBase)){ try{history.pushState({nomBase:1},'');}catch(_){}}}
function navOpen(closeFn){  // call when a layer opens; returns an entry handle
  const entry={close:closeFn};
  _navStack.push(entry);
  try{history.pushState({nomLayer:_navStack.length},'');}catch(_){}
  return entry;
}
function navClose(entry){    // call from a UI close (X / swipe / backdrop)
  if(!entry)return;
  const i=_navStack.indexOf(entry);
  if(i===-1)return;         // already unwound by a back press
  _navStack.splice(i,1);
  _navSuppress++;
  try{history.back();}catch(_){_navSuppress=Math.max(0,_navSuppress-1);}   // consume our pushed entry
}
window.addEventListener('popstate',()=>{
  if(_navSuppress>0){_navSuppress--;return;}
  if(_navStack.length){ _navStack.pop().close(); return; }   // a layer is open -> close the top one
  // no layers open: back acts as in-app navigation instead of leaving the site
  if(typeof tab!=='undefined' && tab!=='today'){ tab='today'; if(typeof todayKey==='function')viewDate=todayKey(); try{render();}catch(_){}}
  setTimeout(_navBase,0);    // re-buffer OUTSIDE the popstate dispatch (Chrome ignores pushState inside it)
});

function openModal(title,bodyHtml){
  const m=el(`<div class="overlay"><div class="overlay-inner"><div class="mhead"><h2>${esc(title)}</h2><button class="linkbtn" id="m-close">Close</button></div><div id="m-body">${bodyHtml}</div></div></div>`);
  $('modal-root').appendChild(m);
  m._nav=navOpen(()=>{ if(m.parentNode)m.remove(); render(); });
  m.querySelector('#m-close').onclick=()=>closeModal(m);
  return m;
}
function closeModal(m){ if(m){navClose(m._nav); if(m.parentNode)m.remove();} render(); }
function closeAllModals(){ while(_navStack.length)navClose(_navStack[_navStack.length-1]); $('modal-root').innerHTML=''; render(); }

/* ---------- bottom-sheet helper (slide up + swipe down, like Settings) ---------- */
function makeSheet(innerHtml){
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    ${innerHtml}
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  let closed=false;
  const rawClose=()=>{
    if(closed)return; closed=true;
    camStop();
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  const _navEntry=navOpen(rawClose);
  const close=()=>{ if(closed)return; navClose(_navEntry); rawClose(); };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  let startY=0,dY=0,drag=false;
  const handle=overlay.querySelector('#sheet-handle');
  handle.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  handle.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-startY;if(dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}},{passive:false});
  handle.addEventListener('touchend',()=>{if(!drag){sheet.style.transition='';return;}drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}});
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};

function recentFoods(n){
  const seen=new Set(), out=[];
  for(let i=state.entries.length-1;i>=0 && out.length<n;i--){
    const e=state.entries[i]; const key=(e.name||'').toLowerCase();
    if(!e.name||seen.has(key))continue; seen.add(key);
    const sub=`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`;
    out.push({name:e.name,sub,entry:e});
  }
  return out;
}
function relogFood(r){
  state.entries.push(Object.assign({},r.entry,{id:uid(),date:viewDate,meal:defaultMeal()}));
  save();
}

function openAdd(){

  function addItemView(run){

          <button class="tile" id="af-lib"><span class="tile-ic">${IC_BOOK}</span><span>Library</span></button>
          <button class="tile" id="af-man"><span class="tile-ic">${IC_PEN}</span><span>Manual</span></button>
        </div>
        ${recents.length?`<div class="add-label">Recent</div><div>${recents.map((r,i)=>`<div class="recent-row"><span class="recent-ic">${IC_FORK}</span><div class="recent-main"><div class="rn">${esc(r.name)}</div><div class="rs">${esc(r.sub)}</div></div><button class="recent-add" data-rl="${i}" aria-label="Re-log">${IC_PLUS}</button></div>`).join('')}</div>`:''}`;
      main.querySelector('#af-scan').onclick=()=>renderScan();
      main.querySelector('#af-recipe').onclick=()=>renderRecipe();
      main.querySelector('#af-eatout').onclick=()=>eatOutView();
      main.querySelector('#af-bar').onclick=()=>renderBarcode();
      main.querySelector('#af-lib').onclick=()=>renderLibrary();
      main.querySelector('#af-man').onclick=()=>renderManual();
      main.querySelectorAll('[data-rl]').forEach(b=>b.onclick=()=>{relogFood(recents[+b.dataset.rl]);sh.close();});
    }
    function showResults(term){
      const low=term.toLowerCase(), isBC=/^\d{8,14}$/.test(term);
      const seq=++_searchSeq;                       // invalidate any in-flight online lookups
      clearTimeout(_offT); clearTimeout(_aiT);
      let html='';
      if(isBC) html+=`<div class="add-label">Barcode</div>`+rowHtml('Look up barcode '+term,'Search packaged products','data-bc="1"',IC_BARCODE);
      const hpbM=(SGDB||[]).filter(f=>f[0].toLowerCase().includes(low)).slice(0,20);
      if(hpbM.length) html+=`<div class="add-label">Singapore (HPB)</div>`+hpbM.map((f,i)=>{const g=(+f[6]>0)?+f[6]:null; const sub=g?`${r0(f[1]*g/100)} kcal · ${esc(f[8]||(g+' g'))}`:`${r0(f[1])} kcal/100g`; return rowHtml(f[0],sub,`data-hpb="${i}"`);}).join('');
      const libM=state.library.filter(l=>l.name.toLowerCase().includes(low)).slice(0,8);
      if(libM.length) html+=`<div class="add-label">Saved</div>`+libM.map(l=>{const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;return rowHtml(l.name,sub,`data-lib="${l.id}"`);}).join('');
      const dbM=(DB||[]).filter(f=>f.name.toLowerCase().includes(low) && !HPB_NAMES.has(_norm(f.name))).slice(0,12);
      if(dbM.length) html+=`<div class="add-label">Local database</div>`+dbM.map((f,i)=>rowHtml(f.name,`${r0(f.calories)} kcal · ${esc(f.portion)}`,`data-db="${i}"`)).join('');
      let onM=[];
      if(low.length>=2){
        if(ONDB){ onM=ONDB.filter(a=>a[0].toLowerCase().includes(low)).slice(0,25); if(onM.length) html+=`<div class="add-label">OpenNutrition</div>`+onM.map((f,i)=>rowHtml(f[0],`${r0(f[1])} kcal/100g`,`data-on="${i}"`)).join(''); }
        else html+=`<div class="add-label">OpenNutrition</div><div class="empty" style="border:none" id="af-onload">Loading food database (first time, ~10 MB)…</div>`;
      }
      // online avenues fill in here after a short debounce — no buttons
      if(!isBC && low.length>=2) html+=`<div id="af-offsec"></div>`;
      if(!isBC && low.length>=1) html+=`<div id="af-aisec"></div>`;
      if(!html) html=`<div class="empty" style="border:none">Type a food name to search or estimate with AI.</div>`;
      main.innerHTML=html;

      const bc=main.querySelector('[data-bc]'); if(bc)bc.onclick=()=>addItemView(async st=>{ st.innerHTML=`<div class="spinner">Looking up…</div>`; const r=await barcodeLookup(term); if(!r){st.innerHTML=`<div class="err">No product found for barcode ${esc(term)}.</div>`;return;} logPackaged(null,st,r,()=>sh.close()); });
      main.querySelectorAll('[data-lib]').forEach(n=>n.onclick=()=>{const l=state.library.find(x=>x.id===n.dataset.lib);addItemView(st=>{ if(l.perServing)logServing(null,st,l.name,l.perServing.calories,l.perServing.portion,'library',()=>sh.close()); else weighAndLog(null,st,l.name,l.per_100g,'library',l.lastGrams,()=>sh.close()); });});
      main.querySelectorAll('[data-hpb]').forEach(n=>n.onclick=()=>{const f=hpbM[+n.dataset.hpb];addItemView(st=>openWeighPer(st,f[0],{calories:f[1],protein_g:f[2],carbs_g:f[3],fat_g:f[4],sugar_g:f[5]},'hpb',(+f[6]>0)?+f[6]:null,()=>sh.close()));});
      main.querySelectorAll('[data-db]').forEach(n=>n.onclick=()=>{const f=dbM[+n.dataset.db];addItemView(st=>logServing(null,st,f.name,f.calories,f.portion,'local',()=>sh.close()));});
      main.querySelectorAll('[data-on]').forEach(n=>n.onclick=()=>{const f=onM[+n.dataset.on];addItemView(st=>openWeighPer(st,f[0],{calories:f[1],protein_g:f[2],carbs_g:f[3],fat_g:f[4],sugar_g:f[5]},'opennutrition',(+f[6]>0)?+f[6]:null,()=>sh.close()));});

      if(low.length>=2 && !ONDB) ensureONDB().then(()=>{ if(qEl.value.trim()===term) showResults(term); }).catch(()=>{const ld=main.querySelector('#af-onload'); if(ld)ld.textContent='Offline database unavailable here — Open Food Facts and AI below still work, or check it’s deployed next to the app over https.';});

      // debounced online lookups (Open Food Facts always; AI as a smart fallback)
      if(!isBC && low.length>=3) _offT=setTimeout(()=>runOff(term,seq),450);
      if(!isBC && low.length>=2) _aiT=setTimeout(()=>runAI(term,seq),780);
    }

    async function runOff(term,seq){
      if(seq!==_searchSeq) return;
      const sec=main.querySelector('#af-offsec'); if(!sec) return;
      sec.innerHTML=`<div class="add-label">Packaged &amp; branded</div><div class="empty" style="border:none">Searching Open Food Facts…</div>`;
      try{
        const items=await offTextSearch(term);
        if(seq!==_searchSeq || qEl.value.trim()!==term) return;
        const box=main.querySelector('#af-offsec'); if(!box) return;
        if(!items.length){ box.innerHTML=''; return; }        // quietly omit when nothing found
        box.innerHTML=`<div class="add-label">Packaged &amp; branded</div>`+items.map((it,i)=>{
          const sub=it.grams
            ? `${it.brands?esc(it.brands)+' · ':''}${r0(it.grams)} g · ${r0(it.per.calories*it.grams/100)} kcal · Open Food Facts`
            : `${it.brands?esc(it.brands)+' · ':''}${r0(it.per.calories)} kcal/100g · Open Food Facts`;
          return rowHtml(it.name,sub,`data-off="${i}"`);
        }).join('');
        box.querySelectorAll('[data-off]').forEach(n=>n.onclick=()=>{const it=items[+n.dataset.off];addItemView(st=>weighAndLog(null,st,it.name,it.per,'packaged',it.grams||null,()=>sh.close()));});
      }catch(e){ const box=main.querySelector('#af-offsec'); if(box&&seq===_searchSeq) box.innerHTML=''; }   // quiet fail
    }

    function aiEstimate(term){
      addItemView(st=>{
        const run=async()=>{
          if(!state.settings.apiKey){ st.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to estimate foods with AI.</div><button class="btn btn-block" id="af-aiset" style="margin-top:10px">Open Settings</button>`; const b=st.querySelector('#af-aiset'); if(b)b.onclick=()=>{sh.close();setTimeout(openSettings,200);}; return; }
          st.innerHTML=`<div class="spinner">Estimating “${esc(term)}” with AI…</div>`;
          try{ const ai=await aiNutrition(term); if(!ai||!ai.per_100g||!(+ai.per_100g.calories)){ st.innerHTML=`<div class="err">AI couldn’t estimate that. Try a different name, or enter it manually.</div>`; return; } weighAndLog(null,st,ai.name||term,ai.per_100g,'ai',null,()=>sh.close(),ai.portion||null); }
          catch(e){ st.innerHTML=`<div class="err">${esc(e.message||'AI lookup failed.')}</div><button class="btn btn-block" id="af-airt" style="margin-top:10px">Try again</button>`; const rb=st.querySelector('#af-airt'); if(rb)rb.onclick=run; }
        };
        run();
      });
    }

    async function runAI(term,seq){
      if(seq!==_searchSeq) return;
      const sec=main.querySelector('#af-aisec'); if(!sec) return;
      const low=term.toLowerCase();
      const localCount=state.library.filter(l=>l.name.toLowerCase().includes(low)).length
        + (SGDB?SGDB.filter(a=>a[0].toLowerCase().includes(low)).length:0)
        + (DB||[]).filter(f=>f.name.toLowerCase().includes(low)).length
        + (ONDB?ONDB.filter(a=>a[0].toLowerCase().includes(low)).length:0);
      // plenty of results already, or no key -> offer AI as a single one-tap row (don't spend a call)
      if(localCount>=3 || !state.settings.apiKey){
        sec.innerHTML=`<div class="add-label">Not what you want?</div>`+rowHtml(`Estimate “${term}” with AI`,'AI nutrition estimate','data-aigo="1"',IC_SPARK);
        const g=sec.querySelector('[data-aigo]'); if(g)g.onclick=()=>aiEstimate(term);
        return;
      }
      // thin results -> auto-estimate
      sec.innerHTML=`<div class="add-label">AI estimate</div><div class="empty" style="border:none">Estimating “${esc(term)}” with AI…</div>`;
      try{
        const ai=await aiNutrition(term);
        if(seq!==_searchSeq || qEl.value.trim()!==term) return;
        const box=main.querySelector('#af-aisec'); if(!box) return;
        if(!ai||!ai.per_100g||!(+ai.per_100g.calories)){ box.innerHTML=''; return; }
        box.innerHTML=`<div class="add-label">AI estimate</div>`+rowHtml(ai.name||term,`${r0(ai.per_100g.calories)} kcal/100g · AI estimate`,'data-aihit="1"',IC_SPARK);
        const row=box.querySelector('[data-aihit]');
        if(row)row.onclick=()=>addItemView(st=>weighAndLog(null,st,ai.name||term,ai.per_100g,'ai',null,()=>sh.close(),ai.portion||null));
      }catch(e){
        if(seq!==_searchSeq) return;
        const box=main.querySelector('#af-aisec'); if(!box) return;
        box.innerHTML=`<div class="add-label">AI estimate</div>`+rowHtml('Couldn’t reach AI — tap to retry',esc(term),'data-airetry="1"',IC_SPARK);
        const rt=box.querySelector('[data-airetry]'); if(rt)rt.onclick=()=>runAI(term,_searchSeq);
      }
    }
    qEl.oninput=()=>{ const t=qEl.value.trim(); t?showResults(t):showHome(); };
    showHome();
  }

  /* ---------- EAT OUT: scan a menu (A) + find food near me (B) ---------- */
  const EO_FALLBACK={Breakfast:400,Lunch:600,Dinner:600,Snack:200};
  const eoOpts={meal:null, target:null};
  function eoRemaining(){ return state.settings.dailyTarget ? Math.round(state.settings.dailyTarget - sum(todayFood(),'calories') + sum(todayEx(),'caloriesBurned')) : null; }
  function eoMealTarget(meal){
    const dt=state.settings.dailyTarget;
    const t = dt ? Math.round(dt*mealFraction(meal)) : (EO_FALLBACK[meal]||500);
    return Math.max(150,t);
  }
  function eoFit(kcal,budget){ if(budget==null) return 'var(--accent-strong)'; if(kcal<=budget) return '#3FB27F'; if(kcal<=budget*1.1) return '#E5A23D'; return '#E5484D'; }
  // build a dish object straight from Gemini's estimate (no OpenNutrition anchor for Eat out)
  function eoDish(d){
    const grams=Math.max(1,Math.round(+d.grams||300));
    let per;
    if(d.per100 && +d.per100.calories){ per={calories:+d.per100.calories||0,protein_g:+d.per100.protein_g||0,carbs_g:+d.per100.carbs_g||0,fat_g:+d.per100.fat_g||0,sugar_g:+d.per100.sugar_g||0}; }
    else { const c=(+d.kcal>0&&grams>0)?(+d.kcal*100/grams):0; per={calories:c,protein_g:0,carbs_g:0,fat_g:0,sugar_g:0}; }
    let kcal=Math.round(per.calories*grams/100); if(!kcal && +d.kcal>0) kcal=Math.round(+d.kcal);
    return {name:d.name, grams, per, kcal};
  }

  function eatOutView(){
    camStop(); setTabs(false);
    if(!eoOpts.meal){ eoOpts.meal=defaultMeal(); eoOpts.target=eoMealTarget(eoOpts.meal); }
    const MEALS_EO=['Breakfast','Lunch','Dinner','Snack'];

      <div class="sub-head"><button class="circ-back" id="eo-back">${IC_BACK}</button><h3>Eat out</h3></div>
      <div class="scard">
        <div class="scard-h">What can I eat around me?</div>
        <div class="field"><label>Meal</label><div class="chips" id="eo-meal">${MEALS_EO.map(m=>`<button class="chip${m===eoOpts.meal?' sel':''}" data-m="${m}">${m}</button>`).join('')}</div></div>
        <div class="field"><label>Calories for this meal</label><input type="number" inputmode="numeric" id="eo-budget" value="${eoOpts.target!=null?eoOpts.target:''}" placeholder="optional"><div class="hint" id="eo-remwarn" style="display:none;margin-top:6px;color:var(--text-soft)"></div></div>
        <button class="dashed-btn" id="eo-menu">${IC_CAMERA} Scan a menu or food court</button>
        <button class="dashed-btn" id="eo-near" style="margin-top:10px">${IC_PIN} Find food places near me</button>

    body.querySelector('#eo-back').onclick=renderFood;
    const budEl=body.querySelector('#eo-budget');

        remWarn.style.display=''; remWarn.textContent=`Above your ~${Math.max(0,rem)} kcal left today.`;

  // hand a single chosen dish to the standard confirm/log step (pre-selecting the chosen meal)
  function openDish(dish, backFn){
    setTabs(false);

  const eoDishRow=(d,budget,attr)=>`<div class="recent-row eo-dish" ${attr} style="cursor:pointer">

  // Path A — menu / food-court photo
  function menuScanView(){
    camStop(); setTabs(false);

      <div class="sub-head"><button class="circ-back" id="ms-back">${IC_BACK}</button><h3>Scan a menu</h3></div>

    function renderMenuList(dishes){
      setTabs(false);
      const budget=eoOpts.target;
      const sorted=dishes.slice().sort((a,b)=>{ const af=budget==null?0:(a.kcal<=budget?0:1), bf=budget==null?0:(b.kcal<=budget?0:1); return af-bf || a.kcal-b.kcal; });
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="ms-b3">${IC_BACK}</button><h3>What you can eat</h3></div>
        ${budget!=null?`<div class="hint" style="margin-top:0">${eoOpts.meal} target ~${budget} kcal — green fits, amber is close.</div>`:''}

      body.querySelector('#ms-b3').onclick=menuScanView;

  // Path B — places near me (key stays server-side in the Netlify function)
  function nearbyView(){
    camStop(); setTabs(false);
    if(!state.settings.apiKey){
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="nb-back">${IC_BACK}</button><h3>Find food near me</h3></div>

    }
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="nb-back">${IC_BACK}</button><h3>Find food near me</h3></div><div id="nb-stage"><div class="spinner">Getting your location…</div></div>`;
    body.querySelector('#nb-back').onclick=eatOutView;

    const fail=(msg)=>{ stage.innerHTML=`<div class="err">${esc(msg)}</div><button class="btn btn-block" id="nb-rt" style="margin-top:10px">Try again</button><button class="dashed-btn" id="nb-menu">${IC_CAMERA} Scan a menu instead</button>`; stage.querySelector('#nb-rt').onclick=nearbyView; stage.querySelector('#nb-menu').onclick=menuScanView; };
    (async()=>{
      let loc;
      try{ loc=await getLocation(); }catch(e){ return fail(e.message); }
      stage.innerHTML=`<div class="spinner">Looking for places within 600 m…</div>`;

      places.forEach(p=>{ p._dist=haversine(loc.lat,loc.lng,+p.lat,+p.lng); });

      renderPlaceList(withDishes,budget);
    })();

    function renderPlaceList(places,budget){
      setTabs(false);
      const fmtDist=(m)=>m<1000?`${m} m`:`${(m/1000).toFixed(1)} km`;
      const price=(n)=> (n>0?'$'.repeat(Math.min(4,n)):'');

        ${budget!=null?`<div class="hint" style="margin-top:0">${eoOpts.meal} target ~${budget} kcal — green fits, amber is close.</div>`:''}
        <div>${places.map((p,pi)=>`
          <div class="scard" style="padding:14px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">

              <div class="rs" style="white-space:nowrap;color:var(--text-soft)">${fmtDist(p._dist)}${price(p.priceLevel)?' · '+price(p.priceLevel):''}</div>
            </div>
            ${(p._dishes&&p._dishes.length)?p._dishes.map((d,di)=>eoDishRow(d,budget,`data-p="${pi}" data-d="${di}"`)).join(''):`<div class="hint" style="margin-top:6px">No dish suggestions for this place.</div>`}
          </div>`).join('')}</div>`;
      body.querySelector('#nb-b2').onclick=nearbyView;
      body.querySelectorAll('.eo-dish').forEach(b=>b.onclick=()=>{ const d=places[+b.dataset.p]._dishes[+b.dataset.d]; openDish(d, renderPlaceList.bind(null,places,budget)); });
    }
  }

  function editRecipeView(rec, backFn){
    camStop(); setTabs(false);
    const work=JSON.parse(JSON.stringify(rec));
    if(!Array.isArray(work.ingredients))work.ingredients=[];
    let adding=false;
    const oCal=(work.total&&work.total.calories)||0, oP=(work.total&&work.total.protein_g)||0, oC=(work.total&&work.total.carbs_g)||0, oF=(work.total&&work.total.fat_g)||0;
    work.ingredients.forEach(ing=>{ const g=+ing.grams||0;
      ing._rk=g>0?(+ing.kcal||0)/g:0;
      ing._rp=(g>0&&ing.protein_g!=null)?(+ing.protein_g)/g:null;
      ing._rc=(g>0&&ing.carbs_g!=null)?(+ing.carbs_g)/g:null;
      ing._rf=(g>0&&ing.fat_g!=null)?(+ing.fat_g)/g:null; });
    function recompute(){
      let tk=0,tp=0,tc=0,tf=0,allMac=work.ingredients.length>0;
      work.ingredients.forEach(ing=>{ const g=+ing.grams||0; ing.kcal=Math.round(ing._rk*g); tk+=ing._rk*g;
        if(ing._rp!=null)tp+=ing._rp*g; else allMac=false;
        if(ing._rc!=null)tc+=ing._rc*g; if(ing._rf!=null)tf+=ing._rf*g; });
      const sv=Math.max(1,Math.round(+work.servings||1));
      let TP,TC,TF;
      if(allMac){TP=tp;TC=tc;TF=tf;} else { const r=oCal>0?tk/oCal:0; TP=oP*r;TC=oC*r;TF=oF*r; }
      work.total={calories:Math.round(tk),protein_g:Math.round(TP),carbs_g:Math.round(TC),fat_g:Math.round(TF)};
      work.per={calories:Math.round(tk/sv),protein_g:Math.round(TP/sv),carbs_g:Math.round(TC/sv),fat_g:Math.round(TF/sv)};
    }
    function preview(){ const per=work.per||{calories:0}, tot=work.total||{calories:0}, sv=Math.max(1,Math.round(+work.servings||1));
      return `<div class="rc-top"><div><div class="rc-meta">makes ${sv} serving${sv===1?'':'s'} · ${tot.calories} kcal total</div></div><div class="rc-kcal"><b>${per.calories}</b><span>kcal/serving</span></div></div><div class="fitlabel" style="margin-top:6px">${per.protein_g||0} g protein/serving</div>`; }
    function refreshNums(){ recompute();
      work.ingredients.forEach((ing,i)=>{ const k=body.querySelector('.ei-k[data-i="'+i+'"]'); if(k)k.textContent=ing.kcal+' kcal'; });
      const pv=body.querySelector('#re-prev'); if(pv)pv.innerHTML=preview(); }
    function draw(){
      recompute();
      const sv=Math.max(1,Math.round(+work.servings||1));
      body.innerHTML=`
        <div class="sub-head"><button class="circ-back" id="re-back">${IC_BACK}</button><h3>Edit recipe</h3></div>
        <div class="scard">
          <div class="field"><label>Recipe name</label><input id="re-name" value="${esc(work.name||'')}" autocomplete="off"></div>
          <div class="prow" style="margin-top:8px"><span class="lab">Makes (servings)</span><div class="pstep"><button id="re-svdn">${IC_MINUS}</button><span class="val" id="re-sv">${sv}</span><button id="re-svup">${IC_PLUS}</button></div></div>
        </div>
        <div class="scard">
          <div class="scard-h">Ingredients</div>
          <div id="re-ings">${work.ingredients.map((ing,i)=>`
            <div class="edit-ing">
              <div class="ei-name">${esc(ing.name)}</div>
              <div class="ei-right">
                <input class="ei-g" type="number" inputmode="decimal" min="0" data-i="${i}" value="${r0(ing.grams)}"><span class="ei-u">g</span>
                <span class="ei-k" data-i="${i}">${ing.kcal} kcal</span>
                <button class="ei-rm" data-rm="${i}" aria-label="Remove">${IC_X}</button>
              </div>
            </div>`).join('')}</div>
          ${work.ingredients.length?'':`<div class="rc-empty">No ingredients left — cancel to keep the original.</div>`}
          ${adding?`<div class="add-ing-form">
            <div class="field"><label>Ingredient</label><input id="re-aname" placeholder="e.g. cooked rice" autocomplete="off"></div>
            <div style="display:flex;gap:10px;margin-top:10px">
              <div class="field" style="flex:1;margin:0"><label>Amount (g)</label><input id="re-ag" type="number" inputmode="decimal" min="0" placeholder="100"></div>
              <div class="field" style="flex:1;margin:0"><label>kcal / 100g</label><input id="re-a100" type="number" inputmode="decimal" min="0" placeholder="auto"></div>
            </div>
            <div id="re-astat" class="hint" style="margin-top:8px"></div>
            <div class="rc-acts" style="margin-top:10px"><button class="btn" id="re-addx">Cancel</button><button class="btn btn-primary" id="re-addgo">Add</button></div>
          </div>`:`<button class="dashed-btn" id="re-add" style="margin-top:12px">${IC_PLUS} Add ingredient</button>`}
        </div>
        <div class="rc-card" id="re-prev">${preview()}</div>
        <div class="rc-acts"><button class="btn" id="re-cancel">Cancel</button><button class="btn btn-primary" id="re-save">Save changes</button></div>`;
      body.querySelector('#re-back').onclick=()=>openRecipeDetail(rec,backFn);
      body.querySelector('#re-cancel').onclick=()=>openRecipeDetail(rec,backFn);
      body.querySelector('#re-name').oninput=(e)=>{work.name=e.target.value;};
      body.querySelector('#re-svup').onclick=()=>{work.servings=Math.min(20,sv+1);body.querySelector('#re-sv').textContent=work.servings;refreshNums();};
      body.querySelector('#re-svdn').onclick=()=>{work.servings=Math.max(1,sv-1);body.querySelector('#re-sv').textContent=work.servings;refreshNums();};
      body.querySelectorAll('.ei-g').forEach(inp=>inp.oninput=(e)=>{ const i=+e.target.dataset.i; if(work.ingredients[i]){work.ingredients[i].grams=+e.target.value||0; refreshNums();} });
      body.querySelectorAll('[data-rm]').forEach(btn=>btn.onclick=()=>{ work.ingredients.splice(+btn.dataset.rm,1); draw(); });
      if(adding){
        const an=body.querySelector('#re-aname'); if(an)an.focus();
        body.querySelector('#re-addx').onclick=()=>{adding=false;draw();};
        body.querySelector('#re-addgo').onclick=async()=>{
          const nameEl=body.querySelector('#re-aname'),gEl=body.querySelector('#re-ag'),mEl=body.querySelector('#re-a100'),stat=body.querySelector('#re-astat'),go=body.querySelector('#re-addgo');
          const name=(nameEl.value||'').trim(),g=+gEl.value||0,man=+mEl.value||0;
          if(!name){stat.textContent='Enter an ingredient name.';return;}
          if(!g){stat.textContent='Enter an amount in grams.';return;}
          let per100;
          if(man>0){ per100={cal:man,prot:0,carb:0,fat:0}; }
          else { stat.textContent='Estimating calories…'; go.disabled=true; per100=await lookupPer100(name); go.disabled=false;
            if(!per100){ stat.textContent='Couldn’t estimate — enter a kcal/100g value above, or add a Gemini API key in Settings.'; return; } }
          work.ingredients.push({name,grams:g,have:true,
            kcal:Math.round((per100.cal||0)*g/100),protein_g:Math.round((per100.prot||0)*g/100),carbs_g:Math.round((per100.carb||0)*g/100),fat_g:Math.round((per100.fat||0)*g/100),
            _rk:(per100.cal||0)/100,_rp:(per100.prot||0)/100,_rc:(per100.carb||0)/100,_rf:(per100.fat||0)/100});
          adding=false; draw();
        };
      } else { const ab=body.querySelector('#re-add'); if(ab)ab.onclick=()=>{adding=true;draw();}; }
      body.querySelector('#re-save').onclick=()=>{
        recompute();
        const name=(work.name||'').trim()||rec.name, svv=Math.max(1,Math.round(+work.servings||1));
        const clean=JSON.parse(JSON.stringify(rec));
        clean.name=name; clean.servings=svv;
        clean.ingredients=work.ingredients.map(ing=>{ const g=+ing.grams||0; return {name:ing.name,grams:g,have:!!ing.have,kcal:Math.round(ing._rk*g),
          protein_g:ing._rp!=null?Math.round(ing._rp*g):(ing.protein_g||0),
          carbs_g:ing._rc!=null?Math.round(ing._rc*g):(ing.carbs_g||0),
          fat_g:ing._rf!=null?Math.round(ing._rf*g):(ing.fat_g||0)}; });
        clean.total=work.total; clean.per=work.per;
        const idx=state.recipes.findIndex(x=>x.id===rec.id); if(idx>=0)state.recipes[idx]=clean; else state.recipes.push(clean);
        save();
        openRecipeDetail(clean,backFn);
      };
    }
    draw();
  }
  function openRecipeDetail(rec, backFn){
    camStop(); setTabs(false);
    const base=Math.max(1,Math.round(rec.servings||1));
    let cur=base, meal=rec.meal||defaultMeal();
    function draw(){
      const f=cur/base, ings=rec.ingredients||[];
      const have=ings.filter(x=>x.have), buy=ings.filter(x=>!x.have);
      const row=(ing)=>`<div class="rc-ing"><div><span class="nm">${esc(ing.name)}</span> <span class="g">${ing.grams?r0(ing.grams*f)+' g':''}</span></div><span class="kc">${ing.kcal?r0(ing.kcal*f)+' kcal':''}</span></div>`;
      const totCal=Math.round(((rec.total&&rec.total.calories)||0)*f);
      const per=rec.per||{calories:0,protein_g:0};
      body.innerHTML=`
        <div class="sub-head"><button class="circ-back" id="rd-back">${IC_BACK}</button><h3>${esc(rec.name)}</h3></div>
        <div class="rc-card">
          <div class="rc-top">
            <div><div class="rc-meta">${rec.time_min?r0(rec.time_min)+' min · ':''}makes ${cur} serving${cur===1?'':'s'} · ${totCal} kcal total</div></div>
            <div class="rc-kcal"><b>${per.calories}</b><span>kcal/serving</span></div>
          </div>
          <div class="fitlabel" style="margin-top:6px">${per.protein_g||0} g protein/serving</div>
          <div class="prow" style="margin-top:14px"><span class="lab">Scale recipe</span><div class="pstep"><button id="rd-dn">${IC_MINUS}</button><span class="val" id="rd-sv">${cur}</span><button id="rd-up">${IC_PLUS}</button></div></div>
          <div class="rc-sec">You have</div>${have.length?have.map(row).join(''):`<div class="rc-empty">—</div>`}
          ${buy.length?`<div class="rc-sec">Shopping list</div>`+buy.map(row).join(''):''}

    function recipeCard(r,i){

  function renderBarcode(){
    camStop(); setTabs(false);
    let scanner=null, running=false;
    const stopScanner=()=>{ if(scanner&&running){ running=false; try{ return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{}); }catch(_){} } return Promise.resolve(); };
    body.innerHTML=`
      <div class="sub-head"><button class="circ-back" id="bc-back">${IC_BACK}</button><h3>Scan a barcode</h3></div>
      <div id="reader"></div>
      <div class="bc-hint" id="bc-hint">Point your camera at a product barcode</div>
      <div id="bc-stage"></div>`;
    const stage=body.querySelector('#bc-stage'), hint=body.querySelector('#bc-hint');
    body.querySelector('#bc-back').onclick=()=>{stopScanner();renderFood();};
    const onDetect=(txt)=>{ if(!running)return; stopScanner(); doLookup(txt); };
    const startScan=async()=>{
      if(typeof Html5Qrcode==='undefined'){ hint.textContent='Camera scanning isn’t available here — you can also type the barcode number into “Search for a food”.'; return; }
      await stopScanner();
      const opts={};
      if(typeof Html5QrcodeSupportedFormats!=='undefined'){
        opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];
      }
      try{
        scanner=new Html5Qrcode('reader',opts); running=true;
        hint.textContent='Point your camera at a product barcode';
        await scanner.start({facingMode:'environment'},
          {fps:10, qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};}, aspectRatio:1.3333, experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
          onDetect, ()=>{});
      }catch(e){ running=false; hint.textContent='Couldn’t start the camera — you can also type the barcode number into “Search for a food”.'; }
    };
    async function doLookup(code){
      stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
      const r=await barcodeLookup(code);
      if(!r){ stage.innerHTML=`<div class="err">No product found for that barcode. Scan again, or enter it manually.</div><button class="btn btn-block" id="bc-man" style="margin-top:10px">Enter manually</button><button class="btn btn-block" id="bc-again" style="margin-top:8px">Scan again</button>`; stage.querySelector('#bc-man').onclick=renderManual; stage.querySelector('#bc-again').onclick=renderBarcode; return; }
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="bc-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="bc-stage2"></div>`;
      body.querySelector('#bc-b2').onclick=renderBarcode;
      logPackaged(null,body.querySelector('#bc-stage2'),r,()=>sh.close());
    }
    startScan();
  }

      let startX=0,base=0,off=0,down=false,dragging=false,open=false,suppress=false;
      const apply=(x,anim)=>{row.style.transition=anim?'transform .2s ease':'';row.style.transform=`translateX(${x}px)`;};
      const close=()=>{open=false;apply(0,true);};
      const openIt=()=>{open=true;apply(OPENX,true);};
      const guard=()=>{suppress=true;setTimeout(()=>{suppress=false;},80);};
      const doDelete=()=>{ state.library=state.library.filter(x=>x.id!==id); save(); renderLibrary(); };
      delBtn.onclick=(e)=>{e.stopPropagation();doDelete();};
      mealBtn.onclick=(e)=>{e.stopPropagation(); const l=state.library.find(x=>x.id===id); close(); if(l)openMealPicker(l);};
      addBtn.onclick=(e)=>{ if(open||suppress){e.stopPropagation();e.preventDefault();close();return;} addFromLib(id); };
      row.addEventListener('pointerdown',e=>{ down=true;dragging=false;startX=e.clientX;base=open?OPENX:0;off=base; });
      row.addEventListener('pointermove',e=>{
        if(!down)return; const d=e.clientX-startX;
        if(!dragging && Math.abs(d)>6){ dragging=true; try{row.setPointerCapture(e.pointerId);}catch(_){} }
        if(dragging){ off=base+d; if(off>0)off=0; if(off<OPENX-22)off=OPENX-22; apply(off,false); e.preventDefault(); }
      });
      const endDrag=()=>{
        if(!down)return; down=false;
        if(dragging){ guard(); if(off<=-50){openIt();} else {close();} }
        else if(open){ guard(); close(); }
      };
      row.addEventListener('pointerup',endDrag);
      row.addEventListener('pointercancel',endDrag);
    });
  }

async function barcodeLookup(code){
  code=String(code);
  try{ await ensureONDB(); const hit=ONBYEAN&&ONBYEAN.get(code); if(hit){ const sg=(+hit[6]>0)?+hit[6]:null; return {name:hit[0],per:{calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]},source:'opennutrition',servingGrams:sg,servingLabel:sg?`${r1(sg)} g`:null,packageGrams:null}; } }catch(e){}
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments,serving_size,serving_quantity,product_quantity`);
    const data=await res.json();
    if(data.product){
      const p=data.product, n=p.nutriments||{};
      const per={calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)};
      // serving weight in grams: prefer numeric serving_quantity, else parse it out of the serving_size label
      let sg=null; const sq=parseFloat(p.serving_quantity);
      if(isFinite(sq)&&sq>0&&sq<=5000) sg=sq;
      if(sg==null && p.serving_size){ const mm=String(p.serving_size).match(/([\d.]+)\s*(g|ml)\b/i); if(mm){ const v=parseFloat(mm[1]); if(isFinite(v)&&v>0&&v<=5000) sg=v; } }
      const sLabel=(p.serving_size&&String(p.serving_size).trim())||(sg?`${r1(sg)} g`:null);
      const pq=parseFloat(p.product_quantity); const pkg=(isFinite(pq)&&pq>0&&pq<=10000)?pq:null;   // net package weight (g/ml)
      return {name:p.product_name||('Item '+code),per,source:'barcode',servingGrams:sg,servingLabel:sLabel,packageGrams:pkg};
    }
  }catch(e){}
  return null;
}
/* Open Food Facts text search.
   Uses the legacy /cgi/search.pl on world.openfoodfacts.org because it allows
   cross-origin browser requests. The newer search.openfoodfacts.org (Search-a-licious)
   does NOT send CORS headers, so a browser fetch to it fails with "Load failed".
   On-demand only — OFF rate-limits search to ~10/min and asks apps not to search-as-you-type. */
async function offTextSearch(term){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(term)}&search_simple=1&action=process&json=1&page_size=20&fields=code,product_name,brands,quantity,product_quantity,nutriments`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Open Food Facts search is unavailable right now ('+r.status+'). Try again shortly, scan the barcode, or estimate with AI.');
  const data=await r.json();
  const list=data.products||[];
  return list.map(p=>{
    const n=p.nutriments||{}; const kcal=n['energy-kcal_100g'];
    if(!p.product_name || kcal==null) return null;
    const pq=parseFloat(p.product_quantity);                 // net package weight in grams (or ml)
    const grams=(isFinite(pq) && pq>0 && pq<=10000) ? pq : null;
    return {name:p.product_name, brands:p.brands||'', quantity:p.quantity||'', grams, per:{
      calories:+kcal||0, protein_g:+(n['proteins_100g']||0), carbs_g:+(n['carbohydrates_100g']||0),
      fat_g:+(n['fat_100g']||0), sugar_g:+(n['sugars_100g']||0)}};
  }).filter(Boolean);
}
function openSearch(){

    <div id="sf-lib"></div>

  `);
  const q=m.querySelector('#sf-q'), libBox=m.querySelector('#sf-lib'), res=m.querySelector('#sf-results');

function loadImage(file){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);res(img);};img.onerror=rej;img.src=u;});}
async function toJpegBase64(file,maxDim=1100,q=0.8){
  const img=await loadImage(file);
  const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',q).split(',')[1];
}

function camCapture(v){

function genConfig(model){
  const cfg={responseMimeType:'application/json',maxOutputTokens:2048};
  if(/flash/i.test(model)) cfg.thinkingConfig={thinkingBudget:0}; // disable "thinking" so JSON isn't truncated
  return cfg;
}
async function analyzePhoto(b64){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const res=await fetch(url,{
    method:'POST',

    body:JSON.stringify({
      contents:[{parts:[
        {inline_data:{mime_type:'image/jpeg',data:b64}},
        {text:VISION_PROMPT}
      ]}],
      generationConfig:genConfig(model)
    })
  });
  if(!res.ok){
    let msg='Gemini API error '+res.status;
    try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Tap to try again, or use a clearer, closer photo.');

  text=text.replace(/```json|```/g,'').trim();

async function aiNutrition(name){
  const model=state.settings.model||'gemini-2.5-flash';

  const prompt=`Give typical nutrition per 100 grams for this food, assuming the common Singapore version if relevant: "${name}", and the typical weight in grams of one small, one medium (average), and one large single serving or piece, with a short unit label like "apple","banana","bowl","plate","slice". Respond with ONLY JSON, no markdown: {"name":"","per_100g":{"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"sugar_g":0},"serving":{"label":"","small_g":0,"medium_g":0,"large_g":0}}. If it is not a food, set calories to 0.`;
  const res=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:genConfig(model)})});
  if(!res.ok){let msg='Gemini API error '+res.status;try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}throw new Error(msg);}
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Please try again.');
  let text=cand&&cand.content&&cand.content.parts?cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim():'';
  text=text.replace(/```json|```/g,'').trim();const s=text.indexOf('{'),e=text.lastIndexOf('}');if(s>=0&&e>=0)text=text.slice(s,e+1);
  let out; try{ out=JSON.parse(text); }catch(err){ throw new Error('Could not read the AI response. Please try again.'); }
  const p=normPortion(out.serving);
  if(p && out.name) portionCacheSet(out.name, p);   // reuse this weight for future logs of the same food
  out.portion=p;
  return out;

/* Normalise an AI serving object -> {label, small, medium, large} grams (medium = average). */
function normPortion(o){
  if(!o) return null;
  const g=v=>{ const n=Math.round(+v); return isFinite(n)&&n>0?n:0; };
  let s=g(o.small_g), m=g(o.medium_g), l=g(o.large_g);
  const base=m||s||l; if(!base) return null;
  if(!m)m=base; if(!s)s=Math.max(1,Math.round(m*0.7)); if(!l)l=Math.round(m*1.35);
  s=Math.min(s,m); l=Math.max(l,m);   // keep S ≤ M ≤ L
  let label=(typeof o.label==='string'&&o.label.trim())?o.label.trim().slice(0,24):'serving';
  return {label,small:s,medium:m,large:l};
}
/* Persisted, capped cache of typical portion weights, keyed by lowercased food name. */
function portionCacheGet(name){ const k=(name||'').toLowerCase().trim(); return (k&&state.portionCache&&state.portionCache[k])||null; }
function portionCacheSet(name,val){
  const k=(name||'').toLowerCase().trim(); if(!k||!val) return;
  if(!state.portionCache) state.portionCache={};
  state.portionCache[k]=val;
  const keys=Object.keys(state.portionCache);
  if(keys.length>400){ for(const kk of keys.slice(0,keys.length-400)) delete state.portionCache[kk]; }
  save();
}
/* One cached AI call for just a typical portion weight (used for DB foods with no serving weight). */
async function aiServingWeight(name){
  const cached=portionCacheGet(name); if(cached) return cached;
  const prompt=`For the food "${name}" (common Singapore version if relevant), give the typical weight in grams of one small, one medium (average) and one large single serving or piece, plus a short unit label like "apple","banana","bowl","plate","slice". Respond with ONLY JSON, no markdown: {"label":"","small_g":0,"medium_g":0,"large_g":0}.`;
  const out=await geminiJSON([{text:prompt}],256);
  const p=normPortion(out); if(!p) throw new Error('No weight estimate available.');
  portionCacheSet(name,p); return p;
}
/* ---------- AI: MET lookup for a free-typed "Other" sport ---------- */
async function aiSportMET(sport){
  const prompt=`Give the metabolic equivalent (MET) values for the physical activity "${sport}" at three effort levels, using standard Compendium of Physical Activities figures. Reference points: slow walking ~2.8, brisk walking ~4.3, jogging ~7, running ~9.8, cycling ~6-10, vigorous swimming ~9.5. Respond with ONLY JSON, no markdown: {"activity":"","light":0,"moderate":0,"vigorous":0}. If it is not a real physical activity, set all three values to 0.`;
  const out=await geminiJSON([{text:prompt}],512);
  const cl=v=>{ const n=+v; return isFinite(n)&&n>0?Math.round(n*10)/10:0; };
  const met={light:cl(out.light),moderate:cl(out.moderate),vigorous:cl(out.vigorous)};
  if(!met.light && !met.moderate && !met.vigorous) throw new Error('That doesn’t look like an exercise — try another word.');
  const base=met.moderate||met.vigorous||met.light;   // fill any gaps sensibly
  if(!met.light)    met.light=Math.max(1,Math.round(base*0.7*10)/10);
  if(!met.moderate) met.moderate=base;
  if(!met.vigorous) met.vigorous=Math.round(base*1.3*10)/10;
  return met;
}

function bestFoodMatch(name){
  if(!ONDB) return null;
  const q=(name||'').toLowerCase().trim(); if(q.length<2) return null;
  let hits=ONDB.filter(a=>a[0].toLowerCase().includes(q));
  if(!hits.length){ const w=q.split(/[\s,]+/)[0]; if(w&&w.length>2) hits=ONDB.filter(a=>a[0].toLowerCase().includes(w)); }
  if(!hits.length) return null;
  hits.sort((a,b)=>a[0].length-b[0].length);
  const h=hits[0];
  return {per100:{calories:+h[1]||0,protein_g:+h[2]||0,carbs_g:+h[3]||0,fat_g:+h[4]||0,sugar_g:+h[5]||0}};
}
async function costRecipe(recipe){

  for(const ing of (recipe.ingredients||[])){

    if(g>0){ const m=bestFoodMatch(ing.name); if(m){ kcal=m.per100.calories*g/100; p=m.per100.protein_g*g/100; c=m.per100.carbs_g*g/100; f=m.per100.fat_g*g/100; matched=true; } }
    if(kcal==null){ kcal=+ing.kcal||0; p=+ing.protein_g||0; if(g>0&&kcal>0)anyEst=true; }
    ing._kcal=Math.round(kcal); ing._matched=matched; ing._prot=Math.round(p); ing._carb=Math.round(c); ing._fat=Math.round(f);
    tk+=kcal; tp+=p; tc+=c; tf+=f;
  }
  const sv=Math.max(1,Math.round(+recipe.servings||1));
  recipe._total={calories:Math.round(tk),protein_g:Math.round(tp),carbs_g:Math.round(tc),fat_g:Math.round(tf)};
  recipe._per={calories:Math.round(tk/sv),protein_g:Math.round(tp/sv),carbs_g:Math.round(tc/sv),fat_g:Math.round(tf/sv)};
  recipe._estimated=anyEst;
  return recipe;
}
async function lookupPer100(name){
  try{ await ensureONDB(); }catch(_){}

  if(m) return {cal:m.per100.calories,prot:m.per100.protein_g,carb:m.per100.carbs_g,fat:m.per100.fat_g,src:'db'};

function haversine(la1,lo1,la2,lo2){
  const R=6371000, t=Math.PI/180, dLa=(la2-la1)*t, dLo=(lo2-lo1)*t;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

  return 'unknown';

function _loadPersistedLoc(){
  try{ const j=JSON.parse(localStorage.getItem('nomnom_lastloc')||'null'); return (j&&j.lat!=null)?j:null; }catch(_){ return null; }
}
function _cachedLoc(maxAgeMs){
  if(_lastLoc && (Date.now()-_lastLoc.ts)<maxAgeMs) return _lastLoc;
  const p=_loadPersistedLoc();
  if(p && (Date.now()-(p.ts||0))<maxAgeMs) return p;
  return null;
}
// opts: {force:true} to bypass cache and re-fetch; {maxAge:ms} to widen/narrow reuse window
function getLocation(opts){
  opts=opts||{};
  const maxAge = opts.maxAge!=null ? opts.maxAge : 30*60*1000; // reuse a fix up to 30 min old — avoids re-prompting on reopen
  return new Promise(async(resolve,reject)=>{
    if(!opts.force){ const c=_cachedLoc(maxAge); if(c) return resolve({lat:c.lat,lng:c.lng,cached:true}); }
    if(!navigator.geolocation) return reject(new Error('This device can’t share its location.'));
    if(await permState('geolocation')==='denied') return reject(new Error('Location is blocked for this site. Allow it in your browser or site settings, then try again.'));
    navigator.geolocation.getCurrentPosition(
      p=>{ const loc={lat:p.coords.latitude,lng:p.coords.longitude,ts:Date.now()}; _lastLoc=loc;
           try{ localStorage.setItem('nomnom_lastloc',JSON.stringify(loc)); }catch(_){}
           resolve({lat:loc.lat,lng:loc.lng}); },
      err=>reject(new Error(err&&err.code===1?'Location permission was denied — allow location access for this site, then try again.':'Couldn’t get your location. Make sure location is on, then try again.')),
      {enableHighAccuracy:true,timeout:12000,maximumAge:maxAge}
    );
  });
}

    <div id="bc-stage"></div>
