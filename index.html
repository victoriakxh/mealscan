async function detectIngredients(b64){
  const prompt=`Identify the distinct food ingredients visible in this photo (e.g. a fridge, pantry shelf, or a group of grocery items). Use simple common names. Ignore non-food objects, brands, and packaging text. Respond with ONLY JSON, no markdown: {"ingredients":["",""]}. Return an empty array if no food is visible.`;
  const out=await geminiJSON([{inline_data:{mime_type:'image/jpeg',data:b64}},{text:prompt}],1024);

function bestFoodMatch(name){
  if(!ONDB) return null;
  const q=(name||'').toLowerCase().trim(); if(q.length<2) return null;
  let hits=ONDB.filter(a=>a[0].toLowerCase().includes(q));
  if(!hits.length){ const w=q.split(/[\s,]+/)[0]; if(w&&w.length>2) hits=ONDB.filter(a=>a[0].toLowerCase().includes(w)); }
  if(!hits.length) return null;
  hits.sort((a,b)=>a[0].length-b[0].length);
  const h=hits[0];
  return {per100:{calories:+h[1]||0,protein_g:+h[2]||0,carbs_g:+h[3]||0,fat_g:+h[4]||0,sugar_g:+h[5]||0}};
}
async function costRecipe(recipe){
  try{ await ensureONDB(); }catch(_){}
  let tk=0,tp=0,tc=0,tf=0,anyEst=false;
  for(const ing of (recipe.ingredients||[])){
    const g=+ing.grams||0; let kcal=null,p=0,c=0,f=0,matched=false;
    if(g>0){ const m=bestFoodMatch(ing.name); if(m){ kcal=m.per100.calories*g/100; p=m.per100.protein_g*g/100; c=m.per100.carbs_g*g/100; f=m.per100.fat_g*g/100; matched=true; } }
    if(kcal==null){ kcal=+ing.kcal||0; p=+ing.protein_g||0; if(g>0&&kcal>0)anyEst=true; }
    ing._kcal=Math.round(kcal); ing._matched=matched;
    tk+=kcal; tp+=p; tc+=c; tf+=f;
  }
  const sv=Math.max(1,Math.round(+recipe.servings||1));
  recipe._total={calories:Math.round(tk),protein_g:Math.round(tp),carbs_g:Math.round(tc),fat_g:Math.round(tf)};
  recipe._per={calories:Math.round(tk/sv),protein_g:Math.round(tp/sv),carbs_g:Math.round(tc/sv),fat_g:Math.round(tf/sv)};
  recipe._estimated=anyEst;
  return recipe;
}

      await scanner.start({facingMode:'environment'},
        {fps:10,qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};},aspectRatio:1.3333,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
        (txt)=>{ if(!running)return; stopScanner(); doLookup(txt); },()=>{});
    }catch(e){running=false;hint.textContent='Couldn’t start the camera — type the barcode number into “Search for a food”.';}
  };
  async function doLookup(code){
    await stopScanner();
    m.querySelector('#reader').innerHTML='';
    stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
    const r=await barcodeLookup(code);
    if(!r){stage.innerHTML=`<div class="err">Product not found in OpenNutrition or Open Food Facts. Try entering it manually.</div><div class="btn-row"><button class="btn" id="man">Enter manually</button></div>`;stage.querySelector('#man').onclick=()=>{m.remove();openManual();};return;}
    weighAndLog(m,stage,r.name,r.per,r.source,r.g);
  }
  startScan();
}

/* shared: weigh a known per-100g item and log */
function weighAndLog(m,stage,name,per,source,defGrams,onDone){
  per={calories:+per.calories||0,protein_g:+per.protein_g||0,carbs_g:+per.carbs_g||0,fat_g:+per.fat_g||0,sugar_g:+per.sugar_g||0};
  stage.innerHTML=`
    <div class="item-edit"><div class="nm">${esc(name)} <span style="color:var(--text-soft);font-weight:400">· ${r0(per.calories)} kcal/100g</span></div></div>
    ${servingWidget()}
    ${mealChips(defaultMeal())}
    <div class="toggle-row"><input type="checkbox" id="wl-lib" style="width:auto"><label for="wl-lib" style="margin:0">Save to library</label></div>
    <div class="field"><button class="btn btn-primary btn-block" id="wl-save">Log item</button></div>`;
  const sv=wireServing(stage,per,defGrams);
  const getMeal=wireMealChips(stage);
  stage.querySelector('#wl-save').onclick=()=>{
    const g=sv.grams();
    state.entries.push({id:uid(),date:viewDate,meal:getMeal(),name,grams:g,servingLabel:sv.desc(),
      calories:per.calories*g/100,protein_g:per.protein_g*g/100,carbs_g:per.carbs_g*g/100,fat_g:per.fat_g*g/100,sugar_g:per.sugar_g*g/100,source});
    if(stage.querySelector('#wl-lib').checked)addToLibrary(name,per,g);
    save(); onDone?onDone():closeModal(m);
  };
}

  const distinct=()=>{const seen=new Set(),out=[];for(let i=state.entries.length-1;i>=0;i--){const e=state.entries[i],k=(e.name||'').toLowerCase();if(!e.name||seen.has(k))continue;seen.add(k);out.push({name:e.name,sub:`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`,entry:e});}return out;};

/* edit/delete a food entry */
function editFood(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  const perServing=(e.unitCal!=null);
  const per100=(!perServing&&e.grams)?{calories:e.calories/e.grams*100,protein_g:(e.protein_g||0)/e.grams*100,carbs_g:(e.carbs_g||0)/e.grams*100,fat_g:(e.fat_g||0)/e.grams*100,sugar_g:(e.sugar_g||0)/e.grams*100}:null;
  let size=perServing?0:Math.max(5,Math.round(e.grams||100));   // grams per serving
  let servings=perServing?(e.unitCal?r1(e.calories/e.unitCal):1):1; if(!servings)servings=1;
  let meal=e.meal||defaultMeal(), saveLib=false;
  const fmtServ=(v)=>{const w=Math.floor(v);if(v-w===0.5)return w?`${w}½`:'½';return String(r1(v));};
  const kcal=()=>perServing?(e.unitCal*servings):(per100?per100.calories*size*servings/100:0);
  const sub=()=>perServing?`${fmtServ(servings)} × ${e.portion||'serving'}`:`${r0(size*servings)} g · ${fmtServ(servings)} serving${servings===1?'':'s'}`;
  const sh=makeSheet(`<div class="edit-head"><span class="edit-title">Edit food</span><button class="edit-x" id="ef-x">${IC_X}</button></div>
    <div class="efh">
      <div class="efh-top"><span class="efh-ic">${IC_FORK}</span><div class="efh-main"><div class="efh-name">${esc(e.name)}</div><div class="efh-sub" id="ef-sub"></div></div></div>
      <div class="efh-cal"><span id="ef-kcal">0</span><small>kcal</small></div>
    </div>
    ${perServing?'':`<div class="add-card">
      <div class="dur-h"><span>Serving size</span><span class="dur-v"><b id="ef-szv">${size}</b> g</span></div>
      <div class="dur-row"><button class="step" id="ef-szdec">${IC_MINUS}</button>
        <div class="nn-slider" id="ef-slider"><div class="nn-track"></div><div class="nn-fill" id="ef-fill"></div><div class="nn-thumb" id="ef-thumb"></div></div>
        <button class="step" id="ef-szinc">${IC_PLUS}</button></div></div>`}
    <div class="add-card">
      <div class="dur-h"><span>Servings</span>
        <div class="stepper"><button id="ef-svdec">${IC_MINUS}</button><div class="sv" id="ef-svv">${fmtServ(servings)}</div><button id="ef-svinc">${IC_PLUS}</button></div></div>
      <div class="qchips" id="ef-q"><button data-q="0.5">½</button><button data-q="1">1</button><button data-q="1.5">1½</button><button data-q="2">2×</button></div>
    </div>
    <div style="margin-top:14px"><div class="add-label">Meal</div><div class="seg" id="ef-meal">${MEALS.map(x=>`<button data-meal="${x}"${x===meal?' class="on"':''}>${x}</button>`).join('')}</div></div>
    <button class="lib-toggle" id="ef-libtog"><span class="lt-ic" id="ef-bm">${IC_BOOKMARK.replace('{F}','none')}</span><span class="lt-label">Save to Library</span><span class="set-tog" id="ef-libsw"><span></span></span></button>
    <button class="btn-del-soft" id="ef-del">${IC_TRASH}<span>Delete this entry</span></button>
    <button class="btn btn-primary btn-block" id="ef-save" style="margin-top:14px">Save changes</button>`);
  const root=sh.sheet;
  let placeSize=()=>{};
  const repaint=()=>{
    root.querySelector('#ef-kcal').textContent=r0(kcal());
    root.querySelector('#ef-sub').textContent=sub();
    root.querySelector('#ef-svv').textContent=fmtServ(servings);
    if(!perServing){const z=root.querySelector('#ef-szv');if(z)z.textContent=r0(size);placeSize();}
    root.querySelectorAll('#ef-q button').forEach(b=>b.classList.toggle('on',+b.dataset.q===servings));
  };
  if(!perServing){
    const MIN=5,MAX=600;
    const sl=root.querySelector('#ef-slider'),fillEl=root.querySelector('#ef-fill'),thumbEl=root.querySelector('#ef-thumb');
    placeSize=()=>{const f=Math.max(0,Math.min(1,(size-MIN)/(MAX-MIN)));fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
    const setFromX=(x)=>{const r=sl.getBoundingClientRect();let f=(x-r.left-13)/(r.width-26);f=Math.max(0,Math.min(1,f));size=Math.round((MIN+f*(MAX-MIN))/5)*5;repaint();};
    let drag=false;
    sl.addEventListener('pointerdown',ev=>{drag=true;try{sl.setPointerCapture(ev.pointerId);}catch(_){}setFromX(ev.clientX);});
    sl.addEventListener('pointermove',ev=>{if(drag)setFromX(ev.clientX);});
    sl.addEventListener('pointerup',()=>{drag=false;});sl.addEventListener('pointercancel',()=>{drag=false;});
    root.querySelector('#ef-szdec').onclick=()=>{size=Math.max(MIN,size-5);repaint();};
    root.querySelector('#ef-szinc').onclick=()=>{size=Math.min(MAX,size+5);repaint();};
  }
  root.querySelector('#ef-svdec').onclick=()=>{servings=Math.max(0.5,r1(servings-0.5));repaint();};
  root.querySelector('#ef-svinc').onclick=()=>{servings=Math.min(20,r1(servings+0.5));repaint();};
  root.querySelectorAll('#ef-q button').forEach(b=>b.onclick=()=>{servings=+b.dataset.q;repaint();});
  root.querySelectorAll('#ef-meal button').forEach(b=>b.onclick=()=>{meal=b.dataset.meal;root.querySelectorAll('#ef-meal button').forEach(x=>x.classList.toggle('on',x===b));});
  root.querySelector('#ef-libtog').onclick=()=>{saveLib=!saveLib;root.querySelector('#ef-libsw').classList.toggle('on',saveLib);root.querySelector('#ef-bm').innerHTML=IC_BOOKMARK.replace('{F}',saveLib?'currentColor':'none');};
  root.querySelector('#ef-x').onclick=()=>sh.close();
  root.querySelector('#ef-del').onclick=()=>{state.entries=state.entries.filter(x=>x.id!==id);save();sh.close();};
  root.querySelector('#ef-save').onclick=()=>{
    e.meal=meal;
    if(perServing){
      e.calories=e.unitCal*servings; e.servingLabel=`${fmtServ(servings)} ${e.portion||'serving'}`;
      if(saveLib)addToLibraryServing(e.name,e.unitCal,e.portion||'serving');
    }else{
      const g=size*servings;
      e.grams=g; e.calories=per100.calories*g/100; e.protein_g=per100.protein_g*g/100; e.carbs_g=per100.carbs_g*g/100; e.fat_g=per100.fat_g*g/100; e.sugar_g=per100.sugar_g*g/100; e.servingLabel=`${r0(g)} g`;
      if(saveLib&&g)addToLibrary(e.name,per100,Math.round(size));
    }
    save();sh.close();
  };
  repaint();
}

function ringSVG(pct){
  const r=58,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,pct||0)));
  return `<svg viewBox="0 0 140 140" width="128" height="128">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent-bg)" stroke-width="12"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 70 70)"/>
  </svg>`;
}
function trendSVG(pts){
  if(pts.length<2)return '<div class="empty" style="border:none">Log at least two mornings to see your trend.</div>';
  const W=320,H=130,padT=10,padB=4,padL=4,padR=4;
  const xs=pts.map(p=>p.t),ys=pts.map(p=>p.v);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);const pad=(maxY-minY)*0.25||1;minY-=pad;maxY+=pad;
  const X=t=>padL+(maxX===minX?0.5:(t-minX)/(maxX-minX))*(W-padL-padR);
  const Y=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  const daily=pts.map(p=>`${X(p.t)},${Y(p.v)}`).join(' ');
  const avg=pts.map(p=>{const win=pts.filter(q=>q.t<=p.t&&q.t>p.t-7*864e5);return [X(p.t),Y(win.reduce((s,q)=>s+q.v,0)/win.length)];});
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <polyline fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" points="${avg.map(a=>a.join(',')).join(' ')}"/>
    <polyline fill="none" stroke="var(--accent-strong)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" points="${daily}"/>
    <circle cx="${X(last.t)}" cy="${Y(last.v)}" r="4.5" fill="var(--surface)" stroke="var(--accent-strong)" stroke-width="3"/>
  </svg>`;
}

  const deltaPill=(d)=>{ // d in display unit

  // range-filtered pts for chart

  // BMI

  if(curKg&&p.height){ const hm=p.height/100; const bmi=curKg/(hm*hm); const cat=bmi<18.5?'Underweight':bmi<25?'Healthy':bmi<30?'Overweight':'Obese'; const ccol=bmi<18.5?'#7CB8E8':bmi<25?'#18A974':bmi<30?'#F2A93B':'#E5747A'; const pct=Math.max(0,Math.min(100,(bmi-15)/(35-15)*100));
    bmiHtml=`<div class="scard" style="padding:16px 18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-weight:600;font-size:13px;color:var(--text-soft)">BMI</span><div style="display:flex;align-items:baseline;gap:5px"><span style="font-family:var(--display);font-weight:800;font-size:18px;color:${ccol}">${bmi.toFixed(1)}</span><span style="font-size:11.5px;color:var(--text-soft)">${cat}</span></div></div><div class="bmibar"><div class="knob" style="left:${pct}%"></div></div></div>`;

        <div style="font-family:var(--display);font-weight:800;font-size:26px;color:${toGo<=0?'#18A974':'#18A974'};line-height:1">${toGo>0?r1(toGo):'0.0'} ${wu}</div>

      ${trendSVG(cpts)}
      <div class="wlegend"><span class="lg"><span style="width:14px;height:3px;border-radius:2px;background:var(--accent-strong)"></span>Daily weigh-in</span><span class="lg"><span style="width:14px;height:2px;border-radius:2px;background:var(--accent)"></span>7-day average</span></div>
    </div>

    <div class="wstrip">
      <div class="col"><div class="l">Week</div><div class="v">${stripVal(weekCh)}</div></div><div class="vline"></div>
      <div class="col"><div class="l">Month</div><div class="v">${stripVal(monthCh)}</div></div><div class="vline"></div>
      <div class="col"><div class="l">Start</div><div class="v">${stripVal(startCh)}</div></div><div class="vline"></div>

      ${[...pts].reverse().map((q,i,arr)=>{ const prev=arr[i+1]; const d=prev?q.v-prev.v:null; return `<div class="whrow"><span class="lab">${new Date(q.w.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})}</span>${deltaPill(d)}<span class="wt">${r1(q.v)} ${wu}</span><button class="del" data-delw="${q.w.date}">${IC_TRASH}</button></div>`; }).join('')}

/* ---------- PLAN ---------- */
function renderPlan(){
  const p=state.profile;
  const hu=state.settings.heightUnit||'cm', wu=state.settings.weightUnit||'kg';
  const wkg=latestWeightKg();
  const ACTS_P=[{m:1.2,label:'Sedentary',desc:'Little or no exercise — desk job.'},{m:1.375,label:'Light',desc:'Light exercise 1–3 days a week.'},{m:1.55,label:'Moderate',desc:'Moderate exercise 3–5 days a week.'},{m:1.725,label:'Active',desc:'Hard exercise 6–7 days a week.'},{m:1.9,label:'Very active',desc:'Hard daily exercise or a physical job.'}];
  if(!ACTS_P.find(a=>a.m===p.activity)) p.activity=1.55;
  if(p.rate==null) p.rate=(p.lossRate?Math.min(0.75,Math.max(0.25,Math.round(p.lossRate/1100*4)/4)):0.5);
  if(p.goalWeight==null && wkg) p.goalWeight=Math.round((wkg-5)*10)/10;
  const ageNow=()=>(+p.age||30);
  const fmtN=(n)=>r0(n).toLocaleString();
  const round5=(n)=>Math.round(n/5)*5;
  const SCALE_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12l4-4.5"/><path d="M9 4.5h6"/></svg>';
  const CALOK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="3"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/><path d="M16.5 14.5l-3.5 3.5-2-2"/></svg>';
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  $('main').innerHTML=`
    <div class="topbar"><div><h1>Plan</h1><div class="date">Set your targets</div></div><button class="gear" id="open-settings-p">${GEAR_SVG}</button></div>

    <div class="scard" style="margin-top:14px">
      <div class="scard-h">About you</div>
      <div class="prow"><span class="lab">Sex</span>
        <div class="minitog" id="p-sex"><button data-s="female"${p.sex==='female'?' class="on"':''}>Female</button><button data-s="male"${p.sex==='male'?' class="on"':''}>Male</button></div></div>
      <div class="prow brd"><span class="lab">Age</span>
        <div class="pstep"><button id="p-agedn">${IC_MINUS}</button><span class="val" id="p-agev"></span><button id="p-ageup">${IC_PLUS}</button></div></div>
      <div class="prow brd"><span class="lab">Height</span>
        <div class="pstep"><button id="p-htdn">${IC_MINUS}</button><span class="val" id="p-htv"></span><button id="p-htup">${IC_PLUS}</button></div></div>
    </div>

    <div class="scard pwsync">
      <div class="ic">${SCALE_SVG}</div>
      <div><div style="font-size:13px;color:var(--text-soft)">Current weight</div><div class="v" id="p-cur"></div></div>
    </div>

    <div class="scard">
      <div class="scard-h">Activity level</div>
      <div class="achips" id="p-act">${ACTS_P.map(a=>`<button class="achip${a.m===p.activity?' on':''}" data-m="${a.m}">${a.label}</button>`).join('')}</div>
      <div class="adesc" id="p-actdesc"></div>
    </div>

    <div class="scard">
      <div class="scard-h">Goal</div>
      <div class="seg-goal" id="p-goal"><button data-g="maintain"${p.goal==='maintain'?' class="on"':''}>Maintain</button><button data-g="lose"${p.goal==='lose'?' class="on"':''}>Lose weight</button></div>
      <div id="p-lose" style="${p.goal==='lose'?'':'display:none'}">

        </div>
        <div id="p-proj"></div>
      </div>
    </div>

    <div class="scard">
      <div class="scard-h">Your numbers</div>
      <div class="numrow"><div><div class="t">BMR</div><div class="s">At complete rest</div></div><span class="v" id="p-bmr">—</span></div>

      <div class="tgtbox"><div><div style="font-size:13.5px;font-weight:700;color:var(--text)">Daily target</div><div class="s" id="p-tsub" style="font-size:11.5px;color:var(--text-soft);margin-top:1px"></div></div>
        <div style="display:flex;align-items:baseline;gap:3px"><span class="big" id="p-tgt">—</span><span style="font-size:12px;color:var(--text-soft)">kcal</span></div></div>
    </div>

    <button class="cta" id="p-set">Set as daily target</button>
    <div id="p-saved"></div>
  `;
  $('open-settings-p').onclick=openSettings;

  function paint(){
    $('p-agev').textContent=ageNow();
    $('p-htv').textContent=p.height?`${r0(cmToUnit(p.height,hu))} ${hu}`:`— ${hu}`;
    $('p-cur').textContent=wkg?`${r1(kgToUnit(wkg,wu))} ${wu}`:'Log a weigh-in first';
    const act=ACTS_P.find(a=>a.m===p.activity)||ACTS_P[2];
    $('p-actdesc').textContent=act.desc;
    document.querySelectorAll('#p-act .achip').forEach(b=>b.classList.toggle('on',+b.dataset.m===p.activity));
    document.querySelectorAll('#p-sex button').forEach(b=>b.classList.toggle('on',b.dataset.s===p.sex));
    document.querySelectorAll('#p-goal button').forEach(b=>b.classList.toggle('on',b.dataset.g===p.goal));
    $('p-lose').style.display=p.goal==='lose'?'':'none';
    if(p.goal==='lose'){
      $('p-gwv').textContent=p.goalWeight!=null?`${r1(kgToUnit(p.goalWeight,wu))} ${wu}`:`— ${wu}`;
      document.querySelectorAll('#p-pace .pace').forEach(b=>b.classList.toggle('on',Math.abs(+b.dataset.r-p.rate)<0.01));
    }
    // numbers
    const age=ageNow(), ht=+p.height||0;
    if(!wkg||!ht){
      $('p-bmr').textContent='—';$('p-maint').textContent='—';$('p-tgt').textContent='—';

      $('p-set').disabled=true;
      $('p-proj').innerHTML='';
      return;
    }
    $('p-set').disabled=false;
    const bmr=10*wkg+6.25*ht-5*age+(p.sex==='male'?5:-161);
    const maint=bmr*p.activity;
    const lose=p.goal==='lose';
    const deficit=Math.round(p.rate*7700/7);
    const floor=p.sex==='male'?1500:1200;
    let target=lose?maint-deficit:maint, clamped=false;
    if(target<floor){target=floor;clamped=true;}
    $('p-bmr').textContent=fmtN(round5(bmr))+' kcal';
    $('p-maint').textContent=fmtN(round5(maint))+' kcal';
    $('p-tgt').textContent=fmtN(round5(target));
    $('p-tsub').textContent=lose?(clamped?'Held at a safe minimum':'−'+fmtN(round5(deficit))+' kcal/day deficit'):'Maintenance calories';
    p._target=round5(target);
    // projection

      const toGo=wkg-p.goalWeight;

        const wks=Math.max(1,Math.round(toGo/p.rate));
        const eta=new Date(); eta.setDate(eta.getDate()+Math.round(toGo/p.rate*7));

      } else {
        $('p-proj').innerHTML=`<div style="background:var(--accent-bg);border-radius:14px;padding:12px 14px;margin-top:16px;font-size:12.5px;color:var(--text-soft)">Set a goal weight below your current weight to see a projection.</div>`;
      }
    } else $('p-proj').innerHTML='';
  }
  const save2=()=>{p.lossRate=Math.round(p.rate*7700/7);save();$('p-saved').innerHTML='';paint();};

  document.querySelectorAll('#p-sex button').forEach(b=>b.onclick=()=>{p.sex=b.dataset.s;save2();});
  $('p-ageup').onclick=()=>{p.age=Math.min(100,ageNow()+1);save2();};
  $('p-agedn').onclick=()=>{p.age=Math.max(14,ageNow()-1);save2();};
  const htStep=(d)=>{const disp=p.height?cmToUnit(p.height,hu):(hu==='in'?67:170);const nd=Math.round(disp)+d;p.height=r1(unitToCm(nd,hu));save2();};
  $('p-htup').onclick=()=>htStep(1); $('p-htdn').onclick=()=>htStep(-1);
  document.querySelectorAll('#p-act .achip').forEach(b=>b.onclick=()=>{p.activity=+b.dataset.m;save2();});
  document.querySelectorAll('#p-goal button').forEach(b=>b.onclick=()=>{p.goal=b.dataset.g;save2();});
  const gwStep=(d)=>{const base=p.goalWeight!=null?p.goalWeight:(wkg||70);const disp=kgToUnit(base,wu)+d;p.goalWeight=r1(unitToKg(disp,wu));save2();};
  $('p-gwup').onclick=()=>gwStep(0.1); $('p-gwdn').onclick=()=>gwStep(-0.1);
  document.querySelectorAll('#p-pace .pace').forEach(b=>b.onclick=()=>{p.rate=+b.dataset.r;save2();});
  $('p-set').onclick=()=>{ if(p._target){state.settings.dailyTarget=p._target;save();$('p-saved').innerHTML=`<div class="saved-note">${fmtN(p._target)} kcal set as your daily target ✓</div>`;} };
  paint();
}

/* ---------- SETTINGS ---------- */
function openSettings(){
  const s=state.settings;
  const I=(p)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const IC_SCALE=I('<path d="M7 8h10a2 2 0 012 2v9a2 2 0 01-2 2H7a2 2 0 01-2-2v-9a2 2 0 012-2z"/><path d="M12 4v4M9.5 13.5L12 8l2.5 5.5"/>');
  const IC_RULER=I('<path d="M12 3v18M8 6l4-3 4 3M8 18l4 3 4-3"/>');
  const IC_SPARK=I('<path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/><path d="M18 14l.9 2.1L21 17l-2.1.9L18 20l-.9-2.1L15 17l2.1-.9z"/>');
  const IC_DB=I('<ellipse cx="12" cy="5.5" rx="7" ry="2.5"/><path d="M5 5.5v6c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5v-6M5 11.5v6c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5v-6"/>');
  const IC_EXPORT=I('<path d="M12 4v11M8 11l4 4 4-4"/><path d="M5 18v1a2 2 0 002 2h10a2 2 0 002-2v-1"/>');
  const IC_CHEVR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
  const IC_CHEVD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
  const IC_CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M20 6L9 17l-5-5"/></svg>';
  const MODELS=[
    {id:'gemini-3.5-flash',name:'Gemini 3.5 Flash',desc:'Newest · best accuracy'},
    {id:'gemini-2.5-flash',name:'Gemini 2.5 Flash',desc:'Fast & dependable'},
    {id:'gemini-2.5-flash-lite',name:'Gemini 2.5 Flash-Lite',desc:'Lighter on quota'},
    {id:'gemini-2.0-flash',name:'Gemini 2.0 Flash',desc:'Lowest latency'}
  ];
  const meta=(user&&user.user_metadata)||{};
  const email=(user&&user.email)||'';
  const namePart=(email.split('@')[0]||'').replace(/[._-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const displayName=meta.full_name||meta.name||namePart||'Your account';
  const initials=((displayName.match(/\b\w/g)||[]).join('').slice(0,2)||email.slice(0,2)||'NN').toUpperCase();

  const overlay=el(`<div class="sheet-overlay"><div class="sheet set-sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    <h2>Settings</h2>

    ${(CLOUD&&user)?`<div class="set-card set-prof" style="margin-top:10px">
      <div class="set-av">${esc(initials)}</div>
      <div class="grow"><div class="set-name">${esc(displayName)}</div><div class="set-email">${esc(email)}</div></div>
    </div>`:''}

    <div class="set-sec">Units</div>
    <div class="set-card">
      <div class="set-row first">
        <div class="set-ico">${IC_SCALE}</div>
        <div class="grow"><div class="set-rt">Weight unit</div></div>
        <div class="seg" id="seg-w">
          <button class="seg-btn${s.weightUnit==='kg'?' active':''}" data-w="kg">kg</button>
          <button class="seg-btn${s.weightUnit==='lb'?' active':''}" data-w="lb">lb</button>
        </div>
      </div>
      <div class="set-row">
        <div class="set-ico">${IC_RULER}</div>
        <div class="grow"><div class="set-rt">Height unit</div><div class="set-rs">used only for profile estimates</div></div>
        <div class="seg" id="seg-h">
          <button class="seg-btn${s.heightUnit==='cm'?' active':''}" data-h="cm">cm</button>
          <button class="seg-btn${s.heightUnit==='in'?' active':''}" data-h="in">in</button>
        </div>
      </div>
    </div>

    <div class="set-sec">Appearance</div>
    <div class="set-card pad">
      <div class="set-rt" style="margin-bottom:4px">Theme</div>
      <div class="set-rs" id="set-themelbl" style="margin-bottom:16px">${esc((THEMES[s.theme]||{}).desc||'')}</div>
      <div class="set-themes" id="set-themes">
        ${Object.keys(THEMES).map(id=>{const t=THEMES[id];return `<button class="set-sw${s.theme===id?' sel':''}" data-theme="${id}" style="--swr:${t.strong}"><span class="dot" style="background:${t.sw}"></span><span class="lbl">${t.name}</span></button>`;}).join('')}
      </div>
    </div>

    <div class="set-sec">AI scanning</div>
    <div class="set-card">
      <div class="set-row first">
        <div class="set-ico">${IC_SPARK}</div>
        <div class="grow"><div class="set-rs" style="line-height:1.45">Powers photo &amp; barcode food recognition. Bring your own key — <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="color:var(--accent-strong);font-weight:600">free in Google AI Studio</a>.</div></div>
      </div>
      <div class="set-row" id="set-keyrow"></div>
      <div class="set-row" style="display:block">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="grow"><div class="set-rt">Model</div></div>
          <button class="set-pill" id="set-modelpill"><span id="set-modelname">Choose</span>${IC_CHEVD}</button>
        </div>
        <div id="set-modelmenu"></div>
      </div>
    </div>

    <div class="set-sec">Data &amp; storage</div>
    <div class="set-card">
      <div class="set-row first">
        <div class="set-ico">${IC_DB}</div>
        <div class="grow"><div class="set-rt">Offline food database</div><div class="set-rs" id="set-dbstatus">…</div></div>
        <button class="set-tog" id="set-dbtog"><span></span></button>
      </div>
      <div class="set-row" id="set-export">
        <div class="set-ico">${IC_EXPORT}</div>
        <div class="grow"><div class="set-rt">Export my data</div><div class="set-rs">download everything as JSON</div></div>
        <span class="set-chev">${IC_CHEVR}</span>
      </div>
      <div class="set-row" id="set-clear">
        <div class="set-ico danger">${IC_TRASH}</div>
        <div class="grow"><div class="set-rt danger">Clear all data</div><div class="set-rs danger">this can't be undone</div></div>
      </div>
    </div>

    ${(CLOUD&&user)?`<button class="set-signout" id="set-signout">Sign out</button>`:''}
    <div class="set-foot">NomNom · Food data from <a href="https://www.opennutrition.app" target="_blank" rel="noopener">OpenNutrition</a> &amp; <a href="https://world.openfoodfacts.org" target="_blank" rel="noopener">Open Food Facts</a></div>
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  // slide-up entry
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  const close=()=>{
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  // swipe-down to dismiss
  let startY=0,dY=0,drag=false;
  // touch: drag down from anywhere when the sheet is scrolled to the top (native bottom-sheet feel)
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-startY;
    if(sheet.scrollTop<=0 && dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}
  },{passive:false});
  sheet.addEventListener('touchend',()=>{
    if(!drag){sheet.style.transition='';return;}
    drag=false;sheet.style.transition='transform .25s ease';
    if(dY>90){close();}else{sheet.style.transform='translateY(0)';}
  });
  // mouse: drag the grip handle (desktop)
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);
    const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  // ---- units (segmented, live save) ----
  overlay.querySelectorAll('#seg-w .seg-btn').forEach(b=>b.onclick=()=>{ s.weightUnit=b.dataset.w; save();
    overlay.querySelectorAll('#seg-w .seg-btn').forEach(x=>x.classList.toggle('active',x===b)); });
  overlay.querySelectorAll('#seg-h .seg-btn').forEach(b=>b.onclick=()=>{ s.heightUnit=b.dataset.h; save();
    overlay.querySelectorAll('#seg-h .seg-btn').forEach(x=>x.classList.toggle('active',x===b)); });

  // ---- theme (apply live on tap) ----
  overlay.querySelectorAll('#set-themes .set-sw').forEach(b=>b.onclick=()=>{
    s.theme=b.dataset.theme; save(); applyTheme(s.theme);
    overlay.querySelectorAll('#set-themes .set-sw').forEach(p=>p.classList.toggle('sel',p===b));
    const lbl=overlay.querySelector('#set-themelbl'); if(lbl)lbl.textContent=(THEMES[s.theme]||{}).desc||'';
  });

  // ---- API key (masked display + inline edit) ----
  const keyrow=overlay.querySelector('#set-keyrow');
  const maskKey=k=>k?('••••••••'+k.slice(-4)):'Not set';
  function paintKey(){
    keyrow.innerHTML=`<div class="grow"><div class="set-rt">Gemini API key</div><div class="set-rs">${esc(maskKey(s.apiKey))}</div></div><button class="set-editbtn">${s.apiKey?'Edit':'Add'}</button>`;
    keyrow.querySelector('button').onclick=editKey;
  }
  function editKey(){
    keyrow.innerHTML=`<div class="grow"><div class="set-rt">Gemini API key</div><input class="set-keyinput" type="password" placeholder="AIza…"></div><button class="set-editbtn">Done</button>`;
    const inp=keyrow.querySelector('input'); inp.value=s.apiKey||''; setTimeout(()=>inp.focus(),0);
    keyrow.querySelector('button').onclick=()=>{ s.apiKey=inp.value.trim(); save(); paintKey(); };
    inp.onkeydown=e=>{ if(e.key==='Enter'){ s.apiKey=inp.value.trim(); save(); paintKey(); } };
  }
  paintKey();

  // ---- model picker (dropdown, live save) ----
  let modelOpen=false;
  const pill=overlay.querySelector('#set-modelpill');
  const nameEl=overlay.querySelector('#set-modelname');
  const menuEl=overlay.querySelector('#set-modelmenu');
  function paintModel(){
    const cur=MODELS.find(m=>m.id===s.model);
    nameEl.textContent=cur?cur.name:(s.model||'Choose');
    pill.classList.toggle('open',modelOpen);
    if(!modelOpen){ menuEl.innerHTML=''; return; }
    menuEl.innerHTML=`<div class="set-menu">${MODELS.map(m=>`<button class="set-mi${s.model===m.id?' sel':''}" data-m="${m.id}"><div style="flex:1;min-width:0"><div class="mn">${m.name}</div><div class="md">${m.desc}</div></div>${s.model===m.id?`<span class="mck">${IC_CHECK}</span>`:''}</button>`).join('')}</div>`;
    menuEl.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{ s.model=b.dataset.m; save(); modelOpen=false; paintModel(); });
  }
  pill.onclick=()=>{ modelOpen=!modelOpen; paintModel(); };
  paintModel();

  // ---- offline database (toggle: download / clear) ----
  const dbtog=overlay.querySelector('#set-dbtog');
  const dbstatus=overlay.querySelector('#set-dbstatus');
  function paintDb(){
    const on=!!ONDB;
    dbtog.classList.toggle('on',on);
    dbstatus.textContent=on?`${ONDB.length.toLocaleString()} foods · offline ready`:'Not downloaded';
  }
  paintDb();
  dbtog.onclick=async()=>{
    if(ONDB){
      if(!confirm('Remove the offline food database from this device? You can download it again anytime.'))return;
      try{await _idbDel('food');}catch(e){}
      ONDB=null; ONBYEAN=null; _onPromise=null; paintDb();
    }else{
      dbtog.classList.add('on'); dbstatus.textContent='Downloading…';
      try{ await ensureONDB(); paintDb(); }
      catch(e){ dbtog.classList.remove('on'); dbstatus.textContent='Couldn’t download — needs the deployed https site.'; }
    }
  };

  // ---- export / clear / sign out ----
  overlay.querySelector('#set-export').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nomnom-data.json';a.click();
  };
  overlay.querySelector('#set-clear').onclick=()=>{if(confirm('Erase all data? This cannot be undone.')){localStorage.removeItem(KEY);state=structuredClone(DEFAULT);if(CLOUD&&user){saveLocal();pushCloud();}close();}};
  const so=overlay.querySelector('#set-signout'); if(so)so.onclick=()=>{overlay.remove();signOut();};
}

/* ---------- cloud sync (Supabase) ---------- */
function initCloud(){
  if(SUPABASE_URL && /^https?:\/\//.test(SUPABASE_URL) && window.supabase){
    try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); CLOUD=true; }catch(e){ CLOUD=false; }
  }
}
let _pushT=null;
function scheduleCloudPush(){ if(!CLOUD||!user)return; clearTimeout(_pushT); _pushT=setTimeout(pushCloud,800); }
async function pushCloud(){ if(!CLOUD||!user)return; try{ await sb.from('profiles').upsert({id:user.id,data:state,updated_at:new Date().toISOString()}); }catch(e){} }
function hasData(){ return (state.entries&&state.entries.length)||(state.weights&&state.weights.length)||(state.exercise&&state.exercise.length)||(state.library&&state.library.length); }
async function loadCloudIntoState(){
  let row=null;
  try{ const r=await sb.from('profiles').select('data').eq('id',user.id).maybeSingle(); row=r.data; }catch(e){}
  if(row&&row.data){ state=Object.assign(structuredClone(DEFAULT),row.data); saveLocal(); }   // cloud wins
  else if(hasData()){ await pushCloud(); }                                                       // migrate this device's data up
}
async function onAuth(){
  if(user){ try{ await loadCloudIntoState(); }catch(e){} showApp(); }
  else showLogin();
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; try{localStorage.removeItem(KEY);}catch(e){} state=structuredClone(DEFAULT); showLogin(); }
function showApp(){
  const a=document.getElementById('auth-screen'); if(a)a.style.display='none';
  document.getElementById('app').style.display='';
  document.querySelector('.tabbar').style.display='';
  render(); layout();
}
function showLogin(){
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  applyTheme(state.settings.theme);
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML=`<div class="auth-wrap">
    <div class="auth-cat">${LOGO_SVG}</div>
    <div class="auth-logo">NomNom</div>
    <div class="auth-tag">Sign in to sync your food log across your devices.</div>
    <div id="auth-msg"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>
    <button class="btn btn-primary btn-block" id="auth-magic" style="margin-top:14px">Email me a sign-in link</button>
    <div class="auth-or">or</div>
    <button class="btn btn-block" id="auth-google">Continue with Google</button>
  </div>`;
  const msg=s.querySelector('#auth-msg');
  const redirect=location.href.split('#')[0].split('?')[0];
  s.querySelector('#auth-magic').onclick=async()=>{
    const email=s.querySelector('#auth-email').value.trim();
    if(!email){msg.innerHTML='<div class="err">Enter your email.</div>';return;}
    msg.innerHTML='<div class="hint">Sending…</div>';
    try{ const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:redirect}}); if(error)throw error;
      msg.innerHTML='<div class="note">Check your email for a sign-in link, then return here.</div>';
    }catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Could not send the link.')+'</div>'; }
  };
  s.querySelector('#auth-google').onclick=async()=>{
    msg.innerHTML='<div class="hint">Redirecting to Google…</div>';
    try{ const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirect}}); if(error)throw error; }
    catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Google sign-in failed.')+'</div>'; }
  };
}
async function boot(){
  initCloud();
  if(!CLOUD){ render(); layout(); return; }
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML='<div class="auth-wrap"><div class="auth-logo">NomNom</div><div class="auth-tag">Loading…</div></div>';
  try{
    const {data}=await sb.auth.getSession();
    user=(data&&data.session&&data.session.user)||null;
    sb.auth.onAuthStateChange((_e,sess)=>{ const u=(sess&&sess.user)||null; const changed=((u&&u.id)||null)!==((user&&user.id)||null); user=u; if(changed) onAuth(); });
    await onAuth();
  }catch(e){ CLOUD=false; document.getElementById('app').style.display=''; document.querySelector('.tabbar').style.display=''; render(); layout(); }
}

/* ---------- init ---------- */
document.querySelectorAll('.tabbar .tab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;if(tab==='today')viewDate=todayKey();closeAllModals();});
window.addEventListener('resize',layout);
window.addEventListener('orientationchange',()=>setTimeout(layout,250));
if(window.visualViewport)window.visualViewport.addEventListener('resize',layout);
window.addEventListener('load',layout);
boot();
</script>
