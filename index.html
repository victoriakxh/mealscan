<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --font:'DM Sans',-apple-system,system-ui,sans-serif;
    --display:'Baloo 2','DM Sans',sans-serif;
    --header:#EF9CB4;
    --bg:linear-gradient(180deg,#FDEFF3,#FBE7EE);
    --surface:#FFFFFF;
    --text:#2B2A26;
    --text-soft:#9A938A;
    --divider:#EFE9DF;
    --accent:#EF9CB4;
    --accent-strong:#E37D9A;
    --accent-bg:#FBEFF4;
    --danger:#D67A8E;
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);background-attachment:fixed;color:var(--text);
    font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);}
  button{cursor:pointer;background:none;border:none;}
  input,select{background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--radius-sm);
    padding:11px 14px;width:100%;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  a{color:var(--accent-strong);}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 18px var(--reserve,160px);}

  .band{background:var(--header);margin:0 -18px;padding:16px 18px 20px;color:#fff;}
  .band-top{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;}
  .logo-cat{width:30px;height:30px;flex:0 0 auto;display:inline-flex;}
  .logo-cat svg,.auth-cat svg,.logo-cat img,.auth-cat img{width:100%;height:100%;display:block;object-fit:contain;}
  .gear{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;}
  .gear:active{background:rgba(255,255,255,.34);}
  .bandnav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .bandnav .navbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;line-height:1;}
  .bandnav .navbtn.off{opacity:.35;pointer-events:none;}
  .bandnav .d1{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;line-height:1;text-align:center;}
  .bandnav .d2{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;}
  .hero{text-align:center;margin-top:14px;}
  .hero-num{font-family:var(--display);font-weight:800;font-size:60px;color:#fff;line-height:.95;}
  .hero-label{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.03em;}
  .progress{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .progress .track{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;}
  .progress .fill{height:100%;background:rgba(255,255,255,.92);border-radius:6px;transition:width .3s ease;}
  .progress .pct{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;min-width:34px;text-align:right;}
  .statchips{display:flex;gap:10px;margin-top:12px;}
  .statchip{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:9px 8px;text-align:center;}
  .statchip .l{font-size:10px;color:rgba(255,255,255,.8);}
  .statchip .v{font-family:var(--display);font-weight:700;font-size:16px;color:#fff;margin-top:2px;}

  .card{background:var(--surface);border-radius:24px;padding:18px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-top:14px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text);}
  .card-sub{font-size:13px;color:var(--text-soft);}

  .macrocols{display:flex;gap:10px;}
  .macrocol{flex:1;}
  .macrocol .mv{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;}
  .macrocol .mv s{text-decoration:none;font-size:12px;font-weight:600;color:var(--text-soft);}
  .macrocol .ml{font-size:12px;color:var(--text-soft);margin:5px 0 6px;}
  .mbar{height:5px;border-radius:4px;background:#ECE6DB;overflow:hidden;}
  .mbar i{display:block;height:100%;}

  .mealgroup{padding-top:14px;}
  .meal-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-line .ml-left{display:flex;align-items:center;gap:8px;}
  .meal-dot{width:7px;height:7px;border-radius:50%;}
  .meal-name{font-weight:600;font-size:14px;color:var(--text);}
  .meal-sub{font-size:13px;color:var(--text-soft);}
  .fooditems{display:flex;flex-direction:column;gap:8px;}
  .fooditem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--accent-bg);border-radius:12px;padding:9px 13px;text-align:left;}
  .fooditem:active{filter:brightness(.96);}
  .fooditem .fi-name{font-weight:600;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fooditem .fi-sub{font-size:12.5px;color:var(--text-soft);margin-top:1px;}
  .fooditem .fi-right{display:flex;align-items:center;gap:8px;flex:none;}
  .fooditem .fi-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}
  .chev{color:#C9C2B6;flex:none;}

  .act-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid #F0EAE0;cursor:pointer;}
  .act-item.first{border-top:none;padding-top:2px;}
  .act-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-bg);
    display:flex;align-items:center;justify-content:center;color:var(--accent-strong);flex:none;}
  .act-name{font-weight:600;font-size:14px;color:var(--text);}
  .act-sub{font-size:13px;color:var(--text-soft);}
  .act-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}

  .topbar{background:var(--header);margin:0 -18px;padding:16px 18px 18px;color:#fff;
    display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-family:var(--display);font-size:20px;font-weight:800;margin:0;color:#fff;}
  .topbar .date{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px;}
  .topbar .gear{flex:none;}

  .budget{background:var(--surface);border-radius:var(--radius);box-shadow:0 3px 14px rgba(43,42,38,.05);padding:22px;margin-top:14px;}
  .budget .big{font-family:var(--display);font-size:50px;font-weight:800;line-height:1;color:var(--accent-strong);}
  .budget .biglabel{font-size:13px;color:var(--text-soft);margin-top:6px;}
  .budget .bd{display:flex;gap:22px;margin-top:18px;font-size:13px;color:var(--text-soft);}
  .budget .bd b{display:block;color:var(--text);font-weight:700;font-size:16px;font-family:var(--display);}

  .section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);padding:20px 4px 6px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:13px 16px;margin-top:9px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:0 3px 14px rgba(43,42,38,.05);}
  .row .name{font-weight:600;}
  .row .sub{font-size:13px;color:var(--text-soft);margin-top:2px;}
  .row .val{font-weight:700;white-space:nowrap;color:var(--accent-strong);font-family:var(--display);}
  .row.tappable:active{filter:brightness(.97);}
  .empty{padding:18px;color:var(--text-soft);font-size:14px;background:var(--surface);border-radius:var(--radius-sm);margin-top:9px;}
  .daynav{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;margin-top:9px;background:var(--surface);border-radius:999px;}
  .daynav .arrow{font-size:22px;color:var(--accent-strong);font-weight:800;padding:6px 22px;}
  .daynav .arrow.off{color:var(--divider);pointer-events:none;}
  .daynav .dlabel{font-weight:700;font-size:16px;font-family:var(--display);}
  .mealhead{display:flex;justify-content:space-between;align-items:baseline;padding:20px 6px 2px;}
  .mealhead .mt{font-size:13px;font-weight:700;color:var(--accent-strong);font-family:var(--display);}
  .mealhead .ms{font-size:13px;color:var(--text-soft);}

  .btn{display:inline-block;border:1.5px solid var(--divider);border-radius:999px;padding:13px 18px;
    font-weight:700;text-align:center;background:var(--surface);color:var(--text);}
  .btn:active{filter:brightness(.97);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-block{display:block;width:100%;}
  .btn-row{display:flex;gap:10px;margin-top:12px;}
  .btn-row .btn{flex:1;}
  .btn-danger{color:var(--danger);border-color:var(--divider);background:var(--surface);}
  .linkbtn{font-size:13px;font-weight:700;color:var(--text-soft);padding:6px 10px;border-radius:999px;}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:var(--fab-bottom,96px);
    background:var(--header);color:#fff;font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.06em;
    border:3px solid var(--accent-bg);padding:13px 40px;border-radius:26px;z-index:40;box-shadow:0 12px 26px -8px rgba(0,0,0,.28);}
  .fab:active{filter:brightness(.95);}

  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:space-around;align-items:center;
    background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;z-index:50;
    padding:10px 16px calc(12px + env(safe-area-inset-bottom));}
  .tabbar .tab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 18px;border-radius:16px;color:var(--text-soft);}
  .tabbar .tab .tlabel{font-size:11px;font-weight:600;}
  .tabbar .tab.active{background:var(--accent-bg);color:var(--accent-strong);}
  .tabbar .tab.active .tlabel{font-weight:700;}

  .overlay{position:fixed;inset:0;background:var(--bg);background-attachment:fixed;z-index:60;overflow-y:auto;}
  .overlay-inner{max-width:560px;margin:0 auto;padding:0 18px calc(40px + env(safe-area-inset-bottom));}
  .overlay .mhead{display:flex;justify-content:space-between;align-items:center;padding:20px 4px 14px;position:sticky;top:0;background:var(--bg);background-attachment:fixed;z-index:2;}
  .overlay .mhead h2{font-family:var(--display);font-size:20px;font-weight:700;margin:0;}
  .field{margin-top:18px;}
  .field label{display:block;font-size:13px;color:var(--text-soft);margin-bottom:6px;font-weight:600;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;margin-top:0;}
  .hint{font-size:13px;color:var(--text-soft);margin-top:8px;}
  .note{font-size:13px;color:var(--text-soft);background:var(--accent-bg);padding:13px 15px;margin-top:16px;border-radius:var(--radius-sm);}
  .err{font-size:14px;color:var(--danger);margin-top:14px;font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .chip{border:1.5px solid var(--divider);padding:9px 16px;font-size:14px;font-weight:600;background:var(--surface);border-radius:999px;color:var(--text);}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
  .item-edit{padding:12px 0;border-bottom:1px solid var(--divider);}
  .item-edit .nm{font-weight:700;margin-bottom:8px;}
  .ie-head{display:flex;gap:8px;align-items:center;}
  .ie-head .ie-name{flex:1;min-width:0;padding:10px 12px;font-weight:700;}
  .ie-del{flex:0 0 auto;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--divider);border-radius:50%;background:var(--surface);color:var(--text-soft);padding:0;}
  .ie-del svg{width:18px;height:18px;}
  .ie-del:active{color:var(--danger);border-color:var(--danger);}
  .ie-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .ie-per{font-size:13px;color:var(--text-soft);}
  .conf-tag{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:#FBE9C8;color:#9A6B17;}
  .ie-reest{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent-strong);background:var(--accent-bg);border:1.5px solid var(--accent);border-radius:999px;padding:7px 13px;}
  .ie-reest svg{width:15px;height:15px;}
  .ie-reest[disabled]{opacity:.6;}
  .ie-rowerr{font-size:13px;color:var(--danger);font-weight:600;margin-top:8px;}
  .add-missing{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;padding:12px;border:1.5px dashed var(--accent);border-radius:var(--radius-sm);background:none;color:var(--accent-strong);font-weight:700;font-size:14px;}
  .spinner{padding:40px 0;text-align:center;color:var(--text-soft);}
  .menu-item{padding:18px;margin-top:11px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:0 3px 14px rgba(43,42,38,.05);font-weight:700;}
  .menu-item:active{filter:brightness(.97);}
  .menu-item .d{font-size:13px;color:var(--text-soft);font-weight:400;margin-top:3px;}

  .chart-wrap{padding:14px 0 6px;}
  svg.chart{width:100%;height:auto;display:block;}
  .range-row{display:flex;gap:8px;margin-top:8px;}
  .toggle-row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;color:var(--text-soft);}
  #reader{width:100%;margin-top:16px;border-radius:var(--radius-sm);overflow:hidden;}
  #reader video{border-radius:var(--radius-sm) !important;}

  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:70;display:flex;align-items:flex-end;}
  .sheet{width:100%;max-width:560px;margin:0 auto;background:#fff;border-radius:28px 28px 0 0;
    padding:8px 18px calc(28px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
    scrollbar-width:none;-ms-overflow-style:none;}
  .sheet::-webkit-scrollbar{display:none;}
  .sheet-handle{padding:10px 0 8px;cursor:grab;touch-action:none;}
  .sheet-handle:active{cursor:grabbing;}
  .sheet-grip{width:40px;height:5px;border-radius:3px;background:#E7E0D5;margin:0 auto;}
  #add-body{min-height:60vh;}
  .sheet h2{font-family:var(--display);font-weight:700;font-size:20px;margin:6px 0 2px;}
  .sheet .sub-h{font-family:var(--display);font-weight:700;font-size:15px;margin:22px 0 2px;color:var(--text);}
  .preset{display:flex;align-items:center;gap:13px;padding:13px 16px;border-radius:14px;border:2px solid var(--divider);background:#fff;width:100%;text-align:left;margin-top:10px;}
  .preset.sel{border-color:var(--accent-strong);}
  .preset-sw{width:28px;height:28px;border-radius:50%;flex:none;}
  .preset .pn{display:block;font-family:var(--display);font-weight:600;font-size:15px;color:var(--text);}
  .preset .pd{display:block;font-size:12px;color:var(--text-soft);margin-top:3px;}

  /* ---- redesigned settings ---- */
  .sheet.set-sheet{background:var(--bg);}
  .set-sec{font-family:var(--font);font-weight:600;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-soft);opacity:.85;padding:0 6px 8px;margin-top:20px;}
  .set-card{background:var(--surface);border-radius:22px;padding:2px 16px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-bottom:4px;}
  .set-card.pad{padding:18px;}
  .set-prof{display:flex;align-items:center;gap:14px;padding:16px;}
  .set-av{width:54px;height:54px;border-radius:18px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:22px;flex:none;}
  .set-name{font-family:var(--display);font-weight:700;font-size:18px;color:var(--text);line-height:1.1;}
  .set-email{font-size:13px;color:var(--text-soft);margin-top:2px;word-break:break-all;}
  .set-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--divider);}
  .set-row.first,.set-card>.set-row:first-child{border-top:none;}
  .set-ico{width:38px;height:38px;border-radius:11px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex:none;color:var(--accent-strong);}
  .set-ico svg{width:20px;height:20px;}
  .set-ico.danger{background:#FBE9E5;color:#E5533A;}
  .set-card .grow{flex:1;min-width:0;}
  .set-rt{font-weight:600;font-size:15px;color:var(--text);}
  .set-rt.danger{color:#E5533A;}
  .set-rs{font-size:12px;color:var(--text-soft);margin-top:1px;}
  .set-rs.danger{color:#D9A99F;}
  .set-chev{color:#D6C3CB;flex:none;display:flex;}
  .set-chev svg{width:16px;height:16px;}
  .seg{display:flex;gap:3px;padding:3px;background:rgba(43,42,38,.05);border-radius:11px;flex:none;}
  .seg-btn{padding:7px 20px;min-width:50px;text-align:center;border:none;border-radius:8px;background:transparent;font-family:var(--font);font-weight:600;font-size:13px;color:var(--text-soft);cursor:pointer;}
  .seg-btn.active{background:var(--surface);color:var(--accent-strong);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .set-themes{display:flex;justify-content:space-between;margin-top:2px;}
  .set-sw{display:flex;flex-direction:column;align-items:center;gap:8px;border:none;background:none;padding:0;cursor:pointer;}
  .set-sw .dot{width:46px;height:46px;border-radius:50%;}
  .set-sw.sel .dot{box-shadow:0 0 0 3px var(--surface),0 0 0 5px var(--swr);}
  .set-sw .lbl{font-family:var(--font);font-weight:600;font-size:12px;color:var(--text-soft);}
  .set-sw.sel .lbl{color:var(--text);}
  .set-editbtn{padding:8px 16px;border:none;border-radius:11px;background:var(--accent-bg);color:var(--accent-strong);font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;flex:none;}
  .set-keyinput{width:100%;margin-top:10px;}
  .set-pill{display:inline-flex;align-items:center;gap:9px;padding:9px 12px 9px 15px;border:none;border-radius:12px;background:var(--accent-bg);color:var(--accent-strong);font-family:var(--font);font-weight:600;font-size:13.5px;cursor:pointer;flex:none;}
  .set-pill svg{width:15px;height:15px;transition:transform .2s;}
  .set-pill.open svg{transform:rotate(180deg);}
  .set-menu{margin-top:12px;border:1.5px solid var(--divider);border-radius:16px;overflow:hidden;}
  .set-mi{display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;border:none;border-bottom:1px solid var(--divider);background:var(--surface);text-align:left;cursor:pointer;}
  .set-mi:last-child{border-bottom:none;}
  .set-mi.sel{background:var(--accent-bg);}
  .set-mi .mn{font-weight:600;font-size:14px;color:var(--text);}
  .set-mi .md{font-size:12px;color:var(--text-soft);margin-top:1px;}
  .set-mi .mck{flex:none;color:var(--accent-strong);display:flex;}
  .set-tog{position:relative;width:46px;height:27px;border-radius:14px;border:none;background:var(--divider);cursor:pointer;padding:0;flex:none;transition:background .2s;}
  .set-tog.on{background:var(--accent);}
  .set-tog span{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s;}
  .set-tog.on span{left:22px;}
  .set-signout{width:100%;margin-top:14px;padding:15px 0;border:none;border-radius:18px;background:var(--surface);box-shadow:0 3px 14px rgba(43,42,38,.05);font-family:var(--display);font-weight:700;font-size:16px;color:#E5533A;cursor:pointer;}
  .set-foot{text-align:center;font-family:var(--font);font-size:12px;color:var(--text-soft);padding:18px 0 4px;}
  .set-foot a{color:var(--text-soft);}

  #auth-screen{min-height:100vh;align-items:center;justify-content:center;padding:24px;}
  .auth-wrap{width:100%;max-width:380px;background:var(--surface);border-radius:26px;padding:30px 24px;box-shadow:0 12px 34px rgba(43,42,38,.12);}
  .auth-logo{font-family:var(--display);font-weight:800;font-size:32px;color:var(--accent-strong);text-align:center;}
  .auth-cat{width:84px;height:84px;margin:0 auto 8px;display:block;}
  .auth-tag{text-align:center;color:var(--text-soft);font-size:14px;margin:8px 0 20px;}
  .auth-or{text-align:center;color:var(--text-soft);font-size:12px;margin:14px 0;letter-spacing:.04em;}
  #auth-msg:not(:empty){margin-bottom:6px;}

  /* Add sheet */
  .seg{display:flex;gap:6px;padding:4px;background:var(--accent-bg);border-radius:14px;}
  .seg button{flex:1;padding:9px 0;border:none;border-radius:10px;background:transparent;font-family:var(--body);font-weight:600;font-size:14px;color:var(--text-soft);cursor:pointer;}
  .seg button.on{background:#fff;color:var(--accent-strong);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .addtabs{margin:8px 0 2px;}
  .add-search{display:flex;align-items:center;gap:10px;background:var(--accent-bg);border-radius:15px;padding:13px 15px;margin-top:14px;color:var(--text-soft);}
  .add-search .as-ic{flex:none;display:flex;color:var(--text-soft);}
  .add-search .as-ic svg{width:20px;height:20px;}
  .add-search input{flex:1;border:none;background:none;outline:none;font-family:var(--body);font-size:15px;color:var(--text);min-width:0;}
  .add-search input::placeholder{color:var(--text-soft);}
  .tiles{display:flex;gap:6px;margin-top:14px;}
  .tile{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:0;}
  .tile-ic{display:flex;align-items:center;justify-content:center;width:100%;max-width:54px;aspect-ratio:1;border-radius:17px;background:var(--accent-bg);color:var(--accent-strong);}
  .tile-ic svg{width:22px;height:22px;}
  .tile>span:last-child{font-family:var(--body);font-weight:500;font-size:11.5px;color:var(--text-soft);text-align:center;line-height:1.15;}
  /* recipe feature */
  .ingchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
  .ingchip{display:inline-flex;align-items:center;gap:7px;background:var(--accent-bg);color:var(--text);border-radius:999px;padding:7px 11px 7px 13px;font-size:13.5px;font-weight:600;}
  .ingchip button{background:none;border:none;color:var(--accent-strong);display:inline-flex;cursor:pointer;padding:0;}
  .ingchip button svg{width:14px;height:14px;}
  .rc-card{background:var(--surface);border-radius:20px;padding:16px;box-shadow:0 3px 14px rgba(43,42,38,.06);margin-bottom:14px;}
  .rc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .rc-name{font-family:var(--display);font-weight:700;font-size:16.5px;color:var(--text);line-height:1.2;}
  .rc-meta{font-size:11.5px;color:var(--text-soft);margin-top:3px;}
  .rc-kcal{text-align:right;flex:0 0 auto;}
  .rc-kcal b{font-family:var(--display);font-size:21px;font-weight:800;color:var(--text);}
  .rc-kcal span{display:block;font-size:10.5px;color:var(--text-soft);}
  .fitbar{height:7px;border-radius:999px;background:var(--divider);margin:13px 0 5px;overflow:hidden;}
  .fitbar>div{height:100%;border-radius:999px;transition:width .3s ease;}
  .fitlabel{font-size:11.5px;color:var(--text-soft);}
  .rc-sec{font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.04em;margin:15px 0 6px;}
  .rc-empty{font-size:13px;color:var(--text-soft);}
  .rc-ing{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--divider);font-size:14px;}
  .rc-ing .nm{color:var(--text);}
  .rc-ing .g{color:var(--text-soft);font-size:12.5px;}
  .rc-ing .kc{color:var(--text-soft);font-size:12.5px;white-space:nowrap;}
  .swapbtn{background:none;border:1.5px solid var(--divider);border-radius:999px;font-size:11.5px;font-weight:600;color:var(--accent-strong);padding:3px 10px;cursor:pointer;}
  .swaps{display:flex;flex-direction:column;gap:6px;margin:2px 0 8px;}
  .swaprow{display:flex;align-items:center;gap:8px;background:var(--accent-bg);border-radius:11px;padding:7px 11px;font-size:13px;color:var(--text);}
  .swaprow .jb{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-strong);background:var(--surface);border-radius:999px;padding:2px 7px;flex:none;}
  .swaprow .dl{font-size:11.5px;color:var(--text-soft);margin-left:auto;}
  .swaprow button{background:var(--accent);color:#fff;border:none;border-radius:999px;font-size:12px;font-weight:600;padding:5px 13px;cursor:pointer;}
  .swaprow .dl + button{margin-left:8px;}
  .swaprow button:only-of-type{margin-left:auto;}
  .steps{margin:2px 0 0;padding-left:20px;}
  .steps li{font-size:13.5px;color:var(--text);margin:6px 0;line-height:1.45;}
  .rc-acts{display:flex;gap:8px;margin-top:15px;}
  .rc-acts .btn{flex:1;}

let viewDate=todayKey();
const MEALS=['Breakfast','Lunch','Dinner','Snack'];
function defaultMeal(){const h=new Date().getHours();return h<11?'Breakfast':h<15?'Lunch':h<21?'Dinner':'Snack';}
function shiftDay(key,delta){const a=key.split('-').map(Number);const d=new Date(a[0],a[1]-1,a[2]);d.setDate(d.getDate()+delta);return dateKey(d);}
function dayLabel(key){if(key===todayKey())return 'Today';if(key===shiftDay(todayKey(),-1))return 'Yesterday';return new Date(key+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'long'});}
function mealChips(sel){return `<div class="field"><label>Meal</label><div class="chips mealchips">${MEALS.map(x=>`<button class="chip${x===sel?' sel':''}" data-meal="${x}">${x}</button>`).join('')}</div></div>`;}
function wireMealChips(root){const box=root.querySelector('.mealchips');let cur=box.querySelector('.chip.sel')?box.querySelector('.chip.sel').dataset.meal:MEALS[0];box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{cur=c.dataset.meal;box.querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x===c));});return ()=>cur;}
const UNITS=[{u:'gram',g:1},{u:'ml',g:1},{u:'tsp',g:5},{u:'tbsp',g:15},{u:'cup',g:240},{u:'bowl',g:250},{u:'plate',g:300},{u:'piece',g:50},{u:'slice',g:30},{u:'serving',g:100}];
function servingWidget(){
  return `<div class="field"><label>Serving size</label>
    <select id="sv-unit">${UNITS.map(x=>`<option value="${x.u}">${x.u}</option>`).join('')}</select></div>
  <div class="field-row">
    <div class="field"><label>Quantity</label><input type="number" inputmode="decimal" id="sv-qty" value="100"></div>
    <div class="field" id="sv-gpu-wrap" style="display:none"><label>Grams per serving</label><input type="number" inputmode="decimal" id="sv-gpu" value="1"></div>
  </div>
  <div class="hint" id="sv-total"></div>`;
}
function wireServing(root,per,initGrams){
  const unitSel=root.querySelector('#sv-unit'),qty=root.querySelector('#sv-qty'),gpu=root.querySelector('#sv-gpu'),gpuWrap=root.querySelector('#sv-gpu-wrap'),total=root.querySelector('#sv-total');
  function grams(){return (+qty.value||0)*(+gpu.value||0);}
  function recompute(){const g=grams();const u=unitSel.value;const wl=(u==='ml')?`${r1(g)} ml`:`${r1(g)} g`;total.textContent=`= ${wl}${per?` · ${r0(per.calories*g/100)} kcal`:''}`;}
  function syncUnit(){
    const u=unitSel.value;
    if(u==='gram'||u==='ml'){gpuWrap.style.display='none';gpu.value=1;qty.value=100;}
    else{const d=UNITS.find(x=>x.u===u);gpuWrap.style.display='';gpu.value=d.g;qty.value=1;}
    recompute();
  }
  unitSel.onchange=syncUnit;qty.oninput=recompute;gpu.oninput=recompute;
  if(initGrams){unitSel.value='gram';gpuWrap.style.display='none';gpu.value=1;qty.value=r1(initGrams);}
  recompute();
  return {grams,desc:()=>{const u=unitSel.value,q=+qty.value||0;return (u==='gram')?`${r1(grams())} g`:(u==='ml')?`${r1(grams())} ml`:`${q} ${u} (${r1(grams())} g)`;}};
}

/* ---------- helpers ---------- */
const $=(id)=>document.getElementById(id);
const el=(html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;};
function dateKey(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function todayKey(){return dateKey(new Date());}
function fmtDate(){return new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});}
function r0(n){return Math.round(n||0);}
function r1(n){return Math.round((n||0)*10)/10;}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const KG_PER_LB=0.45359237, CM_PER_IN=2.54;
function kgToUnit(kg,u){return u==='lb'?kg/KG_PER_LB:kg;}
function unitToKg(v,u){return u==='lb'?v*KG_PER_LB:v;}
function cmToUnit(cm,u){return u==='in'?cm/CM_PER_IN:cm;}
function unitToCm(v,u){return u==='in'?v*CM_PER_IN:v;}
function weightDisp(w,u){return kgToUnit(unitToKg(w.weight,w.unit||'kg'),u);}  // a weigh-in -> current display unit
function latestWeightKg(){
  if(!state.weights.length)return null;
  const w=[...state.weights].sort((a,b)=>a.date<b.date?1:-1)[0];
  return unitToKg(w.weight, w.unit||'kg');
}
function todayFood(){return state.entries.filter(e=>e.date===viewDate);}
function todayEx(){return state.exercise.filter(e=>e.date===viewDate);}
function sum(arr,f){return arr.reduce((s,x)=>s+(x[f]||0),0);}

  const food=todayFood(), ex=todayEx();
  const consumed=sum(food,'calories');
  const burned=sum(ex,'caloriesBurned');
  const target=state.settings.dailyTarget;
  const atToday = viewDate===todayKey();
  const subdate=new Date(viewDate+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  const heroNum = target ? r0(target-consumed+burned) : r0(consumed);
  const heroLabel = target ? 'calories remaining' : 'calories eaten';
  let progressHtml='';
  if(target){
    const pct=Math.max(0,Math.min(100,Math.round((consumed-burned)/target*100)));
    progressHtml=`<div class="progress"><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="pct">${pct}%</div></div>`;
  }
  const band=`
    <div class="band">
      <div class="band-top"><span class="logo"><span class="logo-cat">${LOGO_SVG}</span>NomNom</span><div class="band-actions"><button class="gear" id="open-cal">${CAL_SVG}</button><button class="gear" id="open-settings">${GEAR_SVG}</button></div></div>
      <div class="bandnav">
        <button class="navbtn" id="day-prev">&#8249;</button>
        <button id="cal-open2" style="background:none;border:none;cursor:pointer;padding:0"><div class="d1">${dayLabel(viewDate)}</div><div class="d2">${subdate}</div></button>
        <button class="navbtn${atToday?' off':''}" id="day-next">&#8250;</button>
      </div>
      <div class="hero">
        <div class="hero-num">${heroNum}</div>
        <div class="hero-label">${heroLabel}</div>
        ${progressHtml}
        <div class="statchips">
          <div class="statchip"><div class="l">Target</div><div class="v">${target?r0(target):'—'}</div></div>
          <div class="statchip"><div class="l">Food</div><div class="v">${r0(consumed)}</div></div>
          <div class="statchip"><div class="l">Exercise</div><div class="v">${r0(burned)}</div></div>
        </div>
      </div>
    </div>`;

  // macros card
  const macro=(g,ref,color,label)=>{
    const pct=Math.max(0,Math.min(100,Math.round((g/ref)*100)));
    return `<div class="macrocol"><div class="mv" style="color:${color}">${r0(g)}<s>g</s></div><div class="ml">${label}</div><div class="mbar"><i style="width:${pct}%;background:${color}"></i></div></div>`;
  };
  const macroCard=`<div class="card">
    <div class="card-title" style="margin-bottom:14px">Macros today</div>
    <div class="macrocols">
      ${macro(sum(food,'protein_g'),120,'#18A974','Protein')}
      ${macro(sum(food,'carbs_g'),300,'#F2A93B','Carbs')}
      ${macro(sum(food,'fat_g'),70,'#FF6B4A','Fat')}
    </div></div>`;

  // food card grouped by meal
  let groups='';
  MEALS.forEach(mealName=>{
    const items=food.filter(e=>(e.meal||'Snack')===mealName);
    if(!items.length)return;
    const subtotal=sum(items,'calories');
    groups+=`<div class="mealgroup">
      <div class="meal-line"><div class="ml-left"><span class="meal-dot" style="background:${MEALCOLOR[mealName]}"></span><span class="meal-name">${mealName}</span></div><span class="meal-sub">${r0(subtotal)} kcal</span></div>
      <div class="fooditems">${items.map(e=>`
        <button class="fooditem" data-edit-food="${e.id}">
          <span style="min-width:0;display:flex;flex-direction:column;gap:2px"><span class="fi-name">${esc(e.name)}</span><span class="fi-sub">${esc(e.servingLabel||r0(e.grams)+' g')}</span></span>
          <span class="fi-right"><span class="fi-cal">${r0(e.calories)}</span><svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>`).join('')}</div>
    </div>`;
  });
  if(!groups)groups=`<div class="empty" style="margin-top:6px">No food logged${atToday?' yet':''}. Tap Add to start.</div>`;
  const foodCard=`<div class="card">
    <div class="card-head"><div class="card-title">Food</div><div class="card-sub">${r0(consumed)} kcal</div></div>
    ${groups}</div>`;

  // activity card
  const actRows = ex.length ? ex.map((e,i)=>`
    <div class="act-item${i===0?' first':''}" data-edit-ex="${e.id}">
      <div class="act-icon">${ACT_SVG}</div>
      <div style="flex:1;min-width:0"><div class="act-name">${esc(e.activity)}</div><div class="act-sub">${e.minutes} min · ${e.intensity}</div></div>
      <div class="act-cal">${r0(e.caloriesBurned)}</div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-soft);flex:none;margin-left:6px"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join('') : `<div class="empty" style="margin-top:0">No exercise logged.</div>`;
  const actCard=`<div class="card">
    <div class="card-head"><div class="card-title">Activity</div><div class="card-sub">${r0(burned)} kcal</div></div>
    ${actRows}</div>`;

  $('main').innerHTML=band+macroCard+foodCard+actCard;
  $('open-settings').onclick=openSettings;
  $('open-cal').onclick=openCalendar;
  $('cal-open2').onclick=openCalendar;
  $('day-prev').onclick=()=>{viewDate=shiftDay(viewDate,-1);render();};
  $('day-next').onclick=()=>{if(!atToday){viewDate=shiftDay(viewDate,1);render();}};
  document.querySelectorAll('[data-edit-food]').forEach(n=>n.onclick=()=>editFood(n.dataset.editFood));
  document.querySelectorAll('[data-edit-ex]').forEach(n=>n.onclick=()=>editExercise(n.dataset.editEx));
}

/* ---------- CALENDAR ---------- */
function openCalendar(){
  const target=state.settings.dailyTarget;
  const today=todayKey();
  const map={};
  for(const e of state.entries){(map[e.date]=map[e.date]||{c:0,b:0}).c+=e.calories||0;}
  for(const x of state.exercise){(map[x.date]=map[x.date]||{c:0,b:0}).b+=x.caloriesBurned||0;}
  const hasData=(k)=>!!(map[k]&&map[k].c>0);
  const netOf=(k)=>map[k]?(map[k].c-map[k].b):0;
  const consumedOf=(k)=>map[k]?map[k].c:0;
  const metric=(k)=>target!=null?(target-netOf(k)):netOf(k);   // remaining (target − food + exercise) when a target is set
  const lerp=(a,b,t)=>[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
  const lum=(c)=>(0.299*c[0]+0.587*c[1]+0.114*c[2])/255;
  const GLO=[150,226,197],GHI=[16,150,101],RLO=[249,178,180],RHI=[222,54,60];
  const signed=(k)=>{ if(target==null)return r0(metric(k)); const v=metric(k); return (v>0?'+':'')+r0(v); };
  const heat=(k)=>{
    const st=statusOf(k);
    if((st==='under'||st==='over')&&target){
      const rem=target-netOf(k); let f,bg;
      if(rem>=0){ f=Math.min(1,rem/target); bg=lerp(GLO,GHI,f); } else { f=Math.min(1,(-rem)/target); bg=lerp(RLO,RHI,f); }
      return {bg:`rgb(${bg[0]},${bg[1]},${bg[2]})`, fg:lum(bg)>0.62?'#23201c':'#fff'};
    }
    return {bg:CELLBG[st], fg:CELLFG[st]};
  };
  const statusOf=(k)=>{ if(k>today)return 'future'; if(!hasData(k))return 'none'; if(!target)return 'data'; return netOf(k)<=target?'under':'over'; };
  const CELLBG={under:'#18A974',over:'#E5484D',data:'var(--accent-bg)',none:'rgba(43,42,38,.04)',future:'transparent'};
  const CELLFG={under:'#fff',over:'#fff',data:'var(--text)',none:'var(--text-soft)',future:'#D8D2C8'};
  const DOW=['S','M','T','W','T','F','S'];
  const shortLabel=(k)=>new Date(k+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});
  let mode='month';
  let anchor=new Date(today+'T00:00:00');

  // all-time stats
  const allDays=Object.keys(map).filter(hasData).sort();
  let bestStreak=0;
  if(target){ let run=0,prev=null; for(const k of allDays){ if(netOf(k)<=target){ run=(prev&&shiftDay(prev,1)===k)?run+1:1; bestStreak=Math.max(bestStreak,run); prev=k; } else { run=0; prev=null; } } }
  let bestDay=null,highDay=null;
  for(const k of allDays){
    if(target!=null){ if(bestDay===null||metric(k)>metric(bestDay))bestDay=k; } else { if(bestDay===null||metric(k)<metric(bestDay))bestDay=k; }
    if(highDay===null||consumedOf(k)>consumedOf(highDay))highDay=k;
  }

  const ov=el(`<div class="cal-ov"><div class="cal-head">
      <div class="cal-head-row">
        <button class="cal-rbtn" id="cal-prev">${IC_BACK}</button>
        <span class="cal-title" id="cal-title"></span>
        <div style="display:flex;gap:7px"><button class="cal-rbtn" id="cal-next">${IC_CHEVR}</button><button class="cal-rbtn" id="cal-x">${IC_X}</button></div>
      </div>
      <div class="cal-agg"><span class="net" id="cal-net">—</span><span class="cal-pill" id="cal-pill"></span></div>
      <div class="cal-sub" id="cal-sub"></div>
    </div>
    <div class="cal-body">
      <div class="cal-seg" id="cal-seg"><button data-m="week">1W</button><button data-m="month">1M</button></div>
      <div class="cal-card" id="cal-card"></div>
      <div class="cal-legend"><span class="lg"><span class="sw" style="background:#18A974"></span>Under target</span><span class="lg"><span class="sw" style="background:#E5484D"></span>Over target</span></div>
      <div class="cal-stats" id="cal-stats"></div>
    </div></div>`);
  $('modal-root').appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('#cal-x').onclick=close;
  const jump=(k)=>{ viewDate=k; tab='today'; close(); render(); };

  const periodKeys=()=>{
    const keys=[];
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),days=new Date(y,m+1,0).getDate();
      for(let i=1;i<=days;i++)keys.push(dateKey(new Date(y,m,i)));
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);keys.push(dateKey(d));}
    }
    return keys;
  };

  function paint(){
    if(mode==='month'){ ov.querySelector('#cal-title').textContent=anchor.toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
    else { const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(s.getDate()+6); ov.querySelector('#cal-title').textContent=`${shortLabel(dateKey(s))} – ${shortLabel(dateKey(e))}`; }
    ov.querySelectorAll('#cal-seg button').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
    const pk=periodKeys().filter(hasData), daysLogged=pk.length;
    const avg=daysLogged?Math.round(pk.reduce((s,k)=>s+metric(k),0)/daysLogged):0;
    ov.querySelector('#cal-net').textContent=daysLogged?r0(avg):'—';
    const pill=ov.querySelector('#cal-pill');
    if(daysLogged&&target){
      const under=avg>=0;
      pill.style.display='';
      pill.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">${under?'<path d="M12 5v14M6 13l6 6 6-6"/>':'<path d="M12 19V5M6 11l6-6 6 6"/>'}</svg><span>${under?'under':'over'}</span>`;
    } else pill.style.display='none';
    ov.querySelector('#cal-sub').textContent=daysLogged?`${target?'avg left/day':'avg net/day'} · ${daysLogged} day${daysLogged===1?'':'s'} logged${target?'':' · set a daily target to track on/over'}`:'No days logged this period';

    const card=ov.querySelector('#cal-card');
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
      let cells='';
      for(let i=0;i<first;i++)cells+=`<div></div>`;
      for(let dd=1;dd<=days;dd++){
        const k=dateKey(new Date(y,m,dd)),h=heat(k),clk=k<=today;
        const kc=hasData(k)?`<span class="k" style="color:${h.fg}">${signed(k)}</span>`:'';
        cells+=`<div class="cal-cell" data-jump="${clk?k:''}" style="background:${h.bg};cursor:${clk?'pointer':'default'}"><span class="d" style="color:${h.fg}">${dd}</span>${kc}</div>`;
      }
      card.innerHTML=`<div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      let cells='';
      for(let i=0;i<7;i++){
        const d=new Date(s);d.setDate(s.getDate()+i);const k=dateKey(d),h=heat(k),clk=k<=today;
        const lab=hasData(k)?signed(k):(k>today?'·':'–');
        cells+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:10px;font-weight:600;color:var(--text-soft)">${DOW[i]}</span>
          <div class="cal-cell" data-jump="${clk?k:''}" style="width:100%;background:${h.bg};border-radius:11px;padding:9px 2px;cursor:${clk?'pointer':'default'}"><span class="d" style="font-size:13px;color:${h.fg}">${d.getDate()}</span><span class="k" style="font-size:9.5px;color:${h.fg}">${lab}</span></div></div>`;
      }
      card.innerHTML=`<div class="cal-grid">${cells}</div>`;
    }
    card.querySelectorAll('[data-jump]').forEach(c=>{ if(c.dataset.jump)c.onclick=()=>openDayDetail(c.dataset.jump); });

    const pkAll=periodKeys().filter(hasData);
    const daysOn=target?pkAll.filter(k=>netOf(k)<=target).length:0;
    const icC='<svg viewBox="0 0 24 24" fill="none" stroke="#18A974" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    const icF='<svg viewBox="0 0 24 24" fill="none" stroke="#F2A93B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1.5 3 4 4 4 7a4 4 0 01-8 0c0-1 .3-1.8.8-2.5C9 9 12 8 12 2z"/></svg>';
    ov.querySelector('#cal-stats').innerHTML=`
      <div class="cal-stat"><div class="sh">${icC}Days on target</div><div class="sv" style="color:#18A974">${target?daysOn:'—'}<small>${target?` /${pkAll.length}`:''}</small></div></div>
      <div class="cal-stat"><div class="sh">${icF}Best streak</div><div class="sv" style="color:var(--text)">${target?bestStreak:'—'}<small> days</small></div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#18A974"></span>Best day</div><div class="sv" style="color:#18A974">${bestDay?signed(bestDay):'—'}</div><div class="sl">${bestDay?shortLabel(bestDay):'No data yet'}</div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#E5484D"></span>Highest day</div><div class="sv" style="color:#E5484D">${highDay?r0(consumedOf(highDay)):'—'}</div><div class="sl">${highDay?shortLabel(highDay):'No data yet'}</div></div>`;
  }
  ov.querySelector('#cal-prev').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()-1); else anchor.setDate(anchor.getDate()-7); paint(); };
  ov.querySelector('#cal-next').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()+1); else anchor.setDate(anchor.getDate()+7); paint(); };
  ov.querySelectorAll('#cal-seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.m;paint();});
  paint();
}
function openDayDetail(key){
  const target=state.settings.dailyTarget;
  const MC={Breakfast:'#F2A93B',Lunch:'#18A974',Dinner:'#FF6B4A',Snack:'#A285CF'};
  const REST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>';
  const ov=el(`<div class="cal-ov" style="z-index:140"><div class="cal-head">
      <div class="cal-head-row">
        <button class="cal-rbtn" id="dd-x">${IC_X}</button>
        <span class="cal-title" id="dd-date"></span>
        <div style="display:flex;gap:7px"><button class="cal-rbtn" id="dd-prev">${IC_BACK}</button><button class="cal-rbtn" id="dd-next">${IC_CHEVR}</button></div>
      </div>
      <div class="cal-agg"><span class="net" id="dd-net"></span><span id="dd-word" style="font-size:13px;color:rgba(255,255,255,.85);margin-bottom:4px"></span></div>
      <div class="dd-mini">
        <div class="dd-box"><div class="l">Food</div><div class="v" id="dd-food"></div></div>
        <div class="dd-box"><div class="l">Exercise</div><div class="v" id="dd-burn"></div></div>
        <div class="dd-box"><div class="l">Target</div><div class="v" id="dd-tgt"></div></div>
      </div>
    </div>
    <div class="cal-body" id="dd-body"></div></div>`);
  $('modal-root').appendChild(ov);
  let cur=key;
  ov.querySelector('#dd-x').onclick=()=>ov.remove();
  ov.querySelector('#dd-prev').onclick=()=>{cur=shiftDay(cur,-1);paint();};
  ov.querySelector('#dd-next').onclick=()=>{cur=shiftDay(cur,1);paint();};
  function paint(){
    const food=state.entries.filter(e=>e.date===cur);
    const exs=state.exercise.filter(e=>e.date===cur);
    const consumed=sum(food,'calories'), burned=sum(exs,'caloriesBurned');
    ov.querySelector('#dd-date').textContent=dayLabel(cur);
    if(target!=null){ const v=target-consumed+burned; ov.querySelector('#dd-net').textContent=r0(Math.abs(v)); ov.querySelector('#dd-word').textContent=v>=0?'calories left':'over target'; }
    else { ov.querySelector('#dd-net').textContent=r0(consumed-burned); ov.querySelector('#dd-word').textContent='net intake'; }
    ov.querySelector('#dd-food').textContent=r0(consumed);
    ov.querySelector('#dd-burn').textContent=r0(burned);
    ov.querySelector('#dd-tgt').textContent=target!=null?r0(target):'—';
    let foodHtml='';
    MEALS.forEach(mn=>{
      const items=food.filter(e=>(e.meal||defaultMeal())===mn);
      if(!items.length)return;
      foodHtml+=`<div class="dd-meal"><div class="dd-meal-h"><div class="nm"><span class="dot" style="background:${MC[mn]||'#999'}"></span>${mn}</div><div class="sub">${r0(sum(items,'calories'))} kcal</div></div>${items.map(it=>`<div class="dd-item"><span class="nm">${esc(it.name)}</span><span class="kc">${r0(it.calories)}</span></div>`).join('')}</div>`;
    });
    if(!foodHtml)foodHtml=`<div class="dd-rest" style="padding-top:10px"><div class="ic">${IC_FORK}</div>No food logged</div>`;
    const exHtml = exs.length
      ? exs.map(e=>`<div class="dd-ex"><div class="ic">${actMeta(e.activity).ic}</div><div class="mn"><div class="n">${esc(e.activity)}</div><div class="s">${e.minutes} min · ${e.intensity}</div></div><div class="kc">${r0(e.caloriesBurned)}</div></div>`).join('')
      : `<div class="dd-rest"><div class="ic">${REST}</div>Rest day — no activity logged</div>`;
    ov.querySelector('#dd-body').innerHTML=`
      <div class="dd-card"><div class="dd-card-h"><div class="t">Food</div><div class="s">${r0(consumed)} kcal</div></div>${foodHtml}</div>
      <div class="dd-card"><div class="dd-card-h"><div class="t">Activity</div><div class="s">${r0(burned)} kcal</div></div><div style="margin-top:12px">${exHtml}</div></div>`;
  }
  paint();
}
function openModal(title,bodyHtml){
  const m=el(`<div class="overlay"><div class="overlay-inner"><div class="mhead"><h2>${esc(title)}</h2><button class="linkbtn" id="m-close">Close</button></div><div id="m-body">${bodyHtml}</div></div></div>`);
  $('modal-root').appendChild(m);
  m.querySelector('#m-close').onclick=()=>closeModal(m);
  return m;
}
function closeModal(m){ if(m&&m.parentNode)m.remove(); render(); }
function closeAllModals(){ $('modal-root').innerHTML=''; render(); }

/* ---------- bottom-sheet helper (slide up + swipe down, like Settings) ---------- */
function makeSheet(innerHtml){
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    ${innerHtml}
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  let closed=false;
  const close=()=>{
    if(closed)return; closed=true;
    camStop();
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  let startY=0,dY=0,drag=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-startY;if(sheet.scrollTop<=0&&dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}},{passive:false});
  sheet.addEventListener('touchend',()=>{if(!drag){sheet.style.transition='';return;}drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}});
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  return {overlay,sheet,close};
}

function recentFoods(n){
  const seen=new Set(), out=[];
  for(let i=state.entries.length-1;i>=0 && out.length<n;i--){
    const e=state.entries[i]; const key=(e.name||'').toLowerCase();
    if(!e.name||seen.has(key))continue; seen.add(key);
    const sub=`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`;
    out.push({name:e.name,sub,entry:e});
  }
  return out;
}

      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="rc-back">${IC_BACK}</button><h3>Recipe</h3></div>
        <div class="note">Add your Google Gemini API key in Settings to create recipes from your ingredients.</div>
        <button class="btn btn-primary btn-block" id="rc-set" style="margin-top:12px">Open Settings</button>`;
      body.querySelector('#rc-back').onclick=renderFood;
      body.querySelector('#rc-set').onclick=()=>{sh.close();setTimeout(openSettings,200);};
      return;
    }
    const remaining = state.settings.dailyTarget ? Math.round(state.settings.dailyTarget - sum(todayFood(),'calories') + sum(todayEx(),'caloriesBurned')) : null;
    const rc={ings:[], servings:2, meal:defaultMeal(), extras:3, diet:[], budget:(remaining!=null?Math.max(250,remaining):null)};
    const DIETS=['Vegetarian','Halal','No dairy','No nuts'];

    function inputView(){
      camStop(); setTabs(false);
      body.innerHTML=`
        <div class="sub-head"><button class="circ-back" id="rc-back">${IC_BACK}</button><h3>Cook with what I have</h3></div>
        <div class="scard">
          <div class="scard-h">Your ingredients</div>
          <div class="add-search"><span class="as-ic">${IC_SEARCH}</span><input id="rc-in" placeholder="Type an ingredient, then Enter" autocomplete="off"></div>
          <button class="dashed-btn" id="rc-shot" style="margin-top:10px">${IC_CAMERA} Scan ingredients from a photo</button>
          <input type="file" accept="image/*" id="rc-file" style="display:none">
          <div class="ingchips" id="rc-chips"></div>
          <div id="rc-detect"></div>
        </div>
        <div class="scard">
          <div class="scard-h">Preferences</div>
          <div class="prow"><span class="lab">Servings</span>
            <div class="pstep"><button id="rc-svdn">${IC_MINUS}</button><span class="val" id="rc-svv">${rc.servings}</span><button id="rc-svup">${IC_PLUS}</button></div></div>
          <div class="field"><label>Meal</label><div class="chips" id="rc-meal">${MEALS.map(m=>`<button class="chip${m===rc.meal?' sel':''}" data-m="${m}">${m}</button>`).join('')}</div></div>
          <div class="field"><label>Extra ingredients I'd buy</label><div class="chips" id="rc-extras">
            <button class="chip${rc.extras===0?' sel':''}" data-x="0">Only what I have</button>
            <button class="chip${rc.extras===3?' sel':''}" data-x="3">A few</button>
            <button class="chip${rc.extras===99?' sel':''}" data-x="99">Best recipe</button></div></div>
          <div class="field"><label>Dietary</label><div class="chips" id="rc-diet">${DIETS.map(d=>`<button class="chip" data-d="${d}">${d}</button>`).join('')}</div></div>
          <div class="field"><label>Calorie budget per serving${remaining!=null?' · your remaining today':''}</label>
            <input type="number" inputmode="numeric" id="rc-budget" value="${rc.budget!=null?rc.budget:''}" placeholder="optional"></div>
        </div>
        <button class="btn btn-primary btn-block" id="rc-go" ${rc.ings.length?'':'disabled'}>Suggest recipes</button>`;
      body.querySelector('#rc-back').onclick=()=>{camStop();renderFood();};
      const chips=body.querySelector('#rc-chips'), goBtn=body.querySelector('#rc-go');
      const refresh=()=>{ goBtn.disabled=!rc.ings.length; };
      const drawChips=()=>{ chips.innerHTML=rc.ings.map((g,i)=>`<span class="ingchip">${esc(g)}<button data-rm="${i}" aria-label="Remove">${IC_X}</button></span>`).join('');
        chips.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{rc.ings.splice(+b.dataset.rm,1);drawChips();refresh();}); };
      const addIng=(v)=>{ (v||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(x=>{ if(!rc.ings.some(g=>g.toLowerCase()===x.toLowerCase())) rc.ings.push(x); }); drawChips(); refresh(); };
      drawChips();
      const inEl=body.querySelector('#rc-in');
      inEl.onkeydown=(e)=>{ if(e.key==='Enter'){e.preventDefault();addIng(inEl.value);inEl.value='';} };
      const file=body.querySelector('#rc-file');
      body.querySelector('#rc-shot').onclick=()=>{ file.removeAttribute('capture'); file.click(); };
      file.onchange=async(ev)=>{ const f=ev.target.files[0]; if(!f)return; const box=body.querySelector('#rc-detect'); box.innerHTML=`<div class="spinner">Spotting ingredients…</div>`;
        try{ const b64=await toJpegBase64(f); const found=await detectIngredients(b64);
          if(!found.length){ box.innerHTML=`<div class="hint">No ingredients spotted — add them by typing above.</div>`; }
          else { found.forEach(x=>{ if(!rc.ings.some(g=>g.toLowerCase()===x.toLowerCase())) rc.ings.push(x); }); drawChips(); refresh(); box.innerHTML=`<div class="hint">Added ${found.length} item${found.length===1?'':'s'} — edit or remove any above.</div>`; }
        }catch(e){ box.innerHTML=`<div class="err">${esc(e.message||'Could not read that photo.')}</div>`; } file.value=''; };
      body.querySelector('#rc-svup').onclick=()=>{rc.servings=Math.min(12,rc.servings+1);body.querySelector('#rc-svv').textContent=rc.servings;};
      body.querySelector('#rc-svdn').onclick=()=>{rc.servings=Math.max(1,rc.servings-1);body.querySelector('#rc-svv').textContent=rc.servings;};
      body.querySelectorAll('#rc-meal .chip').forEach(c=>c.onclick=()=>{rc.meal=c.dataset.m;body.querySelectorAll('#rc-meal .chip').forEach(x=>x.classList.toggle('sel',x===c));});
      body.querySelectorAll('#rc-extras .chip').forEach(c=>c.onclick=()=>{rc.extras=+c.dataset.x;body.querySelectorAll('#rc-extras .chip').forEach(x=>x.classList.toggle('sel',x===c));});
      body.querySelectorAll('#rc-diet .chip').forEach(c=>c.onclick=()=>{const d=c.dataset.d,i=rc.diet.indexOf(d);if(i>=0)rc.diet.splice(i,1);else rc.diet.push(d);c.classList.toggle('sel');});
      body.querySelector('#rc-budget').oninput=(e)=>{rc.budget=+e.target.value||null;};
      goBtn.onclick=()=>generate();

    async function generate(){
      setTabs(false);
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="rc-b2">${IC_BACK}</button><h3>Recipes</h3></div><div id="rc-out"><div class="spinner">Cooking up ideas…</div></div>`;
      body.querySelector('#rc-b2').onclick=inputView;
      const out=body.querySelector('#rc-out');
      try{
        const recipes=await generateRecipes(rc.ings,{servings:rc.servings,meal:rc.meal,extras:rc.extras,diet:rc.diet,budget:rc.budget});
        if(!recipes.length){ out.innerHTML=`<div class="err">No recipes came back. Try adding an ingredient or loosening the extras.</div><button class="btn btn-block" id="rc-rt" style="margin-top:10px">Back</button>`; out.querySelector('#rc-rt').onclick=inputView; return; }
        for(const r of recipes){ try{ await costRecipe(r); }catch(_){ } }
        renderResults(recipes);
      }catch(e){ out.innerHTML=`<div class="err">${esc(e.message||'Request failed.')}</div><button class="btn btn-block" id="rc-rt" style="margin-top:10px">Try again</button>`; out.querySelector('#rc-rt').onclick=inputView; }
    }

    const fitColor=(per)=>{ if(rc.budget==null) return 'var(--accent)'; if(per<=rc.budget) return '#3FB27F'; if(per<=rc.budget*1.1) return '#E5A23D'; return '#E5484D'; };
    function ingRow(ing,i,gi){
      const swaps=(ing.alts||[]).filter(a=>a&&a.name).slice(0,3);
      return `<div class="rc-ing">
        <div><span class="nm">${esc(ing.name)}</span> <span class="g">${ing.grams?r0(ing.grams)+' g':''}</span></div>
        <div style="display:flex;align-items:center;gap:8px">${ing._kcal?`<span class="kc">${ing._kcal} kcal${ing._matched?'':' ≈'}</span>`:''}${swaps.length?`<button class="swapbtn" data-sw="${i}:${gi}">swap</button>`:''}</div>
      </div>${swaps.length?`<div class="swaps" id="sw-${i}-${gi}" style="display:none">${swaps.map((a,ai)=>`<div class="swaprow"><span class="jb">${a.job==='cut'?'lighter':a.job==='diet'?'dietary':'on hand'}</span><span>${esc(a.name)}</span>${a.kcalDelta?`<span class="dl">${a.kcalDelta>0?'+':''}${r0(a.kcalDelta)} kcal</span>`:''}<button data-apply="${i}:${gi}:${ai}">Use</button></div>`).join('')}</div>`:''}`;
    }
    function recipeCard(r,i){
      const per=r._per?r._per.calories:0, prot=r._per?r._per.protein_g:0, ings=r.ingredients||[];
      const have=ings.filter(x=>x.have), buy=ings.filter(x=>!x.have);
      const pct=rc.budget?Math.min(100,Math.round(per/rc.budget*100)):Math.min(100,Math.round(per/800*100));
      const fitTxt=rc.budget?(per<=rc.budget?`Fits your ${rc.budget} kcal budget`:`${per-rc.budget} kcal over budget`):'';
      return `<div class="rc-card">
        <div class="rc-top">
          <div><div class="rc-name">${esc(r.name)}</div><div class="rc-meta">${r0(r.servings||rc.servings)} servings${r.time_min?' · '+r0(r.time_min)+' min':''}${r._estimated?' · some values estimated':''}</div></div>
          <div class="rc-kcal"><b>${per}</b><span>kcal/serving</span></div>
        </div>
        <div class="fitbar"><div style="width:${pct}%;background:${fitColor(per)}"></div></div>
        <div class="fitlabel">${fitTxt}${fitTxt?' · ':''}${prot} g protein/serving</div>
        <div class="rc-sec">You have</div>${have.length?have.map(ing=>ingRow(ing,i,ings.indexOf(ing))).join(''):`<div class="rc-empty">—</div>`}
        ${buy.length?`<div class="rc-sec">Add to make it</div>`+buy.map(ing=>ingRow(ing,i,ings.indexOf(ing))).join(''):''}
        <div class="rc-sec">Method</div><ol class="steps">${(r.steps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
        ${r.note?`<div class="hint" style="margin-top:8px">${esc(r.note)}</div>`:''}
        <div class="rc-acts"><button class="btn" data-save="${i}">Save</button><button class="btn btn-primary" data-log="${i}">Log to ${esc(rc.meal)}</button></div>
        <div data-msg="${i}"></div>
      </div>`;
    }
    function renderResults(recipes){
      const out=body.querySelector('#rc-out');
      out.innerHTML=recipes.map((r,i)=>recipeCard(r,i)).join('')+`<button class="dashed-btn" id="rc-more">${IC_REFRESH} Suggest different recipes</button>`;
      out.querySelectorAll('[data-sw]').forEach(b=>b.onclick=()=>{ const [i,gi]=b.dataset.sw.split(':'); const box=out.querySelector('#sw-'+i+'-'+gi); if(box)box.style.display=box.style.display==='none'?'':'none'; });
      out.querySelectorAll('[data-apply]').forEach(b=>b.onclick=async()=>{ const [i,gi,ai]=b.dataset.apply.split(':').map(Number); const r=recipes[i],ing=r.ingredients[gi],alt=(ing.alts||[])[ai]; if(!alt)return; ing.name=alt.name; if(alt.job==='have')ing.have=true; ing.alts=[]; b.textContent='…'; try{ await costRecipe(r); }catch(_){ } renderResults(recipes); });
      out.querySelectorAll('[data-log]').forEach(b=>b.onclick=()=>{ const r=recipes[+b.dataset.log],per=r._per||{calories:0}; state.entries.push({id:uid(),date:viewDate,meal:rc.meal,name:r.name,grams:0,portion:'serving',unitCal:per.calories,servingLabel:'1 serving',calories:per.calories,protein_g:per.protein_g||0,carbs_g:per.carbs_g||0,fat_g:per.fat_g||0,sugar_g:0,source:'recipe'}); save(); sh.close(); });
      out.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>{ const r=recipes[+b.dataset.save],per=r._per||{calories:0}; state.library.push({id:uid(),name:r.name,perServing:{calories:per.calories,portion:'serving'},recipe:{servings:r.servings,ingredients:r.ingredients,steps:r.steps}}); save(); const m=out.querySelector('[data-msg="'+b.dataset.save+'"]'); if(m)m.innerHTML=`<div class="saved-note" style="margin-top:8px">Saved to Library ✓</div>`; b.disabled=true; });
      out.querySelector('#rc-more').onclick=()=>generate();
    }

    inputView();
  }

  function renderBarcode(){
    camStop(); setTabs(false);
    let scanner=null, running=false;
    const stopScanner=()=>{ if(scanner&&running){ running=false; try{ return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{}); }catch(_){} } return Promise.resolve(); };
    body.innerHTML=`
      <div class="sub-head"><button class="circ-back" id="bc-back">${IC_BACK}</button><h3>Scan a barcode</h3></div>
      <div id="reader"></div>
      <div class="bc-hint" id="bc-hint">Point your camera at a product barcode</div>
      <div id="bc-stage"></div>`;
    const stage=body.querySelector('#bc-stage'), hint=body.querySelector('#bc-hint');
    body.querySelector('#bc-back').onclick=()=>{stopScanner();renderFood();};
    const onDetect=(txt)=>{ if(!running)return; stopScanner(); doLookup(txt); };
    const startScan=async()=>{
      if(typeof Html5Qrcode==='undefined'){ hint.textContent='Camera scanning isn’t available here — you can also type the barcode number into “Search for a food”.'; return; }
      await stopScanner();
      const opts={};
      if(typeof Html5QrcodeSupportedFormats!=='undefined'){
        opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];
      }
      try{
        scanner=new Html5Qrcode('reader',opts); running=true;
        hint.textContent='Point your camera at a product barcode';
        await scanner.start({facingMode:'environment'},
          {fps:10, qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};}, aspectRatio:1.3333, experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
          onDetect, ()=>{});
      }catch(e){ running=false; hint.textContent='Couldn’t start the camera — you can also type the barcode number into “Search for a food”.'; }
    };
    async function doLookup(code){
      stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
      const r=await barcodeLookup(code);
      if(!r){ stage.innerHTML=`<div class="err">No product found for that barcode. Scan again, or enter it manually.</div><button class="btn btn-block" id="bc-man" style="margin-top:10px">Enter manually</button><button class="btn btn-block" id="bc-again" style="margin-top:8px">Scan again</button>`; stage.querySelector('#bc-man').onclick=renderManual; stage.querySelector('#bc-again').onclick=renderBarcode; return; }
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="bc-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="bc-stage2"></div>`;
      body.querySelector('#bc-b2').onclick=renderBarcode;
      weighAndLog(null,body.querySelector('#bc-stage2'),r.name,r.per,r.source,r.g,()=>sh.close());
    }
    startScan();
  }

  function addFromLib(id){
    const l=state.library.find(x=>x.id===id); if(!l)return;
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="lb-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="lb-stage"></div>`;
    body.querySelector('#lb-b2').onclick=renderLibrary;
    const stage=body.querySelector('#lb-stage');
    if(l.perServing)logServing(null,stage,l.name,l.perServing.calories,l.perServing.portion,'library',()=>sh.close());
    else weighAndLog(null,stage,l.name,l.per_100g,'library',l.lastGrams,()=>sh.close());
  }
  function renderLibrary(){
    camStop(); setTabs(false);
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="lb-back">${IC_BACK}</button><h3>Library</h3></div>
      <div id="lib-body" style="margin-top:6px"></div>`;
    body.querySelector('#lb-back').onclick=renderFood;
    const lb=body.querySelector('#lib-body');
    const lib2=state.library, meals=state.meals||[];
    if(!lib2.length && !meals.length){lb.innerHTML=`<div class="empty" style="border:none">Your library is empty. Tick “Save to library” after logging an item to reuse it here — then swipe a saved food left to drop it into a meal folder.</div>`;return;}
    let html='';
    if(meals.length){
      html+=`<div class="lib-sec">My meals</div>`;
      html+=meals.map(mm=>`<button class="meal-folder" data-meal="${mm.id}">
        <span class="mf-ic">${IC_FOLDER}</span>
        <span class="mf-main"><span class="mf-name">${esc(mm.name)}</span><span class="mf-sum">${mealSummary(mm)}</span></span>
        <span class="mf-chev">${IC_CHEVR}</span>
      </button>`).join('');
    }
    if(lib2.length){
      html+=`<div class="lib-sec">${meals.length?'Single foods':'Saved foods'}</div>`;
      html+=lib2.map(l=>{
        const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;
        return `<div class="swipe-wrap" data-id="${l.id}">
          <div class="swipe-actions">
            <button class="swipe-meal" data-meal-add="${l.id}" aria-label="Add to meal">${IC_FOLDERADD}<span>＋ Meal</span></button>
            <button class="swipe-del" data-del="${l.id}" aria-label="Delete">${IC_TRASH}<span>Delete</span></button>
          </div>
          <div class="recent-row swipe-row">
            <span class="recent-ic">${IC_FORK}</span>
            <div class="recent-main"><div class="rn">${esc(l.name)}</div><div class="rs">${esc(sub)}</div></div>
            <button class="recent-add" data-lib="${l.id}" aria-label="Add">${IC_PLUS}</button>
          </div>
        </div>`;
      }).join('');
    }
    lb.innerHTML=html;
    lb.querySelectorAll('[data-meal]').forEach(b=>b.onclick=()=>renderMeal(b.dataset.meal));
    const OPENX=-168;
    lb.querySelectorAll('.swipe-wrap').forEach(wrap=>{
      const id=wrap.dataset.id, row=wrap.querySelector('.swipe-row');
      const addBtn=wrap.querySelector('.recent-add'), delBtn=wrap.querySelector('.swipe-del'), mealBtn=wrap.querySelector('.swipe-meal');
      let startX=0,base=0,off=0,down=false,dragging=false,open=false,suppress=false;
      const apply=(x,anim)=>{row.style.transition=anim?'transform .2s ease':'';row.style.transform=`translateX(${x}px)`;};
      const close=()=>{open=false;apply(0,true);};
      const openIt=()=>{open=true;apply(OPENX,true);};
      const guard=()=>{suppress=true;setTimeout(()=>{suppress=false;},80);};
      const doDelete=()=>{ state.library=state.library.filter(x=>x.id!==id); save(); renderLibrary(); };
      delBtn.onclick=(e)=>{e.stopPropagation();doDelete();};
      mealBtn.onclick=(e)=>{e.stopPropagation(); const l=state.library.find(x=>x.id===id); close(); if(l)openMealPicker(l);};
      addBtn.onclick=(e)=>{ if(open||suppress){e.stopPropagation();e.preventDefault();close();return;} addFromLib(id); };
      row.addEventListener('pointerdown',e=>{ down=true;dragging=false;startX=e.clientX;base=open?OPENX:0;off=base; });
      row.addEventListener('pointermove',e=>{
        if(!down)return; const d=e.clientX-startX;
        if(!dragging && Math.abs(d)>6){ dragging=true; try{row.setPointerCapture(e.pointerId);}catch(_){} }
        if(dragging){ off=base+d; if(off>0)off=0; if(off<OPENX-22)off=OPENX-22; apply(off,false); e.preventDefault(); }
      });
      const endDrag=()=>{
        if(!down)return; down=false;
        if(dragging){ guard(); if(off<=-50){openIt();} else {close();} }
        else if(open){ guard(); close(); }
      };
      row.addEventListener('pointerup',endDrag);
      row.addEventListener('pointercancel',endDrag);
    });
  }
  function openMealPicker(l){
    const meals=state.meals||[];
    const ov=el(`<div class="picker-ov"><div class="picker-bd" id="pk-bd"></div>
      <div class="picker-card">
        <div class="picker-grip"></div>
        <div class="picker-title">Add to a meal</div>
        <div class="picker-sub">Put “${esc(l.name)}” into one of your meals.</div>
        <div style="display:flex;flex-direction:column;gap:9px;margin-top:16px">
          ${meals.map(mm=>`<button class="meal-folder" data-pick="${mm.id}" style="margin-bottom:0">
            <span class="mf-ic">${IC_FOLDER}</span>
            <span class="mf-main"><span class="mf-name" style="font-size:14.5px">${esc(mm.name)}</span><span class="mf-sum">${mealSummary(mm)}</span></span>
            <span class="mf-chev" style="color:var(--accent)">${IC_PLUS}</span>
          </button>`).join('')}
          <button class="meal-new" id="pk-new">${IC_PLUS}<span>New meal</span></button>
        </div>
      </div></div>`);
    $('modal-root').appendChild(ov);
    const done=()=>ov.remove();
    ov.querySelector('#pk-bd').onclick=done;
    ov.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{
      const mm=state.meals.find(x=>x.id===b.dataset.pick); if(mm){mm.items.push(libToMealItem(l));save();}
      done(); renderLibrary();
    });
    ov.querySelector('#pk-new').onclick=()=>{
      const name=(prompt('Name this meal','My meal')||'').trim(); if(!name){return;}
      state.meals.push({id:uid(),name,items:[libToMealItem(l)]}); save();
      done(); renderLibrary();
    };
  }
  function renderMeal(mealId){
    camStop(); setTabs(false);
    const meal=()=>state.meals.find(x=>x.id===mealId);
    if(!meal()){renderLibrary();return;}
    let chosenMeal=defaultMeal();
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="ml-back">${IC_BACK}</button><h3 id="ml-title" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(meal().name)}</h3><button class="circ-back" id="ml-rename" aria-label="Rename" style="margin-left:auto">${IC_PENCIL}</button></div>
      <div id="ml-hero"></div>
      <div id="ml-items" style="margin-top:6px"></div>
      ${mealChips(chosenMeal)}
      <button class="btn btn-primary btn-block" id="ml-add" style="margin-top:14px"></button>
      <button class="btn btn-danger btn-block" id="ml-del" style="margin-top:10px">Delete this meal</button>`;
    body.querySelector('#ml-back').onclick=renderLibrary;
    const getMeal=wireMealChips(body);
    body.querySelector('#ml-rename').onclick=()=>{const m=meal();const nn=(prompt('Rename meal',m.name)||'').trim();if(nn){m.name=nn;save();renderMeal(mealId);}};
    body.querySelector('#ml-del').onclick=()=>{ if(confirm('Delete this meal folder? Saved single foods are not affected.')){state.meals=state.meals.filter(x=>x.id!==mealId);save();renderLibrary();} };
    function paint(){
      const m=meal(); if(!m){renderLibrary();return;}
      const tot=mealTotal(m);
      body.querySelector('#ml-hero').innerHTML=`<div class="meal-hero"><div><div class="mh-l">${m.items.length} ingredient${m.items.length===1?'':'s'}</div><div class="mh-s">Adjust portions below</div></div><div style="display:flex;align-items:baseline;gap:5px"><span class="mh-tot">${r0(tot)}</span><span class="mh-u">kcal</span></div></div>`;

        <div class="burned"><div class="burned-l">Calories burned</div>

        ${wkg?'':'<div class="hint" style="text-align:center;margin-top:8px">Using an estimated 60&nbsp;kg — log your weight for a more accurate burn.</div>'}
        <button class="btn btn-primary btn-block" id="ex-save" style="margin-top:16px">Save exercise</button>`;
      const MINm=5,MAXm=120;
      const sl=body.querySelector('#ex-slider'), fillEl=body.querySelector('#ex-fill'), thumbEl=body.querySelector('#ex-thumb');
      const place=()=>{const f=(minutes-MINm)/(MAXm-MINm);fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
      const paint=()=>{body.querySelector('#ex-minv').textContent=minutes;body.querySelector('#ex-kcal').textContent=calc();place();};
      const setFromX=(x)=>{const r=sl.getBoundingClientRect();let f=(x-r.left-13)/(r.width-26);f=Math.max(0,Math.min(1,f));minutes=Math.round(MINm+f*(MAXm-MINm));paint();};
      let dragging=false;
      sl.addEventListener('pointerdown',e=>{dragging=true;try{sl.setPointerCapture(e.pointerId);}catch(_){}setFromX(e.clientX);});

      sl.addEventListener('pointerup',()=>{dragging=false;});
      sl.addEventListener('pointercancel',()=>{dragging=false;});
      place();
      body.querySelector('#ex-actbtn').onclick=chooseActivity;

        state.exercise.push({id:uid(),date:viewDate,activity,intensity,minutes,met:MET[activity][intensity],caloriesBurned:calc()});
        save();sh.close();

    }
    draw();

/* ---------- SEARCH BY NAME ---------- */
async function barcodeLookup(code){
  code=String(code);
  try{ await ensureONDB(); const hit=ONBYEAN&&ONBYEAN.get(code); if(hit) return {name:hit[0],per:{calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]},source:'opennutrition',g:hit[6]}; }catch(e){}
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments`);
    const data=await res.json();
    if(data.product){ const n=data.product.nutriments||{}; return {name:data.product.product_name||('Item '+code),per:{calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)},source:'barcode'}; }
  }catch(e){}
  return null;
}
/* Open Food Facts text search.
   Uses the legacy /cgi/search.pl on world.openfoodfacts.org because it allows
   cross-origin browser requests. The newer search.openfoodfacts.org (Search-a-licious)
   does NOT send CORS headers, so a browser fetch to it fails with "Load failed".
   On-demand only — OFF rate-limits search to ~10/min and asks apps not to search-as-you-type. */
async function offTextSearch(term){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(term)}&search_simple=1&action=process&json=1&page_size=20&fields=code,product_name,brands,quantity,product_quantity,nutriments`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Open Food Facts search is unavailable right now ('+r.status+'). Try again shortly, scan the barcode, or estimate with AI.');
  const data=await r.json();
  const list=data.products||[];
  return list.map(p=>{
    const n=p.nutriments||{}; const kcal=n['energy-kcal_100g'];
    if(!p.product_name || kcal==null) return null;
    const pq=parseFloat(p.product_quantity);                 // net package weight in grams (or ml)
    const grams=(isFinite(pq) && pq>0 && pq<=10000) ? pq : null;
    return {name:p.product_name, brands:p.brands||'', quantity:p.quantity||'', grams, per:{
      calories:+kcal||0, protein_g:+(n['proteins_100g']||0), carbs_g:+(n['carbohydrates_100g']||0),
      fat_g:+(n['fat_100g']||0), sugar_g:+(n['sugars_100g']||0)}};
  }).filter(Boolean);
}
function openSearch(){
  const m=openModal('Search by name',`

  const q=m.querySelector('#sf-q'), libBox=m.querySelector('#sf-lib'), res=m.querySelector('#sf-results');
  let dbMatches=[], onMatches=[];
  function pickPer(name,per,source,g){

  function offerAI(term){
    const wrap=el(`<div><div class="empty">No match in your library, the local database, or Open Food Facts for "${esc(term)}".</div><div class="field"><button class="btn btn-primary btn-block" id="sf-aigo">Estimate "${esc(term)}" with AI</button></div></div>`);
    res.innerHTML=''; res.appendChild(wrap);
    wrap.querySelector('#sf-aigo').onclick=()=>runAI(term);
  }
  async function runAI(term){
    if(!state.settings.apiKey){res.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to use AI lookup.</div>`;return;}
    res.innerHTML=`<div class="spinner">Asking AI…</div>`;
    try{
      const ai=await aiNutrition(term);
      if(!ai.per_100g || !ai.per_100g.calories){res.innerHTML=`<div class="err">AI couldn't estimate that. Try a different name or enter it manually.</div>`;return;}
      res.innerHTML=`<div class="section-label">AI estimate</div>`;
      const node=el(`<div class="row tappable"><div><div class="name">${esc(ai.name||term)}</div><div class="sub">${r0(ai.per_100g.calories)} kcal/100g · AI estimate</div></div></div>`);

  async function doSearch(){
    const term=q.value.trim(); if(!term)return;
    const localHas=state.library.some(l=>l.name.toLowerCase().includes(term.toLowerCase())) || (DB||[]).some(f=>f.name.toLowerCase().includes(term.toLowerCase()));

    try{
      const url=`https://search.openfoodfacts.org/search?q=${encodeURIComponent(term)}&page_size=20&fields=code,product_name,brands,nutriments`;
      const r=await fetch(url);
      if(!r.ok) throw new Error('Open Food Facts returned an error ('+r.status+').');
      const data=await r.json();
      const prods=(data.hits||[]).filter(p=>p.product_name && p.nutriments && p.nutriments['energy-kcal_100g']!=null);
      if(!prods.length){ if(localHas){res.innerHTML='';} else {offerAI(term);} return; }
      res.innerHTML=`<div class="section-label">Open Food Facts</div>`+prods.map((p,i)=>{
        const cal=r0(p.nutriments['energy-kcal_100g']);
        return `<div class="row tappable" data-off="${i}"><div><div class="name">${esc(p.product_name)}</div><div class="sub">${p.brands?esc(p.brands)+' · ':''}${cal} kcal/100g · Open Food Facts</div></div></div>`;
      }).join('')+`<div class="field"><button class="btn btn-block" id="sf-aibtn">None of these — estimate with AI</button></div>`;
      res.querySelectorAll('[data-off]').forEach(node=>node.onclick=()=>{

function loadImage(file){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);res(img);};img.onerror=rej;img.src=u;});}
async function toJpegBase64(file,maxDim=1100,q=0.8){
  const img=await loadImage(file);
  const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',q).split(',')[1];
}

function camCapture(v){

  if(!text) throw new Error('Empty response from Gemini. Please try again.');

  const s=text.indexOf('{'),e=text.lastIndexOf('}'); if(s>=0&&e>=0)text=text.slice(s,e+1);
