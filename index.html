  let scanner=null, running=false;
  const stopScanner=()=>{ if(scanner&&running){running=false;try{return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{});}catch(_){}} return Promise.resolve(); };
  const startScan=async()=>{
    if(typeof Html5Qrcode==='undefined'){hint.textContent='Camera scanning isn’t available here — type the barcode number into “Search for a food”.';return;}
    await stopScanner();
    const opts={};
    if(typeof Html5QrcodeSupportedFormats!=='undefined'){opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];}
    try{
      scanner=new Html5Qrcode('reader',opts); running=true;
      await scanner.start({facingMode:'environment'},
        {fps:10,qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};},aspectRatio:1.3333,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
        (txt)=>{ if(!running)return; stopScanner(); doLookup(txt); },()=>{});
    }catch(e){running=false;hint.textContent='Couldn’t start the camera — type the barcode number into “Search for a food”.';}
  };
  async function doLookup(code){
    await stopScanner();
    m.querySelector('#reader').innerHTML='';

    const r=await barcodeLookup(code);

/* Decide how to open the weigh screen for a per-100g food:
   known serving weight -> manual default; else use a cached/AI typical portion (S/M/L chips);
   no key / lookup fails -> plain manual. Costs at most one cached AI call per unique food. */
function openWeighPer(stage,name,per,source,defGrams,onDone){
  if(defGrams){ weighAndLog(null,stage,name,per,source,defGrams,onDone); return; }
  const cached=portionCacheGet(name);
  if(cached){ weighAndLog(null,stage,name,per,source,null,onDone,cached); return; }
  if(!state.settings.apiKey){ weighAndLog(null,stage,name,per,source,null,onDone); return; }
  stage.innerHTML=`<div class="spinner">Estimating a typical portion…</div>`;
  aiServingWeight(name)
    .then(p=>weighAndLog(null,stage,name,per,source,null,onDone,p))
    .catch(()=>weighAndLog(null,stage,name,per,source,null,onDone));
}

  const per={calories:+r.per.calories||0,protein_g:+r.per.protein_g||0,carbs_g:+r.per.carbs_g||0,fat_g:+r.per.fat_g||0,sugar_g:+r.per.sugar_g||0};
  const sg=(+r.servingGrams>0)?+r.servingGrams:null;
  const pkg=(+r.packageGrams>0)?+r.packageGrams:null;
  if(!sg){ return weighAndLog(m,stage,r.name,per,r.source,pkg||undefined,onDone); }   // no serving info -> old behaviour
  const sLabel=r.servingLabel||`${r1(sg)} g`;
  const kcalFor=g=>r0(per.calories*g/100);
  let basis='serving', count=1;                     // count = number of servings
  const bases=[['serving','1 serving']];
  if(pkg) bases.push(['package','Whole package']);
  bases.push(['custom','Custom amount']);
  stage.innerHTML=`
    <div class="item-edit"><div class="nm">${esc(r.name)}</div>
      <div style="color:var(--text-soft);font-size:12.5px;margin-top:3px">Serving ${esc(sLabel)} · ${kcalFor(sg)} kcal${pkg?` &nbsp;·&nbsp; Package ${r1(pkg)} g · ${kcalFor(pkg)} kcal`:''}</div></div>
    <div class="field"><label>How much did you have?</label>
      <div class="chips" id="pk-basis">${bases.map(([b,l])=>`<button class="chip${b===basis?' sel':''}" data-b="${b}">${l}</button>`).join('')}</div></div>
    <div class="field" id="pk-serv"><label>Number of servings</label>
      <div class="pstep"><button id="pk-dn">${IC_MINUS}</button><span class="val" id="pk-ct">1</span><button id="pk-up">${IC_PLUS}</button></div></div>
    <div id="pk-custom" style="display:none">${servingWidget()}</div>
    <div class="hint" id="pk-total"></div>
    ${mealChips(defaultMeal())}
    <div class="toggle-row"><input type="checkbox" id="pk-lib" style="width:auto"><label for="pk-lib" style="margin:0">Save to library</label></div>
    <div class="field"><button class="btn btn-primary btn-block" id="pk-save">Log item</button></div>`;
  const getMeal=wireMealChips(stage);
  const svWrap=stage.querySelector('#pk-serv'), customWrap=stage.querySelector('#pk-custom'),
        total=stage.querySelector('#pk-total'), ctEl=stage.querySelector('#pk-ct');
  const sv=wireServing(customWrap,per,sg);          // custom grams widget, pre-filled to one serving
  const curGrams=()=> basis==='serving' ? sg*count : basis==='package' ? pkg : sv.grams();
  const curDesc=()=> basis==='serving' ? `${r1(count)} serving${count===1?'':'s'} (${r1(sg*count)} g)`
                    : basis==='package' ? `whole package (${r1(pkg)} g)` : sv.desc();
  const recompute=()=>{ const g=curGrams(); total.textContent=`= ${r0(per.calories*g/100)} kcal · ${r1(g)} g`; };
  const syncBasis=()=>{ svWrap.style.display=basis==='serving'?'':'none'; customWrap.style.display=basis==='custom'?'':'none'; recompute(); };
  stage.querySelectorAll('#pk-basis .chip').forEach(c=>c.onclick=()=>{ basis=c.dataset.b; stage.querySelectorAll('#pk-basis .chip').forEach(x=>x.classList.toggle('sel',x===c)); syncBasis(); });
  stage.querySelector('#pk-up').onclick=()=>{ count=r1(Math.min(50,count+0.5)); ctEl.textContent=r1(count); recompute(); };
  stage.querySelector('#pk-dn').onclick=()=>{ count=r1(Math.max(0.5,count-0.5)); ctEl.textContent=r1(count); recompute(); };
  customWrap.addEventListener('input',recompute);
  syncBasis();
  stage.querySelector('#pk-save').onclick=()=>{
    const g=curGrams();
    state.entries.push({id:uid(),date:viewDate,meal:getMeal(),name:r.name,grams:g,servingLabel:curDesc(),
      calories:per.calories*g/100,protein_g:per.protein_g*g/100,carbs_g:per.carbs_g*g/100,fat_g:per.fat_g*g/100,sugar_g:per.sugar_g*g/100,source:r.source});
    if(stage.querySelector('#pk-lib').checked)addToLibrary(r.name,per,sg);
    save(); onDone?onDone():closeModal(m);
  };
}

/* ---------- LIBRARY ---------- */
function openLibrary(){
  const m=openModal('Library',`
    <div class="seg" id="lib-tabs" style="margin-top:10px">
      <button data-t="recent" class="on">Recent</button>
      <button data-t="saved">Saved</button>
      <button data-t="mine">My foods</button>
    </div>
    <div id="lib-body" style="margin-top:10px"></div>`);
  const body=m.querySelector('#lib-body');
  const tabs=m.querySelectorAll('#lib-tabs button');
  const rowHtml=(name,sub,attr)=>`<div class="recent-row"><span class="recent-ic">${IC_FORK}</span><div class="recent-main"><div class="rn">${esc(name)}</div><div class="rs">${esc(sub)}</div></div><button class="recent-add" ${attr} aria-label="Add">${IC_PLUS}</button></div>`;
  const distinct=()=>{const seen=new Set(),out=[];for(let i=state.entries.length-1;i>=0;i--){const e=state.entries[i],k=(e.name||'').toLowerCase();if(!e.name||seen.has(k))continue;seen.add(k);out.push({name:e.name,sub:`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`,entry:e});}return out;};
  function quickList(list){
    if(!list.length){body.innerHTML=`<div class="empty" style="border:none">Nothing logged yet.</div>`;return;}
    body.innerHTML=list.map((r,i)=>rowHtml(r.name,r.sub,`data-i="${i}"`)).join('');
    body.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{relogFood(list[+b.dataset.i]);closeModal(m);});
  }
  function showSaved(){
    const lib=state.library;
    if(!lib.length){body.innerHTML=`<div class="empty" style="border:none">Your library is empty. Tick “Save to library” after logging to reuse items here.</div>`;return;}
    body.innerHTML=lib.map(l=>{const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;return rowHtml(l.name,sub,`data-lib="${l.id}"`);}).join('');
    body.querySelectorAll('[data-lib]').forEach(b=>b.onclick=()=>{
      const l=state.library.find(x=>x.id===b.dataset.lib);
      const stage=el('<div></div>');m.querySelector('#m-body').innerHTML='';m.querySelector('#m-body').appendChild(stage);
      if(l.perServing)logServing(m,stage,l.name,l.perServing.calories,l.perServing.portion,'library');
      else weighAndLog(m,stage,l.name,l.per_100g,'library',l.lastGrams);
    });
  }
  tabs.forEach(b=>b.onclick=()=>{tabs.forEach(x=>x.classList.toggle('on',x===b));const t=b.dataset.t;t==='recent'?quickList(recentFoods(20)):t==='mine'?quickList(distinct()):showSaved();});
  quickList(recentFoods(20));
}

/* edit/delete a food entry */
function editFood(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  const perServing=(e.unitCal!=null);
  const per100=(!perServing&&e.grams)?{calories:e.calories/e.grams*100,protein_g:(e.protein_g||0)/e.grams*100,carbs_g:(e.carbs_g||0)/e.grams*100,fat_g:(e.fat_g||0)/e.grams*100,sugar_g:(e.sugar_g||0)/e.grams*100}:null;
  let size=perServing?0:Math.max(5,Math.round(e.grams||100));   // grams per serving
  let servings=perServing?(e.unitCal?r1(e.calories/e.unitCal):1):1; if(!servings)servings=1;
  let meal=e.meal||defaultMeal(), saveLib=false;
  const fmtServ=(v)=>{const w=Math.floor(v);if(v-w===0.5)return w?`${w}½`:'½';return String(r1(v));};
  const kcal=()=>perServing?(e.unitCal*servings):(per100?per100.calories*size*servings/100:0);
  const sub=()=>perServing?`${fmtServ(servings)} × ${e.portion||'serving'}`:`${r0(size*servings)} g · ${fmtServ(servings)} serving${servings===1?'':'s'}`;
  const sh=makeSheet(`<div class="edit-head"><span class="edit-title">Edit food</span><button class="edit-x" id="ef-x">${IC_X}</button></div>
    <div class="efh">
      <div class="efh-top"><span class="efh-ic">${IC_FORK}</span><div class="efh-main"><div class="efh-name">${esc(e.name)}</div><div class="efh-sub" id="ef-sub"></div></div></div>
      <div class="efh-cal"><span id="ef-kcal">0</span><small>kcal</small></div>
    </div>
    ${perServing?'':`<div class="add-card">
      <div class="dur-h"><span>Serving size</span><span class="dur-v"><b id="ef-szv">${size}</b> g</span></div>
      <div class="dur-row"><button class="step" id="ef-szdec">${IC_MINUS}</button>
        <div class="nn-slider" id="ef-slider"><div class="nn-track"></div><div class="nn-fill" id="ef-fill"></div><div class="nn-thumb" id="ef-thumb"></div></div>
        <button class="step" id="ef-szinc">${IC_PLUS}</button></div></div>`}
    <div class="add-card">
      <div class="dur-h"><span>Servings</span>
        <div class="stepper"><button id="ef-svdec">${IC_MINUS}</button><div class="sv" id="ef-svv">${fmtServ(servings)}</div><button id="ef-svinc">${IC_PLUS}</button></div></div>
      <div class="qchips" id="ef-q"><button data-q="0.5">½</button><button data-q="1">1</button><button data-q="1.5">1½</button><button data-q="2">2×</button></div>
    </div>
    <div style="margin-top:14px"><div class="add-label">Meal</div><div class="seg" id="ef-meal">${MEALS.map(x=>`<button data-meal="${x}"${x===meal?' class="on"':''}>${x}</button>`).join('')}</div></div>
    <button class="lib-toggle" id="ef-libtog"><span class="lt-ic" id="ef-bm">${IC_BOOKMARK.replace('{F}','none')}</span><span class="lt-label">Save to Library</span><span class="set-tog" id="ef-libsw"><span></span></span></button>
    <button class="btn-del-soft" id="ef-del">${IC_TRASH}<span>Delete this entry</span></button>
    <button class="btn btn-primary btn-block" id="ef-save" style="margin-top:14px">Save changes</button>`);
  const root=sh.sheet;
  let placeSize=()=>{};
  const repaint=()=>{
    root.querySelector('#ef-kcal').textContent=r0(kcal());
    root.querySelector('#ef-sub').textContent=sub();
    root.querySelector('#ef-svv').textContent=fmtServ(servings);
    if(!perServing){const z=root.querySelector('#ef-szv');if(z)z.textContent=r0(size);placeSize();}
    root.querySelectorAll('#ef-q button').forEach(b=>b.classList.toggle('on',+b.dataset.q===servings));
  };
  if(!perServing){
    const MIN=5,MAX=600;
    const sl=root.querySelector('#ef-slider'),fillEl=root.querySelector('#ef-fill'),thumbEl=root.querySelector('#ef-thumb');
    placeSize=()=>{const f=Math.max(0,Math.min(1,(size-MIN)/(MAX-MIN)));fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
    const setFromX=(x)=>{const r=sl.getBoundingClientRect();let f=(x-r.left-13)/(r.width-26);f=Math.max(0,Math.min(1,f));size=Math.round((MIN+f*(MAX-MIN))/5)*5;repaint();};
    let drag=false;
    sl.addEventListener('pointerdown',ev=>{drag=true;try{sl.setPointerCapture(ev.pointerId);}catch(_){}setFromX(ev.clientX);});
    sl.addEventListener('pointermove',ev=>{if(drag)setFromX(ev.clientX);});
    sl.addEventListener('pointerup',()=>{drag=false;});sl.addEventListener('pointercancel',()=>{drag=false;});
    root.querySelector('#ef-szdec').onclick=()=>{size=Math.max(MIN,size-5);repaint();};
    root.querySelector('#ef-szinc').onclick=()=>{size=Math.min(MAX,size+5);repaint();};
  }
  root.querySelector('#ef-svdec').onclick=()=>{servings=Math.max(0.5,r1(servings-0.5));repaint();};
  root.querySelector('#ef-svinc').onclick=()=>{servings=Math.min(20,r1(servings+0.5));repaint();};
  root.querySelectorAll('#ef-q button').forEach(b=>b.onclick=()=>{servings=+b.dataset.q;repaint();});
  root.querySelectorAll('#ef-meal button').forEach(b=>b.onclick=()=>{meal=b.dataset.meal;root.querySelectorAll('#ef-meal button').forEach(x=>x.classList.toggle('on',x===b));});
  root.querySelector('#ef-libtog').onclick=()=>{saveLib=!saveLib;root.querySelector('#ef-libsw').classList.toggle('on',saveLib);root.querySelector('#ef-bm').innerHTML=IC_BOOKMARK.replace('{F}',saveLib?'currentColor':'none');};
  root.querySelector('#ef-x').onclick=()=>sh.close();
  root.querySelector('#ef-del').onclick=()=>{state.entries=state.entries.filter(x=>x.id!==id);save();sh.close();};
  root.querySelector('#ef-save').onclick=()=>{
    e.meal=meal;
    if(perServing){
      e.calories=e.unitCal*servings; e.servingLabel=`${fmtServ(servings)} ${e.portion||'serving'}`;
      if(saveLib)addToLibraryServing(e.name,e.unitCal,e.portion||'serving');
    }else{
      const g=size*servings;
      e.grams=g; e.calories=per100.calories*g/100; e.protein_g=per100.protein_g*g/100; e.carbs_g=per100.carbs_g*g/100; e.fat_g=per100.fat_g*g/100; e.sugar_g=per100.sugar_g*g/100; e.servingLabel=`${r0(g)} g`;
      if(saveLib&&g)addToLibrary(e.name,per100,Math.round(size));
    }
    save();sh.close();
  };
  repaint();
}

/* ---------- EXERCISE ---------- */
function openExercise(){
  const wkg=latestWeightKg();
  const acts=[...QUICK,...Object.keys(MET).filter(a=>!QUICK.includes(a))];
  let activity='Walking',intensity='moderate';
  const m=openModal('Add exercise',`
    <div class="field"><label>Activity</label>
      <div class="chips" id="ex-acts">${acts.map(a=>`<button class="chip${a==='Walking'?' sel':''}" data-act="${a}">${a}</button>`).join('')}</div>

  m.querySelectorAll('#ex-int .chip').forEach(c=>c.onclick=()=>{intensity=c.dataset.int;m.querySelectorAll('#ex-int .chip').forEach(x=>x.classList.toggle('sel',x===c));recompute();});

    state.exercise.push({id:uid(),date:viewDate,activity,intensity,minutes:min,met:MET[activity][intensity],caloriesBurned:cal});
    save();closeModal(m);
  };
}

/* ---------- WEIGHT ---------- */
function editExercise(id){

        </div></div>
      <div class="add-card"><div class="dur-h"><span>Duration</span><span class="dur-v"><b id="ee-minv">${minutes}</b> min</span></div>
        <div class="dur-row"><button class="step" id="ee-dec">${IC_MINUS}</button>
          <div class="nn-slider" id="ee-slider"><div class="nn-track"></div><div class="nn-fill" id="ee-fill"></div><div class="nn-thumb" id="ee-thumb"></div></div>
          <button class="step" id="ee-inc">${IC_PLUS}</button></div></div>

      ${wkg?'':'<div class="hint" style="text-align:center;margin-top:8px">Using an estimated 60&nbsp;kg — log your weight for a more accurate burn.</div>'}
      <button class="btn-del-soft" id="ee-del">${IC_TRASH}<span>Delete this entry</span></button>
      <button class="btn btn-primary btn-block" id="ee-save" style="margin-top:14px">Save changes</button>`;
    const MIN=5,MAX=120;
    const sl=root.querySelector('#ee-slider'),fillEl=root.querySelector('#ee-fill'),thumbEl=root.querySelector('#ee-thumb');
    const place=()=>{const f=(minutes-MIN)/(MAX-MIN);fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
    const paint=()=>{root.querySelector('#ee-minv').textContent=minutes;root.querySelector('#ee-kcal').textContent=calc();place();};

function ringSVG(pct){
  const r=58,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,pct||0)));
  return `<svg viewBox="0 0 140 140" width="128" height="128">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent-bg)" stroke-width="12"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 70 70)"/>
  </svg>`;
}
function trendSVG(pts){
  if(pts.length<2)return '<div class="empty" style="border:none">Log at least two mornings to see your trend.</div>';
  const W=320,H=130,padT=10,padB=4,padL=4,padR=4;
  const xs=pts.map(p=>p.t),ys=pts.map(p=>p.v);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);const pad=(maxY-minY)*0.25||1;minY-=pad;maxY+=pad;
  const X=t=>padL+(maxX===minX?0.5:(t-minX)/(maxX-minX))*(W-padL-padR);
  const Y=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  const daily=pts.map(p=>`${X(p.t)},${Y(p.v)}`).join(' ');
  const avg=pts.map(p=>{const win=pts.filter(q=>q.t<=p.t&&q.t>p.t-7*864e5);return [X(p.t),Y(win.reduce((s,q)=>s+q.v,0)/win.length)];});
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <polyline fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" points="${avg.map(a=>a.join(',')).join(' ')}"/>
    <polyline fill="none" stroke="var(--accent-strong)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" points="${daily}"/>
    <circle cx="${X(last.t)}" cy="${Y(last.v)}" r="4.5" fill="var(--surface)" stroke="var(--accent-strong)" stroke-width="3"/>
  </svg>`;
}

    }
    // numbers
    const age=ageNow(), ht=+p.height||0;
    if(!wkg||!ht){
      $('p-bmr').textContent='—';$('p-maint').textContent='—';$('p-tgt').textContent='—';
      $('p-tsub').textContent=!wkg?'Log a weigh-in to calculate':'Add your height above';
      $('p-set').disabled=true;
      $('p-proj').innerHTML='';
      return;
    }
    $('p-set').disabled=false;
    const bmr=10*wkg+6.25*ht-5*age+(p.sex==='male'?5:-161);
    const maint=bmr*p.activity;
    const lose=p.goal==='lose';
    const deficit=Math.round(p.rate*7700/7);
    const floor=p.sex==='male'?1500:1200;
    let target=lose?maint-deficit:maint, clamped=false;
    if(target<floor){target=floor;clamped=true;}
    $('p-bmr').textContent=fmtN(round5(bmr))+' kcal';
    $('p-maint').textContent=fmtN(round5(maint))+' kcal';
    $('p-tgt').textContent=fmtN(round5(target));
    $('p-tsub').textContent=lose?(clamped?'Held at a safe minimum':'−'+fmtN(round5(deficit))+' kcal/day deficit'):'Maintenance calories';
    p._target=round5(target);
    // projection
    if(lose && p.goalWeight!=null){
      const toGo=wkg-p.goalWeight;
      if(toGo>0.05){
        const wks=Math.max(1,Math.round(toGo/p.rate));
        const eta=new Date(); eta.setDate(eta.getDate()+Math.round(toGo/p.rate*7));
        $('p-proj').innerHTML=`<div class="proj"><div class="ic">${CALOK_SVG}</div><div class="tx">Lose ${r1(kgToUnit(toGo,wu))} ${wu} at ${p.rate} kg/week — reach ${r1(kgToUnit(p.goalWeight,wu))} ${wu} around ${MN[eta.getMonth()]} ${eta.getDate()} (~${wks} week${wks===1?'':'s'}).</div></div>`;
      } else {
        $('p-proj').innerHTML=`<div style="background:var(--accent-bg);border-radius:14px;padding:12px 14px;margin-top:16px;font-size:12.5px;color:var(--text-soft)">Set a goal weight below your current weight to see a projection.</div>`;
      }
    } else $('p-proj').innerHTML='';
  }
  const save2=()=>{p.lossRate=Math.round(p.rate*7700/7);save();$('p-saved').innerHTML='';paint();};

  document.querySelectorAll('#p-sex button').forEach(b=>b.onclick=()=>{p.sex=b.dataset.s;save2();});
  $('p-ageup').onclick=()=>{p.age=Math.min(100,ageNow()+1);save2();};
  $('p-agedn').onclick=()=>{p.age=Math.max(14,ageNow()-1);save2();};
  const htStep=(d)=>{const disp=p.height?cmToUnit(p.height,hu):(hu==='in'?67:170);const nd=Math.round(disp)+d;p.height=r1(unitToCm(nd,hu));save2();};
  $('p-htup').onclick=()=>htStep(1); $('p-htdn').onclick=()=>htStep(-1);
  document.querySelectorAll('#p-act .achip').forEach(b=>b.onclick=()=>{p.activity=+b.dataset.m;save2();});
  document.querySelectorAll('#p-goal button').forEach(b=>b.onclick=()=>{p.goal=b.dataset.g;save2();});
  const gwStep=(d)=>{const base=p.goalWeight!=null?p.goalWeight:(wkg||70);const disp=kgToUnit(base,wu)+d;p.goalWeight=r1(unitToKg(disp,wu));save2();};
  $('p-gwup').onclick=()=>gwStep(0.1); $('p-gwdn').onclick=()=>gwStep(-0.1);
  document.querySelectorAll('#p-pace .pace').forEach(b=>b.onclick=()=>{p.rate=+b.dataset.r;save2();});
  document.querySelectorAll('#p-meals .achip').forEach(b=>b.onclick=()=>{
    const cur=Object.assign({Breakfast:true,Lunch:true,Dinner:true,Snack:true}, state.settings.meals||{});
    cur[b.dataset.meal]=!cur[b.dataset.meal];
    if(!MEALS.some(k=>cur[k])) cur[b.dataset.meal]=true; // keep at least one on
    state.settings.meals=cur; save();
    document.querySelectorAll('#p-meals .achip').forEach(x=>x.classList.toggle('on',cur[x.dataset.meal]));
  });
  $('p-set').onclick=()=>{ if(p._target){state.settings.dailyTarget=p._target;save();$('p-saved').innerHTML=`<div class="saved-note">${fmtN(p._target)} kcal set as your daily target ✓</div>`;} };
  paint();
}

/* ================================================================
   RIVALS — head-to-head competition with one friend
   Fairness: each person races their own Plan-tab target, so different
   genders / weights / goals compete on adherence, not raw kg.
   Only DERIVED scores (points + %-progress) ever leave the device.
   ================================================================ */

/* Rivals colours (RV_YOU / RV_THEM / …) are theme-aware — set in rvSyncColors(), called from applyTheme(). */

/* ----- scoring (pure functions of local state) ----- */
function compCalorieScore(C,T){                 // 0..80
  if(!T)return 0;
  if(C<=T)return 80;
  return Math.max(0, 80*(1-(C-T)/(0.25*T)));
}
function compDayCalories(d){ return sum(state.entries.filter(e=>e.date===d),'calories'); }
function compDayExercise(d){ return sum(state.exercise.filter(e=>e.date===d),'caloriesBurned'); }
function compDayNet(d){ return Math.max(0, compDayCalories(d)-compDayExercise(d)); }  // exercise earns back headroom
function compDayLogged(d){ return state.entries.some(e=>e.date===d); }
function compDailyScore(d){                      // 0..100
  const T=state.settings.dailyTarget;
  if(!T || !compDayLogged(d)) return 0;          // no log = 0 (showing up is the point)
  return 20 + compCalorieScore(compDayNet(d), T);  // net = food − exercise vs target
}
function earliestWeightKg(){
  if(!state.weights||!state.weights.length)return null;
  const w=[...state.weights].sort((a,b)=>a.date<b.date?-1:1)[0];
  return unitToKg(w.weight, w.unit||'kg');
}
// Progress to goal weight: how far your latest weigh-in has moved from your
// true starting weight (first weigh-in) toward your goal. 0..100%.
// Display-only — it does not feed the points race.
function compProgressPct(){
  const goal=state.profile.goalWeight, start=earliestWeightKg(), cur=latestWeightKg();
  if(goal==null||start==null||cur==null||start===goal)return null;
  const p=(start-cur)/(start-goal)*100;
  if(!isFinite(p))return null;
  return Math.max(0,Math.min(100,p));
}

/* ----- week / range helpers ----- */
function compWeekMonday(offset){                 // offset weeks back; 0 = this week
  const now=new Date(); const o=(now.getDay()+6)%7; // 0=Mon
  const mon=new Date(now); mon.setDate(now.getDate()-o-7*(offset||0)); mon.setHours(0,0,0,0);
  return mon;
}
function compWeekDaysFor(offset){
  const mon=compWeekMonday(offset), out=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(dateKey(d));}
  return out;
}
function compWeekDays(){ return compWeekDaysFor(0); }
function comp28Days(){
  const start=compWeekMonday(3), out=[];
  for(let i=0;i<28;i++){const d=new Date(start);d.setDate(start.getDate()+i);out.push(dateKey(d));}
  return out;                                    // 4 ISO weeks ending this Sunday
}
function compDaysLeftWeek(){ const idx=(new Date().getDay()+6)%7; return 6-idx; }
function compDaysLeftMonth(){
  const now=new Date(); const end=new Date(now.getFullYear(),now.getMonth()+1,0);
  return Math.max(0, Math.round((end-now)/86400000));
}

/* ----- who am I (display name, matches Settings) ----- */
function compMyName(){
  const meta=(user&&user.user_metadata)||{}, email=(user&&user.email)||'';
  const namePart=(email.split('@')[0]||'').replace(/[._-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  return meta.full_name||meta.name||namePart||'You';
}
function rvInitial(n){ return ((n||'?').trim()[0]||'?').toUpperCase(); }

/* ----- code normalisation (fixes join: prefix is fixed, we only need 4 chars) ----- */
function compNormalizeCode(raw){
  let s=String(raw||'').toUpperCase().replace(/\s+/g,'');
  s=s.replace(/^NOM[-\s]?/,'').replace(/[^A-Z0-9]/g,'');
  return 'NOM-'+s;
}

/* ----- Supabase wrappers ----- */
async function compCreate(){
  const name=compMyName();
  const {data,error}=await sb.rpc('create_competition',{p_display_name:name});
  if(error)throw error;
  state.competition={id:data.id,code:data.code,role:'host',startWeightKg:latestWeightKg(),name};
  save();
  return data;
}
async function compJoin(code){
  const name=compMyName();
  const {data,error}=await sb.rpc('join_competition',{p_code:compNormalizeCode(code),p_display_name:name});
  if(error)throw error;
  state.competition={id:data.id,code:data.code,role:'guest',startWeightKg:latestWeightKg(),name};
  save();
  return data;
}
// compact food entry for sharing with a rival (short keys keep the payload small)
function rvDiaryEntry(e){
  return {m:e.meal||'Snack', n:e.name||'', s:e.servingLabel||(r0(e.grams)+' g'),
    c:r0(e.calories||0), p:r1(e.protein_g||0), cb:r1(e.carbs_g||0), f:r1(e.fat_g||0)};
}
async function compPushMine(){
  const c=state.competition; if(!c||!CLOUD||!user)return;
  const days=comp28Days(), tk=todayKey(), pct=compProgressPct(), now=new Date().toISOString();
  const past=days.filter(d=>d<=tk);
  const rows=past.map(d=>({
    competition_id:c.id, user_id:user.id, date:d,
    daily_points:Math.round(compDailyScore(d)), logged:compDayLogged(d),
    progress_pct:pct, updated_at:now
  }));
  if(rows.length) await sb.from('competition_scores').upsert(rows,{onConflict:'competition_id,user_id,date'});
  // share the actual food diary (overwrites each day, so deletions propagate). Degrades quietly if the table isn't set up yet.
  try{
    const myTgt=state.settings.dailyTarget||null;                 // so a rival can see how much you were over/under
    const drows=past.map(d=>{
      const items=state.entries.filter(e=>e.date===d).map(rvDiaryEntry);
      if(myTgt!=null && items.length) items[0].dt=myTgt;           // stash target on the first item; old clients ignore unknown keys
      return { competition_id:c.id, user_id:user.id, date:d, entries:items, updated_at:now };
    });
    if(drows.length) await sb.from('competition_diary').upsert(drows,{onConflict:'competition_id,user_id,date'});
  }catch(e){}
}
// lazy: pull one rival-day's diary only when the user opens it
async function compFetchDiary(userId,date){
  const c=state.competition; if(!c)return {items:[],target:null};
  const {data,error}=await sb.from('competition_diary').select('entries')
    .eq('competition_id',c.id).eq('user_id',userId).eq('date',date).maybeSingle();
  if(error)throw error;
  const items=(data&&Array.isArray(data.entries))?data.entries:[];
  let target=null; for(const x of items){ if(x&&x.dt!=null){ target=+x.dt; break; } }
  return {items, target};
}
async function compFetchAll(){
  const c=state.competition; if(!c)return null;
  const days=comp28Days();
  const [memR,scR,cmpR]=await Promise.all([
    sb.from('competition_members').select('user_id,display_name').eq('competition_id',c.id),
    sb.from('competition_scores').select('user_id,date,daily_points,logged,progress_pct').eq('competition_id',c.id).in('date',days),
    sb.from('competitions').select('status,invite_code,started_at').eq('id',c.id).maybeSingle()
  ]);
  if(memR.error)throw memR.error;
  const members=memR.data||[], scores=scR.data||[];
  const status=(cmpR.data&&cmpR.data.status)||'pending';
  const startedAt=(cmpR.data&&cmpR.data.started_at)||null;
  if(startedAt && c.startedAt!==startedAt){ c.startedAt=startedAt; save(); }  // lock in the shared start moment
  const mk=(id,name)=>({id,name,byDate:{},pct:null});
  const users={};
  members.forEach(m=>users[m.user_id]=mk(m.user_id,m.display_name||'Player'));
  scores.forEach(r=>{
    const u=users[r.user_id]; if(!u)return;
    u.byDate[r.date]={points:r.daily_points||0,logged:!!r.logged};
    if(r.progress_pct!=null)u.pct=r.progress_pct;
  });
  const me=users[user.id]||mk(user.id,c.name);
  const them=Object.values(users).find(u=>u.id!==user.id)||null;
  return {status,me,them,startedAt,invite:(cmpR.data&&cmpR.data.invite_code)||c.code};
}
async function compLeave(){
  const c=state.competition; if(!c)return;
  try{ await sb.from('competition_members').delete().eq('competition_id',c.id).eq('user_id',user.id); }catch(e){}
  state.competition=null; save();
}

/* ----- competition start date (the day both parties joined) ----- */
function isoToLocalDateKey(iso){ try{ return dateKey(new Date(iso)); }catch(e){ return null; } }
function compStartDate(){
  const c=state.competition, s=c&&c.startedAt;
  return s?isoToLocalDateKey(s):null;
}
// keep only days on/after the competition start and on/before today
function compCountDates(dates){
  const start=compStartDate(), tk=todayKey();
  return dates.filter(d=> d<=tk && (!start || d>=start));
}

/* ----- per-user aggregation over a set of dates ----- */
function rvAgg(u,dates){
  let p=0,l=0; if(u) dates.forEach(d=>{const e=u.byDate[d]; if(e){p+=e.points; if(e.logged)l++;}});
  return {points:p, logged:l, logging:20*l, calorie:Math.max(0,p-20*l)};
}

/* ---- auto-refresh (silent polling while on the tab) ---- */
function rvUserSig(u){ return u?[u.pct,Object.keys(u.byDate).sort().map(d=>d+':'+u.byDate[d].points+(u.byDate[d].logged?'1':'0')).join(',')].join('|'):'∅'; }
function rvDataSig(d){ return d?[d.status,d.startedAt,rvUserSig(d.me),rvUserSig(d.them)].join('~'):''; }
function rivalsStartAuto(){
  if(_rvTimer)return;
  _rvTimer=setInterval(()=>{
    if(tab!=='rivals'||!state.competition){ clearInterval(_rvTimer); _rvTimer=null; return; }
    if(document.hidden)return;
    if(_navStack.length)return;                         // a modal is open — don't disrupt
    if(document.getElementById('rv-menu-pop'))return;   // menu open
    rivalsSilentRefresh();
  }, 20000);
}
async function rivalsSilentRefresh(){
  if(!(CLOUD&&user)||!state.competition||_rivalsLoading)return;
  try{
    await compPushMine();
    const d=await compFetchAll();
    const sig=rvDataSig(d);
    rivalsData=d;
    if(tab==='rivals' && sig!==_rvSig && !_navStack.length && !document.getElementById('rv-menu-pop')){ _rvSig=sig; renderRivals(); }
    else _rvSig=sig;
  }catch(e){/* silent */}
}

/* ---- view a rival's food diary for one day (lazy-loaded) ---- */
async function rvOpenDiary(userId,name,dk){

  const subLine=(tot,tgt,noneMsg)=> tgt!=null ? `target ${Math.round(tgt).toLocaleString()} · ${ou(tot,tgt)}` : noneMsg;
  let groups='';

function rvRenderBoard(){
  const d=rivalsData, me=d.me, them=d.them;
  const meName=me.name||compMyName(), themName=them.name||'Rival';
  const mode=rivalsMode;
  const dates=compCountDates(mode==='week'?compWeekDaysFor(0):comp28Days());
  const A=rvAgg(me,dates), B=rvAgg(them,dates);
  const diff=A.points-B.points;
  const total=A.points+B.points;
  const meShare=total>0?Math.round(A.points/total*100):50;
  const daysLeft=mode==='week'?compDaysLeftWeek():compDaysLeftMonth();
  const leadTxt = diff>0 ? `You're ahead by ${diff}` : diff<0 ? `${esc(themName)} leads by ${-diff}` : `All square`;
  const leftTxt = daysLeft<=0 ? (mode==='week'?'final day':'last day') : `${daysLeft} day${daysLeft===1?'':'s'} left`;

  // pct for weight-goal row
  const mePct = me.pct==null?null:Math.round(me.pct);
  const themPct = them.pct==null?null:Math.round(them.pct);

  // hero
  const hero=`<div class="rv-hero">
    <div class="rv-hero-row">
      <div class="rv-hero-p">
        ${rvAvatar(rvInitial(meName),RV_YOU,RV_YOU_BG,'#fff')}
        <div class="rv-hero-name">You</div>
        <div class="rv-hero-pts">${A.points.toLocaleString()}</div>
        <div class="rv-hero-lbl">points</div>
      </div>
      <div class="rv-hero-vs">VS</div>
      <div class="rv-hero-p" style="opacity:.94">
        ${rvAvatar(rvInitial(themName),RV_THEM,RV_THEM_BG,'rgba(255,255,255,.5)')}
        <div class="rv-hero-name">${esc(themName)}</div>
        <div class="rv-hero-pts" style="color:rgba(255,255,255,.9)">${B.points.toLocaleString()}</div>
        <div class="rv-hero-lbl">points</div>
      </div>
    </div>
    <div class="rv-hero-split"><div style="width:${meShare}%"></div></div>
    <div class="rv-hero-foot">${leadTxt} — ${leftTxt}</div>
  </div>`;

  // breakdown (adherence points only)
  const breakdown=`<div class="rv-card">
    <div class="rv-card-h">Where the points came from</div>
    ${rvBreakRow('Logging streak',A.logging,B.logging,'',A.logging>=B.logging)}
    ${rvBreakRow('Days under calorie goal',Math.round(A.calorie),Math.round(B.calorie),'',A.calorie>=B.calorie)}
  </div>`;

  // progress to goal weight — its own widget (closeness to goal; not scored)
  const goalCard=rvGoalCard(mePct,themPct,themName);

  // day-by-day (week) or week-by-week (month)
  let chart='';
  if(mode==='week'){
    const wk=compWeekDaysFor(0), tk=todayKey(), startD=compStartDate();
    const labels=['M','T','W','T','F','S','S'];
    let mx=1; wk.forEach(dk=>{ if(startD&&dk<startD)return; const em=me.byDate[dk],et=them.byDate[dk];mx=Math.max(mx,em?em.points:0,et?et.points:0);});
    const bars=wk.map((dk,i)=>{
      const future=dk>tk;
      const preStart=startD && dk<startD;
      const inactive=future||preStart;
      const em=preStart?null:me.byDate[dk], et=preStart?null:them.byDate[dk];
      const mh=em?Math.max(6,em.points/mx*70):(inactive?10:6);
      const th=et?Math.max(6,et.points/mx*70):(inactive?10:6);
      const op=inactive?'opacity:.4':'';
      const mc=inactive?'#DED6C8':(em?RV_YOU:RV_YOU_LT);
      const tc=inactive?'#DED6C8':(et?RV_THEM:RV_THEM_LT);
      const tap=!inactive;
      return `<div class="rv-daycol${tap?' tap':''}" style="${op}"${tap?` data-rvday="${dk}"`:''}>
        <div class="rv-daybars"><div style="height:${mh}px;background:${mc}"></div><div style="height:${th}px;background:${tc}"></div></div>
        <span>${labels[i]}</span></div>`;
    }).join('');
    chart=`<div class="rv-card">
      <div class="rv-card-h rv-legend"><span>Day by day</span>
        <span class="rv-leg"><i style="background:${RV_YOU}"></i>You <i style="background:${RV_THEM}"></i>${esc(themName)}</span></div>
      <div class="rv-daywrap">${bars}</div>
      <div class="rv-daytip">Tap a day to see ${esc(themName)}'s food</div>
    </div>`;
  } else {
    // week by week (4 weeks, oldest→newest) + weeks-won tally
    const rows=[]; let mx=1; let meWon=0, themWon=0; const tk=todayKey();
    for(let off=3; off>=0; off--){
      const wdays=compCountDates(compWeekDaysFor(off));
      const a=rvAgg(me,wdays).points, b=rvAgg(them,wdays).points;
      const hasData=(a+b)>0;
      if(hasData){ if(a>=b)meWon++; else themWon++; }
      mx=Math.max(mx,a,b);
      rows.push({label:'W'+(4-off),a,b,current:off===0,hasData});
    }
    const bars=rows.map(r=>{
      const mh=Math.max(6,r.a/mx*70), th=Math.max(6,r.b/mx*70);
      return `<div class="rv-daycol">
        <div class="rv-daybars"><div style="height:${mh}px;background:${r.a>=r.b?RV_YOU:RV_YOU_LT}"></div><div style="height:${th}px;background:${r.b>r.a?RV_THEM:RV_THEM_LT}"></div></div>
        <span>${r.label}</span></div>`;
    }).join('');
    const wins=rows.map(r=>{
      const bg = !r.hasData ? '#EFE9DF' : (r.a>=r.b?RV_YOU:RV_THEM);
      return `<div class="rv-wincell" style="background:${bg};${r.current?'':''}"><span>${r.label}</span></div>`;
    }).join('');
    chart=`<div class="rv-card">
        <div class="rv-card-h rv-legend"><span>Week by week</span>
          <span class="rv-leg"><i style="background:${RV_YOU}"></i>You <i style="background:${RV_THEM}"></i>${esc(themName)}</span></div>
        <div class="rv-daywrap">${bars}</div>
      </div>
      <div class="rv-card">
        <div class="rv-card-h rv-legend"><span>Weeks won</span>
          <span class="rv-brow-v">You lead <b style="color:${RV_YOU}">${meWon}</b>–${themWon}</span></div>
        <div class="rv-winrow">${wins}</div>
      </div>`;
  }

  const toggle=`<div class="rv-toggle">
    <button data-m="week" class="${mode==='week'?'on':''}">This week</button>
    <button data-m="month" class="${mode==='month'?'on':''}">This month</button>
  </div>`;

  $('main').innerHTML =
    rvHeader('Rivals', `You & ${themName}`, true) +
    toggle + hero + breakdown + goalCard + chart;

  document.querySelectorAll('.rv-toggle button').forEach(bt=>bt.onclick=()=>{ rivalsMode=bt.dataset.m; rvRenderBoard(); });
  document.querySelectorAll('#main [data-rvday]').forEach(c=>c.onclick=()=>rvOpenDiary(them.id,themName,c.dataset.rvday));
}

/* ---- toast ---- */
function toastComp(msg){
  const t=el(`<div style="position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:200;
    background:var(--text);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;
    font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.2);max-width:80%;text-align:center">${esc(msg)}</div>`);
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},1900);
}

/* shortcut used by the Settings card */
function openLeaderboard(){ tab='rivals'; _rivalsStale=true; closeAllModals(); }


/* ---------- cloud sync (Supabase) ---------- */
function initCloud(){
  if(SUPABASE_URL && /^https?:\/\//.test(SUPABASE_URL) && window.supabase){
    try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); CLOUD=true; }catch(e){ CLOUD=false; }
  }
}
let _pushT=null;
function scheduleCloudPush(){ if(!CLOUD||!user)return; clearTimeout(_pushT); _pushT=setTimeout(pushCloud,800); }
async function pushCloud(){ if(!CLOUD||!user)return; try{ await sb.from('profiles').upsert({id:user.id,data:state,updated_at:new Date().toISOString()}); }catch(e){} }
let _rvPushT=null;
// keep a rival's scoreboard + diary fresh as you log, instead of only when you open the Rivals tab
function scheduleRivalsPush(){ if(!CLOUD||!user||!state.competition)return; clearTimeout(_rvPushT); _rvPushT=setTimeout(()=>{ compPushMine().catch(()=>{}); },1000); }
function hasData(){ return (state.entries&&state.entries.length)||(state.weights&&state.weights.length)||(state.exercise&&state.exercise.length)||(state.library&&state.library.length); }
async function loadCloudIntoState(){
  let row=null;
  try{ const r=await sb.from('profiles').select('data').eq('id',user.id).maybeSingle(); row=r.data; }catch(e){}
  if(row&&row.data){ state=Object.assign(structuredClone(DEFAULT),row.data); saveLocal(); }   // cloud wins
  else if(hasData()){ await pushCloud(); }                                                       // migrate this device's data up
}
async function onAuth(){
  if(user){ try{ await loadCloudIntoState(); }catch(e){} showApp(); }
  else showLogin();
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; try{localStorage.removeItem(KEY);}catch(e){} state=structuredClone(DEFAULT); showLogin(); }
function showApp(){
  const a=document.getElementById('auth-screen'); if(a)a.style.display='none';
  document.getElementById('app').style.display='';
  document.querySelector('.tabbar').style.display='';
  render(); layout();
}
function showLogin(){
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  applyTheme(state.settings.theme);
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML=`<div class="auth-wrap">
    <div class="auth-cat">${LOGO_SVG}</div>
    <div class="auth-logo">NomNom</div>
    <div class="auth-tag">Sign in to sync your food log across your devices.</div>
    <div id="auth-msg"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>
    <button class="btn btn-primary btn-block" id="auth-magic" style="margin-top:14px">Email me a sign-in link</button>
    <div class="auth-or">or</div>
    <button class="btn btn-block" id="auth-google">Continue with Google</button>
  </div>`;
  const msg=s.querySelector('#auth-msg');
  const redirect=location.href.split('#')[0].split('?')[0];
  s.querySelector('#auth-magic').onclick=async()=>{
    const email=s.querySelector('#auth-email').value.trim();
    if(!email){msg.innerHTML='<div class="err">Enter your email.</div>';return;}
    msg.innerHTML='<div class="hint">Sending…</div>';
    try{ const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:redirect}}); if(error)throw error;
      msg.innerHTML='<div class="note">Check your email for a sign-in link, then return here.</div>';
    }catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Could not send the link.')+'</div>'; }
  };
  s.querySelector('#auth-google').onclick=async()=>{
    msg.innerHTML='<div class="hint">Redirecting to Google…</div>';
    try{ const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirect}}); if(error)throw error; }
    catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Google sign-in failed.')+'</div>'; }
  };
}
async function boot(){
  initCloud();
  if(!CLOUD){ render(); layout(); return; }
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML='<div class="auth-wrap"><div class="auth-logo">NomNom</div><div class="auth-tag">Loading…</div></div>';
  try{
    const {data}=await sb.auth.getSession();
    user=(data&&data.session&&data.session.user)||null;
    sb.auth.onAuthStateChange((_e,sess)=>{ const u=(sess&&sess.user)||null; const changed=((u&&u.id)||null)!==((user&&user.id)||null); user=u; if(changed) onAuth(); });
    await onAuth();
  }catch(e){ CLOUD=false; document.getElementById('app').style.display=''; document.querySelector('.tabbar').style.display=''; render(); layout(); }
}

/* ---------- init ---------- */
document.querySelectorAll('.tabbar .tab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;if(tab==='today')viewDate=todayKey();if(tab==='rivals')_rivalsStale=true;closeAllModals();});
window.addEventListener('resize',layout);
window.addEventListener('orientationchange',()=>setTimeout(layout,250));
if(window.visualViewport)window.visualViewport.addEventListener('resize',layout);
window.addEventListener('load',layout);
// Guarantee a history buffer so the first back press is caught in-app (not sent to the
// previous page / app exit). replaceState normalizes the current entry first, so this
// works even when a relaunched PWA restored a persisted nomBase state.
try{ history.replaceState({nomRoot:1},''); }catch(_){}
_navBase();
boot();
</script>
