<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --font:'DM Sans',-apple-system,system-ui,sans-serif;
    --display:'Baloo 2','DM Sans',sans-serif;
    --header:#EF9CB4;
    --bg:linear-gradient(180deg,#FDEFF3,#FBE7EE);
    --surface:#FFFFFF;
    --text:#2B2A26;
    --text-soft:#9A938A;
    --divider:#EFE9DF;
    --accent:#EF9CB4;
    --accent-strong:#E37D9A;
    --accent-bg:#FBEFF4;
    --danger:#D67A8E;
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);background-attachment:fixed;color:var(--text);
    font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);}
  button{cursor:pointer;background:none;border:none;}
  input,select{background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--radius-sm);
    padding:11px 14px;width:100%;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  a{color:var(--accent-strong);}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 18px var(--reserve,160px);}

  .band{background:var(--header);margin:0 -18px;padding:16px 18px 20px;color:#fff;}
  .band-top{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:var(--display);font-weight:800;font-size:20px;color:#fff;}
  .gear{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;}
  .gear:active{background:rgba(255,255,255,.34);}
  .bandnav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .bandnav .navbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;line-height:1;}
  .bandnav .navbtn.off{opacity:.35;pointer-events:none;}
  .bandnav .d1{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;line-height:1;text-align:center;}
  .bandnav .d2{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;}
  .hero{text-align:center;margin-top:14px;}
  .hero-num{font-family:var(--display);font-weight:800;font-size:60px;color:#fff;line-height:.95;}
  .hero-label{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.03em;}
  .progress{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .progress .track{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;}
  .progress .fill{height:100%;background:rgba(255,255,255,.92);border-radius:6px;transition:width .3s ease;}
  .progress .pct{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;min-width:34px;text-align:right;}
  .statchips{display:flex;gap:10px;margin-top:12px;}
  .statchip{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:9px 8px;text-align:center;}
  .statchip .l{font-size:10px;color:rgba(255,255,255,.8);}
  .statchip .v{font-family:var(--display);font-weight:700;font-size:16px;color:#fff;margin-top:2px;}

  .card{background:var(--surface);border-radius:24px;padding:18px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-top:14px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text);}
  .card-sub{font-size:13px;color:var(--text-soft);}

  .macrocols{display:flex;gap:10px;}
  .macrocol{flex:1;}
  .macrocol .mv{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;}
  .macrocol .mv s{text-decoration:none;font-size:12px;font-weight:600;color:var(--text-soft);}
  .macrocol .ml{font-size:12px;color:var(--text-soft);margin:5px 0 6px;}
  .mbar{height:5px;border-radius:4px;background:#ECE6DB;overflow:hidden;}
  .mbar i{display:block;height:100%;}

  .mealgroup{padding-top:14px;}
  .meal-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-line .ml-left{display:flex;align-items:center;gap:8px;}
  .meal-dot{width:7px;height:7px;border-radius:50%;}
  .meal-name{font-weight:600;font-size:14px;color:var(--text);}
  .meal-sub{font-size:13px;color:var(--text-soft);}
  .fooditems{display:flex;flex-direction:column;gap:8px;}
  .fooditem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--accent-bg);border-radius:12px;padding:9px 13px;text-align:left;}
  .fooditem:active{filter:brightness(.96);}

  <div class="hint" id="sv-total"></div>`;

function wireServing(root,per,initGrams){
  const unitSel=root.querySelector('#sv-unit'),qty=root.querySelector('#sv-qty'),gpu=root.querySelector('#sv-gpu'),gpuWrap=root.querySelector('#sv-gpu-wrap'),total=root.querySelector('#sv-total');
  function grams(){return (+qty.value||0)*(+gpu.value||0);}
  function recompute(){const g=grams();total.textContent=`= ${r1(g)} g${per?` · ${r0(per.calories*g/100)} kcal`:''}`;}
  function syncUnit(){
    if(unitSel.value==='gram'){gpuWrap.style.display='none';gpu.value=1;qty.value=100;}
    else{const d=UNITS.find(x=>x.u===unitSel.value);gpuWrap.style.display='';gpu.value=d.g;qty.value=1;}
    recompute();
  }
  unitSel.onchange=syncUnit;qty.oninput=recompute;gpu.oninput=recompute;
  if(initGrams){unitSel.value='gram';gpuWrap.style.display='none';gpu.value=1;qty.value=r1(initGrams);}
  recompute();
  return {grams,desc:()=>{const u=unitSel.value,q=+qty.value||0;return u==='gram'?`${r1(grams())} g`:`${q} ${u} (${r1(grams())} g)`;}};
}

/* ---------- OpenNutrition food database (downloaded once, cached on device) ---------- */
const FOOD_DB_URL='opennutrition.json.gz';
const FOOD_DB_VERSION='2025.1';
let ONDB=null, ONBYEAN=null, _onPromise=null;
function _idb(){return new Promise((res,rej)=>{const r=indexedDB.open('nomnom_food',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function _idbGet(k){return _idb().then(d=>new Promise((res,rej)=>{const t=d.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error);}));}
function _idbSet(k,v){return _idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function ensureONDB(){
  if(ONDB) return Promise.resolve(ONDB);
  if(_onPromise) return _onPromise;
  _onPromise=(async()=>{
    let txt=null;
    try{const c=await _idbGet('food');if(c&&c.v===FOOD_DB_VERSION)txt=c.t;}catch(e){}
    if(!txt){
      const r=await fetch(FOOD_DB_URL);
      if(!r.ok) throw new Error('Could not load food database ('+r.status+').');
      const buf=await r.arrayBuffer();
      const u8=new Uint8Array(buf);
      if(u8[0]===0x1f && u8[1]===0x8b){ // gzip magic bytes → decompress
        if(typeof DecompressionStream==='undefined') throw new Error('This browser can\'t decompress the food database (needs Safari 16.4+ / a recent browser).');
        const stream=new Response(buf).body.pipeThrough(new DecompressionStream('gzip'));
        txt=await new Response(stream).text();
      }else{ // already plain JSON (server may have decompressed it)
        txt=new TextDecoder().decode(buf);
      }
      try{await _idbSet('food',{v:FOOD_DB_VERSION,t:txt});}catch(e){}
    }
    ONDB=JSON.parse(txt);
    ONBYEAN=new Map();
    for(const it of ONDB){if(it[7])ONBYEAN.set(it[7],it);}
    return ONDB;
  })();
  return _onPromise;
}

/* ---------- bottom-sheet helper (slide up + swipe down, like Settings) ---------- */
function makeSheet(innerHtml){
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    ${innerHtml}
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  let closed=false;
  const close=()=>{
    if(closed)return; closed=true;
    camStop();
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  let startY=0,dY=0,drag=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-startY;if(sheet.scrollTop<=0&&dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}},{passive:false});
  sheet.addEventListener('touchend',()=>{if(!drag){sheet.style.transition='';return;}drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}});
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  return {overlay,sheet,close};
}

function recentFoods(n){
  const seen=new Set(), out=[];
  for(let i=state.entries.length-1;i>=0 && out.length<n;i--){
    const e=state.entries[i]; const key=(e.name||'').toLowerCase();
    if(!e.name||seen.has(key))continue; seen.add(key);
    const sub=`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`;
    out.push({name:e.name,sub,entry:e});
  }
  return out;
}
function relogFood(r){
  state.entries.push(Object.assign({},r.entry,{id:uid(),date:viewDate,meal:defaultMeal()}));
  save();
}

/* ---------- ADD sheet (Food / Exercise tabs) ---------- */
$('fab').onclick=()=>openAdd();
function openAdd(){
  const sh=makeSheet(`
    <div class="seg addtabs" id="add-tabs">
      <button data-tab="food" class="on">Food</button>
      <button data-tab="exercise">Exercise</button>

    <div id="add-body"></div>`);

    camStop(); setTabs(true);

      <div class="add-search"><span class="as-ic">${IC_SEARCH}</span><input id="af-q" placeholder="Search for a food…" autocomplete="off"></div>

    const qEl=body.querySelector('#af-q'), main=body.querySelector('#af-main');
    const rowHtml=(name,sub,attr,ic)=>`<div class="recent-row" ${attr}><span class="recent-ic">${ic||IC_FORK}</span><div class="recent-main"><div class="rn">${esc(name)}</div><div class="rs">${esc(sub)}</div></div><button class="recent-add" tabindex="-1" aria-label="Add">${IC_PLUS}</button></div>`;
    function showHome(){
      const recents=recentFoods(8);
      main.innerHTML=`
        <div class="tiles">
          <button class="tile" id="af-scan"><span class="tile-ic">${IC_CAMERA}</span><span>Scan food</span></button>
          <button class="tile" id="af-bar"><span class="tile-ic">${IC_BARCODE}</span><span>Barcode</span></button>
          <button class="tile" id="af-lib"><span class="tile-ic">${IC_BOOK}</span><span>Library</span></button>
          <button class="tile" id="af-man"><span class="tile-ic">${IC_PEN}</span><span>Manual</span></button>
        </div>
        ${recents.length?`<div class="add-label">Recent</div><div>${recents.map((r,i)=>`<div class="recent-row"><span class="recent-ic">${IC_FORK}</span><div class="recent-main"><div class="rn">${esc(r.name)}</div><div class="rs">${esc(r.sub)}</div></div><button class="recent-add" data-rl="${i}" aria-label="Re-log">${IC_PLUS}</button></div>`).join('')}</div>`:''}`;
      main.querySelector('#af-scan').onclick=()=>renderScan();
      main.querySelector('#af-bar').onclick=()=>renderBarcode();
      main.querySelector('#af-lib').onclick=()=>renderLibrary();
      main.querySelector('#af-man').onclick=()=>renderManual();
      main.querySelectorAll('[data-rl]').forEach(b=>b.onclick=()=>{relogFood(recents[+b.dataset.rl]);sh.close();});
    }
    function showResults(term){
      const low=term.toLowerCase(), isBC=/^\d{8,14}$/.test(term);
      let html='';
      if(isBC) html+=`<div class="add-label">Barcode</div>`+rowHtml('Look up barcode '+term,'Search packaged products','data-bc="1"',IC_BARCODE);
      const libM=state.library.filter(l=>l.name.toLowerCase().includes(low)).slice(0,8);
      if(libM.length) html+=`<div class="add-label">Saved</div>`+libM.map(l=>{const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;return rowHtml(l.name,sub,`data-lib="${l.id}"`);}).join('');
      const dbM=(DB||[]).filter(f=>f.name.toLowerCase().includes(low)).slice(0,12);
      if(dbM.length) html+=`<div class="add-label">Local database</div>`+dbM.map((f,i)=>rowHtml(f.name,`${r0(f.calories)} kcal · ${esc(f.portion)}`,`data-db="${i}"`)).join('');
      let onM=[];
      if(low.length>=2){
        if(ONDB){ onM=ONDB.filter(a=>a[0].toLowerCase().includes(low)).slice(0,25); if(onM.length) html+=`<div class="add-label">OpenNutrition</div>`+onM.map((f,i)=>rowHtml(f[0],`${r0(f[1])} kcal/100g`,`data-on="${i}"`)).join(''); }
        else html+=`<div class="add-label">OpenNutrition</div><div class="empty" style="border:none" id="af-onload">Loading food database (first time, ~10 MB)…</div>`;
      }
      if(!isBC && low.length>=1) html+=`<div class="add-label">Not what you want?</div><button class="btn btn-block" id="af-ai" style="margin-top:2px">Estimate “${esc(term)}” with AI</button>`;
      if(!html) html=`<div class="empty" style="border:none">Type a food name to search or estimate with AI.</div>`;
      main.innerHTML=html;
      const aiBtn=main.querySelector('#af-ai'); if(aiBtn) aiBtn.onclick=()=>addItemView(async st=>{
        if(!state.settings.apiKey){ st.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to estimate foods with AI.</div><button class="btn btn-block" id="af-aiset" style="margin-top:10px">Open Settings</button>`; const b=st.querySelector('#af-aiset'); if(b)b.onclick=()=>{sh.close();setTimeout(openSettings,200);}; return; }
        st.innerHTML=`<div class="spinner">Estimating “${esc(term)}” with AI…</div>`;
        try{ const ai=await aiNutrition(term); if(!ai||!ai.per_100g||!(+ai.per_100g.calories)){ st.innerHTML=`<div class="err">AI couldn’t estimate that. Try a different name, or enter it manually.</div>`; return; } weighAndLog(null,st,ai.name||term,ai.per_100g,'ai',null,()=>sh.close()); }
        catch(e){ st.innerHTML=`<div class="err">${esc(e.message||'AI lookup failed.')}</div>`; }
      });
      const bc=main.querySelector('[data-bc]'); if(bc)bc.onclick=()=>addItemView(async st=>{ st.innerHTML=`<div class="spinner">Looking up…</div>`; const r=await barcodeLookup(term); if(!r){st.innerHTML=`<div class="err">No product found for barcode ${esc(term)}.</div>`;return;} weighAndLog(null,st,r.name,r.per,r.source,r.g,()=>sh.close()); });
      main.querySelectorAll('[data-lib]').forEach(n=>n.onclick=()=>{const l=state.library.find(x=>x.id===n.dataset.lib);addItemView(st=>{ if(l.perServing)logServing(null,st,l.name,l.perServing.calories,l.perServing.portion,'library',()=>sh.close()); else weighAndLog(null,st,l.name,l.per_100g,'library',l.lastGrams,()=>sh.close()); });});
      main.querySelectorAll('[data-db]').forEach(n=>n.onclick=()=>{const f=dbM[+n.dataset.db];addItemView(st=>logServing(null,st,f.name,f.calories,f.portion,'local',()=>sh.close()));});
      main.querySelectorAll('[data-on]').forEach(n=>n.onclick=()=>{const f=onM[+n.dataset.on];addItemView(st=>weighAndLog(null,st,f[0],{calories:f[1],protein_g:f[2],carbs_g:f[3],fat_g:f[4],sugar_g:f[5]},'opennutrition',f[6],()=>sh.close()));});
      if(low.length>=2 && !ONDB) ensureONDB().then(()=>{ if(qEl.value.trim()===term) showResults(term); }).catch(()=>{const ld=main.querySelector('#af-onload'); if(ld)ld.textContent='Couldn’t load the food database here.';});
    }
    qEl.oninput=()=>{ const t=qEl.value.trim(); t?showResults(t):showHome(); };
    showHome();
  }

  function renderScan(){
    camStop(); setTabs(false);
    if(!state.settings.apiKey){
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="sc-back">${IC_BACK}</button><h3>Scan food</h3></div>
        <div class="note">Add your Google Gemini API key in Settings to identify food from photos.</div>
        <button class="btn btn-primary btn-block" id="sc-set" style="margin-top:12px">Open Settings</button>`;
      body.querySelector('#sc-back').onclick=renderFood;
      body.querySelector('#sc-set').onclick=()=>{sh.close();setTimeout(openSettings,200);};
      return;
    }
    body.innerHTML=`
      <div class="sub-head"><button class="circ-back" id="sc-back">${IC_BACK}</button><h3>Scan food</h3></div>
      <div class="scan-frame" id="sc-frame"><video id="sc-video" playsinline muted></video><div class="corners"><span></span><span></span><span></span><span></span></div><div class="scan-line"></div><div class="scan-hint" id="sc-hint">Starting camera…</div></div>
      <button class="btn btn-primary btn-block" id="sc-shot" style="margin-top:14px">Capture photo</button>
      <button class="dashed-btn" id="sc-up">${IC_UPLOAD} Upload a photo instead</button>
      <input type="file" accept="image/*" id="sc-file" style="display:none">
      <div id="sc-stage"></div>`;
    const video=body.querySelector('#sc-video'), hint=body.querySelector('#sc-hint'), file=body.querySelector('#sc-file');
    body.querySelector('#sc-back').onclick=()=>{camStop();renderFood();};
    let live=false;
    camStart(video).then(ok=>{ live=ok; hint.textContent=ok?'Point your camera at your meal':'Camera unavailable — tap Capture to use your camera'; });
    async function analyze(b64){
      camStop();
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="sc-b2">${IC_BACK}</button><h3>Review &amp; add</h3></div><div id="sc-stage"><div class="spinner">Analyzing photo…</div></div>`;
      body.querySelector('#sc-b2').onclick=renderScan;
      const stage=body.querySelector('#sc-stage');
      try{
        const result=await analyzePhoto(b64);
        if(!result.items||!result.items.length){ stage.innerHTML=`<div class="err">No food detected. ${esc(result.assumptions||'')}</div><button class="btn btn-block" id="sc-rt" style="margin-top:10px">Try again</button>`; stage.querySelector('#sc-rt').onclick=renderScan; return; }
        showConfirm(null,stage,result,()=>sh.close());
      }catch(e){ stage.innerHTML=`<div class="err">${esc(e.message||'Request failed.')}</div><button class="btn btn-block" id="sc-rt" style="margin-top:10px">Try again</button>`; stage.querySelector('#sc-rt').onclick=renderScan; }
    }
    const nativeShot=()=>{ file.setAttribute('capture','environment'); file.click(); };
    body.querySelector('#sc-shot').onclick=()=>{ if(live&&_camStream){ analyze(camCapture(video)); } else { nativeShot(); } };
    body.querySelector('#sc-up').onclick=()=>{ file.removeAttribute('capture'); file.click(); };
    file.onchange=async(ev)=>{ const f=ev.target.files[0]; if(!f)return; camStop(); try{ analyze(await toJpegBase64(f)); }catch(e){ body.querySelector('#sc-stage').innerHTML=`<div class="err">Could not read that image.</div>`; } };
  }

  function renderBarcode(){
    camStop(); setTabs(false);
    let scanner=null, running=false;
    const stopScanner=()=>{ if(scanner&&running){ running=false; try{ return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{}); }catch(_){} } return Promise.resolve(); };
    body.innerHTML=`
      <div class="sub-head"><button class="circ-back" id="bc-back">${IC_BACK}</button><h3>Scan a barcode</h3></div>
      <div id="reader"></div>
      <div class="bc-hint" id="bc-hint">Point your camera at a product barcode</div>
      <div id="bc-stage"></div>`;
    const stage=body.querySelector('#bc-stage'), hint=body.querySelector('#bc-hint');
    body.querySelector('#bc-back').onclick=()=>{stopScanner();renderFood();};
    const onDetect=(txt)=>{ if(!running)return; stopScanner(); doLookup(txt); };
    const startScan=async()=>{
      if(typeof Html5Qrcode==='undefined'){ hint.textContent='Camera scanning isn’t available here — you can also type the barcode number into “Search for a food”.'; return; }
      await stopScanner();
      const opts={};
      if(typeof Html5QrcodeSupportedFormats!=='undefined'){
        opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];
      }
      try{
        scanner=new Html5Qrcode('reader',opts); running=true;
        hint.textContent='Point your camera at a product barcode';
        await scanner.start({facingMode:'environment'},
          {fps:10, qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};}, aspectRatio:1.3333, experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
          onDetect, ()=>{});
      }catch(e){ running=false; hint.textContent='Couldn’t start the camera — you can also type the barcode number into “Search for a food”.'; }
    };
    async function doLookup(code){
      stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
      const r=await barcodeLookup(code);
      if(!r){ stage.innerHTML=`<div class="err">No product found for that barcode. Scan again, or enter it manually.</div><button class="btn btn-block" id="bc-man" style="margin-top:10px">Enter manually</button><button class="btn btn-block" id="bc-again" style="margin-top:8px">Scan again</button>`; stage.querySelector('#bc-man').onclick=renderManual; stage.querySelector('#bc-again').onclick=renderBarcode; return; }
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="bc-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="bc-stage2"></div>`;
      body.querySelector('#bc-b2').onclick=renderBarcode;
      weighAndLog(null,body.querySelector('#bc-stage2'),r.name,r.per,r.source,r.g,()=>sh.close());
    }
    startScan();
  }

    lb.querySelectorAll('[data-lib]').forEach(b=>b.onclick=()=>{

      if(l.perServing)logServing(null,stage,l.name,l.perServing.calories,l.perServing.portion,'library',()=>sh.close());
      else weighAndLog(null,stage,l.name,l.per_100g,'library',l.lastGrams,()=>sh.close());
    });
  }

  function renderManual(){
    camStop(); setTabs(false);
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="mn-back">${IC_BACK}</button><h3>Enter manually</h3></div>

      <div class="mrow" style="margin-top:12px">
        <div class="mfield"><label>Serving</label><input type="number" inputmode="decimal" id="mn-amt" value="1"></div>
        <div class="mfield"><label>Unit</label><select id="mn-unit" class="munit">${UNITS.map(x=>`<option value="${x.u}"${x.u==='serving'?' selected':''}>${x.u}</option>`).join('')}</select></div>

      </div>

      <div class="mcal"><label>Calories</label><div class="calwrap"><input type="number" inputmode="numeric" id="mn-cal" placeholder="0"><span class="calu">kcal</span></div></div>

      if(body.querySelector('#mn-lib').checked && ps>0) addToLibrary(name,{calories:cal*100/ps,protein_g:p*100/ps,carbs_g:c*100/ps,fat_g:f*100/ps,sugar_g:0},ps);
      save();sh.close();
    };
  }

  function renderExercise(){
    camStop();
    const wkg=latestWeightKg();
    const acts=[...QUICK,...Object.keys(MET).filter(a=>!QUICK.includes(a))];
    let activity='Running',intensity='moderate',minutes=28;
    const calc=()=>Math.round(MET[activity][intensity]*(wkg||60)*(minutes/60));

    function chooseActivity(){
      setTabs(false);
      body.innerHTML=`
        <div class="sub-head"><button class="circ-back" id="ca-back">${IC_BACK}</button><h3>Choose activity</h3></div>
        <div class="chooser">${acts.map(a=>`<button class="choose-row${a===activity?' on':''}" data-a="${esc(a)}">

      body.querySelector('#ca-back').onclick=draw;

      body.innerHTML=`
        <button class="act-pick" id="ex-actbtn"><span class="act-ic">${actMeta(activity).ic}</span>

        <div class="add-card"><div class="add-card-h">Intensity</div>
          <div class="seg" id="ex-int">

            <button data-i="vigorous"${intensity==='vigorous'?' class="on"':''}>Vigorous</button>
          </div></div>
        <div class="add-card"><div class="dur-h"><span>Duration</span><span class="dur-v"><b id="ex-minv">${minutes}</b> min</span></div>
          <div class="dur-row"><button class="step" id="ex-dec">${IC_MINUS}</button>
            <div class="nn-slider" id="ex-slider"><div class="nn-track"></div><div class="nn-fill" id="ex-fill"></div><div class="nn-thumb" id="ex-thumb"></div></div>
            <button class="step" id="ex-inc">${IC_PLUS}</button></div></div>
        <div class="burned"><div class="burned-l">Calories burned</div>
          <div class="burned-n" id="ex-kcal">${calc()}</div>
          <div class="burned-s">kcal · estimated from intensity, time${wkg?' &amp; weight':''}</div></div>
        ${wkg?'':'<div class="hint" style="text-align:center;margin-top:8px">Using an estimated 60&nbsp;kg — log your weight for a more accurate burn.</div>'}
        <button class="btn btn-primary btn-block" id="ex-save" style="margin-top:16px">Save exercise</button>`;
      const MINm=5,MAXm=120;
      const sl=body.querySelector('#ex-slider'), fillEl=body.querySelector('#ex-fill'), thumbEl=body.querySelector('#ex-thumb');
      const place=()=>{const f=(minutes-MINm)/(MAXm-MINm);fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
      const paint=()=>{body.querySelector('#ex-minv').textContent=minutes;body.querySelector('#ex-kcal').textContent=calc();place();};
      const setFromX=(x)=>{const r=sl.getBoundingClientRect();let f=(x-r.left-13)/(r.width-26);f=Math.max(0,Math.min(1,f));minutes=Math.round(MINm+f*(MAXm-MINm));paint();};
      let dragging=false;
      sl.addEventListener('pointerdown',e=>{dragging=true;try{sl.setPointerCapture(e.pointerId);}catch(_){}setFromX(e.clientX);});
      sl.addEventListener('pointermove',e=>{if(dragging)setFromX(e.clientX);});
      sl.addEventListener('pointerup',()=>{dragging=false;});
      sl.addEventListener('pointercancel',()=>{dragging=false;});

      body.querySelector('#ex-actbtn').onclick=chooseActivity;

    draw();

async function barcodeLookup(code){
  code=String(code);
  try{ await ensureONDB(); const hit=ONBYEAN&&ONBYEAN.get(code); if(hit) return {name:hit[0],per:{calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]},source:'opennutrition',g:hit[6]}; }catch(e){}
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments`);
    const data=await res.json();
    if(data.product){ const n=data.product.nutriments||{}; return {name:data.product.product_name||('Item '+code),per:{calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)},source:'barcode'}; }
  }catch(e){}
  return null;
}

    if(term.length>=2 && !ONDB){

        .catch(()=>{const ld=libBox.querySelector('#on-load'); if(ld)ld.textContent='Couldn\'t load opennutrition.json — it must be uploaded next to the app (it won\'t load in the preview or a local file).';});
    }

  function offerAI(term){
    const wrap=el(`<div><div class="empty">No match in your library, the local database, or Open Food Facts for "${esc(term)}".</div><div class="field"><button class="btn btn-primary btn-block" id="sf-aigo">Estimate "${esc(term)}" with AI</button></div></div>`);
    res.innerHTML=''; res.appendChild(wrap);
    wrap.querySelector('#sf-aigo').onclick=()=>runAI(term);
  }
  async function runAI(term){
    if(!state.settings.apiKey){res.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to use AI lookup.</div>`;return;}
    res.innerHTML=`<div class="spinner">Asking AI…</div>`;

      const node=el(`<div class="row tappable"><div><div class="name">${esc(ai.name||term)}</div><div class="sub">${r0(ai.per_100g.calories)} kcal/100g · AI estimate</div></div></div>`);

  async function doSearch(){
    const term=q.value.trim(); if(!term)return;

      if(!prods.length){ if(localHas){res.innerHTML='';} else {offerAI(term);} return; }
      res.innerHTML=`<div class="section-label">Open Food Facts</div>`+prods.map((p,i)=>{
        const cal=r0(p.nutriments['energy-kcal_100g']);

      }).join('')+`<div class="field"><button class="btn btn-block" id="sf-aibtn">None of these — estimate with AI</button></div>`;

      res.querySelector('#sf-aifail').onclick=()=>runAI(term);

  q.oninput=renderLocal;
  q.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();doSearch();}};

/* ---------- PHOTO ---------- */
function loadImage(file){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);res(img);};img.onerror=rej;img.src=u;});}
async function toJpegBase64(file,maxDim=1100,q=0.8){
  const img=await loadImage(file);
  const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',q).split(',')[1];
}
let _camStream=null;
async function camStart(v){
  try{ _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false}); v.srcObject=_camStream; await v.play(); return true; }
  catch(e){ _camStream=null; return false; }
}
function camStop(){ if(_camStream){_camStream.getTracks().forEach(t=>t.stop());_camStream=null;} }
function camCapture(v){
  const w=v.videoWidth||1100,h=v.videoHeight||1100,sc=Math.min(1,1100/Math.max(w,h));
  const c=document.createElement('canvas'); c.width=Math.round(w*sc); c.height=Math.round(h*sc);
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',0.8).split(',')[1];
}

function genConfig(model){
  const cfg={responseMimeType:'application/json',maxOutputTokens:2048};
  if(/flash/i.test(model)) cfg.thinkingConfig={thinkingBudget:0}; // disable "thinking" so JSON isn't truncated
  return cfg;
}
async function analyzePhoto(b64){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const res=await fetch(url,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inline_data:{mime_type:'image/jpeg',data:b64}},
        {text:VISION_PROMPT}
      ]}],
      generationConfig:genConfig(model)
    })
  });
  if(!res.ok){
    let msg='Gemini API error '+res.status;
    try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Tap to try again, or use a clearer, closer photo.');
  let text=cand && cand.content && cand.content.parts ? cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim() : '';
  if(!text)throw new Error('Empty response from Gemini. Try again or enter the food manually.');
  text=text.replace(/```json|```/g,'').trim();
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }
  catch(err){ throw new Error('Could not read the AI response (it may have been cut off). Please try again.'); }
}
async function aiNutrition(name){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const prompt=`Give typical nutrition per 100 grams for this food, assuming the common Singapore version if relevant: "${name}". Respond with ONLY JSON, no markdown: {"name":"","per_100g":{"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"sugar_g":0}}. If it is not a food, set calories to 0.`;
  const res=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:genConfig(model)})});
  if(!res.ok){let msg='Gemini API error '+res.status;try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}throw new Error(msg);}
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Please try again.');
  let text=cand&&cand.content&&cand.content.parts?cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim():'';
  text=text.replace(/```json|```/g,'').trim();const s=text.indexOf('{'),e=text.lastIndexOf('}');if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }catch(err){ throw new Error('Could not read the AI response. Please try again.'); }
}

/* ---------- BARCODE ---------- */
function openBarcode(){
  const m=openModal('Scan a barcode',`
    <div id="reader"></div>
    <div class="bc-hint" id="bc-hint">Point your camera at a product barcode</div>
    <div id="bc-stage"></div>
  `);
  const stage=m.querySelector('#bc-stage'), hint=m.querySelector('#bc-hint');
  let scanner=null, running=false;
  const stopScanner=()=>{ if(scanner&&running){running=false;try{return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{});}catch(_){}} return Promise.resolve(); };
  const startScan=async()=>{
    if(typeof Html5Qrcode==='undefined'){hint.textContent='Camera scanning isn’t available here — type the barcode number into “Search for a food”.';return;}
    await stopScanner();
    const opts={};
    if(typeof Html5QrcodeSupportedFormats!=='undefined'){opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];}
    try{
      scanner=new Html5Qrcode('reader',opts); running=true;
      await scanner.start({facingMode:'environment'},
        {fps:10,qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};},aspectRatio:1.3333,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
        (txt)=>{ if(!running)return; stopScanner(); doLookup(txt); },()=>{});
    }catch(e){running=false;hint.textContent='Couldn’t start the camera — type the barcode number into “Search for a food”.';}
  };
  async function doLookup(code){
    await stopScanner();
    m.querySelector('#reader').innerHTML='';
    stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
    const r=await barcodeLookup(code);
    if(!r){stage.innerHTML=`<div class="err">Product not found in OpenNutrition or Open Food Facts. Try entering it manually.</div><div class="btn-row"><button class="btn" id="man">Enter manually</button></div>`;stage.querySelector('#man').onclick=()=>{m.remove();openManual();};return;}
    weighAndLog(m,stage,r.name,r.per,r.source,r.g);
  }
  startScan();
}

/* edit/delete a food entry */
function editFood(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;

  const qtyNow=perServing&&e.unitCal?e.calories/e.unitCal:1;

  const amountField=perServing
    ? `<div class="field"><label>Quantity (number of ${esc(e.portion||'serving')})</label><input type="number" inputmode="decimal" id="ef-q" value="${r1(qtyNow)}"></div>

    ${mealChips(e.meal||defaultMeal())}

    <div class="field"><button class="btn btn-danger btn-block" id="ef-del">Delete entry</button></div>
  `);
  const getMeal=wireMealChips(m.querySelector('#m-body'));
  m.querySelector('#ef-save').onclick=()=>{

      ${[7,30,90,9999].map(r=>`<button class="chip${chartRange===r?' sel':''}" data-r="${r}">${r===9999?'All':r+'d'}</button>`).join('')}
    </div>
    <div class="toggle-row"><input type="checkbox" id="trend" ${showTrend?'checked':''} style="width:auto"><label for="trend" style="margin:0">7-day trend line</label></div>`;
  area.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{chartRange=+b.dataset.r;drawChartArea();});
  area.querySelector('#trend').onchange=(e)=>{showTrend=e.target.checked;drawChartArea();};
}
function chartSVG(){
  const all=[...state.weights].sort((a,b)=>a.date<b.date?-1:1);
  if(all.length<1)return `<div class="empty" style="border:none">Log a few mornings to see your trend.</div>`;
  const cutoff=chartRange>=9999?'0000':new Date(Date.now()-chartRange*864e5).toISOString().slice(0,10);
  const pts=all.filter(w=>w.date>=cutoff);
  if(pts.length<2)return `<div class="empty" style="border:none">Need at least two weigh-ins in this range.</div>`;
  const W=520,H=240,padL=38,padR=10,padT=14,padB=26;
  const xs=pts.map(p=>new Date(p.date).getTime());
  const ys=pts.map(p=>p.weight);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=(maxY-minY)*0.15||1;minY-=pad;maxY+=pad;
  const X=t=>padL+(maxX===minX?0:(t-minX)/(maxX-minX))*(W-padL-padR);
  const Y=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  // gridlines
  let grid='';const ticks=4;
  for(let i=0;i<=ticks;i++){const v=minY+(maxY-minY)*i/ticks;const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--divider)" stroke-width="1"/>`;
    grid+=`<text x="0" y="${y+4}" font-size="11" fill="var(--text-soft)">${r1(v)}</text>`;}
  // trend (7-day moving avg)
  let trendPath='';
  if(showTrend){
    const tp=pts.map((p,i)=>{const d0=new Date(p.date).getTime();
      const win=pts.filter(q=>{const d=new Date(q.date).getTime();return d<=d0&&d>d0-7*864e5;});
      const avg=win.reduce((s,q)=>s+q.weight,0)/win.length;return [X(d0),Y(avg)];});
    trendPath=`<polyline fill="none" stroke="var(--accent)" stroke-opacity="0.4" stroke-width="3" points="${tp.map(p=>p.join(',')).join(' ')}"/>`;
  }
  const line=pts.map(p=>`${X(new Date(p.date).getTime())},${Y(p.weight)}`).join(' ');
  const dots=pts.map(p=>{const x=X(new Date(p.date).getTime()),y=Y(p.weight);return `<rect x="${x-2.5}" y="${y-2.5}" width="5" height="5" fill="var(--accent)"/>`;}).join('');
  const first=new Date(pts[0].date).toLocaleDateString(undefined,{day:'numeric',month:'short'});
  const last=new Date(pts[pts.length-1].date).toLocaleDateString(undefined,{day:'numeric',month:'short'});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    ${grid}
    ${trendPath}
    <polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${line}"/>
    ${dots}
    <text x="${padL}" y="${H-6}" font-size="11" fill="var(--text-soft)">${first}</text>
    <text x="${W-padR}" y="${H-6}" font-size="11" fill="var(--text-soft)" text-anchor="end">${last}</text>
  </svg>`;
}

/* ---------- PLAN ---------- */
function renderPlan(){
  const p=state.profile;const wkg=latestWeightKg();
  const gwInit = (p.goalWeight!=null) ? p.goalWeight : (wkg ? Math.round(wkg*10)/10 : null);
  $('main').innerHTML=`
    <div class="topbar"><div><h1>Plan</h1><div class="date">Daily calorie target</div></div><button class="gear" id="open-settings-p">${GEAR_SVG}</button></div>
    <div class="field"><label>Sex</label>
      <div class="chips" id="p-sex">
        <button class="chip${p.sex==='male'?' sel':''}" data-sex="male">Male</button>
        <button class="chip${p.sex==='female'?' sel':''}" data-sex="female">Female</button>
      </div></div>
    <div class="field-row">
      <div class="field"><label>Age</label><input type="number" inputmode="numeric" id="p-age" value="${p.age||''}"></div>
      <div class="field"><label>Height (cm)</label><input type="number" inputmode="decimal" id="p-ht" value="${p.height||''}"></div>
    </div>
    <div class="field"><label>Current weight (kg)</label><input type="number" inputmode="decimal" id="p-wt" value="${wkg?r1(wkg):''}" placeholder="${wkg?'':'log weight or type it'}"></div>
    <div class="field"><label>Activity (baseline, not counting workouts)</label>
      <select id="p-act">
        <option value="1.2">Sedentary — little/no exercise</option>
        <option value="1.375">Lightly active — 1–3 days/week</option>
        <option value="1.55">Moderately active — 3–5 days/week</option>
        <option value="1.725">Very active — 6–7 days/week</option>
        <option value="1.9">Extra active — physical job</option>
      </select></div>
    <div class="field"><label>Goal</label>
      <div class="chips" id="p-goal">
        <button class="chip${p.goal==='maintain'?' sel':''}" data-goal="maintain">Maintain</button>
        <button class="chip${p.goal==='lose'?' sel':''}" data-goal="lose">Lose</button>
      </div></div>
    <div class="field" id="p-goalw-wrap" style="${p.goal==='lose'?'':'display:none'}"><label>Goal weight (kg)</label>
      <div class="stepper">
        <button type="button" id="p-gw-dn" aria-label="Decrease goal weight">−</button>
        <input type="number" inputmode="decimal" step="0.1" id="p-gw" value="${gwInit!=null?gwInit.toFixed(1):''}" placeholder="set a target">
        <button type="button" id="p-gw-up" aria-label="Increase goal weight">+</button>
      </div></div>
    <div class="field" id="p-rate-wrap" style="${p.goal==='lose'?'':'display:none'}"><label>Rate</label>
      <div class="chips" id="p-rate">
        <button class="chip${p.lossRate===250?' sel':''}" data-rate="250">Gentle · ~0.25 kg/wk</button>
        <button class="chip${p.lossRate!==250?' sel':''}" data-rate="500">Standard · ~0.5 kg/wk</button>
      </div></div>
    <div class="note">Workouts are credited separately on Today, so set activity to your baseline to avoid double-counting.</div>
    <div id="p-out"></div>
  `;
  $('p-act').value=String(p.activity);
  let sex=p.sex,goal=p.goal,rate=p.lossRate,gw=gwInit;
  const sync=()=>{
    p.sex=sex;p.goal=goal;p.lossRate=rate;
    p.age=+$('p-age').value||'';p.height=+$('p-ht').value||'';p.activity=+$('p-act').value;
    save();compute();
  };
  $('open-settings-p').onclick=openSettings;
  document.querySelectorAll('#p-sex .chip').forEach(c=>c.onclick=()=>{sex=c.dataset.sex;document.querySelectorAll('#p-sex .chip').forEach(x=>x.classList.toggle('sel',x===c));sync();});
  document.querySelectorAll('#p-goal .chip').forEach(c=>c.onclick=()=>{goal=c.dataset.goal;document.querySelectorAll('#p-goal .chip').forEach(x=>x.classList.toggle('sel',x===c));$('p-rate-wrap').style.display=goal==='lose'?'':'none';$('p-goalw-wrap').style.display=goal==='lose'?'':'none';sync();});
  document.querySelectorAll('#p-rate .chip').forEach(c=>c.onclick=()=>{rate=+c.dataset.rate;document.querySelectorAll('#p-rate .chip').forEach(x=>x.classList.toggle('sel',x===c));sync();});
  function setGw(v){
    if(v==null||isNaN(v)){gw=null;}
    else{gw=Math.min(250,Math.max(30,Math.round(v*10)/10));}
    $('p-gw').value=gw!=null?gw.toFixed(1):'';
    p.goalWeight=gw;save();compute();
  }
  $('p-gw-dn').onclick=()=>setGw((gw!=null?gw:(+$('p-wt').value||60))-0.1);
  $('p-gw-up').onclick=()=>setGw((gw!=null?gw:(+$('p-wt').value||60))+0.1);
  $('p-gw').oninput=()=>{const v=parseFloat($('p-gw').value);gw=isNaN(v)?null:v;p.goalWeight=gw;save();compute();};
  $('p-gw').onblur=()=>{if(gw!=null)setGw(gw);};
  ['p-age','p-ht','p-wt','p-act'].forEach(id=>$(id).oninput=sync);
  function compute(){
    const age=+$('p-age').value,ht=+$('p-ht').value,wt=+$('p-wt').value,act=+$('p-act').value;
    const out=$('p-out');
    if(!age||!ht||!wt){out.innerHTML=`<div class="hint">Fill in age, height, and weight to calculate.</div>`;return;}
    const bmr=10*wt+6.25*ht-5*age+(sex==='male'?5:-161);
    const tdee=bmr*act;
    let target=goal==='lose'?tdee-rate:tdee;
    const floor=sex==='male'?1500:1200;
    let clamped=false;
    if(target<floor){target=floor;clamped=true;}
    let proj='';
    if(goal==='lose'&&gw!=null&&rate>0&&gw<wt){
      const perWk=rate/1000;
      const wks=(wt-gw)/perWk;
      const d=new Date(Date.now()+wks*7*86400000);
      const ds=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      proj=`<div class="note">At ~${perWk} kg/week, reaching ${gw.toFixed(1)} kg from ${r1(wt)} kg takes about ${Math.ceil(wks)} weeks — around ${ds}. (Estimate; real loss varies.)</div>`;
    } else if(goal==='lose'&&gw!=null&&gw>=wt){
      proj=`<div class="note">Your goal weight (${gw.toFixed(1)} kg) isn't below your current weight of ${r1(wt)} kg.</div>`;
    }
    out.innerHTML=`
      <div class="budget" style="border-bottom:none">
        <div class="big">${r0(target)}</div>
        <div class="biglabel">calories per day${goal==='lose'?' to lose weight':' to maintain'}</div>
        <div class="bd"><div><b>${r0(tdee)}</b>maintenance</div><div><b>${r0(bmr)}</b>BMR</div></div>
      </div>
      ${clamped?`<div class="note">That deficit would fall below a safe minimum, so the target is held at ${floor}. Consider a gentler rate.</div>`:''}
      ${proj}
      <div class="field"><button class="btn btn-primary btn-block" id="p-set">Set as daily target</button></div>`;
    $('p-set').onclick=()=>{state.settings.dailyTarget=r0(target);save();alert('Daily target set to '+r0(target)+' kcal.');};
  }
  compute();
}

/* ---------- SETTINGS ---------- */
function openSettings(){
  const s=state.settings;
  const presets=Object.keys(THEMES).map(id=>{
    const t=THEMES[id];
    return `<button class="preset${s.theme===id?' sel':''}" data-theme="${id}">
      <span class="preset-sw" style="background:${t.sw}"></span>
      <span><span class="pn">${t.name}</span><span class="pd">${t.desc}</span></span>
    </button>`;
  }).join('');
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    <h2>Settings</h2>
    <div class="sub-h">Theme</div>
    ${presets}
    <div class="sub-h">AI &amp; data</div>
    <div class="field"><label>Google Gemini API key</label>
      <input type="password" id="s-key" value="${esc(s.apiKey)}" placeholder="AIza..."></div>
    <div class="hint">Stored only on this device. Used for photo food recognition. Create one free in Google AI Studio.</div>
    <div class="field"><label>Gemini model</label>
      <input id="s-model" value="${esc(s.model)}" placeholder="gemini-2.5-flash"></div>
    <div class="hint">e.g. gemini-2.5-flash or gemini-3.5-flash, depending on your key's access.</div>
    <div class="field-row">
      <div class="field"><label>Weight unit</label><select id="s-wu"><option value="kg">kg</option><option value="lb">lb</option></select></div>
      <div class="field"><label>Height unit</label><select id="s-hu"><option value="cm">cm</option><option value="in">in</option></select></div>
    </div>
    <div class="field"><label>Daily calorie target</label><input type="number" inputmode="numeric" id="s-target" value="${s.dailyTarget||''}" placeholder="set here or in Plan"></div>
    <div class="field"><button class="btn btn-primary btn-block" id="s-save">Save settings</button></div>
    ${(CLOUD&&user)?`<div class="sub-h">Account</div><div class="hint">Signed in as ${esc(user.email||'your account')}. Your data syncs to the cloud.</div><div class="field"><button class="btn btn-block" id="s-signout">Sign out</button></div>`:''}
    <div class="sub-h">Data</div>
    <div class="btn-row"><button class="btn" id="s-export">Export JSON</button><button class="btn btn-danger" id="s-clear">Clear all data</button></div>
    <div class="sub-h">Food database</div>
    <div class="hint" id="s-dbinfo">The full OpenNutrition database (326,000+ foods, incl. barcodes) downloads once (~10 MB) and is cached on this device for offline search and barcode lookup.</div>
    <div class="field"><button class="btn btn-block" id="s-dbget">Download for offline use</button></div>
    <div class="sub-h">About &amp; credits</div>
    <div class="hint">Food data from <a href="https://www.opennutrition.app" target="_blank" rel="noopener">OpenNutrition</a> (Open Database License) and <a href="https://world.openfoodfacts.org" target="_blank" rel="noopener">Open Food Facts</a> contributors. Local Singapore dishes from a public calorie chart. AI estimates and photo analysis use Google Gemini. Calorie and macro values are approximate.</div>
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  // slide-up entry
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  const close=()=>{
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  // swipe-down to dismiss
  let startY=0,dY=0,drag=false;
  // touch: drag down from anywhere when the sheet is scrolled to the top (native bottom-sheet feel)
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-startY;
    if(sheet.scrollTop<=0 && dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}
  },{passive:false});
  sheet.addEventListener('touchend',()=>{
    if(!drag){sheet.style.transition='';return;}
    drag=false;sheet.style.transition='transform .25s ease';
    if(dY>90){close();}else{sheet.style.transform='translateY(0)';}
  });
  // mouse: drag the grip handle (desktop)
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);
    const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  overlay.querySelector('#s-wu').value=s.weightUnit;
  overlay.querySelector('#s-hu').value=s.heightUnit;
  (function(){
    const info=overlay.querySelector('#s-dbinfo'), btn=overlay.querySelector('#s-dbget');
    if(ONDB){info.textContent=`Cached on this device ✓ — ${ONDB.length.toLocaleString()} foods available offline.`;btn.style.display='none';}
    btn.onclick=async()=>{
      btn.disabled=true;btn.textContent='Downloading…';
      try{await ensureONDB();info.textContent=`Cached on this device ✓ — ${ONDB.length.toLocaleString()} foods available offline.`;btn.style.display='none';}
      catch(e){btn.disabled=false;btn.textContent='Download for offline use';info.textContent='Couldn\'t load opennutrition.json. It must be uploaded in the same folder as the app and served over https (it won\'t load in the in-chat preview or from a local file).';}
    };
  })();
  // theme presets — apply live on tap
  overlay.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{
    s.theme=b.dataset.theme;save();applyTheme(s.theme);
    overlay.querySelectorAll('.preset').forEach(p=>p.classList.toggle('sel',p===b));
  });
  overlay.querySelector('#s-save').onclick=()=>{
    s.apiKey=overlay.querySelector('#s-key').value.trim();
    s.model=overlay.querySelector('#s-model').value.trim()||'gemini-2.5-flash';
    s.weightUnit=overlay.querySelector('#s-wu').value;
    s.heightUnit=overlay.querySelector('#s-hu').value;
    s.dailyTarget=+overlay.querySelector('#s-target').value||null;
    save();close();
  };
  overlay.querySelector('#s-export').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nomnom-data.json';a.click();
  };
  const so=overlay.querySelector('#s-signout'); if(so)so.onclick=()=>{overlay.remove();signOut();};
  overlay.querySelector('#s-clear').onclick=()=>{if(confirm('Erase all data? This cannot be undone.')){localStorage.removeItem(KEY);state=structuredClone(DEFAULT);if(CLOUD&&user){saveLocal();pushCloud();}close();}};
}

/* ---------- cloud sync (Supabase) ---------- */
function initCloud(){
  if(SUPABASE_URL && /^https?:\/\//.test(SUPABASE_URL) && window.supabase){
    try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); CLOUD=true; }catch(e){ CLOUD=false; }
  }
}
let _pushT=null;
function scheduleCloudPush(){ if(!CLOUD||!user)return; clearTimeout(_pushT); _pushT=setTimeout(pushCloud,800); }
async function pushCloud(){ if(!CLOUD||!user)return; try{ await sb.from('profiles').upsert({id:user.id,data:state,updated_at:new Date().toISOString()}); }catch(e){} }
function hasData(){ return (state.entries&&state.entries.length)||(state.weights&&state.weights.length)||(state.exercise&&state.exercise.length)||(state.library&&state.library.length); }
async function loadCloudIntoState(){
  let row=null;
  try{ const r=await sb.from('profiles').select('data').eq('id',user.id).maybeSingle(); row=r.data; }catch(e){}
  if(row&&row.data){ state=Object.assign(structuredClone(DEFAULT),row.data); saveLocal(); }   // cloud wins
  else if(hasData()){ await pushCloud(); }                                                       // migrate this device's data up
}
async function onAuth(){
  if(user){ try{ await loadCloudIntoState(); }catch(e){} showApp(); }
  else showLogin();
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; try{localStorage.removeItem(KEY);}catch(e){} state=structuredClone(DEFAULT); showLogin(); }
function showApp(){
  const a=document.getElementById('auth-screen'); if(a)a.style.display='none';
  document.getElementById('app').style.display='';
  document.querySelector('.tabbar').style.display='';
  render(); layout();
}
function showLogin(){
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  applyTheme(state.settings.theme);
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML=`<div class="auth-wrap">
    <div class="auth-logo">NomNom</div>
    <div class="auth-tag">Sign in to sync your food log across your devices.</div>
    <div id="auth-msg"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>
    <button class="btn btn-primary btn-block" id="auth-magic" style="margin-top:14px">Email me a sign-in link</button>
    <div class="auth-or">or</div>
    <button class="btn btn-block" id="auth-google">Continue with Google</button>
  </div>`;
  const msg=s.querySelector('#auth-msg');
  const redirect=location.href.split('#')[0].split('?')[0];
  s.querySelector('#auth-magic').onclick=async()=>{
    const email=s.querySelector('#auth-email').value.trim();
    if(!email){msg.innerHTML='<div class="err">Enter your email.</div>';return;}
    msg.innerHTML='<div class="hint">Sending…</div>';
    try{ const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:redirect}}); if(error)throw error;
      msg.innerHTML='<div class="note">Check your email for a sign-in link, then return here.</div>';
    }catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Could not send the link.')+'</div>'; }
  };
  s.querySelector('#auth-google').onclick=async()=>{
    msg.innerHTML='<div class="hint">Redirecting to Google…</div>';
    try{ const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirect}}); if(error)throw error; }
    catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Google sign-in failed.')+'</div>'; }
  };
}
async function boot(){
  initCloud();
  if(!CLOUD){ render(); layout(); return; }
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML='<div class="auth-wrap"><div class="auth-logo">NomNom</div><div class="auth-tag">Loading…</div></div>';
  try{
    const {data}=await sb.auth.getSession();
    user=(data&&data.session&&data.session.user)||null;
    sb.auth.onAuthStateChange((_e,sess)=>{ const u=(sess&&sess.user)||null; const changed=((u&&u.id)||null)!==((user&&user.id)||null); user=u; if(changed) onAuth(); });
    await onAuth();
  }catch(e){ CLOUD=false; document.getElementById('app').style.display=''; document.querySelector('.tabbar').style.display=''; render(); layout(); }
}

/* ---------- init ---------- */
document.querySelectorAll('.tabbar .tab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;if(tab==='today')viewDate=todayKey();closeAllModals();});
window.addEventListener('resize',layout);
window.addEventListener('orientationchange',()=>setTimeout(layout,250));
if(window.visualViewport)window.visualViewport.addEventListener('resize',layout);
window.addEventListener('load',layout);
boot();
</script>
