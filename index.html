<title>NomNom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --font:'DM Sans',-apple-system,system-ui,sans-serif;
    --display:'Baloo 2','DM Sans',sans-serif;
    --header:#EF9CB4;
    --bg:linear-gradient(180deg,#FDEFF3,#FBE7EE);
    --surface:#FFFFFF;
    --text:#2B2A26;
    --text-soft:#9A938A;
    --divider:#EFE9DF;
    --accent:#EF9CB4;
    --accent-strong:#E37D9A;
    --accent-bg:#FBEFF4;
    --danger:#D67A8E;
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);background-attachment:fixed;color:var(--text);
    font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);}
  button{cursor:pointer;background:none;border:none;}
  input,select{background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--radius-sm);
    padding:11px 14px;width:100%;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  a{color:var(--accent-strong);}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 18px var(--reserve,160px);}

  .band{background:var(--header);margin:0 -18px;padding:16px 18px 20px;color:#fff;}
  .band-top{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:800;font-size:20px;color:#fff;}
  .logo-cat{width:30px;height:30px;flex:0 0 auto;display:inline-flex;}
  .logo-cat svg,.auth-cat svg{width:100%;height:100%;display:block;}
  .gear{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;}
  .gear:active{background:rgba(255,255,255,.34);}
  .bandnav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .bandnav .navbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;line-height:1;}
  .bandnav .navbtn.off{opacity:.35;pointer-events:none;}
  .bandnav .d1{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;line-height:1;text-align:center;}
  .bandnav .d2{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;}
  .hero{text-align:center;margin-top:14px;}
  .hero-num{font-family:var(--display);font-weight:800;font-size:60px;color:#fff;line-height:.95;}
  .hero-label{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.03em;}
  .progress{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .progress .track{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;}
  .progress .fill{height:100%;background:rgba(255,255,255,.92);border-radius:6px;transition:width .3s ease;}
  .progress .pct{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;min-width:34px;text-align:right;}
  .statchips{display:flex;gap:10px;margin-top:12px;}
  .statchip{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:9px 8px;text-align:center;}
  .statchip .l{font-size:10px;color:rgba(255,255,255,.8);}
  .statchip .v{font-family:var(--display);font-weight:700;font-size:16px;color:#fff;margin-top:2px;}

  .card{background:var(--surface);border-radius:24px;padding:18px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-top:14px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text);}
  .card-sub{font-size:13px;color:var(--text-soft);}

  .macrocols{display:flex;gap:10px;}
  .macrocol{flex:1;}
  .macrocol .mv{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;}
  .macrocol .mv s{text-decoration:none;font-size:12px;font-weight:600;color:var(--text-soft);}
  .macrocol .ml{font-size:12px;color:var(--text-soft);margin:5px 0 6px;}
  .mbar{height:5px;border-radius:4px;background:#ECE6DB;overflow:hidden;}
  .mbar i{display:block;height:100%;}

  .mealgroup{padding-top:14px;}
  .meal-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-line .ml-left{display:flex;align-items:center;gap:8px;}
  .meal-dot{width:7px;height:7px;border-radius:50%;}
  .meal-name{font-weight:600;font-size:14px;color:var(--text);}
  .meal-sub{font-size:13px;color:var(--text-soft);}
  .fooditems{display:flex;flex-direction:column;gap:8px;}
  .fooditem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--accent-bg);border-radius:12px;padding:9px 13px;text-align:left;}
  .fooditem:active{filter:brightness(.96);}
  .fooditem .fi-name{font-weight:600;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fooditem .fi-sub{font-size:12.5px;color:var(--text-soft);margin-top:1px;}
  .fooditem .fi-right{display:flex;align-items:center;gap:8px;flex:none;}
  .fooditem .fi-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}
  .chev{color:#C9C2B6;flex:none;}

  .act-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid #F0EAE0;cursor:pointer;}
  .act-item.first{border-top:none;padding-top:2px;}
  .act-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-bg);
    display:flex;align-items:center;justify-content:center;color:var(--accent-strong);flex:none;}
  .act-name{font-weight:600;font-size:14px;color:var(--text);}
  .act-sub{font-size:13px;color:var(--text-soft);}
  .act-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}

  .topbar{background:var(--header);margin:0 -18px;padding:16px 18px 18px;color:#fff;
    display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-family:var(--display);font-size:20px;font-weight:800;margin:0;color:#fff;}
  .topbar .date{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px;}
  .topbar .gear{flex:none;}

  .budget{background:var(--surface);border-radius:var(--radius);box-shadow:0 3px 14px rgba(43,42,38,.05);padding:22px;margin-top:14px;}
  .budget .big{font-family:var(--display);font-size:50px;font-weight:800;line-height:1;color:var(--accent-strong);}
  .budget .biglabel{font-size:13px;color:var(--text-soft);margin-top:6px;}
  .budget .bd{display:flex;gap:22px;margin-top:18px;font-size:13px;color:var(--text-soft);}
  .budget .bd b{display:block;color:var(--text);font-weight:700;font-size:16px;font-family:var(--display);}

  .section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);padding:20px 4px 6px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:13px 16px;margin-top:9px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:0 3px 14px rgba(43,42,38,.05);}
  .row .name{font-weight:600;}
  .row .sub{font-size:13px;color:var(--text-soft);margin-top:2px;}
  .row .val{font-weight:700;white-space:nowrap;color:var(--accent-strong);font-family:var(--display);}
  .row.tappable:active{filter:brightness(.97);}
  .empty{padding:18px;color:var(--text-soft);font-size:14px;background:var(--surface);border-radius:var(--radius-sm);margin-top:9px;}
  .daynav{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;margin-top:9px;background:var(--surface);border-radius:999px;}
  .daynav .arrow{font-size:22px;color:var(--accent-strong);font-weight:800;padding:6px 22px;}
  .daynav .arrow.off{color:var(--divider);pointer-events:none;}
  .daynav .dlabel{font-weight:700;font-size:16px;font-family:var(--display);}
  .mealhead{display:flex;justify-content:space-between;align-items:baseline;padding:20px 6px 2px;}
  .mealhead .mt{font-size:13px;font-weight:700;color:var(--accent-strong);font-family:var(--display);}
  .mealhead .ms{font-size:13px;color:var(--text-soft);}

  .btn{display:inline-block;border:1.5px solid var(--divider);border-radius:999px;padding:13px 18px;
    font-weight:700;text-align:center;background:var(--surface);color:var(--text);}
  .btn:active{filter:brightness(.97);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}

const FOOD_DB_URL='opennutrition.json.gz';
const FOOD_DB_VERSION='2025.1';
let ONDB=null, ONBYEAN=null, _onPromise=null;
function _idb(){return new Promise((res,rej)=>{const r=indexedDB.open('nomnom_food',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function _idbGet(k){return _idb().then(d=>new Promise((res,rej)=>{const t=d.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error);}));}
function _idbSet(k,v){return _idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function _idbDel(k){return _idb().then(d=>new Promise((res,rej)=>{const tx=d.transaction('kv','readwrite');tx.objectStore('kv').delete(k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function ensureONDB(){
  if(ONDB) return Promise.resolve(ONDB);
  if(_onPromise) return _onPromise;
  _onPromise=(async()=>{
    let txt=null;
    try{const c=await _idbGet('food');if(c&&c.v===FOOD_DB_VERSION)txt=c.t;}catch(e){}
    if(!txt){
      const r=await fetch(FOOD_DB_URL);
      if(!r.ok) throw new Error('Could not load food database ('+r.status+').');
      const buf=await r.arrayBuffer();
      const u8=new Uint8Array(buf);
      if(u8[0]===0x1f && u8[1]===0x8b){ // gzip magic bytes → decompress
        if(typeof DecompressionStream==='undefined') throw new Error('This browser can\'t decompress the food database (needs Safari 16.4+ / a recent browser).');
        const stream=new Response(buf).body.pipeThrough(new DecompressionStream('gzip'));
        txt=await new Response(stream).text();
      }else{ // already plain JSON (server may have decompressed it)
        txt=new TextDecoder().decode(buf);
      }
      try{await _idbSet('food',{v:FOOD_DB_VERSION,t:txt});}catch(e){}
    }
    ONDB=JSON.parse(txt);
    ONBYEAN=new Map();
    for(const it of ONDB){if(it[7])ONBYEAN.set(it[7],it);}
    return ONDB;
  })();

  const burned=sum(ex,'caloriesBurned');
  const target=state.settings.dailyTarget;
  const atToday = viewDate===todayKey();
  const subdate=new Date(viewDate+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  const heroNum = target ? r0(target-consumed+burned) : r0(consumed);
  const heroLabel = target ? 'calories remaining' : 'calories eaten';
  let progressHtml='';
  if(target){
    const pct=Math.max(0,Math.min(100,Math.round((consumed-burned)/target*100)));
    progressHtml=`<div class="progress"><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="pct">${pct}%</div></div>`;
  }
  const band=`
    <div class="band">
      <div class="band-top"><span class="logo"><span class="logo-cat">${LOGO_SVG}</span>NomNom</span><div class="band-actions"><button class="gear" id="open-cal">${CAL_SVG}</button><button class="gear" id="open-settings">${GEAR_SVG}</button></div></div>
      <div class="bandnav">
        <button class="navbtn" id="day-prev">&#8249;</button>
        <button id="cal-open2" style="background:none;border:none;cursor:pointer;padding:0"><div class="d1">${dayLabel(viewDate)}</div><div class="d2">${subdate}</div></button>
        <button class="navbtn${atToday?' off':''}" id="day-next">&#8250;</button>
      </div>
      <div class="hero">
        <div class="hero-num">${heroNum}</div>
        <div class="hero-label">${heroLabel}</div>
        ${progressHtml}
        <div class="statchips">
          <div class="statchip"><div class="l">Target</div><div class="v">${target?r0(target):'—'}</div></div>
          <div class="statchip"><div class="l">Food</div><div class="v">${r0(consumed)}</div></div>
          <div class="statchip"><div class="l">Exercise</div><div class="v">${r0(burned)}</div></div>
        </div>
      </div>
    </div>`;

  // macros card
  const macro=(g,ref,color,label)=>{
    const pct=Math.max(0,Math.min(100,Math.round((g/ref)*100)));
    return `<div class="macrocol"><div class="mv" style="color:${color}">${r0(g)}<s>g</s></div><div class="ml">${label}</div><div class="mbar"><i style="width:${pct}%;background:${color}"></i></div></div>`;
  };
  const macroCard=`<div class="card">
    <div class="card-title" style="margin-bottom:14px">Macros today</div>
    <div class="macrocols">
      ${macro(sum(food,'protein_g'),120,'#18A974','Protein')}
      ${macro(sum(food,'carbs_g'),300,'#F2A93B','Carbs')}
      ${macro(sum(food,'fat_g'),70,'#FF6B4A','Fat')}
    </div></div>`;

  // food card grouped by meal
  let groups='';
  MEALS.forEach(mealName=>{
    const items=food.filter(e=>(e.meal||'Snack')===mealName);
    if(!items.length)return;
    const subtotal=sum(items,'calories');
    groups+=`<div class="mealgroup">
      <div class="meal-line"><div class="ml-left"><span class="meal-dot" style="background:${MEALCOLOR[mealName]}"></span><span class="meal-name">${mealName}</span></div><span class="meal-sub">${r0(subtotal)} kcal</span></div>
      <div class="fooditems">${items.map(e=>`
        <button class="fooditem" data-edit-food="${e.id}">
          <span style="min-width:0;display:flex;flex-direction:column;gap:2px"><span class="fi-name">${esc(e.name)}</span><span class="fi-sub">${esc(e.servingLabel||r0(e.grams)+' g')}</span></span>
          <span class="fi-right"><span class="fi-cal">${r0(e.calories)}</span><svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>`).join('')}</div>
    </div>`;
  });
  if(!groups)groups=`<div class="empty" style="margin-top:6px">No food logged${atToday?' yet':''}. Tap Add to start.</div>`;
  const foodCard=`<div class="card">
    <div class="card-head"><div class="card-title">Food</div><div class="card-sub">${r0(consumed)} kcal</div></div>
    ${groups}</div>`;

  // activity card
  const actRows = ex.length ? ex.map((e,i)=>`
    <div class="act-item${i===0?' first':''}" data-edit-ex="${e.id}">
      <div class="act-icon">${ACT_SVG}</div>
      <div style="flex:1;min-width:0"><div class="act-name">${esc(e.activity)}</div><div class="act-sub">${e.minutes} min · ${e.intensity}</div></div>
      <div class="act-cal">${r0(e.caloriesBurned)}</div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-soft);flex:none;margin-left:6px"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join('') : `<div class="empty" style="margin-top:0">No exercise logged.</div>`;
  const actCard=`<div class="card">
    <div class="card-head"><div class="card-title">Activity</div><div class="card-sub">${r0(burned)} kcal</div></div>
    ${actRows}</div>`;

  $('main').innerHTML=band+macroCard+foodCard+actCard;
  $('open-settings').onclick=openSettings;
  $('open-cal').onclick=openCalendar;
  $('cal-open2').onclick=openCalendar;
  $('day-prev').onclick=()=>{viewDate=shiftDay(viewDate,-1);render();};
  $('day-next').onclick=()=>{if(!atToday){viewDate=shiftDay(viewDate,1);render();}};
  document.querySelectorAll('[data-edit-food]').forEach(n=>n.onclick=()=>editFood(n.dataset.editFood));
  document.querySelectorAll('[data-edit-ex]').forEach(n=>n.onclick=()=>editExercise(n.dataset.editEx));
}

/* ---------- CALENDAR ---------- */
function openCalendar(){
  const target=state.settings.dailyTarget;
  const today=todayKey();
  const map={};
  for(const e of state.entries){(map[e.date]=map[e.date]||{c:0,b:0}).c+=e.calories||0;}
  for(const x of state.exercise){(map[x.date]=map[x.date]||{c:0,b:0}).b+=x.caloriesBurned||0;}
  const hasData=(k)=>!!(map[k]&&map[k].c>0);
  const netOf=(k)=>map[k]?(map[k].c-map[k].b):0;
  const consumedOf=(k)=>map[k]?map[k].c:0;
  const metric=(k)=>target!=null?(target-netOf(k)):netOf(k);   // remaining (target − food + exercise) when a target is set
  const lerp=(a,b,t)=>[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
  const lum=(c)=>(0.299*c[0]+0.587*c[1]+0.114*c[2])/255;
  const GLO=[150,222,189],GHI=[8,94,62],RLO=[244,176,178],RHI=[150,28,33];
  const signed=(k)=>{ if(target==null)return r0(metric(k)); const v=metric(k); return (v>0?'+':'')+r0(v); };
  const heat=(k)=>{
    const st=statusOf(k);
    if((st==='under'||st==='over')&&target){
      const rem=target-netOf(k); let f,bg;
      if(rem>=0){ f=Math.min(1,rem/target); bg=lerp(GLO,GHI,f); } else { f=Math.min(1,(-rem)/target); bg=lerp(RLO,RHI,f); }
      return {bg:`rgb(${bg[0]},${bg[1]},${bg[2]})`, fg:lum(bg)>0.62?'#23201c':'#fff'};
    }
    return {bg:CELLBG[st], fg:CELLFG[st]};
  };
  const statusOf=(k)=>{ if(k>today)return 'future'; if(!hasData(k))return 'none'; if(!target)return 'data'; return netOf(k)<=target?'under':'over'; };
  const CELLBG={under:'#18A974',over:'#E5484D',data:'var(--accent-bg)',none:'rgba(43,42,38,.04)',future:'transparent'};
  const CELLFG={under:'#fff',over:'#fff',data:'var(--text)',none:'var(--text-soft)',future:'#D8D2C8'};
  const DOW=['S','M','T','W','T','F','S'];
  const shortLabel=(k)=>new Date(k+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});
  let mode='month';
  let anchor=new Date(today+'T00:00:00');

  // all-time stats
  const allDays=Object.keys(map).filter(hasData).sort();
  let bestStreak=0;
  if(target){ let run=0,prev=null; for(const k of allDays){ if(netOf(k)<=target){ run=(prev&&shiftDay(prev,1)===k)?run+1:1; bestStreak=Math.max(bestStreak,run); prev=k; } else { run=0; prev=null; } } }
  let bestDay=null,highDay=null;
  for(const k of allDays){
    if(target!=null){ if(bestDay===null||metric(k)>metric(bestDay))bestDay=k; } else { if(bestDay===null||metric(k)<metric(bestDay))bestDay=k; }
    if(highDay===null||consumedOf(k)>consumedOf(highDay))highDay=k;
  }

  const ov=el(`<div class="cal-ov"><div class="cal-head">
      <div class="cal-head-row">
        <button class="cal-rbtn" id="cal-prev">${IC_BACK}</button>
        <span class="cal-title" id="cal-title"></span>
        <div style="display:flex;gap:7px"><button class="cal-rbtn" id="cal-next">${IC_CHEVR}</button><button class="cal-rbtn" id="cal-x">${IC_X}</button></div>
      </div>
      <div class="cal-agg"><span class="net" id="cal-net">—</span><span class="cal-pill" id="cal-pill"></span></div>
      <div class="cal-sub" id="cal-sub"></div>
    </div>
    <div class="cal-body">
      <div class="cal-seg" id="cal-seg"><button data-m="week">1W</button><button data-m="month">1M</button></div>
      <div class="cal-card" id="cal-card"></div>
      <div class="cal-legend"><span class="lg"><span class="sw" style="background:#18A974"></span>Under target</span><span class="lg"><span class="sw" style="background:#E5484D"></span>Over target</span></div>
      <div class="cal-stats" id="cal-stats"></div>
    </div></div>`);
  $('modal-root').appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('#cal-x').onclick=close;
  const jump=(k)=>{ viewDate=k; tab='today'; close(); render(); };

  const periodKeys=()=>{
    const keys=[];
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),days=new Date(y,m+1,0).getDate();
      for(let i=1;i<=days;i++)keys.push(dateKey(new Date(y,m,i)));
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);keys.push(dateKey(d));}
    }
    return keys;
  };

  function paint(){
    if(mode==='month'){ ov.querySelector('#cal-title').textContent=anchor.toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
    else { const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(s.getDate()+6); ov.querySelector('#cal-title').textContent=`${shortLabel(dateKey(s))} – ${shortLabel(dateKey(e))}`; }
    ov.querySelectorAll('#cal-seg button').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
    const pk=periodKeys().filter(hasData), daysLogged=pk.length;
    const avg=daysLogged?Math.round(pk.reduce((s,k)=>s+metric(k),0)/daysLogged):0;
    ov.querySelector('#cal-net').textContent=daysLogged?r0(avg):'—';
    const pill=ov.querySelector('#cal-pill');
    if(daysLogged&&target){
      const under=avg>=0;
      pill.style.display='';
      pill.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">${under?'<path d="M12 5v14M6 13l6 6 6-6"/>':'<path d="M12 19V5M6 11l6-6 6 6"/>'}</svg><span>${under?'under':'over'}</span>`;
    } else pill.style.display='none';
    ov.querySelector('#cal-sub').textContent=daysLogged?`${target?'avg left/day':'avg net/day'} · ${daysLogged} day${daysLogged===1?'':'s'} logged${target?'':' · set a daily target to track on/over'}`:'No days logged this period';

    const card=ov.querySelector('#cal-card');
    if(mode==='month'){
      const y=anchor.getFullYear(),m=anchor.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
      let cells='';
      for(let i=0;i<first;i++)cells+=`<div></div>`;
      for(let dd=1;dd<=days;dd++){
        const k=dateKey(new Date(y,m,dd)),h=heat(k),clk=k<=today;
        const kc=hasData(k)?`<span class="k" style="color:${h.fg}">${signed(k)}</span>`:'';
        cells+=`<div class="cal-cell" data-jump="${clk?k:''}" style="background:${h.bg};cursor:${clk?'pointer':'default'}"><span class="d" style="color:${h.fg}">${dd}</span>${kc}</div>`;
      }
      card.innerHTML=`<div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
    }else{
      const s=new Date(anchor);s.setDate(s.getDate()-s.getDay());
      let cells='';
      for(let i=0;i<7;i++){
        const d=new Date(s);d.setDate(s.getDate()+i);const k=dateKey(d),h=heat(k),clk=k<=today;
        const lab=hasData(k)?signed(k):(k>today?'·':'–');
        cells+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:10px;font-weight:600;color:var(--text-soft)">${DOW[i]}</span>
          <div class="cal-cell" data-jump="${clk?k:''}" style="width:100%;background:${h.bg};border-radius:11px;padding:9px 2px;cursor:${clk?'pointer':'default'}"><span class="d" style="font-size:13px;color:${h.fg}">${d.getDate()}</span><span class="k" style="font-size:9.5px;color:${h.fg}">${lab}</span></div></div>`;
      }
      card.innerHTML=`<div class="cal-grid">${cells}</div>`;
    }
    card.querySelectorAll('[data-jump]').forEach(c=>{ if(c.dataset.jump)c.onclick=()=>openDayDetail(c.dataset.jump); });

    const pkAll=periodKeys().filter(hasData);
    const daysOn=target?pkAll.filter(k=>netOf(k)<=target).length:0;
    const icC='<svg viewBox="0 0 24 24" fill="none" stroke="#18A974" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    const icF='<svg viewBox="0 0 24 24" fill="none" stroke="#F2A93B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1.5 3 4 4 4 7a4 4 0 01-8 0c0-1 .3-1.8.8-2.5C9 9 12 8 12 2z"/></svg>';
    ov.querySelector('#cal-stats').innerHTML=`
      <div class="cal-stat"><div class="sh">${icC}Days on target</div><div class="sv" style="color:#18A974">${target?daysOn:'—'}<small>${target?` /${pkAll.length}`:''}</small></div></div>
      <div class="cal-stat"><div class="sh">${icF}Best streak</div><div class="sv" style="color:var(--text)">${target?bestStreak:'—'}<small> days</small></div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#18A974"></span>Best day</div><div class="sv" style="color:#18A974">${bestDay?signed(bestDay):'—'}</div><div class="sl">${bestDay?shortLabel(bestDay):'No data yet'}</div></div>
      <div class="cal-stat"><div class="sh"><span class="cal-dot" style="background:#E5484D"></span>Highest day</div><div class="sv" style="color:#E5484D">${highDay?r0(consumedOf(highDay)):'—'}</div><div class="sl">${highDay?shortLabel(highDay):'No data yet'}</div></div>`;
  }
  ov.querySelector('#cal-prev').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()-1); else anchor.setDate(anchor.getDate()-7); paint(); };
  ov.querySelector('#cal-next').onclick=()=>{ if(mode==='month')anchor.setMonth(anchor.getMonth()+1); else anchor.setDate(anchor.getDate()+7); paint(); };
  ov.querySelectorAll('#cal-seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.m;paint();});
  paint();
}
function openDayDetail(key){
  const target=state.settings.dailyTarget;
  const MC={Breakfast:'#F2A93B',Lunch:'#18A974',Dinner:'#FF6B4A',Snack:'#A285CF'};
  const REST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>';
  const ov=el(`<div class="cal-ov" style="z-index:140"><div class="cal-head">
      <div class="cal-head-row">
        <button class="cal-rbtn" id="dd-x">${IC_X}</button>
        <span class="cal-title" id="dd-date"></span>
        <div style="display:flex;gap:7px"><button class="cal-rbtn" id="dd-prev">${IC_BACK}</button><button class="cal-rbtn" id="dd-next">${IC_CHEVR}</button></div>
      </div>
      <div class="cal-agg"><span class="net" id="dd-net"></span><span id="dd-word" style="font-size:13px;color:rgba(255,255,255,.85);margin-bottom:4px"></span></div>
      <div class="dd-mini">
        <div class="dd-box"><div class="l">Food</div><div class="v" id="dd-food"></div></div>
        <div class="dd-box"><div class="l">Exercise</div><div class="v" id="dd-burn"></div></div>
        <div class="dd-box"><div class="l">Target</div><div class="v" id="dd-tgt"></div></div>
      </div>
    </div>
    <div class="cal-body" id="dd-body"></div></div>`);
  $('modal-root').appendChild(ov);
  let cur=key;
  ov.querySelector('#dd-x').onclick=()=>ov.remove();
  ov.querySelector('#dd-prev').onclick=()=>{cur=shiftDay(cur,-1);paint();};
  ov.querySelector('#dd-next').onclick=()=>{cur=shiftDay(cur,1);paint();};
  function paint(){
    const food=state.entries.filter(e=>e.date===cur);
    const exs=state.exercise.filter(e=>e.date===cur);
    const consumed=sum(food,'calories'), burned=sum(exs,'caloriesBurned');
    ov.querySelector('#dd-date').textContent=dayLabel(cur);
    if(target!=null){ const v=target-consumed+burned; ov.querySelector('#dd-net').textContent=r0(Math.abs(v)); ov.querySelector('#dd-word').textContent=v>=0?'calories left':'over target'; }
    else { ov.querySelector('#dd-net').textContent=r0(consumed-burned); ov.querySelector('#dd-word').textContent='net intake'; }
    ov.querySelector('#dd-food').textContent=r0(consumed);
    ov.querySelector('#dd-burn').textContent=r0(burned);
    ov.querySelector('#dd-tgt').textContent=target!=null?r0(target):'—';
    let foodHtml='';
    MEALS.forEach(mn=>{
      const items=food.filter(e=>(e.meal||defaultMeal())===mn);
      if(!items.length)return;
      foodHtml+=`<div class="dd-meal"><div class="dd-meal-h"><div class="nm"><span class="dot" style="background:${MC[mn]||'#999'}"></span>${mn}</div><div class="sub">${r0(sum(items,'calories'))} kcal</div></div>${items.map(it=>`<div class="dd-item"><span class="nm">${esc(it.name)}</span><span class="kc">${r0(it.calories)}</span></div>`).join('')}</div>`;
    });
    if(!foodHtml)foodHtml=`<div class="dd-rest" style="padding-top:10px"><div class="ic">${IC_FORK}</div>No food logged</div>`;
    const exHtml = exs.length
      ? exs.map(e=>`<div class="dd-ex"><div class="ic">${actMeta(e.activity).ic}</div><div class="mn"><div class="n">${esc(e.activity)}</div><div class="s">${e.minutes} min · ${e.intensity}</div></div><div class="kc">${r0(e.caloriesBurned)}</div></div>`).join('')
      : `<div class="dd-rest"><div class="ic">${REST}</div>Rest day — no activity logged</div>`;
    ov.querySelector('#dd-body').innerHTML=`
      <div class="dd-card"><div class="dd-card-h"><div class="t">Food</div><div class="s">${r0(consumed)} kcal</div></div>${foodHtml}</div>
      <div class="dd-card"><div class="dd-card-h"><div class="t">Activity</div><div class="s">${r0(burned)} kcal</div></div><div style="margin-top:12px">${exHtml}</div></div>`;
  }
  paint();
}

/* ---------- bottom-sheet helper (slide up + swipe down, like Settings) ---------- */
function makeSheet(innerHtml){
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    ${innerHtml}
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  let closed=false;
  const close=()=>{
    if(closed)return; closed=true;
    camStop();
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  let startY=0,dY=0,drag=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-startY;if(sheet.scrollTop<=0&&dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}},{passive:false});
  sheet.addEventListener('touchend',()=>{if(!drag){sheet.style.transition='';return;}drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}});
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  return {overlay,sheet,close};
}

function recentFoods(n){
  const seen=new Set(), out=[];
  for(let i=state.entries.length-1;i>=0 && out.length<n;i--){
    const e=state.entries[i]; const key=(e.name||'').toLowerCase();
    if(!e.name||seen.has(key))continue; seen.add(key);
    const sub=`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`;
    out.push({name:e.name,sub,entry:e});
  }
  return out;
}

  state.entries.push(Object.assign({},r.entry,{id:uid(),date:viewDate,meal:defaultMeal()}));

      const opts={};
      if(typeof Html5QrcodeSupportedFormats!=='undefined'){
        opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];
      }
      try{
        scanner=new Html5Qrcode('reader',opts); running=true;
        hint.textContent='Point your camera at a product barcode';
        await scanner.start({facingMode:'environment'},
          {fps:10, qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};}, aspectRatio:1.3333, experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
          onDetect, ()=>{});
      }catch(e){ running=false; hint.textContent='Couldn’t start the camera — you can also type the barcode number into “Search for a food”.'; }
    };
    async function doLookup(code){
      stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
      const r=await barcodeLookup(code);
      if(!r){ stage.innerHTML=`<div class="err">No product found for that barcode. Scan again, or enter it manually.</div><button class="btn btn-block" id="bc-man" style="margin-top:10px">Enter manually</button><button class="btn btn-block" id="bc-again" style="margin-top:8px">Scan again</button>`; stage.querySelector('#bc-man').onclick=renderManual; stage.querySelector('#bc-again').onclick=renderBarcode; return; }
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="bc-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="bc-stage2"></div>`;
      body.querySelector('#bc-b2').onclick=renderBarcode;
      weighAndLog(null,body.querySelector('#bc-stage2'),r.name,r.per,r.source,r.g,()=>sh.close());
    }
    startScan();
  }

    const OPENX=-168;
    lb.querySelectorAll('.swipe-wrap').forEach(wrap=>{
      const id=wrap.dataset.id, row=wrap.querySelector('.swipe-row');
      const addBtn=wrap.querySelector('.recent-add'), delBtn=wrap.querySelector('.swipe-del'), mealBtn=wrap.querySelector('.swipe-meal');
      let startX=0,base=0,off=0,down=false,dragging=false,open=false,suppress=false;
      const apply=(x,anim)=>{row.style.transition=anim?'transform .2s ease':'';row.style.transform=`translateX(${x}px)`;};
      const close=()=>{open=false;apply(0,true);};
      const openIt=()=>{open=true;apply(OPENX,true);};
      const guard=()=>{suppress=true;setTimeout(()=>{suppress=false;},80);};
      const doDelete=()=>{ state.library=state.library.filter(x=>x.id!==id); save(); renderLibrary(); };
      delBtn.onclick=(e)=>{e.stopPropagation();doDelete();};
      mealBtn.onclick=(e)=>{e.stopPropagation(); const l=state.library.find(x=>x.id===id); close(); if(l)openMealPicker(l);};
      addBtn.onclick=(e)=>{ if(open||suppress){e.stopPropagation();e.preventDefault();close();return;} addFromLib(id); };
      row.addEventListener('pointerdown',e=>{ down=true;dragging=false;startX=e.clientX;base=open?OPENX:0;off=base; });
      row.addEventListener('pointermove',e=>{
        if(!down)return; const d=e.clientX-startX;
        if(!dragging && Math.abs(d)>6){ dragging=true; try{row.setPointerCapture(e.pointerId);}catch(_){} }
        if(dragging){ off=base+d; if(off>0)off=0; if(off<OPENX-22)off=OPENX-22; apply(off,false); e.preventDefault(); }
      });
      const endDrag=()=>{
        if(!down)return; down=false;
        if(dragging){ guard(); if(off<=-50){openIt();} else {close();} }
        else if(open){ guard(); close(); }
      };
      row.addEventListener('pointerup',endDrag);
      row.addEventListener('pointercancel',endDrag);
    });
  }

      const paint=()=>{body.querySelector('#ex-minv').textContent=minutes;body.querySelector('#ex-kcal').textContent=calc();place();};

      sl.addEventListener('pointerup',()=>{dragging=false;});

      place();
      body.querySelector('#ex-actbtn').onclick=chooseActivity;
      body.querySelectorAll('#ex-int button').forEach(b=>b.onclick=()=>{intensity=b.dataset.i;body.querySelectorAll('#ex-int button').forEach(x=>x.classList.toggle('on',x===b));body.querySelector('#ex-kcal').textContent=calc();});

      body.querySelector('#ex-save').onclick=()=>{
        state.exercise.push({id:uid(),date:viewDate,activity,intensity,minutes,met:MET[activity][intensity],caloriesBurned:calc()});
        save();sh.close();
      };
    }
    draw();
  }

/* ---------- SEARCH BY NAME ---------- */
async function barcodeLookup(code){
  code=String(code);
  try{ await ensureONDB(); const hit=ONBYEAN&&ONBYEAN.get(code); if(hit) return {name:hit[0],per:{calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]},source:'opennutrition',g:hit[6]}; }catch(e){}
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments`);
    const data=await res.json();
    if(data.product){ const n=data.product.nutriments||{}; return {name:data.product.product_name||('Item '+code),per:{calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)},source:'barcode'}; }
  }catch(e){}
  return null;
}
/* Open Food Facts text search.
   Uses the legacy /cgi/search.pl on world.openfoodfacts.org because it allows
   cross-origin browser requests. The newer search.openfoodfacts.org (Search-a-licious)
   does NOT send CORS headers, so a browser fetch to it fails with "Load failed".
   On-demand only — OFF rate-limits search to ~10/min and asks apps not to search-as-you-type. */
async function offTextSearch(term){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(term)}&search_simple=1&action=process&json=1&page_size=20&fields=code,product_name,brands,quantity,product_quantity,nutriments`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Open Food Facts search is unavailable right now ('+r.status+'). Try again shortly, scan the barcode, or estimate with AI.');
  const data=await r.json();
  const list=data.products||[];
  return list.map(p=>{
    const n=p.nutriments||{}; const kcal=n['energy-kcal_100g'];
    if(!p.product_name || kcal==null) return null;
    const pq=parseFloat(p.product_quantity);                 // net package weight in grams (or ml)
    const grams=(isFinite(pq) && pq>0 && pq<=10000) ? pq : null;
    return {name:p.product_name, brands:p.brands||'', quantity:p.quantity||'', grams, per:{
      calories:+kcal||0, protein_g:+(n['proteins_100g']||0), carbs_g:+(n['carbohydrates_100g']||0),
      fat_g:+(n['fat_100g']||0), sugar_g:+(n['sugars_100g']||0)}};
  }).filter(Boolean);
}
function openSearch(){
  const m=openModal('Search by name',`
    <div class="field"><label>Food or brand name</label>
      <input id="sf-q" placeholder="Name or barcode number" autocomplete="off"></div>
    <div class="btn-row"><button class="btn btn-primary btn-block" id="sf-go">Also search packaged foods</button></div>
    <div class="hint">Your library, the local database, and OpenNutrition (13,000+ foods with macros) match as you type — all offline. Type or paste a product’s barcode number to look it up. The button also checks Open Food Facts for packaged items.</div>
    <div id="sf-lib"></div>
    <div id="sf-results"></div>
  `);
  const q=m.querySelector('#sf-q'), libBox=m.querySelector('#sf-lib'), res=m.querySelector('#sf-results');
  let dbMatches=[], onMatches=[];
  function pickPer(name,per,source,g){
    const stage=el('<div></div>'); m.querySelector('#m-body').innerHTML=''; m.querySelector('#m-body').appendChild(stage);
    weighAndLog(m,stage,name,per,source,g);
  }
  function pickServing(name,cal,portion,source){
    const stage=el('<div></div>'); m.querySelector('#m-body').innerHTML=''; m.querySelector('#m-body').appendChild(stage);
    logServing(m,stage,name,cal,portion,source);
  }
  async function doBarcode(code){
    const stage=el('<div></div>'); m.querySelector('#m-body').innerHTML=''; m.querySelector('#m-body').appendChild(stage);
    stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
    const r=await barcodeLookup(code);
    if(!r){ stage.innerHTML=`<div class="err">No product found for barcode ${esc(code)} in OpenNutrition or Open Food Facts.</div><div class="field"><button class="btn btn-block" id="bc-back2">Back to search</button></div>`; stage.querySelector('#bc-back2').onclick=()=>{m.remove();openSearch();}; return; }
    weighAndLog(m,stage,r.name,r.per,r.source,r.g);
  }
  function renderLocal(){
    const term=q.value.trim().toLowerCase();
    const raw=q.value.trim(); const isBC=/^\d{8,14}$/.test(raw);
    let html='';
    if(isBC) html+=`<div class="section-label">Barcode</div><div class="row tappable" data-bc="1"><div><div class="name">Look up barcode ${esc(raw)}</div><div class="sub">Search packaged products by number</div></div></div>`;
    const libM=term?state.library.filter(l=>l.name.toLowerCase().includes(term)):[];
    if(libM.length)html+=`<div class="section-label">Personal library</div>`+libM.map(l=>{
      const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;
      return `<div class="row tappable" data-lib="${l.id}"><div><div class="name">${esc(l.name)}</div><div class="sub">${sub} · personal library</div></div></div>`;}).join('');
    dbMatches=term?(DB||[]).filter(f=>f.name.toLowerCase().includes(term)).slice(0,20):[];
    if(dbMatches.length)html+=`<div class="section-label">Local database</div>`+dbMatches.map((f,i)=>`<div class="row tappable" data-db="${i}"><div><div class="name">${esc(f.name)}</div><div class="sub">${r0(f.calories)} kcal per ${esc(f.portion)} · local database</div></div></div>`).join('');
    onMatches=[];
    if(term.length>=2){
      if(ONDB){
        onMatches=ONDB.filter(a=>a[0].toLowerCase().includes(term)).slice(0,30);
        if(onMatches.length)html+=`<div class="section-label">OpenNutrition</div>`+onMatches.map((f,i)=>`<div class="row tappable" data-on="${i}"><div><div class="name">${esc(f[0])}</div><div class="sub">${r0(f[1])} kcal/100g · OpenNutrition</div></div></div>`).join('');
      }else{
        html+=`<div class="section-label">OpenNutrition</div><div class="empty" id="on-load">Loading the food database (first time only, ~10 MB)…</div>`;
      }
    }
    if(term && (libM.length||dbMatches.length||onMatches.length))
      html+=`<div class="hint" style="padding:14px 4px 0">Nutrition data from <a href="https://www.opennutrition.app" target="_blank" rel="noopener">OpenNutrition</a> &amp; Open Food Facts contributors.</div>`;
    libBox.innerHTML=html;
    const bcRow=libBox.querySelector('[data-bc]'); if(bcRow)bcRow.onclick=()=>doBarcode(raw);
    libBox.querySelectorAll('[data-lib]').forEach(n=>n.onclick=()=>{const l=state.library.find(x=>x.id===n.dataset.lib);if(l.perServing)pickServing(l.name,l.perServing.calories,l.perServing.portion,'library');else pickPer(l.name,l.per_100g,'library',l.lastGrams);});
    libBox.querySelectorAll('[data-db]').forEach(n=>n.onclick=()=>{const f=dbMatches[+n.dataset.db];pickServing(f.name,f.calories,f.portion,'local');});
    libBox.querySelectorAll('[data-on]').forEach(n=>n.onclick=()=>{const f=onMatches[+n.dataset.on];pickPer(f[0],{calories:f[1],protein_g:f[2],carbs_g:f[3],fat_g:f[4],sugar_g:f[5]},'opennutrition',f[6]);});
    if(term.length>=2 && !ONDB){
      ensureONDB().then(()=>{ if(q.value.trim().toLowerCase()===term) renderLocal(); })
        .catch(()=>{const ld=libBox.querySelector('#on-load'); if(ld)ld.textContent='Couldn\'t load opennutrition.json — it must be uploaded next to the app (it won\'t load in the preview or a local file).';});
    }
  }
  function offerAI(term){
    const wrap=el(`<div><div class="empty">No match in your library, the local database, or Open Food Facts for "${esc(term)}".</div><div class="field"><button class="btn btn-primary btn-block" id="sf-aigo">Estimate "${esc(term)}" with AI</button></div></div>`);
    res.innerHTML=''; res.appendChild(wrap);
    wrap.querySelector('#sf-aigo').onclick=()=>runAI(term);
  }
  async function runAI(term){
    if(!state.settings.apiKey){res.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to use AI lookup.</div>`;return;}
    res.innerHTML=`<div class="spinner">Asking AI…</div>`;
    try{
      const ai=await aiNutrition(term);
      if(!ai.per_100g || !ai.per_100g.calories){res.innerHTML=`<div class="err">AI couldn't estimate that. Try a different name or enter it manually.</div>`;return;}
      res.innerHTML=`<div class="section-label">AI estimate</div>`;
      const node=el(`<div class="row tappable"><div><div class="name">${esc(ai.name||term)}</div><div class="sub">${r0(ai.per_100g.calories)} kcal/100g · AI estimate</div></div></div>`);
      node.onclick=()=>pickPer(ai.name||term,ai.per_100g,'ai');
      res.appendChild(node);
    }catch(e){res.innerHTML=`<div class="err">${esc(e.message||'AI lookup failed.')}</div>`;}
  }
  async function doSearch(){
    const term=q.value.trim(); if(!term)return;
    const localHas=state.library.some(l=>l.name.toLowerCase().includes(term.toLowerCase())) || (DB||[]).some(f=>f.name.toLowerCase().includes(term.toLowerCase()));
    res.innerHTML=`<div class="spinner">Searching Open Food Facts…</div>`;
    try{
      const url=`https://search.openfoodfacts.org/search?q=${encodeURIComponent(term)}&page_size=20&fields=code,product_name,brands,nutriments`;
      const r=await fetch(url);
      if(!r.ok) throw new Error('Open Food Facts returned an error ('+r.status+').');
      const data=await r.json();
      const prods=(data.hits||[]).filter(p=>p.product_name && p.nutriments && p.nutriments['energy-kcal_100g']!=null);
      if(!prods.length){ if(localHas){res.innerHTML='';} else {offerAI(term);} return; }
      res.innerHTML=`<div class="section-label">Open Food Facts</div>`+prods.map((p,i)=>{
        const cal=r0(p.nutriments['energy-kcal_100g']);
        return `<div class="row tappable" data-off="${i}"><div><div class="name">${esc(p.product_name)}</div><div class="sub">${p.brands?esc(p.brands)+' · ':''}${cal} kcal/100g · Open Food Facts</div></div></div>`;
      }).join('')+`<div class="field"><button class="btn btn-block" id="sf-aibtn">None of these — estimate with AI</button></div>`;
      res.querySelectorAll('[data-off]').forEach(node=>node.onclick=()=>{
        const p=prods[+node.dataset.off], n=p.nutriments;
        const per={calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)};
        pickPer(p.product_name,per,'packaged');
      });
      res.querySelector('#sf-aibtn').onclick=()=>runAI(term);
    }catch(e){
      res.innerHTML=`<div class="err">Open Food Facts name search is unavailable (their text-search service is currently down). For an exact match, scan the product barcode; otherwise estimate with AI.</div>`
        +`<div class="btn-row"><button class="btn" id="sf-bar">Scan barcode</button><button class="btn btn-primary" id="sf-aifail">Estimate with AI</button></div>`;
      res.querySelector('#sf-bar').onclick=()=>{m.remove();openBarcode();};
      res.querySelector('#sf-aifail').onclick=()=>runAI(term);
    }
  }
  renderLocal();
  q.oninput=renderLocal;
  q.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();doSearch();}};
  m.querySelector('#sf-go').onclick=doSearch;
}

function loadImage(file){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);res(img);};img.onerror=rej;img.src=u;});}
async function toJpegBase64(file,maxDim=1100,q=0.8){
  const img=await loadImage(file);
  const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',q).split(',')[1];
}
let _camStream=null;
async function camStart(v){
  try{ _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false}); v.srcObject=_camStream; await v.play(); return true; }
  catch(e){ _camStream=null; return false; }
}
function camStop(){ if(_camStream){_camStream.getTracks().forEach(t=>t.stop());_camStream=null;} }
function camCapture(v){
  const w=v.videoWidth||1100,h=v.videoHeight||1100,sc=Math.min(1,1100/Math.max(w,h));
  const c=document.createElement('canvas'); c.width=Math.round(w*sc); c.height=Math.round(h*sc);
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',0.8).split(',')[1];
}

function genConfig(model){
  const cfg={responseMimeType:'application/json',maxOutputTokens:2048};
  if(/flash/i.test(model)) cfg.thinkingConfig={thinkingBudget:0}; // disable "thinking" so JSON isn't truncated
  return cfg;
}
async function analyzePhoto(b64){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const res=await fetch(url,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inline_data:{mime_type:'image/jpeg',data:b64}},
        {text:VISION_PROMPT}
      ]}],
      generationConfig:genConfig(model)
    })
  });
  if(!res.ok){
    let msg='Gemini API error '+res.status;
    try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Tap to try again, or use a clearer, closer photo.');
  let text=cand && cand.content && cand.content.parts ? cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim() : '';
  if(!text)throw new Error('Empty response from Gemini. Try again or enter the food manually.');
  text=text.replace(/```json|```/g,'').trim();
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }
  catch(err){ throw new Error('Could not read the AI response (it may have been cut off). Please try again.'); }
}
async function aiNutrition(name){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const prompt=`Give typical nutrition per 100 grams for this food, assuming the common Singapore version if relevant: "${name}". Respond with ONLY JSON, no markdown: {"name":"","per_100g":{"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"sugar_g":0}}. If it is not a food, set calories to 0.`;
  const res=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:genConfig(model)})});
  if(!res.ok){let msg='Gemini API error '+res.status;try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}throw new Error(msg);}
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Please try again.');
  let text=cand&&cand.content&&cand.content.parts?cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim():'';
  text=text.replace(/```json|```/g,'').trim();const s=text.indexOf('{'),e=text.lastIndexOf('}');if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }catch(err){ throw new Error('Could not read the AI response. Please try again.'); }
}
function showConfirm(m,stage,result,onDone){
  const items=result.items.map(it=>({
    name:it.name||'Item',
    per:{calories:+(it.per_100g?.calories||0),protein_g:+(it.per_100g?.protein_g||0),carbs_g:+(it.per_100g?.carbs_g||0),fat_g:+(it.per_100g?.fat_g||0),sugar_g:+(it.per_100g?.sugar_g||0)},
    grams:+(it.estimated_grams||100),
    conf:(it.confidence||'').toLowerCase(),
    estName:it.name||'Item'   // name the current nutrition was estimated for
  }));
  function rowHtml(it,i){
    const cal=r0(it.per.calories*it.grams/100);
    const dirty=it.name.trim() && it.name.trim()!==it.estName;
    const lowTag=it.conf==='low'?`<span class="conf-tag">Low confidence</span>`:'';
    return `<div class="item-edit" data-row="${i}">
      <div class="ie-head">
        <input class="ie-name" data-n="${i}" value="${esc(it.name)}" placeholder="Food name" autocomplete="off">
        <button class="ie-del" data-del="${i}" aria-label="Remove item">${IC_TRASH}</button>
      </div>
      <div class="ie-meta">
        <span class="ie-per">${r0(it.per.calories)} kcal/100g</span>
        ${lowTag}
        <button class="ie-reest" data-reest="${i}" style="${dirty?'':'display:none'}">${IC_REFRESH}Re-estimate</button>
      </div>
      <div class="field-row" style="margin-top:10px">
        <div class="field"><label>Weight (g)</label><input type="number" inputmode="decimal" data-g="${i}" value="${it.grams}"></div>
        <div class="field"><label>Calories</label><input type="text" data-c="${i}" value="${cal}" disabled></div>
      </div>
      <div class="ie-rowerr" data-err="${i}" style="display:none"></div>
    </div>`;
  }
  function paint(){
    const named=items.filter(it=>it.name.trim());
    stage.innerHTML=`
      ${result.assumptions?`<div class="note">${esc(result.assumptions)}</div>`:''}
      ${items.length?items.map(rowHtml).join(''):'<div class="empty" style="border:none">No items left. Add one below or go back to rescan.</div>'}
      <button class="add-missing" id="add-missing">+ Add an item the AI missed</button>
      ${mealChips(defaultMeal())}
      <div class="toggle-row"><input type="checkbox" id="savelib" style="width:auto"><label for="savelib" style="margin:0">Save these to library</label></div>
      <div class="field"><button class="btn btn-primary btn-block" id="confirm-save"${named.length?'':' disabled'}>Log ${named.length} item${named.length===1?'':'s'}</button></div>`;
    const getMeal=wireMealChips(stage);

    // weight -> recompute calories live
    stage.querySelectorAll('[data-g]').forEach(inp=>inp.oninput=()=>{
      const i=+inp.dataset.g; items[i].grams=+inp.value||0;
      stage.querySelector(`[data-c="${i}"]`).value=r0(items[i].per.calories*items[i].grams/100);
    });
    // name edits -> update model + toggle this row's Re-estimate button (no repaint, keeps focus)
    stage.querySelectorAll('[data-n]').forEach(inp=>inp.oninput=()=>{
      const i=+inp.dataset.n; items[i].name=inp.value;
      const btn=stage.querySelector(`[data-reest="${i}"]`);
      const dirty=inp.value.trim() && inp.value.trim()!==items[i].estName;
      if(btn)btn.style.display=dirty?'':'none';
    });
    // delete
    stage.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ items.splice(+b.dataset.del,1); paint(); });
    // re-estimate (text-only, keeps grams)
    stage.querySelectorAll('[data-reest]').forEach(b=>b.onclick=async()=>{
      const i=+b.dataset.reest; const name=items[i].name.trim(); if(!name)return;
      const errEl=stage.querySelector(`[data-err="${i}"]`);
      if(!state.settings.apiKey){ errEl.style.display='';errEl.textContent='Add your Gemini API key in Settings to re-estimate.';return; }
      errEl.style.display='none'; b.disabled=true; const html=b.innerHTML; b.innerHTML=`${IC_REFRESH}Estimating…`;
      try{
        const ai=await aiNutrition(name);
        if(!ai||!ai.per_100g||!(+ai.per_100g.calories)){ throw new Error('Couldn’t estimate that. Try a clearer name.'); }
        items[i].per={calories:+ai.per_100g.calories||0,protein_g:+ai.per_100g.protein_g||0,carbs_g:+ai.per_100g.carbs_g||0,fat_g:+ai.per_100g.fat_g||0,sugar_g:+ai.per_100g.sugar_g||0};
        items[i].name=ai.name||name; items[i].estName=items[i].name; items[i].conf='';  // user-corrected: clear low flag
        paint();
      }catch(e){ b.disabled=false; b.innerHTML=html; errEl.style.display='';errEl.textContent=e.message||'Re-estimate failed.'; }
    });
    // add a blank row to fill in + estimate
    stage.querySelector('#add-missing').onclick=()=>{
      items.push({name:'',per:{calories:0,protein_g:0,carbs_g:0,fat_g:0,sugar_g:0},grams:100,conf:'',estName:''});
      paint();
      const inputs=stage.querySelectorAll('[data-n]'); const last=inputs[inputs.length-1]; if(last)last.focus();
    };
    // save (only rows with a name)
    stage.querySelector('#confirm-save').onclick=()=>{
      const lib=stage.querySelector('#savelib').checked; const meal=getMeal();
      const toLog=items.filter(it=>it.name.trim());
      if(!toLog.length)return;
      toLog.forEach(it=>{
        state.entries.push({id:uid(),date:viewDate,meal,name:it.name.trim(),grams:it.grams,
          calories:it.per.calories*it.grams/100,protein_g:it.per.protein_g*it.grams/100,
          carbs_g:it.per.carbs_g*it.grams/100,fat_g:it.per.fat_g*it.grams/100,sugar_g:it.per.sugar_g*it.grams/100,source:'photo'});
        if(lib)addToLibrary(it.name.trim(),it.per,it.grams);
      });
      save(); onDone?onDone():closeModal(m);
    };
  }
  paint();
}
function addToLibrary(name,per,grams){
  const ex=state.library.find(l=>l.name.toLowerCase()===name.toLowerCase());
  if(ex){ex.per_100g=per;ex.lastGrams=grams;delete ex.perServing;}
  else state.library.push({id:uid(),name,per_100g:per,lastGrams:grams});
}
function addToLibraryServing(name,calories,portion){
  const ex=state.library.find(l=>l.name.toLowerCase()===name.toLowerCase());
  if(ex){ex.perServing={calories,portion};delete ex.per_100g;delete ex.lastGrams;}
  else state.library.push({id:uid(),name,perServing:{calories,portion}});
}

/* ---------- BARCODE ---------- */
function openBarcode(){
  const m=openModal('Scan a barcode',`
    <div id="reader"></div>
    <div class="bc-hint" id="bc-hint">Point your camera at a product barcode</div>
    <div id="bc-stage"></div>
  `);
  const stage=m.querySelector('#bc-stage'), hint=m.querySelector('#bc-hint');
  let scanner=null, running=false;
  const stopScanner=()=>{ if(scanner&&running){running=false;try{return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{});}catch(_){}} return Promise.resolve(); };
  const startScan=async()=>{
    if(typeof Html5Qrcode==='undefined'){hint.textContent='Camera scanning isn’t available here — type the barcode number into “Search for a food”.';return;}
    await stopScanner();
    const opts={};
    if(typeof Html5QrcodeSupportedFormats!=='undefined'){opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];}
    try{
      scanner=new Html5Qrcode('reader',opts); running=true;
      await scanner.start({facingMode:'environment'},
        {fps:10,qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};},aspectRatio:1.3333,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
        (txt)=>{ if(!running)return; stopScanner(); doLookup(txt); },()=>{});
    }catch(e){running=false;hint.textContent='Couldn’t start the camera — type the barcode number into “Search for a food”.';}
  };
  async function doLookup(code){
    await stopScanner();
    m.querySelector('#reader').innerHTML='';
    stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
    const r=await barcodeLookup(code);
    if(!r){stage.innerHTML=`<div class="err">Product not found in OpenNutrition or Open Food Facts. Try entering it manually.</div><div class="btn-row"><button class="btn" id="man">Enter manually</button></div>`;stage.querySelector('#man').onclick=()=>{m.remove();openManual();};return;}
    weighAndLog(m,stage,r.name,r.per,r.source,r.g);
  }
  startScan();
}

/* edit/delete a food entry */
function editFood(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  const perServing=(e.unitCal!=null);
  const per100=(!perServing&&e.grams)?{calories:e.calories/e.grams*100,protein_g:(e.protein_g||0)/e.grams*100,carbs_g:(e.carbs_g||0)/e.grams*100,fat_g:(e.fat_g||0)/e.grams*100,sugar_g:(e.sugar_g||0)/e.grams*100}:null;
  let size=perServing?0:Math.max(5,Math.round(e.grams||100));   // grams per serving
  let servings=perServing?(e.unitCal?r1(e.calories/e.unitCal):1):1; if(!servings)servings=1;
  let meal=e.meal||defaultMeal(), saveLib=false;
  const fmtServ=(v)=>{const w=Math.floor(v);if(v-w===0.5)return w?`${w}½`:'½';return String(r1(v));};
  const kcal=()=>perServing?(e.unitCal*servings):(per100?per100.calories*size*servings/100:0);
  const sub=()=>perServing?`${fmtServ(servings)} × ${e.portion||'serving'}`:`${r0(size*servings)} g · ${fmtServ(servings)} serving${servings===1?'':'s'}`;
  const sh=makeSheet(`<div class="edit-head"><span class="edit-title">Edit food</span><button class="edit-x" id="ef-x">${IC_X}</button></div>
    <div class="efh">
      <div class="efh-top"><span class="efh-ic">${IC_FORK}</span><div class="efh-main"><div class="efh-name">${esc(e.name)}</div><div class="efh-sub" id="ef-sub"></div></div></div>
      <div class="efh-cal"><span id="ef-kcal">0</span><small>kcal</small></div>
    </div>
    ${perServing?'':`<div class="add-card">
      <div class="dur-h"><span>Serving size</span><span class="dur-v"><b id="ef-szv">${size}</b> g</span></div>
      <div class="dur-row"><button class="step" id="ef-szdec">${IC_MINUS}</button>
        <div class="nn-slider" id="ef-slider"><div class="nn-track"></div><div class="nn-fill" id="ef-fill"></div><div class="nn-thumb" id="ef-thumb"></div></div>
        <button class="step" id="ef-szinc">${IC_PLUS}</button></div></div>`}
    <div class="add-card">
      <div class="dur-h"><span>Servings</span>
        <div class="stepper"><button id="ef-svdec">${IC_MINUS}</button><div class="sv" id="ef-svv">${fmtServ(servings)}</div><button id="ef-svinc">${IC_PLUS}</button></div></div>
      <div class="qchips" id="ef-q"><button data-q="0.5">½</button><button data-q="1">1</button><button data-q="1.5">1½</button><button data-q="2">2×</button></div>
    </div>
    <div style="margin-top:14px"><div class="add-label">Meal</div><div class="seg" id="ef-meal">${MEALS.map(x=>`<button data-meal="${x}"${x===meal?' class="on"':''}>${x}</button>`).join('')}</div></div>
    <button class="lib-toggle" id="ef-libtog"><span class="lt-ic" id="ef-bm">${IC_BOOKMARK.replace('{F}','none')}</span><span class="lt-label">Save to Library</span><span class="set-tog" id="ef-libsw"><span></span></span></button>
    <button class="btn-del-soft" id="ef-del">${IC_TRASH}<span>Delete this entry</span></button>
    <button class="btn btn-primary btn-block" id="ef-save" style="margin-top:14px">Save changes</button>`);
  const root=sh.sheet;
  let placeSize=()=>{};
  const repaint=()=>{
    root.querySelector('#ef-kcal').textContent=r0(kcal());
    root.querySelector('#ef-sub').textContent=sub();
    root.querySelector('#ef-svv').textContent=fmtServ(servings);
    if(!perServing){const z=root.querySelector('#ef-szv');if(z)z.textContent=r0(size);placeSize();}
    root.querySelectorAll('#ef-q button').forEach(b=>b.classList.toggle('on',+b.dataset.q===servings));
  };
  if(!perServing){
    const MIN=5,MAX=600;
    const sl=root.querySelector('#ef-slider'),fillEl=root.querySelector('#ef-fill'),thumbEl=root.querySelector('#ef-thumb');
    placeSize=()=>{const f=Math.max(0,Math.min(1,(size-MIN)/(MAX-MIN)));fillEl.style.width=(f*100)+'%';thumbEl.style.left='calc('+f+' * (100% - 26px))';};
    const setFromX=(x)=>{const r=sl.getBoundingClientRect();let f=(x-r.left-13)/(r.width-26);f=Math.max(0,Math.min(1,f));size=Math.round((MIN+f*(MAX-MIN))/5)*5;repaint();};
    let drag=false;
    sl.addEventListener('pointerdown',ev=>{drag=true;try{sl.setPointerCapture(ev.pointerId);}catch(_){}setFromX(ev.clientX);});
    sl.addEventListener('pointermove',ev=>{if(drag)setFromX(ev.clientX);});
    sl.addEventListener('pointerup',()=>{drag=false;});sl.addEventListener('pointercancel',()=>{drag=false;});
    root.querySelector('#ef-szdec').onclick=()=>{size=Math.max(MIN,size-5);repaint();};
    root.querySelector('#ef-szinc').onclick=()=>{size=Math.min(MAX,size+5);repaint();};
  }
  root.querySelector('#ef-svdec').onclick=()=>{servings=Math.max(0.5,r1(servings-0.5));repaint();};
  root.querySelector('#ef-svinc').onclick=()=>{servings=Math.min(20,r1(servings+0.5));repaint();};
  root.querySelectorAll('#ef-q button').forEach(b=>b.onclick=()=>{servings=+b.dataset.q;repaint();});
  root.querySelectorAll('#ef-meal button').forEach(b=>b.onclick=()=>{meal=b.dataset.meal;root.querySelectorAll('#ef-meal button').forEach(x=>x.classList.toggle('on',x===b));});
  root.querySelector('#ef-libtog').onclick=()=>{saveLib=!saveLib;root.querySelector('#ef-libsw').classList.toggle('on',saveLib);root.querySelector('#ef-bm').innerHTML=IC_BOOKMARK.replace('{F}',saveLib?'currentColor':'none');};
  root.querySelector('#ef-x').onclick=()=>sh.close();
  root.querySelector('#ef-del').onclick=()=>{state.entries=state.entries.filter(x=>x.id!==id);save();sh.close();};
  root.querySelector('#ef-save').onclick=()=>{
    e.meal=meal;
    if(perServing){
      e.calories=e.unitCal*servings; e.servingLabel=`${fmtServ(servings)} ${e.portion||'serving'}`;
      if(saveLib)addToLibraryServing(e.name,e.unitCal,e.portion||'serving');
    }else{
      const g=size*servings;
      e.grams=g; e.calories=per100.calories*g/100; e.protein_g=per100.protein_g*g/100; e.carbs_g=per100.carbs_g*g/100; e.fat_g=per100.fat_g*g/100; e.sugar_g=per100.sugar_g*g/100; e.servingLabel=`${r0(g)} g`;
      if(saveLib&&g)addToLibrary(e.name,per100,Math.round(size));
    }
    save();sh.close();
  };
  repaint();
}

function ringSVG(pct){
  const r=58,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,pct||0)));
  return `<svg viewBox="0 0 140 140" width="128" height="128">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent-bg)" stroke-width="12"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 70 70)"/>
  </svg>`;
}
function trendSVG(pts){
  if(pts.length<2)return '<div class="empty" style="border:none">Log at least two mornings to see your trend.</div>';
  const W=320,H=130,padT=10,padB=4,padL=4,padR=4;
  const xs=pts.map(p=>p.t),ys=pts.map(p=>p.v);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);const pad=(maxY-minY)*0.25||1;minY-=pad;maxY+=pad;
  const X=t=>padL+(maxX===minX?0.5:(t-minX)/(maxX-minX))*(W-padL-padR);
  const Y=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  const daily=pts.map(p=>`${X(p.t)},${Y(p.v)}`).join(' ');
  const avg=pts.map(p=>{const win=pts.filter(q=>q.t<=p.t&&q.t>p.t-7*864e5);return [X(p.t),Y(win.reduce((s,q)=>s+q.v,0)/win.length)];});
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <polyline fill="none" stroke="#EBBFCF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" points="${daily}"/>
    <polyline fill="none" stroke="#D8557A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" points="${avg.map(a=>a.join(',')).join(' ')}"/>
    <circle cx="${X(last.t)}" cy="${Y(last.v)}" r="4.5" fill="#fff" stroke="#D8557A" stroke-width="3"/>
  </svg>`;
}

    const age=+p.age||0, ht=+p.height||0;
    if(!wkg||!age||!ht){
      $('p-bmr').textContent='—';$('p-maint').textContent='—';$('p-tgt').textContent='—';
      $('p-tsub').textContent=!wkg?'Log a weigh-in to calculate':'Fill in age & height';
      $('p-set').disabled=true;
      $('p-proj').innerHTML='';
      return;
    }
    $('p-set').disabled=false;
    const bmr=10*wkg+6.25*ht-5*age+(p.sex==='male'?5:-161);
    const maint=bmr*p.activity;
    const lose=p.goal==='lose';
    const deficit=Math.round(p.rate*7700/7);
    const floor=p.sex==='male'?1500:1200;
    let target=lose?maint-deficit:maint, clamped=false;
    if(target<floor){target=floor;clamped=true;}
    $('p-bmr').textContent=fmtN(round5(bmr))+' kcal';
    $('p-maint').textContent=fmtN(round5(maint))+' kcal';
    $('p-tgt').textContent=fmtN(round5(target));
    $('p-tsub').textContent=lose?(clamped?'Held at a safe minimum':'−'+fmtN(round5(deficit))+' kcal/day deficit'):'Maintenance calories';
    p._target=round5(target);
    // projection
    if(lose && p.goalWeight!=null){
      const toGo=wkg-p.goalWeight;
      if(toGo>0.05){
        const wks=Math.max(1,Math.round(toGo/p.rate));
        const eta=new Date(); eta.setDate(eta.getDate()+Math.round(toGo/p.rate*7));
        $('p-proj').innerHTML=`<div class="proj"><div class="ic">${CALOK_SVG}</div><div class="tx">Lose ${r1(kgToUnit(toGo,wu))} ${wu} at ${p.rate} kg/week — reach ${r1(kgToUnit(p.goalWeight,wu))} ${wu} around ${MN[eta.getMonth()]} ${eta.getDate()} (~${wks} week${wks===1?'':'s'}).</div></div>`;
      } else {
        $('p-proj').innerHTML=`<div style="background:var(--accent-bg);border-radius:14px;padding:12px 14px;margin-top:16px;font-size:12.5px;color:var(--text-soft)">Set a goal weight below your current weight to see a projection.</div>`;
      }
    } else $('p-proj').innerHTML='';
  }
  const save2=()=>{p.lossRate=Math.round(p.rate*7700/7);save();$('p-saved').innerHTML='';paint();};

  document.querySelectorAll('#p-sex button').forEach(b=>b.onclick=()=>{p.sex=b.dataset.s;save2();});
  $('p-ageup').onclick=()=>{p.age=Math.min(100,ageNow()+1);save2();};
  $('p-agedn').onclick=()=>{p.age=Math.max(14,ageNow()-1);save2();};
  const htStep=(d)=>{const disp=p.height?cmToUnit(p.height,hu):(hu==='in'?67:170);const nd=Math.round(disp)+d;p.height=r1(unitToCm(nd,hu));save2();};
  $('p-htup').onclick=()=>htStep(1); $('p-htdn').onclick=()=>htStep(-1);
  document.querySelectorAll('#p-act .achip').forEach(b=>b.onclick=()=>{p.activity=+b.dataset.m;save2();});
  document.querySelectorAll('#p-goal button').forEach(b=>b.onclick=()=>{p.goal=b.dataset.g;save2();});
  const gwStep=(d)=>{const base=p.goalWeight!=null?p.goalWeight:(wkg||70);const disp=kgToUnit(base,wu)+d;p.goalWeight=r1(unitToKg(disp,wu));save2();};
  $('p-gwup').onclick=()=>gwStep(0.5); $('p-gwdn').onclick=()=>gwStep(-0.5);
  document.querySelectorAll('#p-pace .pace').forEach(b=>b.onclick=()=>{p.rate=+b.dataset.r;save2();});
  $('p-set').onclick=()=>{ if(p._target){state.settings.dailyTarget=p._target;save();$('p-saved').innerHTML=`<div class="saved-note">${fmtN(p._target)} kcal set as your daily target ✓</div>`;} };
  paint();
}

/* ---------- SETTINGS ---------- */
function openSettings(){
  const s=state.settings;
  const I=(p)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const IC_SCALE=I('<path d="M7 8h10a2 2 0 012 2v9a2 2 0 01-2 2H7a2 2 0 01-2-2v-9a2 2 0 012-2z"/><path d="M12 4v4M9.5 13.5L12 8l2.5 5.5"/>');
  const IC_RULER=I('<path d="M12 3v18M8 6l4-3 4 3M8 18l4 3 4-3"/>');
