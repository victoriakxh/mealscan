<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --font:'DM Sans',-apple-system,system-ui,sans-serif;
    --display:'Baloo 2','DM Sans',sans-serif;
    --header:#EF9CB4;
    --bg:linear-gradient(180deg,#FDEFF3,#FBE7EE);
    --surface:#FFFFFF;
    --text:#2B2A26;
    --text-soft:#9A938A;
    --divider:#EFE9DF;
    --accent:#EF9CB4;
    --accent-strong:#E37D9A;
    --accent-bg:#FBEFF4;
    --danger:#D67A8E;
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);background-attachment:fixed;color:var(--text);
    font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:var(--font);font-size:16px;color:var(--text);}
  button{cursor:pointer;background:none;border:none;}
  input,select{background:var(--surface);border:1.5px solid var(--divider);border-radius:var(--radius-sm);
    padding:11px 14px;width:100%;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  a{color:var(--accent-strong);}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 18px var(--reserve,160px);}

  .band{background:var(--header);margin:0 -18px;padding:16px 18px 20px;color:#fff;}
  .band-top{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:var(--display);font-weight:800;font-size:20px;color:#fff;}
  .gear{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;color:#fff;}
  .gear:active{background:rgba(255,255,255,.34);}
  .bandnav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .bandnav .navbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;line-height:1;}
  .bandnav .navbtn.off{opacity:.35;pointer-events:none;}
  .bandnav .d1{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;line-height:1;text-align:center;}
  .bandnav .d2{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;}
  .hero{text-align:center;margin-top:14px;}
  .hero-num{font-family:var(--display);font-weight:800;font-size:60px;color:#fff;line-height:.95;}
  .hero-label{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.03em;}
  .progress{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .progress .track{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;}
  .progress .fill{height:100%;background:rgba(255,255,255,.92);border-radius:6px;transition:width .3s ease;}
  .progress .pct{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;min-width:34px;text-align:right;}
  .statchips{display:flex;gap:10px;margin-top:12px;}
  .statchip{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:9px 8px;text-align:center;}
  .statchip .l{font-size:10px;color:rgba(255,255,255,.8);}
  .statchip .v{font-family:var(--display);font-weight:700;font-size:16px;color:#fff;margin-top:2px;}

  .card{background:var(--surface);border-radius:24px;padding:18px;box-shadow:0 3px 14px rgba(43,42,38,.05);margin-top:14px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--text);}
  .card-sub{font-size:13px;color:var(--text-soft);}

  .macrocols{display:flex;gap:10px;}
  .macrocol{flex:1;}
  .macrocol .mv{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;}
  .macrocol .mv s{text-decoration:none;font-size:12px;font-weight:600;color:var(--text-soft);}
  .macrocol .ml{font-size:12px;color:var(--text-soft);margin:5px 0 6px;}
  .mbar{height:5px;border-radius:4px;background:#ECE6DB;overflow:hidden;}
  .mbar i{display:block;height:100%;}

  .mealgroup{padding-top:14px;}
  .meal-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-line .ml-left{display:flex;align-items:center;gap:8px;}
  .meal-dot{width:7px;height:7px;border-radius:50%;}
  .meal-name{font-weight:600;font-size:14px;color:var(--text);}
  .meal-sub{font-size:13px;color:var(--text-soft);}
  .fooditems{display:flex;flex-direction:column;gap:8px;}
  .fooditem{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--accent-bg);border-radius:12px;padding:9px 13px;text-align:left;}
  .fooditem:active{filter:brightness(.96);}
  .fooditem .fi-name{font-weight:600;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fooditem .fi-sub{font-size:12.5px;color:var(--text-soft);margin-top:1px;}
  .fooditem .fi-right{display:flex;align-items:center;gap:8px;flex:none;}
  .fooditem .fi-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}
  .chev{color:#C9C2B6;flex:none;}

  .act-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid #F0EAE0;}
  .act-item.first{border-top:none;padding-top:2px;}
  .act-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-bg);
    display:flex;align-items:center;justify-content:center;color:var(--accent-strong);flex:none;}
  .act-name{font-weight:600;font-size:14px;color:var(--text);}
  .act-sub{font-size:13px;color:var(--text-soft);}
  .act-cal{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text);}

  .topbar{background:var(--header);margin:0 -18px;padding:16px 18px 18px;color:#fff;
    display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-family:var(--display);font-size:20px;font-weight:800;margin:0;color:#fff;}
  .topbar .date{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px;}
  .topbar .gear{flex:none;}

  .budget{background:var(--surface);border-radius:var(--radius);box-shadow:0 3px 14px rgba(43,42,38,.05);padding:22px;margin-top:14px;}
  .budget .big{font-family:var(--display);font-size:50px;font-weight:800;line-height:1;color:var(--accent-strong);}
  .budget .biglabel{font-size:13px;color:var(--text-soft);margin-top:6px;}
  .budget .bd{display:flex;gap:22px;margin-top:18px;font-size:13px;color:var(--text-soft);}
  .budget .bd b{display:block;color:var(--text);font-weight:700;font-size:16px;font-family:var(--display);}

  .section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);padding:20px 4px 6px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:13px 16px;margin-top:9px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:0 3px 14px rgba(43,42,38,.05);}
  .row .name{font-weight:600;}
  .row .sub{font-size:13px;color:var(--text-soft);margin-top:2px;}
  .row .val{font-weight:700;white-space:nowrap;color:var(--accent-strong);font-family:var(--display);}
  .row.tappable:active{filter:brightness(.97);}
  .empty{padding:18px;color:var(--text-soft);font-size:14px;background:var(--surface);border-radius:var(--radius-sm);margin-top:9px;}
  .daynav{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;margin-top:9px;background:var(--surface);border-radius:999px;}
  .daynav .arrow{font-size:22px;color:var(--accent-strong);font-weight:800;padding:6px 22px;}
  .daynav .arrow.off{color:var(--divider);pointer-events:none;}
  .daynav .dlabel{font-weight:700;font-size:16px;font-family:var(--display);}
  .mealhead{display:flex;justify-content:space-between;align-items:baseline;padding:20px 6px 2px;}
  .mealhead .mt{font-size:13px;font-weight:700;color:var(--accent-strong);font-family:var(--display);}
  .mealhead .ms{font-size:13px;color:var(--text-soft);}

  .btn{display:inline-block;border:1.5px solid var(--divider);border-radius:999px;padding:13px 18px;
    font-weight:700;text-align:center;background:var(--surface);color:var(--text);}
  .btn:active{filter:brightness(.97);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-block{display:block;width:100%;}
  .btn-row{display:flex;gap:10px;margin-top:12px;}
  .btn-row .btn{flex:1;}
  .btn-danger{color:var(--danger);border-color:var(--divider);background:var(--surface);}
  .linkbtn{font-size:13px;font-weight:700;color:var(--text-soft);padding:6px 10px;border-radius:999px;}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:var(--fab-bottom,96px);
    background:var(--header);color:#fff;font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.06em;
    border:3px solid var(--accent-bg);padding:13px 40px;border-radius:26px;z-index:40;box-shadow:0 12px 26px -8px rgba(0,0,0,.28);}
  .fab:active{filter:brightness(.95);}

  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:space-around;align-items:center;
    background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;z-index:50;
    padding:10px 16px calc(12px + env(safe-area-inset-bottom));}
  .tabbar .tab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 18px;border-radius:16px;color:var(--text-soft);}
  .tabbar .tab .tlabel{font-size:11px;font-weight:600;}
  .tabbar .tab.active{background:var(--accent-bg);color:var(--accent-strong);}
  .tabbar .tab.active .tlabel{font-weight:700;}

  .overlay{position:fixed;inset:0;background:var(--bg);background-attachment:fixed;z-index:60;overflow-y:auto;}
  .overlay-inner{max-width:560px;margin:0 auto;padding:0 18px calc(40px + env(safe-area-inset-bottom));}
  .overlay .mhead{display:flex;justify-content:space-between;align-items:center;padding:20px 4px 14px;position:sticky;top:0;background:var(--bg);background-attachment:fixed;z-index:2;}
  .overlay .mhead h2{font-family:var(--display);font-size:20px;font-weight:700;margin:0;}
  .field{margin-top:18px;}
  .field label{display:block;font-size:13px;color:var(--text-soft);margin-bottom:6px;font-weight:600;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;margin-top:0;}
  .hint{font-size:13px;color:var(--text-soft);margin-top:8px;}
  .note{font-size:13px;color:var(--text-soft);background:var(--accent-bg);padding:13px 15px;margin-top:16px;border-radius:var(--radius-sm);}
  .err{font-size:14px;color:var(--danger);margin-top:14px;font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .chip{border:1.5px solid var(--divider);padding:9px 16px;font-size:14px;font-weight:600;background:var(--surface);border-radius:999px;color:var(--text);}

<script>

const THEMES={
  pink:{name:'Baby Pink',desc:'Warm & playful',header:'#EF9CB4',strong:'#E37D9A',itemBg:'#FBEFF4',gradTop:'#FDEFF3',gradBot:'#FBE7EE',sw:'linear-gradient(160deg,#E8839B,#D86A86)'},

  lavender:{name:'Lavender',desc:'Soft & dreamy',header:'#A285CF',strong:'#9274C7',itemBg:'#F3EDFA',gradTop:'#F4EFFB',gradBot:'#EDE5F8',sw:'linear-gradient(160deg,#B599D9,#9274C7)'},

function applyTheme(id){

const GEAR_SVG='<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h9M17 7h3"/><path d="M4 17h3M11 17h9"/><circle cx="15" cy="7" r="2.4" fill="#fff" stroke="none"/><circle cx="9" cy="17" r="2.4" fill="#fff" stroke="none"/></svg>';

function defaultMeal(){const h=new Date().getHours();return h<11?'Breakfast':h<15?'Lunch':h<21?'Dinner':'Snack';}
function shiftDay(key,delta){const a=key.split('-').map(Number);const d=new Date(a[0],a[1]-1,a[2]);d.setDate(d.getDate()+delta);return dateKey(d);}
function dayLabel(key){if(key===todayKey())return 'Today';if(key===shiftDay(todayKey(),-1))return 'Yesterday';return new Date(key+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'long'});}
function mealChips(sel){return `<div class="field"><label>Meal</label><div class="chips mealchips">${MEALS.map(x=>`<button class="chip${x===sel?' sel':''}" data-meal="${x}">${x}</button>`).join('')}</div></div>`;}
function wireMealChips(root){const box=root.querySelector('.mealchips');let cur=box.querySelector('.chip.sel')?box.querySelector('.chip.sel').dataset.meal:MEALS[0];box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{cur=c.dataset.meal;box.querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',x===c));});return ()=>cur;}
const UNITS=[{u:'gram',g:1},{u:'tsp',g:5},{u:'tbsp',g:15},{u:'cup',g:240},{u:'bowl',g:250},{u:'plate',g:300},{u:'piece',g:50},{u:'slice',g:30},{u:'serving',g:100}];
function servingWidget(){
  return `<div class="field"><label>Serving size</label>
    <select id="sv-unit">${UNITS.map(x=>`<option value="${x.u}">${x.u}</option>`).join('')}</select></div>

    <div class="field" id="sv-gpu-wrap" style="display:none"><label>Grams per serving</label><input type="number" inputmode="decimal" id="sv-gpu" value="1"></div>
  </div>
  <div class="hint" id="sv-total"></div>`;
}
function wireServing(root,per,initGrams){
  const unitSel=root.querySelector('#sv-unit'),qty=root.querySelector('#sv-qty'),gpu=root.querySelector('#sv-gpu'),gpuWrap=root.querySelector('#sv-gpu-wrap'),total=root.querySelector('#sv-total');
  function grams(){return (+qty.value||0)*(+gpu.value||0);}
  function recompute(){const g=grams();total.textContent=`= ${r1(g)} g${per?` · ${r0(per.calories*g/100)} kcal`:''}`;}
  function syncUnit(){
    if(unitSel.value==='gram'){gpuWrap.style.display='none';gpu.value=1;qty.value=100;}
    else{const d=UNITS.find(x=>x.u===unitSel.value);gpuWrap.style.display='';gpu.value=d.g;qty.value=1;}
    recompute();
  }
  unitSel.onchange=syncUnit;qty.oninput=recompute;gpu.oninput=recompute;
  if(initGrams){unitSel.value='gram';gpuWrap.style.display='none';gpu.value=1;qty.value=r1(initGrams);}
  recompute();
  return {grams,desc:()=>{const u=unitSel.value,q=+qty.value||0;return u==='gram'?`${r1(grams())} g`:`${q} ${u} (${r1(grams())} g)`;}};
}

    for(const it of ONDB){if(it[7])ONBYEAN.set(it[7],it);}

  })();

}

/* ---------- bottom-sheet helper (slide up + swipe down, like Settings) ---------- */
function makeSheet(innerHtml){
  const overlay=el(`<div class="sheet-overlay"><div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"><div class="sheet-grip"></div></div>
    ${innerHtml}
  </div></div>`);
  $('modal-root').appendChild(overlay);
  const sheet=overlay.querySelector('#sheet');
  sheet.style.transform='translateY(100%)';
  requestAnimationFrame(()=>{sheet.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)';sheet.style.transform='translateY(0)';});
  let closed=false;
  const close=()=>{
    if(closed)return; closed=true;
    camStop();
    sheet.style.transition='transform .25s ease-in';sheet.style.transform='translateY(100%)';
    overlay.style.transition='background .25s';overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.remove();render();},240);
  };
  overlay.onclick=(e)=>{if(e.target===overlay)close();};
  let startY=0,dY=0,drag=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dY=0;drag=false;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-startY;if(sheet.scrollTop<=0&&dy>0){drag=true;dY=dy;sheet.style.transform=`translateY(${dy}px)`;e.preventDefault();}},{passive:false});
  sheet.addEventListener('touchend',()=>{if(!drag){sheet.style.transition='';return;}drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}});
  const handle=overlay.querySelector('#sheet-handle');
  const ps=(y)=>{startY=y;dY=0;drag=true;sheet.style.transition='none';};
  const pm=(y)=>{if(!drag)return;dY=Math.max(0,y-startY);sheet.style.transform=`translateY(${dY}px)`;};
  const pe=()=>{if(!drag)return;drag=false;sheet.style.transition='transform .25s ease';if(dY>90){close();}else{sheet.style.transform='translateY(0)';}};
  handle.addEventListener('mousedown',e=>{e.preventDefault();ps(e.clientY);const mm=ev=>pm(ev.clientY),mu=()=>{pe();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  return {overlay,sheet,close};
}

      <div class="btn-row"><button class="btn" id="bc-scan">Restart camera</button><button class="btn btn-primary" id="bc-look">Look up</button></div>
      <div id="bc-stage"></div>`;
    const stage=body.querySelector('#bc-stage'), hint=body.querySelector('#bc-hint');
    body.querySelector('#bc-back').onclick=()=>{stopScanner();renderFood();};
    const onDetect=(txt)=>{ if(!running)return; stopScanner(); body.querySelector('#bc-num').value=txt; doLookup(txt); };
    const startScan=async()=>{
      if(typeof Html5Qrcode==='undefined'){ hint.textContent='Camera scanning isn’t available here — type the barcode number instead.'; return; }
      await stopScanner();
      const opts={};
      if(typeof Html5QrcodeSupportedFormats!=='undefined'){
        opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];
      }
      try{
        scanner=new Html5Qrcode('reader',opts); running=true;
        hint.textContent='Point your camera at a product barcode';
        await scanner.start({facingMode:'environment'},
          {fps:10, qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};}, aspectRatio:1.3333, experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
          onDetect, ()=>{});
      }catch(e){ running=false; hint.textContent='Couldn’t start the camera — type the barcode number instead.'; }
    };
    body.querySelector('#bc-scan').onclick=startScan;
    body.querySelector('#bc-look').onclick=()=>doLookup(body.querySelector('#bc-num').value.trim());
    async function doLookup(code){
      if(!code){stage.innerHTML=`<div class="err">Enter a barcode number.</div>`;return;}
      await stopScanner();
      stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
      try{ await ensureONDB(); const hit=ONBYEAN&&ONBYEAN.get(String(code)); if(hit){ result(hit[0],{calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]},'opennutrition',hit[6]); return; } }catch(e){}
      stage.innerHTML=`<div class="spinner">Looking up product…</div>`;
      try{
        const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments`);
        const data=await res.json();
        if(!data.product){ stage.innerHTML=`<div class="err">Product not found. Try entering it manually.</div><button class="btn btn-block" id="bc-man" style="margin-top:10px">Enter manually</button>`; stage.querySelector('#bc-man').onclick=renderManual; return; }
        const n=data.product.nutriments||{};
        result(data.product.product_name||('Item '+code),{calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)},'barcode');
      }catch(e){ stage.innerHTML=`<div class="err">Lookup failed. Check your connection or enter manually.</div>`; }
    }
    function result(name,per,source,g){
      body.innerHTML=`<div class="sub-head"><button class="circ-back" id="bc-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="bc-stage2"></div>`;
      body.querySelector('#bc-b2').onclick=renderBarcode;
      weighAndLog(null,body.querySelector('#bc-stage2'),name,per,source,g,()=>sh.close());
    }
    startScan();
  }

  function renderLibrary(){
    camStop();
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="lb-back">${IC_BACK}</button><h3>Library</h3></div>
      <div class="seg" id="lib-tabs"><button data-t="recent" class="on">Recent</button><button data-t="saved">Saved</button><button data-t="mine">My foods</button></div>
      <div id="lib-body" style="margin-top:10px"></div>`;
    body.querySelector('#lb-back').onclick=renderFood;
    const lb=body.querySelector('#lib-body');
    const tabs=body.querySelectorAll('#lib-tabs button');
    const rowHtml=(name,sub,attr)=>`<div class="recent-row"><span class="recent-ic">${IC_FORK}</span><div class="recent-main"><div class="rn">${esc(name)}</div><div class="rs">${esc(sub)}</div></div><button class="recent-add" ${attr} aria-label="Add">${IC_PLUS}</button></div>`;
    const distinct=()=>{const seen=new Set(),out=[];for(let i=state.entries.length-1;i>=0;i--){const e=state.entries[i],k=(e.name||'').toLowerCase();if(!e.name||seen.has(k))continue;seen.add(k);out.push({name:e.name,sub:`${e.servingLabel||(e.grams?r0(e.grams)+' g':'')} · ${r0(e.calories)} kcal`,entry:e});}return out;};
    function quickList(list){
      if(!list.length){lb.innerHTML=`<div class="empty" style="border:none">Nothing logged yet.</div>`;return;}
      lb.innerHTML=list.map((r,i)=>rowHtml(r.name,r.sub,`data-i="${i}"`)).join('');
      lb.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{relogFood(list[+b.dataset.i]);sh.close();});
    }
    function showSaved(){
      const lib2=state.library;
      if(!lib2.length){lb.innerHTML=`<div class="empty" style="border:none">Your library is empty. Tick “Save to library” after logging to reuse items here.</div>`;return;}
      lb.innerHTML=lib2.map(l=>{const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;return rowHtml(l.name,sub,`data-lib="${l.id}"`);}).join('');
      lb.querySelectorAll('[data-lib]').forEach(b=>b.onclick=()=>{
        const l=state.library.find(x=>x.id===b.dataset.lib);
        body.innerHTML=`<div class="sub-head"><button class="circ-back" id="lb-b2">${IC_BACK}</button><h3>Add item</h3></div><div id="lb-stage"></div>`;
        body.querySelector('#lb-b2').onclick=renderLibrary;
        const stage=body.querySelector('#lb-stage');
        if(l.perServing)logServing(null,stage,l.name,l.perServing.calories,l.perServing.portion,'library',()=>sh.close());
        else weighAndLog(null,stage,l.name,l.per_100g,'library',l.lastGrams,()=>sh.close());
      });
    }
    tabs.forEach(b=>b.onclick=()=>{tabs.forEach(x=>x.classList.toggle('on',x===b));const t=b.dataset.t;t==='recent'?quickList(recentFoods(20)):t==='mine'?quickList(distinct()):showSaved();});
    quickList(recentFoods(20));
  }

  function renderManual(){
    camStop();
    body.innerHTML=`<div class="sub-head"><button class="circ-back" id="mn-back">${IC_BACK}</button><h3>Enter manually</h3></div>
      <div class="mfield"><label>Food name</label><input id="mn-name" placeholder="e.g. Avocado toast"></div>
      <div style="margin-top:12px"><label class="mlbl">Meal</label><div class="seg" id="mn-meal">${MEALS.map(x=>`<button data-meal="${x}"${x===defaultMeal()?' class="on"':''}>${x}</button>`).join('')}</div></div>
      <div class="mrow" style="margin-top:12px">
        <div class="mfield"><label>Serving (g)</label><input type="number" inputmode="decimal" id="mn-serv" value="100"></div>
        <div class="mfield"><label>Servings</label><input type="number" inputmode="decimal" id="mn-qty" value="1"></div>
      </div>
      <div class="mcal"><label>Calories</label><div class="calwrap"><input type="number" inputmode="numeric" id="mn-cal" placeholder="0"><span class="calu">kcal</span></div></div>
      <div class="mrow" style="margin-top:12px">
        <div class="mfield"><label>Protein</label><input type="number" inputmode="decimal" id="mn-p" value="0"></div>
        <div class="mfield"><label>Carbs</label><input type="number" inputmode="decimal" id="mn-c" value="0"></div>
        <div class="mfield"><label>Fat</label><input type="number" inputmode="decimal" id="mn-f" value="0"></div>
      </div>
      <div class="toggle-row" style="margin-top:12px"><input type="checkbox" id="mn-lib" style="width:auto"><label for="mn-lib" style="margin:0">Save to library</label></div>
      <button class="btn btn-primary btn-block" id="mn-save" style="margin-top:14px">Add food</button>`;
    body.querySelector('#mn-back').onclick=renderFood;

    body.querySelectorAll('#mn-meal button').forEach(b=>b.onclick=()=>{meal=b.dataset.meal;body.querySelectorAll('#mn-meal button').forEach(x=>x.classList.toggle('on',x===b));});
    body.querySelector('#mn-save').onclick=()=>{
      const name=body.querySelector('#mn-name').value.trim()||'Item';
      const servG=+body.querySelector('#mn-serv').value||0, qty=+body.querySelector('#mn-qty').value||1;
      const cal=+body.querySelector('#mn-cal').value||0, p=+body.querySelector('#mn-p').value||0, c=+body.querySelector('#mn-c').value||0, f=+body.querySelector('#mn-f').value||0;
      const grams=servG*qty;
      state.entries.push({id:uid(),date:viewDate,meal,name,grams,servingLabel:`${r1(qty)} × ${r0(servG)} g`,calories:cal*qty,protein_g:p*qty,carbs_g:c*qty,fat_g:f*qty,sugar_g:0,source:'manual'});
      if(body.querySelector('#mn-lib').checked && servG>0) addToLibrary(name,{calories:cal*100/servG,protein_g:p*100/servG,carbs_g:c*100/servG,fat_g:f*100/servG,sugar_g:0},servG);
      save();sh.close();

  function renderExercise(){
    camStop();
    const wkg=latestWeightKg();
    const acts=[...QUICK,...Object.keys(MET).filter(a=>!QUICK.includes(a))];
    let activity='Running',intensity='moderate',minutes=28;
    const calc=()=>Math.round(MET[activity][intensity]*(wkg||60)*(minutes/60));

    function chooseActivity(){
      body.innerHTML=`
        <div class="sub-head"><button class="circ-back" id="ca-back">${IC_BACK}</button><h3>Choose activity</h3></div>
        <div class="chooser">${acts.map(a=>`<button class="choose-row${a===activity?' on':''}" data-a="${esc(a)}">
          <span class="choose-ic">${actMeta(a).ic}</span>
          <span class="choose-main"><span class="cn">${esc(a)}</span><span class="cc">${actMeta(a).cat}</span></span>
          ${a===activity?`<span class="choose-chk">${IC_CHECK}</span>`:''}</button>`).join('')}</div>`;
      body.querySelector('#ca-back').onclick=draw;
      body.querySelectorAll('.choose-row').forEach(r=>r.onclick=()=>{activity=r.dataset.a;draw();});
    }

    function draw(){
      body.innerHTML=`
        <button class="act-pick" id="ex-actbtn"><span class="act-ic">${actMeta(activity).ic}</span>
          <div class="act-main"><div class="an">${esc(activity)}</div><div class="as">${actMeta(activity).cat}</div></div>
          ${IC_CHEV}</button>
        <div class="add-card"><div class="add-card-h">Intensity</div>
          <div class="seg" id="ex-int">
            <button data-i="light"${intensity==='light'?' class="on"':''}>Light</button>
            <button data-i="moderate"${intensity==='moderate'?' class="on"':''}>Moderate</button>
            <button data-i="vigorous"${intensity==='vigorous'?' class="on"':''}>Vigorous</button>
          </div></div>
        <div class="add-card"><div class="dur-h"><span>Duration</span><span class="dur-v"><b id="ex-minv">${minutes}</b> min</span></div>
          <div class="dur-row"><button class="step" id="ex-dec">${IC_MINUS}</button>
            <input type="range" class="nn-range" id="ex-rng" min="5" max="120" step="1" value="${minutes}">
            <button class="step" id="ex-inc">${IC_PLUS}</button></div></div>
        <div class="burned"><div class="burned-l">Calories burned</div>
          <div class="burned-n" id="ex-kcal">${calc()}</div>
          <div class="burned-s">kcal · estimated from intensity, time${wkg?' &amp; weight':''}</div></div>
        ${wkg?'':'<div class="hint" style="text-align:center;margin-top:8px">Using an estimated 60&nbsp;kg — log your weight for a more accurate burn.</div>'}
        <button class="btn btn-primary btn-block" id="ex-save" style="margin-top:16px">Save exercise</button>`;
      const rng=body.querySelector('#ex-rng');
      const fill=()=>{const p=(minutes-5)/115,off=(0.5-p)*26;const stop=`calc(${(p*100).toFixed(2)}% + ${off.toFixed(1)}px)`;rng.style.background=`linear-gradient(90deg,var(--accent) ${stop},var(--accent-bg) ${stop})`;};
      const paint=()=>{body.querySelector('#ex-minv').textContent=minutes;body.querySelector('#ex-kcal').textContent=calc();fill();};
      fill();
      body.querySelector('#ex-actbtn').onclick=chooseActivity;
      body.querySelectorAll('#ex-int button').forEach(b=>b.onclick=()=>{intensity=b.dataset.i;body.querySelectorAll('#ex-int button').forEach(x=>x.classList.toggle('on',x===b));body.querySelector('#ex-kcal').textContent=calc();});
      rng.oninput=()=>{minutes=+rng.value;paint();};
      body.querySelector('#ex-dec').onclick=()=>{minutes=Math.max(5,minutes-1);rng.value=minutes;paint();};
      body.querySelector('#ex-inc').onclick=()=>{minutes=Math.min(120,minutes+1);rng.value=minutes;paint();};
      body.querySelector('#ex-save').onclick=()=>{
        state.exercise.push({id:uid(),date:viewDate,activity,intensity,minutes,met:MET[activity][intensity],caloriesBurned:calc()});
        save();sh.close();
      };
    }
    draw();
  }

  tabs.forEach(b=>b.onclick=()=>{tabs.forEach(x=>x.classList.toggle('on',x===b));b.dataset.tab==='food'?renderFood():renderExercise();});
  renderFood();
}

/* ---------- SEARCH BY NAME ---------- */
function openSearch(){
  const m=openModal('Search by name',`
    <div class="field"><label>Food or brand name</label>
      <input id="sf-q" placeholder="e.g. chicken rice, Big Mac, Milo" autocomplete="off"></div>
    <div class="btn-row"><button class="btn btn-primary btn-block" id="sf-go">Also search packaged foods</button></div>
    <div class="hint">Your library, the local database, and OpenNutrition (13,000+ foods with macros) match as you type — all offline. The button also checks Open Food Facts for packaged items; barcode scanning is most reliable for branded products.</div>
    <div id="sf-lib"></div>
    <div id="sf-results"></div>
  `);
  const q=m.querySelector('#sf-q'), libBox=m.querySelector('#sf-lib'), res=m.querySelector('#sf-results');
  let dbMatches=[], onMatches=[];
  function pickPer(name,per,source,g){
    const stage=el('<div></div>'); m.querySelector('#m-body').innerHTML=''; m.querySelector('#m-body').appendChild(stage);
    weighAndLog(m,stage,name,per,source,g);
  }
  function pickServing(name,cal,portion,source){
    const stage=el('<div></div>'); m.querySelector('#m-body').innerHTML=''; m.querySelector('#m-body').appendChild(stage);
    logServing(m,stage,name,cal,portion,source);
  }
  function renderLocal(){
    const term=q.value.trim().toLowerCase();
    let html='';
    const libM=term?state.library.filter(l=>l.name.toLowerCase().includes(term)):[];
    if(libM.length)html+=`<div class="section-label">Personal library</div>`+libM.map(l=>{
      const sub=l.perServing?`${r0(l.perServing.calories)} kcal per ${esc(l.perServing.portion)}`:`${r0(l.per_100g.calories)} kcal/100g`;
      return `<div class="row tappable" data-lib="${l.id}"><div><div class="name">${esc(l.name)}</div><div class="sub">${sub} · personal library</div></div></div>`;}).join('');
    dbMatches=term?(DB||[]).filter(f=>f.name.toLowerCase().includes(term)).slice(0,20):[];
    if(dbMatches.length)html+=`<div class="section-label">Local database</div>`+dbMatches.map((f,i)=>`<div class="row tappable" data-db="${i}"><div><div class="name">${esc(f.name)}</div><div class="sub">${r0(f.calories)} kcal per ${esc(f.portion)} · local database</div></div></div>`).join('');
    onMatches=[];
    if(term.length>=2){
      if(ONDB){
        onMatches=ONDB.filter(a=>a[0].toLowerCase().includes(term)).slice(0,30);
        if(onMatches.length)html+=`<div class="section-label">OpenNutrition</div>`+onMatches.map((f,i)=>`<div class="row tappable" data-on="${i}"><div><div class="name">${esc(f[0])}</div><div class="sub">${r0(f[1])} kcal/100g · OpenNutrition</div></div></div>`).join('');
      }else{
        html+=`<div class="section-label">OpenNutrition</div><div class="empty" id="on-load">Loading the food database (first time only, ~10 MB)…</div>`;
      }
    }
    if(term && (libM.length||dbMatches.length||onMatches.length))
      html+=`<div class="hint" style="padding:14px 4px 0">Nutrition data from <a href="https://www.opennutrition.app" target="_blank" rel="noopener">OpenNutrition</a> &amp; Open Food Facts contributors.</div>`;
    libBox.innerHTML=html;
    libBox.querySelectorAll('[data-lib]').forEach(n=>n.onclick=()=>{const l=state.library.find(x=>x.id===n.dataset.lib);if(l.perServing)pickServing(l.name,l.perServing.calories,l.perServing.portion,'library');else pickPer(l.name,l.per_100g,'library',l.lastGrams);});
    libBox.querySelectorAll('[data-db]').forEach(n=>n.onclick=()=>{const f=dbMatches[+n.dataset.db];pickServing(f.name,f.calories,f.portion,'local');});
    libBox.querySelectorAll('[data-on]').forEach(n=>n.onclick=()=>{const f=onMatches[+n.dataset.on];pickPer(f[0],{calories:f[1],protein_g:f[2],carbs_g:f[3],fat_g:f[4],sugar_g:f[5]},'opennutrition',f[6]);});
    if(term.length>=2 && !ONDB){
      ensureONDB().then(()=>{ if(q.value.trim().toLowerCase()===term) renderLocal(); })
        .catch(()=>{const ld=libBox.querySelector('#on-load'); if(ld)ld.textContent='Couldn\'t load opennutrition.json — it must be uploaded next to the app (it won\'t load in the preview or a local file).';});
    }
  }
  function offerAI(term){
    const wrap=el(`<div><div class="empty">No match in your library, the local database, or Open Food Facts for "${esc(term)}".</div><div class="field"><button class="btn btn-primary btn-block" id="sf-aigo">Estimate "${esc(term)}" with AI</button></div></div>`);
    res.innerHTML=''; res.appendChild(wrap);
    wrap.querySelector('#sf-aigo').onclick=()=>runAI(term);
  }
  async function runAI(term){
    if(!state.settings.apiKey){res.innerHTML=`<div class="err">Add your Google Gemini API key in Settings to use AI lookup.</div>`;return;}
    res.innerHTML=`<div class="spinner">Asking AI…</div>`;
    try{
      const ai=await aiNutrition(term);
      if(!ai.per_100g || !ai.per_100g.calories){res.innerHTML=`<div class="err">AI couldn't estimate that. Try a different name or enter it manually.</div>`;return;}
      res.innerHTML=`<div class="section-label">AI estimate</div>`;
      const node=el(`<div class="row tappable"><div><div class="name">${esc(ai.name||term)}</div><div class="sub">${r0(ai.per_100g.calories)} kcal/100g · AI estimate</div></div></div>`);
      node.onclick=()=>pickPer(ai.name||term,ai.per_100g,'ai');
      res.appendChild(node);
    }catch(e){res.innerHTML=`<div class="err">${esc(e.message||'AI lookup failed.')}</div>`;}
  }
  async function doSearch(){
    const term=q.value.trim(); if(!term)return;
    const localHas=state.library.some(l=>l.name.toLowerCase().includes(term.toLowerCase())) || (DB||[]).some(f=>f.name.toLowerCase().includes(term.toLowerCase()));
    res.innerHTML=`<div class="spinner">Searching Open Food Facts…</div>`;
    try{
      const url=`https://search.openfoodfacts.org/search?q=${encodeURIComponent(term)}&page_size=20&fields=code,product_name,brands,nutriments`;
      const r=await fetch(url);
      if(!r.ok) throw new Error('Open Food Facts returned an error ('+r.status+').');
      const data=await r.json();
      const prods=(data.hits||[]).filter(p=>p.product_name && p.nutriments && p.nutriments['energy-kcal_100g']!=null);
      if(!prods.length){ if(localHas){res.innerHTML='';} else {offerAI(term);} return; }
      res.innerHTML=`<div class="section-label">Open Food Facts</div>`+prods.map((p,i)=>{
        const cal=r0(p.nutriments['energy-kcal_100g']);
        return `<div class="row tappable" data-off="${i}"><div><div class="name">${esc(p.product_name)}</div><div class="sub">${p.brands?esc(p.brands)+' · ':''}${cal} kcal/100g · Open Food Facts</div></div></div>`;
      }).join('')+`<div class="field"><button class="btn btn-block" id="sf-aibtn">None of these — estimate with AI</button></div>`;
      res.querySelectorAll('[data-off]').forEach(node=>node.onclick=()=>{
        const p=prods[+node.dataset.off], n=p.nutriments;
        const per={calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)};
        pickPer(p.product_name,per,'packaged');
      });
      res.querySelector('#sf-aibtn').onclick=()=>runAI(term);
    }catch(e){
      res.innerHTML=`<div class="err">Open Food Facts name search is unavailable (their text-search service is currently down). For an exact match, scan the product barcode; otherwise estimate with AI.</div>`
        +`<div class="btn-row"><button class="btn" id="sf-bar">Scan barcode</button><button class="btn btn-primary" id="sf-aifail">Estimate with AI</button></div>`;
      res.querySelector('#sf-bar').onclick=()=>{m.remove();openBarcode();};
      res.querySelector('#sf-aifail').onclick=()=>runAI(term);
    }
  }
  renderLocal();
  q.oninput=renderLocal;
  q.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();doSearch();}};
  m.querySelector('#sf-go').onclick=doSearch;
}

/* ---------- PHOTO ---------- */
function loadImage(file){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);res(img);};img.onerror=rej;img.src=u;});}
async function toJpegBase64(file,maxDim=1100,q=0.8){
  const img=await loadImage(file);
  const sc=Math.min(1,maxDim/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',q).split(',')[1];
}
let _camStream=null;
async function camStart(v){
  try{ _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false}); v.srcObject=_camStream; await v.play(); return true; }
  catch(e){ _camStream=null; return false; }
}
function camStop(){ if(_camStream){_camStream.getTracks().forEach(t=>t.stop());_camStream=null;} }
function camCapture(v){
  const w=v.videoWidth||1100,h=v.videoHeight||1100,sc=Math.min(1,1100/Math.max(w,h));
  const c=document.createElement('canvas'); c.width=Math.round(w*sc); c.height=Math.round(h*sc);
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',0.8).split(',')[1];
}

function genConfig(model){
  const cfg={responseMimeType:'application/json',maxOutputTokens:2048};
  if(/flash/i.test(model)) cfg.thinkingConfig={thinkingBudget:0}; // disable "thinking" so JSON isn't truncated
  return cfg;
}
async function analyzePhoto(b64){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const res=await fetch(url,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inline_data:{mime_type:'image/jpeg',data:b64}},
        {text:VISION_PROMPT}
      ]}],
      generationConfig:genConfig(model)
    })
  });
  if(!res.ok){
    let msg='Gemini API error '+res.status;
    try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Tap to try again, or use a clearer, closer photo.');
  let text=cand && cand.content && cand.content.parts ? cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim() : '';
  if(!text)throw new Error('Empty response from Gemini. Try again or enter the food manually.');
  text=text.replace(/```json|```/g,'').trim();
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }
  catch(err){ throw new Error('Could not read the AI response (it may have been cut off). Please try again.'); }
}
async function aiNutrition(name){
  const model=state.settings.model||'gemini-2.5-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.settings.apiKey)}`;
  const prompt=`Give typical nutrition per 100 grams for this food, assuming the common Singapore version if relevant: "${name}". Respond with ONLY JSON, no markdown: {"name":"","per_100g":{"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"sugar_g":0}}. If it is not a food, set calories to 0.`;
  const res=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:genConfig(model)})});
  if(!res.ok){let msg='Gemini API error '+res.status;try{const e=await res.json();if(e.error&&e.error.message)msg=e.error.message;}catch(_){}throw new Error(msg);}
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  if(cand && cand.finishReason==='MAX_TOKENS') throw new Error('The AI response was cut off. Please try again.');
  let text=cand&&cand.content&&cand.content.parts?cand.content.parts.map(p=>p.text).filter(Boolean).join('\n').trim():'';
  text=text.replace(/```json|```/g,'').trim();const s=text.indexOf('{'),e=text.lastIndexOf('}');if(s>=0&&e>=0)text=text.slice(s,e+1);
  try{ return JSON.parse(text); }catch(err){ throw new Error('Could not read the AI response. Please try again.'); }
}

      const i=+inp.dataset.g; items[i].grams=+inp.value||0;
      stage.querySelector(`[data-c="${i}"]`).value=r0(items[i].per.calories*items[i].grams/100);
    });
    stage.querySelector('#confirm-save').onclick=()=>{

      items.forEach(it=>{
        state.entries.push({id:uid(),date:viewDate,meal,name:it.name,grams:it.grams,

function addToLibrary(name,per,grams){
  const ex=state.library.find(l=>l.name.toLowerCase()===name.toLowerCase());
  if(ex){ex.per_100g=per;ex.lastGrams=grams;delete ex.perServing;}
  else state.library.push({id:uid(),name,per_100g:per,lastGrams:grams});
}
function addToLibraryServing(name,calories,portion){
  const ex=state.library.find(l=>l.name.toLowerCase()===name.toLowerCase());
  if(ex){ex.perServing={calories,portion};delete ex.per_100g;delete ex.lastGrams;}
  else state.library.push({id:uid(),name,perServing:{calories,portion}});
}

/* ---------- BARCODE ---------- */
function openBarcode(){
  const m=openModal('Scan a barcode',`
    <div id="reader"></div>
    <div class="bc-hint">Point your camera at a product barcode</div>
    <div class="field" style="margin-top:10px"><input type="number" inputmode="numeric" id="bc-num" placeholder="…or type the barcode number"></div>
    <div class="btn-row"><button class="btn" id="bc-scan">Restart camera</button><button class="btn btn-primary" id="bc-look">Look up</button></div>
    <div id="bc-stage"></div>
  `);
  const stage=m.querySelector('#bc-stage');
  let scanner=null, running=false;
  const stopScanner=()=>{ if(scanner&&running){running=false;try{return scanner.stop().then(()=>{try{scanner.clear();}catch(_){}}).catch(()=>{});}catch(_){}} return Promise.resolve(); };
  m.querySelector('#bc-look').onclick=()=>doLookup(m.querySelector('#bc-num').value.trim());
  const startScan=async()=>{
    if(typeof Html5Qrcode==='undefined'){stage.innerHTML=`<div class="hint">Camera scanning unavailable here — type the barcode number instead.</div>`;return;}
    await stopScanner();
    const opts={};
    if(typeof Html5QrcodeSupportedFormats!=='undefined'){opts.formatsToSupport=[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE];}
    try{
      scanner=new Html5Qrcode('reader',opts); running=true;
      await scanner.start({facingMode:'environment'},
        {fps:10,qrbox:(w,h)=>{const bw=Math.min(w-20,300);return {width:bw,height:Math.max(110,Math.round(bw*0.55))};},aspectRatio:1.3333,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
        (txt)=>{ if(!running)return; stopScanner(); m.querySelector('#bc-num').value=txt; doLookup(txt); },()=>{});
    }catch(e){running=false;stage.innerHTML=`<div class="hint">Could not start the camera — type the barcode number instead.</div>`;}
  };
  m.querySelector('#bc-scan').onclick=startScan;
  async function doLookup(code){
    if(!code){stage.innerHTML=`<div class="err">Enter a barcode number.</div>`;return;}
    await stopScanner();
    m.querySelector('#reader').innerHTML='';
    stage.innerHTML=`<div class="spinner">${ONDB?'Looking up product…':'Loading food database (first time only, ~10 MB)…'}</div>`;
    // 1) offline: OpenNutrition cached database (313k barcodes)
    try{
      await ensureONDB();
      const hit=ONBYEAN && ONBYEAN.get(String(code));
      if(hit){
        const per={calories:hit[1],protein_g:hit[2],carbs_g:hit[3],fat_g:hit[4],sugar_g:hit[5]};
        weighAndLog(m,stage,hit[0],per,'opennutrition',hit[6]); return;
      }
    }catch(e){/* fall through to online */}
    // 2) online: Open Food Facts
    stage.innerHTML=`<div class="spinner">Looking up product…</div>`;
    try{
      const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,nutriments`);
      const data=await res.json();
      if(!data.product){stage.innerHTML=`<div class="err">Product not found in OpenNutrition or Open Food Facts. Try entering it manually.</div><div class="btn-row"><button class="btn" id="man">Enter manually</button></div>`;stage.querySelector('#man').onclick=()=>{m.remove();openManual();};return;}
      const n=data.product.nutriments||{};
      const per={calories:+(n['energy-kcal_100g']||0),protein_g:+(n['proteins_100g']||0),carbs_g:+(n['carbohydrates_100g']||0),fat_g:+(n['fat_100g']||0),sugar_g:+(n['sugars_100g']||0)};
      const name=data.product.product_name||('Item '+code);
      weighAndLog(m,stage,name,per,'barcode');
    }catch(e){stage.innerHTML=`<div class="err">Lookup failed. Check your connection or enter manually.</div>`;}
  }
}

/* shared: weigh a known per-100g item and log */
function weighAndLog(m,stage,name,per,source,defGrams,onDone){
  per={calories:+per.calories||0,protein_g:+per.protein_g||0,carbs_g:+per.carbs_g||0,fat_g:+per.fat_g||0,sugar_g:+per.sugar_g||0};

    <div class="field"><button class="btn btn-primary btn-block" id="wl-save">Log item</button></div>`;
  const sv=wireServing(stage,per,defGrams);

  };
}

/* edit/delete a food entry */
function editFood(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  const perServing=(e.unitCal!=null);
  const qtyNow=perServing&&e.unitCal?e.calories/e.unitCal:1;
  const per100=e.grams?e.calories/e.grams*100:0;
  const amountField=perServing
    ? `<div class="field"><label>Quantity (number of ${esc(e.portion||'serving')})</label><input type="number" inputmode="decimal" id="ef-q" value="${r1(qtyNow)}"></div>
       <div class="hint">${r0(e.unitCal)} kcal per ${esc(e.portion||'serving')}.</div>`
    : `<div class="field"><label>Weight (g)</label><input type="number" inputmode="decimal" id="ef-g" value="${r1(e.grams)}"></div>
       <div class="hint">Calories and macros scale with weight (currently ${r0(per100)} kcal/100g).</div>`;
  const m=openModal('Edit item',`
    <div class="field"><label>Name</label><input id="ef-name" value="${esc(e.name)}"></div>
    ${amountField}
    ${mealChips(e.meal||defaultMeal())}
    <div class="toggle-row"><input type="checkbox" id="ef-lib" style="width:auto"><label for="ef-lib" style="margin:0">Save to library</label></div>
    <div class="field"><button class="btn btn-primary btn-block" id="ef-save">Save changes</button></div>
    <div class="field"><button class="btn btn-danger btn-block" id="ef-del">Delete entry</button></div>
  `);
  const getMeal=wireMealChips(m.querySelector('#m-body'));
  m.querySelector('#ef-save').onclick=()=>{
    e.name=m.querySelector('#ef-name').value.trim()||e.name;
    e.meal=getMeal();
    if(perServing){
      const qty=+m.querySelector('#ef-q').value||0;
      e.calories=qty*e.unitCal; e.servingLabel=`${qty} ${e.portion||'serving'}`;
      if(m.querySelector('#ef-lib').checked)addToLibraryServing(e.name,e.unitCal,e.portion||'serving');
    }else{
      const g=+m.querySelector('#ef-g').value||0;const ratio=e.grams?g/e.grams:0;

      if(m.querySelector('#ef-lib').checked && g) addToLibrary(e.name,{calories:e.calories/g*100,protein_g:e.protein_g/g*100,carbs_g:e.carbs_g/g*100,fat_g:e.fat_g/g*100,sugar_g:(e.sugar_g||0)/g*100},g);

let chartRange=30, showTrend=true;
function drawChartArea(){
  const area=$('chart-area');if(!area)return;
  area.innerHTML=`
    <div class="chart-wrap">${chartSVG()}</div>
    <div class="range-row">
      ${[7,30,90,9999].map(r=>`<button class="chip${chartRange===r?' sel':''}" data-r="${r}">${r===9999?'All':r+'d'}</button>`).join('')}
    </div>
    <div class="toggle-row"><input type="checkbox" id="trend" ${showTrend?'checked':''} style="width:auto"><label for="trend" style="margin:0">7-day trend line</label></div>`;
  area.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{chartRange=+b.dataset.r;drawChartArea();});
  area.querySelector('#trend').onchange=(e)=>{showTrend=e.target.checked;drawChartArea();};
}
function chartSVG(){
  const all=[...state.weights].sort((a,b)=>a.date<b.date?-1:1);
  if(all.length<1)return `<div class="empty" style="border:none">Log a few mornings to see your trend.</div>`;
  const cutoff=chartRange>=9999?'0000':new Date(Date.now()-chartRange*864e5).toISOString().slice(0,10);
  const pts=all.filter(w=>w.date>=cutoff);
  if(pts.length<2)return `<div class="empty" style="border:none">Need at least two weigh-ins in this range.</div>`;
  const W=520,H=240,padL=38,padR=10,padT=14,padB=26;
  const xs=pts.map(p=>new Date(p.date).getTime());
  const ys=pts.map(p=>p.weight);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=(maxY-minY)*0.15||1;minY-=pad;maxY+=pad;
  const X=t=>padL+(maxX===minX?0:(t-minX)/(maxX-minX))*(W-padL-padR);
  const Y=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  // gridlines
  let grid='';const ticks=4;
  for(let i=0;i<=ticks;i++){const v=minY+(maxY-minY)*i/ticks;const y=Y(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--divider)" stroke-width="1"/>`;
    grid+=`<text x="0" y="${y+4}" font-size="11" fill="var(--text-soft)">${r1(v)}</text>`;}
  // trend (7-day moving avg)
  let trendPath='';
  if(showTrend){
    const tp=pts.map((p,i)=>{const d0=new Date(p.date).getTime();
      const win=pts.filter(q=>{const d=new Date(q.date).getTime();return d<=d0&&d>d0-7*864e5;});
      const avg=win.reduce((s,q)=>s+q.weight,0)/win.length;return [X(d0),Y(avg)];});
    trendPath=`<polyline fill="none" stroke="var(--accent)" stroke-opacity="0.4" stroke-width="3" points="${tp.map(p=>p.join(',')).join(' ')}"/>`;
  }
  const line=pts.map(p=>`${X(new Date(p.date).getTime())},${Y(p.weight)}`).join(' ');
  const dots=pts.map(p=>{const x=X(new Date(p.date).getTime()),y=Y(p.weight);return `<rect x="${x-2.5}" y="${y-2.5}" width="5" height="5" fill="var(--accent)"/>`;}).join('');
  const first=new Date(pts[0].date).toLocaleDateString(undefined,{day:'numeric',month:'short'});
  const last=new Date(pts[pts.length-1].date).toLocaleDateString(undefined,{day:'numeric',month:'short'});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    ${grid}
    ${trendPath}
    <polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${line}"/>
    ${dots}
    <text x="${padL}" y="${H-6}" font-size="11" fill="var(--text-soft)">${first}</text>
    <text x="${W-padR}" y="${H-6}" font-size="11" fill="var(--text-soft)" text-anchor="end">${last}</text>
  </svg>`;
}

/* ---------- cloud sync (Supabase) ---------- */
function initCloud(){
  if(SUPABASE_URL && /^https?:\/\//.test(SUPABASE_URL) && window.supabase){
    try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); CLOUD=true; }catch(e){ CLOUD=false; }
  }
}
let _pushT=null;
function scheduleCloudPush(){ if(!CLOUD||!user)return; clearTimeout(_pushT); _pushT=setTimeout(pushCloud,800); }
async function pushCloud(){ if(!CLOUD||!user)return; try{ await sb.from('profiles').upsert({id:user.id,data:state,updated_at:new Date().toISOString()}); }catch(e){} }
function hasData(){ return (state.entries&&state.entries.length)||(state.weights&&state.weights.length)||(state.exercise&&state.exercise.length)||(state.library&&state.library.length); }
async function loadCloudIntoState(){
  let row=null;
  try{ const r=await sb.from('profiles').select('data').eq('id',user.id).maybeSingle(); row=r.data; }catch(e){}
  if(row&&row.data){ state=Object.assign(structuredClone(DEFAULT),row.data); saveLocal(); }   // cloud wins
  else if(hasData()){ await pushCloud(); }                                                       // migrate this device's data up
}
async function onAuth(){
  if(user){ try{ await loadCloudIntoState(); }catch(e){} showApp(); }
  else showLogin();
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; try{localStorage.removeItem(KEY);}catch(e){} state=structuredClone(DEFAULT); showLogin(); }

  const a=document.getElementById('auth-screen'); if(a)a.style.display='none';

}

    <div class="field"><label>Email</label><input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>
    <button class="btn btn-primary btn-block" id="auth-magic" style="margin-top:14px">Email me a sign-in link</button>
    <div class="auth-or">or</div>
    <button class="btn btn-block" id="auth-google">Continue with Google</button>
  </div>`;
  const msg=s.querySelector('#auth-msg');
  const redirect=location.href.split('#')[0].split('?')[0];
  s.querySelector('#auth-magic').onclick=async()=>{
    const email=s.querySelector('#auth-email').value.trim();
    if(!email){msg.innerHTML='<div class="err">Enter your email.</div>';return;}
    msg.innerHTML='<div class="hint">Sending…</div>';
    try{ const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:redirect}}); if(error)throw error;
      msg.innerHTML='<div class="note">Check your email for a sign-in link, then return here.</div>';
    }catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Could not send the link.')+'</div>'; }
  };
  s.querySelector('#auth-google').onclick=async()=>{
    msg.innerHTML='<div class="hint">Redirecting to Google…</div>';
    try{ const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirect}}); if(error)throw error; }
    catch(e){ msg.innerHTML='<div class="err">'+esc(e.message||'Google sign-in failed.')+'</div>'; }
  };
}
async function boot(){
  initCloud();
  if(!CLOUD){ render(); layout(); return; }
  document.getElementById('app').style.display='none';
  document.querySelector('.tabbar').style.display='none';
  const fab=document.getElementById('fab'); if(fab)fab.style.display='none';
  const s=document.getElementById('auth-screen'); s.style.display='flex';
  s.innerHTML='<div class="auth-wrap"><div class="auth-logo">NomNom</div><div class="auth-tag">Loading…</div></div>';
  try{
    const {data}=await sb.auth.getSession();
    user=(data&&data.session&&data.session.user)||null;
    sb.auth.onAuthStateChange((_e,sess)=>{ const u=(sess&&sess.user)||null; const changed=((u&&u.id)||null)!==((user&&user.id)||null); user=u; if(changed) onAuth(); });
    await onAuth();
  }catch(e){ CLOUD=false; document.getElementById('app').style.display=''; document.querySelector('.tabbar').style.display=''; render(); layout(); }
}

/* ---------- init ---------- */
document.querySelectorAll('.tabbar .tab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;if(tab==='today')viewDate=todayKey();closeAllModals();});
window.addEventListener('resize',layout);
window.addEventListener('orientationchange',()=>setTimeout(layout,250));
if(window.visualViewport)window.visualViewport.addEventListener('resize',layout);
window.addEventListener('load',layout);
boot();
</script>
</body>
